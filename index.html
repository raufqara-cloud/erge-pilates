async function hashPin(pin){
  try{
    var enc=new TextEncoder();
    var data=enc.encode(String(pin));
    var hashBuf=await crypto.subtle.digest('SHA-256',data);
    var arr=Array.from(new Uint8Array(hashBuf));
    return arr.map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }catch(e){
    console.warn('[auth] hashPin error:',e.message);
    return '';
  }
}

function norm(s){
  if(!s)return '';
  var result='';
  var lower=s.toLowerCase();
  for(var i=0;i<lower.length;i++){
    var c=lower[i];
    if(c==='\u0131')c='i';
    else if(c==='\u0259')c='e';
    else if(c==='\u015f')c='s';
    else if(c==='\u00e7')c='c';
    else if(c==='\u00f6')c='o';
    else if(c==='\u00fc')c='u';
    else if(c==='\u011f')c='g';
    else if(c==='\u0130')c='i';
    result+=c;
  }
  return result;
}

  try{
    return new Intl.DateTimeFormat('az-AZ',{
      timeZone:'Asia/Baku',
      year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:false
    }).format(new Date(ts)).replace(',','');

    return ts.slice(0,16).replace('T',' ');

}

      var parts=[];

function toNum(v,def){
  var n=parseFloat(v);
  return isNaN(n)?(def||0):n;
}
function money(n){
  n=toNum(n,0);
  return Math.round(n*100)/100;
}
function getProgramById(id){
  for(var i=0;i<(D.programs||[]).length;i++){
    if(D.programs[i].id===id)return D.programs[i];
  }
  return null;
}
function calcSubUsed(subId,attsArr){
  if(!subId||subId==='null')return 0;
  var arr=attsArr||D.attendances||[];
  var used=0;
  for(var i=0;i<arr.length;i++){
    if(arr[i].subscription_id===subId)used++;
  }
  return used;
}
function calcSubRemaining(sub,attsArr){
  if(!sub)return 0;
  if(sub.is_partner)return null;
  var total=parseInt(sub.sessions_total)||0;
  return Math.max(0,total-calcSubUsed(sub.id,attsArr));
}
function getAttsForCalc(custId){
  if(custId&&S.custDetail&&S.selCust===custId&&S.custDetail.atts)return S.custDetail.atts;
  if(D.attFull)return D.attendances||[];
  return null;
}
function calcRemainingForDisplay(sub){
  if(!sub)return 0;
  if(sub.is_partner)return null;
  // Prefer fresh DB-counted remaining from display cache when available
  if(S.remainingDisplayCache&&S.remainingDisplayCache[sub.id]!==undefined)
    return S.remainingDisplayCache[sub.id];
  var atts=getAttsForCalc(sub.customer_id);
  if(atts)return calcSubRemaining(sub,atts);
  return Math.max(0,(parseInt(sub.remaining)||0));
}

// refreshRemainingDisplay — fetches fresh DB attendance counts for all active non-partner
// studio subscriptions and populates S.remainingDisplayCache.
// Display-only: does NOT write to DB. Does NOT affect recalcSubscriptionRemaining().
async function refreshRemainingDisplay(){
  if(S.remainingDisplayLoading)return;
  S.remainingDisplayLoading=true;
  try{
    var singleP=['ROF','RPS','RPP','ROTG','ROTI','RTEST'];
    // Collect relevant sub IDs: is_active=true, non-partner, non-single
    var subIds=[];
    for(var i=0;i<D.subscriptions.length;i++){
      var s=D.subscriptions[i];
      if(!s.is_active)continue;
      if(s.is_partner)continue;
      if(singleP.indexOf(s.program_id)>=0)continue;
      subIds.push(s.id);
    }
    var cache={};
    // Pre-populate from current sub.remaining as fallback (overwritten by fresh DB count below)
    for(var i=0;i<D.subscriptions.length;i++){
      var s=D.subscriptions[i];
      if(!s.is_active||s.is_partner||singleP.indexOf(s.program_id)>=0)continue;
      var tot=parseInt(s.sessions_total)||0;
      cache[s.id]=Math.max(0,tot-(parseInt(s.remaining)>=0?tot-(parseInt(s.remaining)||0):0));
    }
    // Fetch fresh attendance counts from DB in batches of 50
    var batchSize=50;
    var freshCount={};
    for(var b=0;b<subIds.length;b+=batchSize){
      var batch=subIds.slice(b,b+batchSize);
      if(!batch.length)break;
      var rows=await dbGet('attendances','subscription_id=in.('+batch.join(',')+')'+'&select=subscription_id,id');
      for(var j=0;j<rows.length;j++){
        var sid=rows[j].subscription_id;
        if(sid)freshCount[sid]=(freshCount[sid]||0)+1;
      }
    }
    // Compute fresh remaining per sub
    for(var i=0;i<D.subscriptions.length;i++){
      var s=D.subscriptions[i];
      if(!s.is_active||s.is_partner||singleP.indexOf(s.program_id)>=0)continue;
      var tot=parseInt(s.sessions_total)||0;
      var used=freshCount[s.id]||0;
      cache[s.id]=Math.max(0,tot-used);
    }
    S.remainingDisplayCache=cache;
  }catch(e){
    // On error, leave cache null so display falls back to local count gracefully
    S.remainingDisplayCache=null;
  }
  S.remainingDisplayLoading=false;
  render();
}

function calcDebt(sub){
  if(!sub)return 0;
  var due=(sub.price_due!==undefined&&sub.price_due!==null)?toNum(sub.price_due,0):0;
  var paid=toNum(sub.price_paid,0);
  return Math.max(0,money(due-paid));
}
function subListPriceAtSale(sub){
  if(!sub)return 0;
  if(sub.list_price_at_sale!==undefined&&sub.list_price_at_sale!==null&&sub.list_price_at_sale!=='')return money(sub.list_price_at_sale);
  // Backward compatibility: old subscriptions did not store discount columns.
  // For old rows, treat current price_due as the sale price and discount as 0.
  if(sub.price_due!==undefined&&sub.price_due!==null&&sub.price_due!=='')return money(sub.price_due);
  var prog=getProgramById(sub.program_id);
  return prog?money(prog.list_price):0;
}
function subDiscountAmount(sub){
  if(!sub)return 0;
  if(sub.discount_amount!==undefined&&sub.discount_amount!==null&&sub.discount_amount!=='')return money(sub.discount_amount);
  return 0;
}
function subDiscountNote(sub){
  return (sub&&sub.discount_note)?String(sub.discount_note):'';
}
function calcSubDueFromDiscount(listPrice,discount){
  listPrice=money(listPrice||0);
  discount=money(discount||0);
  if(discount<0)discount=0;
  if(discount>listPrice)discount=listPrice;
  return money(listPrice-discount);
}
function updateSubscriptionLocal(subId,patch){
  function apply(arr){
    if(!arr)return;
    for(var i=0;i<arr.length;i++){
      if(arr[i].id===subId){Object.assign(arr[i],patch);break;}
    }
  }
  apply(D.subscriptions);
  if(S.custDetail&&S.custDetail.subs)apply(S.custDetail.subs);
}


function activeSub(custId){
  var today=td();
  var pending=null;
  for(var i=0;i<D.subscriptions.length;i++){
    var s=D.subscriptions[i];
    if(s.customer_id!==custId||!s.is_active)continue;
    if(s.status==='pending'){
      if(!pending)pending=s;
      continue;
    }
    var rem=s.is_partner?null:calcRemainingForDisplay(s);
    if(s.end_date>=today&&(s.is_partner||(rem!==null&&rem>0)))return s;
  }
  return pending;
}

function subStatus(sub){
  if(!sub)return{t:'none',txt:'Abunəlik yoxdur'};
  if(sub.status==='pending')return{t:'pending',txt:'Ödənilib, gözləyir'};
  if(!sub.is_active)return{t:'exp',txt:'Deaktiv'};
  if(sub.end_date<td())return{t:'exp',txt:'Müddət bitib'};
  if(sub.is_partner){
    var used=0;
    var cm=curMonth();
    for(var i=0;i<D.attendances.length;i++){
      var a=D.attendances[i];
      if(a.subscription_id===sub.id&&a.class_date.indexOf(cm)===0)used++;
    }
    var left=12-used;
    if(left<=0)return{t:'exp',txt:'Bu ay limiti dolub'};
    if(left<=2)return{t:'warn',txt:'Bu ay '+left+' dərs qaldı'};
    return{t:'ok',txt:'Bu ay '+left+' dərs qaldı'};
  }
  var rem=calcRemainingForDisplay(sub);
  if(rem<=0)return{t:'exp',txt:'Dərs sayı tamamlandı'};
  if(rem<=2)return{t:'warn',txt:rem+' dərs qaldı'};
  return{t:'ok',txt:rem+' dərs qaldı'};
}

function custStatus(custId){return subStatus(activeSub(custId));}

async function doAddSub(custId,progId,listPriceAtSale,discountAmount,discountNote,priceDue,pricePaid,startDate,isPending,acctId){
  S.saving=true;render();
  try{
    var prog=null;
    for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId){prog=D.programs[i];break;}}
    if(!prog)throw new Error('Proqram tapılmadı');
    var sd=startDate||td();
    var end=addDays(sd,prog.duration_days);
    var listNum=money(listPriceAtSale!==undefined&&listPriceAtSale!==''?listPriceAtSale:prog.list_price);
    var discNum=money(discountAmount||0);
    if(discNum<0)discNum=0;
    if(discNum>listNum)discNum=listNum;
    var dueNum=calcSubDueFromDiscount(listNum,discNum);
    // UI also sends priceDue; final source of truth is list - discount.
    if(priceDue!==undefined&&priceDue!==''&&Math.abs(money(priceDue)-dueNum)>0.01){
      dueNum=calcSubDueFromDiscount(listNum,discNum);
    }
    var paidNum=money(pricePaid||0);
    // Guard: price_paid > 0 requires a payment account; price_paid = 0 → no txn, account optional
    if(paidNum>0&&!acctId){
      S.saving=false;
      alert('Ödəniş məbləği ('+paidNum+' AZN) daxil edilib. Ödəniş hesabı seçilməlidir.');
      render();
      return;
    }
    // Subscription overlap hard guard: block if customer already has an open subscription
    if(!await dbAssertCanCreateOrEditSubscription(custId,sd,null,'create')){
      S.saving=false;render();return;
    }

function isActiveBookingForDate(booking,dateStr){
  if(booking.is_active===false)return false;
  if(booking.valid_from&&dateStr<booking.valid_from)return false;
  if(booking.valid_until&&dateStr>booking.valid_until)return false;
  return true;
}

function hasActivePermanentBookingOnDow(customerId,dow,excludeBookingId){
  if(!S.bronData)return false;
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    if(b.customer_id!==customerId)continue;
    if(b.type!=='permanent')continue;
    if(excludeBookingId&&b.id===excludeBookingId)continue;
    if(b.day_of_week!==dow)continue;
    if(b.is_active===false)continue;
    return true;
  }
  return false;
}

function hasAbsentForBookingOnDate(bookingId,dateStr){
  if(!S.bronExceptions)return false;
  for(var i=0;i<S.bronExceptions.length;i++){
    var e=S.bronExceptions[i];
    if(e.booking_id===bookingId&&e.exception_date===dateStr&&e.type==='absent')return true;
  }
  return false;
}

function hasCustomerActiveBookingOnDate(customerId,dateStr){
  if(!S.bronData)return false;
  var d=new Date(dateStr+'T00:00:00').getDay();
  var dow=(d===0)?7:d; // Sun=7, Mon=1..Sat=6
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    if(b.customer_id!==customerId)continue;
    if(b.type!=='permanent')continue;
    if(b.day_of_week!==dow)continue;
    if(!isActiveBookingForDate(b,dateStr))continue;
    if(hasAbsentForBookingOnDate(b.id,dateStr))continue;
    return true;
  }
  return false;
}

function hasCustomerAttendanceOnDate(customerId,dateStr){
  var lists=[D.attendances];
  if(S.selDateAtts)lists.push(S.selDateAtts);
  if(S.custDetail&&S.custDetail.atts)lists.push(S.custDetail.atts);
  var seen={};
  for(var li=0;li<lists.length;li++){
    var arr=lists[li];if(!arr)continue;
    for(var i=0;i<arr.length;i++){
      var a=arr[i];
      if(a.customer_id===customerId&&a.class_date===dateStr){
        if(!seen[a.id]){seen[a.id]=true;return true;}
      }
    }
  }
  return false;
}

function assertCanCreateAttendance(customerId,dateStr){
  if(hasCustomerAttendanceOnDate(customerId,dateStr)){
    alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');

  return true;
}

// ── SUBSCRIPTION HARD GUARDS v1 ─────────────────────────────────────────────
// isSubscriptionOperationallyClosed: true only when subscription can no longer block a new one.
// Two independent closing conditions — BOTH safe to call for active, pending, partner, legacy rows:
//   1) end_date is present AND end_date < candidateStartDate  (period has elapsed)
//   2) remaining is a real usable number AND remaining <= 0   (sessions exhausted)
// IMPORTANT: null/undefined/NaN remaining is NOT treated as 0.
//   Partner subs often have null remaining — end_date governs.
//   Pending subs may have no reliable end_date yet — remaining governs.
//   If BOTH are missing/unavailable, treat as still open (blocking) — safe direction.
function isSubscriptionOperationallyClosed(existingSub,candidateStartDate){
  var endDate=existingSub.end_date||'';
  // Condition 1: end_date strictly before candidate
  if(endDate&&endDate<candidateStartDate)return true;
  // Condition 2: remaining is a real numeric value AND depleted
  var rawRem=existingSub.remaining;
  if(rawRem!==null&&rawRem!==undefined){
    var rem=parseFloat(rawRem);
    if(!isNaN(rem)&&rem<=0)return true;
  }
  // Missing/null/NaN remaining with end_date >= candidateStartDate (or no end_date) → still open
  return false;
}

// isSubscriptionActiveOrPending: true when sub is operationally live (not explicitly disabled)
function isSubscriptionActiveOrPending(sub){
  if(sub.is_active===false)return false;
  var st=sub.status||'';
  if(st==='active'||st==='pending')return true;
  if(!st&&sub.is_active!==false)return true; // legacy row without status field
  return false;
}

// hasConflictingSubscriptionLocal: local-cache conflict scan
function hasConflictingSubscriptionLocal(customerId,candidateStartDate,excludeSubId){
  var lists=[D.subscriptions];
  if(S.custDetail&&S.custDetail.subs)lists.push(S.custDetail.subs);
  var seen={};
  for(var li=0;li<lists.length;li++){
    var arr=lists[li];if(!arr)continue;
    for(var i=0;i<arr.length;i++){
      var sub=arr[i];
      if(sub.customer_id!==customerId)continue;
      if(excludeSubId&&sub.id===excludeSubId)continue;
      if(seen[sub.id])continue;
      seen[sub.id]=true;
      if(!isSubscriptionActiveOrPending(sub))continue;
      // Same start date is always forbidden
      if(sub.start_date===candidateStartDate)return true;
      // Operationally open and overlapping
      if(!isSubscriptionOperationallyClosed(sub,candidateStartDate))return true;
    }
  }
  return false;
}

// dbAssertCanCreateOrEditSubscription: local + live DB subscription conflict check
// mode: 'create' | 'edit' | 'activate'
// Returns true = allowed, false = blocked (alert already shown)
async function dbAssertCanCreateOrEditSubscription(customerId,candidateStartDate,excludeSubId,mode){
  function _alertSub(m){
    if(m==='edit')alert('Bu tarix başqa açıq abunəliklə konflikt yaradır. Abunəlik başlanğıc tarixini dəyişmək olmaz.');
    else if(m==='activate')alert('Bu tarixdə başqa açıq abunəlik olduğu üçün pending abunəlik aktivləşdirilə bilməz.');
    else alert('Bu müştərinin bu tarixə açıq abunəliyi var. Mövcud abunəlik bitmədən və ya dərs qalığı sıfırlanmadan yeni abunəlik yaratmaq olmaz.');
  }
  // 1) Local cache check
  if(hasConflictingSubscriptionLocal(customerId,candidateStartDate,excludeSubId)){
    _alertSub(mode);return false;
  }
  // 2) Live DB check (catches stale cache / other device)
  try{
    var dbSubs=await dbGet('subscriptions','customer_id=eq.'+customerId+'&is_active=neq.false&select=id,start_date,end_date,remaining,status,is_active&limit=50');
    if(dbSubs&&dbSubs.length>0){
      for(var i=0;i<dbSubs.length;i++){
        var sub=dbSubs[i];
        if(excludeSubId&&sub.id===excludeSubId)continue;
        if(!isSubscriptionActiveOrPending(sub))continue;
        if(sub.start_date===candidateStartDate){_alertSub(mode);return false;}
        if(!isSubscriptionOperationallyClosed(sub,candidateStartDate)){_alertSub(mode);return false;}
      }
    }
  }catch(e){}
  return true;
}

async function doAtt(custId,subId,classTime,instId,attDate){
  var _attDate=attDate||td();
  var _lock=acquireAttLock(custId,_attDate);
  if(!_lock)return;
  try{
    if(!await dbAssertCanCreateAttendance(custId,_attDate))return;
    if(!await checkSlotCapacity(_attDate,classTime))return;
    S.saving=true;render();
    try{
      var cust=null,sub=null,inst=null;
      for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
      for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
      for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
      // Activate pending subscription on first attendance
      if(sub&&sub.status==='pending'){
        var prog=null;
        for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===sub.program_id){prog=D.programs[i];break;}}
        var newStart=_attDate;
        var newEnd=addDays(newStart,prog?prog.duration_days:30);
        // Subscription conflict guard: ensure no other open sub exists for this start date
        if(!await dbAssertCanCreateOrEditSubscription(custId,newStart,subId,'activate')){
          S.saving=false;render();return;
        }
        await dbPatch('subscriptions','id=eq.'+subId,{status:'active',start_date:newStart,end_date:newEnd});
        sub.status='active';sub.start_date=newStart;sub.end_date=newEnd;
      }
      var att={id:uid(),customer_id:custId,customer_name:cust.name,subscription_id:subId,
        program_id:sub.program_id,program_name:sub.program_name,
        class_date:_attDate,class_time:classTime,
        instructor_id:instId,instructor_name:inst?inst.full_name:''};
      await dbPost('attendances',att);
      logAudit('attendance',att.id,'create',
        (cust?cust.name:custId)+' — '+(att.program_name||'')+' — '+att.class_date+(att.class_time?' '+att.class_time:''),
        null,{customer_id:att.customer_id,customer_name:att.customer_name,subscription_id:att.subscription_id,program_id:att.program_id,program_name:att.program_name,class_date:att.class_date,class_time:att.class_time,instructor_id:att.instructor_id,instructor_name:att.instructor_name,source_flow:'doAtt'});
      D.attendances.unshift(att);
       if(att.class_date===td()&&S.selDateAtts!==null){S.selDateAtts.unshift(att);}
      // Remaining: real attendance count əsasında yenidən hesabla
      if(!sub.is_partner){
        await recalcSubscriptionRemaining(subId);
      }
      S.showAtt=false;
      S.showAlert={t:'ok',cust:cust,st:subStatus(activeSub(custId))};
    }catch(e){alert('Xeta: '+e.message);}
    S.saving=false;render();
  }finally{releaseAttLock(_lock);}
}

async function doFreeze(subId,days,note){
  S.saving=true;render();
  try{
    var sub=null;
    for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
    var newEnd=addDays(sub.end_date,parseInt(days));
    var fEnd=newEnd; // freeze_end = new end_date
    await dbPost('freezes',{id:uid(),subscription_id:subId,freeze_start:td(),freeze_end:fEnd,days_count:parseInt(days),original_end_date:sub.end_date,note:note||''});
    await dbPatch('subscriptions','id=eq.'+subId,{end_date:newEnd,freeze_end:fEnd});
    sub.end_date=newEnd;sub.freeze_end=fEnd;
    S.showFreeze=false;
    if(S.custDetail){S.custDetail=null;S.custDetailLoading=true;fetchCustDetail(S.selCust);}
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

    +'<div class="scard"><div class="snum">'+D.customers.length+'</div><div class="slbl">Mustəri</div></div>'
    +'<div class="scard"><div class="snum">'+ew.length+'</div><div class="slbl">Abunə bitir</div></div>'
    +'</div>';
  if(ex.length)h+='<div class="al al-r">'+ex.length+' mustərinin aktiv abunəliyi yoxdur</div>';
  if(ew.length)h+='<div class="al al-y">Az ders qalan: '+ew.map(function(c){return c.name;}).join(', ')+'</div>';
  h+='<div class="slabel">'+(isToday?'BU GUN ISTIRAK ETDILER':fmt(viewDate).toUpperCase()+' ISTIRAK ETDILER')+'</div>';
  if(S.selDateLoading)h+='<div class="empty"><span class="spin"></span> Yuklenilir...</div>';
  else if(!ta.length)h+='<div class="empty">'+(isToday?'Hələ heç kim qeydiyyatdan keçməyib':fmt(viewDate)+' tarixində iştirak yoxdur')+'</div>';
  else{
    // Group by time slot
    var groups={};
    var groupTimes=[];
    for(var i=0;i<ta.length;i++){
      var t=ta[i].class_time;
      if(!groups[t]){groups[t]=[];groupTimes.push(t);}
      groups[t].push(ta[i]);
    }
    groupTimes.sort();
    for(var gi=0;gi<groupTimes.length;gi++){
      var gtime=groupTimes[gi];
      var gatts=groups[gtime];
      var gkey='home-'+gtime;
      var gopen=S.homeSlot===gkey;
      // Get unique instructors for this slot
      var instNames=[];
      for(var k=0;k<gatts.length;k++){
        var iname=gatts[k].instructor_name||'';
        if(iname&&instNames.indexOf(iname)<0)instNames.push(iname);
      }
      h+='<div style="margin-bottom:6px;border:1px solid #eaeaea;border-radius:10px;overflow:hidden">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:'+(gopen?'#f0faf5':'#fff')+';cursor:pointer" onclick="S.homeSlot=S.homeSlot===\''+gkey+'\' ?null:\''+gkey+'\';render()">';
      h+='<div style="display:flex;align-items:center;gap:10px">';
      h+='<span style="font-size:15px;font-weight:700;color:#1D9E75">'+gtime+'</span>';
      h+='<span style="font-size:12px;color:#555">'+(instNames.join(', ') || '—')+'</span>';
      h+='</div>';
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<span style="background:#1D9E75;color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700">'+gatts.length+' nəfər</span>';
      h+='<span style="color:#1D9E75;font-size:13px">'+(gopen?'▲':'▼')+'</span>';
      h+='</div></div>';
      if(gopen){
        for(var k=0;k<gatts.length;k++){
          var a=gatts[k];
          var _aBg=a._isTrial?'background:#FFFBF0':'';
          h+='<div class="attitem" style="border-top:1px solid #f0f0f0;'+_aBg+'">';
          h+='<div><div style="font-size:11px;color:#aaa;font-weight:500">'+(a._isTrial?'Lead':''+a.customer_id)+'</div>';
          h+='<div style="font-size:13px;font-weight:600">'+escHtml(a.customer_name)+'</div>';
          h+='<div style="font-size:11px;color:#bbb">'+escHtml(a.instructor_name||'')+(a.program_name?' — '+escHtml(a.program_name):'')+'</div></div>';
          if(a._isTrial){
            h+='<span class="badge" style="font-size:10px;background:#FFF8E1;color:#F57F17;border:1px solid #FFE082">SINAQ (Lead)</span>';
          }else{

          }
          h+='</div>';
        }
      }
      h+='</div>';
    }
  }
  return h;
}

function rAtt(){
  var q=norm(S.search);
  var list=[];
  for(var i=0;i<D.customers.length;i++){
    var c=D.customers[i];
    if(!q||norm(c.name).indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||(c.phone||'').indexOf(q)>=0){
      list.push(c);
    }
  }
  var h='<div class="ph"><div class="pt">Davamiyyət Qeydiyyati</div></div>'
    +'<div class="sbar"><span class="sicon">&#128269;</span>'
    +'<input id="att-search" placeholder="Ad, ID veya telefon..." value="'+S.search+'" oninput="ss(this.value)"></div>';
  if(!list.length)h+='<div class="empty">'+(S.search?'Tapilmadi':'Hələ mustəri yoxdur')+'</div>';
  for(var i=0;i<list.length;i++){
    var c=list[i];
    var sub=activeSub(c.id);var st=subStatus(sub);
    var bc=st.t==='ok'?'b-green':st.t==='warn'?'b-yellow':'b-red';
    var isP=sub&&sub.is_partner;
    var done=false;
    for(var j=0;j<D.attendances.length;j++){if(D.attendances[j].customer_id===c.id&&D.attendances[j].class_date===td()){done=true;break;}}
    var frozen=sub&&sub.freeze_end&&sub.freeze_end>=td();
    h+='<div class="card"><div class="cleft"><div class="av '+(isP?'av-p':'')+'">'+ini(c.name)+'</div>'
      +'<div><div class="cid">'+c.id+'</div><div class="cname">'+c.name+'</div><div class="csub">'+c.phone+'</div></div></div>'
      +'<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:flex-end">'
      +(frozen?'<span class="badge b-blue">Dondurulub</span>':'')
      +(isP?'<span class="badge b-purple">Partner</span>':'')
      +'<span class="badge '+bc+'">'+st.txt+'</span>';
    if(frozen||done){
      h+='<span class="badge b-gray">'+(done?'Qeydə alindi':'Dondurulub')+'</span>';
    }else if(st.t==='none'||st.t==='exp'){
      h+='<button class="btn btn-b btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openSingleAtt(\''+c.id+'\')">+ Tək giriş</button>';
      if(st.t==='exp'){h+='<button class="btn btn-g btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openAtt(\''+c.id+'\')">+ Abunə ilə</button>';}
    }else if(sub&&['ROF','RPP','RPS','ROTG','ROTI'].indexOf(sub.program_id)>=0){
      h+='<button class="btn btn-g btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openAtt(\''+c.id+'\')">+ İştirak</button>';
    }else{
      h+='<button class="btn btn-g btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openAtt(\''+c.id+'\')">+ İştirak</button>';
    }
    h+='</div></div>';
  }
  return h;
}

function rCusts(){
  var q=norm(S.search);
  var list=[];
  for(var i=0;i<D.customers.length;i++){
    var c=D.customers[i];
    if(q&&norm(c.name).indexOf(q)<0&&c.id.toLowerCase().indexOf(q)<0&&(c.phone||'').indexOf(q)<0)continue;
    if(S.custTab==='active'){var s=activeSub(c.id);if(!s||s.end_date<td())continue;}
    if(S.custTab==='expired'){var s=activeSub(c.id);if(s&&s.end_date>=td())continue;}
    list.push(c);
  }
  var h='<div class="ph"><div class="pt">Mustərilər</div><button class="btn btn-g" onclick="S.showAddCust=true;render()">+ Yeni Mustəri</button></div>'
    +'<div class="sbar"><span class="sicon">&#128269;</span>'
    +'<input id="cust-search" placeholder="Ad, ID veya telefon..." value="'+S.search+'" oninput="ss(this.value)"></div>'
    +'<div class="tab-row">'
    +'<button class="tab '+(S.custTab==='all'?'active':'')+'" onclick="S.custTab=\'all\';render()">Hamisi ('+D.customers.length+')</button>'
    +'<button class="tab '+(S.custTab==='active'?'active':'')+'" onclick="S.custTab=\'active\';render()">Aktiv</button>'
    +'<button class="tab '+(S.custTab==='expired'?'active':'')+'" onclick="S.custTab=\'expired\';render()">Abunəsiz</button>'
    +'</div>';
  if(!list.length)h+='<div class="empty">Tapilmadi</div>';
  for(var i=0;i<list.length;i++){
    var c=list[i];
    var sub=activeSub(c.id);var st=subStatus(sub);
    var bc=st.t==='ok'?'b-green':st.t==='warn'?'b-yellow':'b-red';
    var isP=sub&&sub.is_partner;
    // Partner ay statistikası
    var ps=getPartnerMonthStats(c.id);
    var partnerBadge='';
    if(ps.used>0||isP){
      var pbColor=ps.over?'#C62828':ps.remaining<=2?'#E65100':'#7B1FA2';
      var pbTxt=ps.over?'⚠ Partner: '+ps.used+'/'+ps.limit+' (limit!)':'Partner: '+ps.used+'/'+ps.limit;
      partnerBadge='<span class="badge" style="background:#F3E5F5;color:'+pbColor+';font-size:10px">'+pbTxt+'</span>';
    }
    h+='<div class="card" onclick="selCust(\''+c.id+'\')"><div class="cleft"><div class="av '+(isP?'av-p':'')+'">'+ini(c.name)+'</div>'
      +'<div><div class="cid">'+c.id+'</div><div class="cname">'+c.name+'</div>'
      +'<div class="csub">'+c.phone+(c.birth_date?' - '+fmt(c.birth_date):'')+'</div></div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
      +partnerBadge
      +'<span class="badge '+bc+'">'+st.txt+'</span></div></div>';
  }
  return h;
}

var DAYS_AZ=['Bazar ertəsi','Çərşənbə axşamı','Çərşənbə','Cümə axşamı','Cümə','Şənbə'];
var DAYS_SHORT=['B.e','Ç.a','Çər','C.a','Cüm','Şnb'];
var MAX_PER_SLOT=8;

// --- Attendance in-flight lock: prevents same customer+date parallel submits ---
// Key format: customerId + '|' + classDate
var S_ATT_INFLIGHT=new Set();
function acquireAttLock(custId,dateStr){
  var k=custId+'|'+dateStr;
  if(S_ATT_INFLIGHT.has(k)){
    alert('Bu müştəri üçün davamiyyət əməliyyatı artıq davam edir. Bir anlıq gözləyin.');
    return null;
  }
  S_ATT_INFLIGHT.add(k);
  return k;
}
function releaseAttLock(k){if(k)S_ATT_INFLIGHT.delete(k);}

// --- Real attendance slot capacity guard ---
// Checks actual attendances DB rows for class_date + class_time before any insert.
// Returns true (can proceed) or false (blocked, alert shown).
async function checkSlotCapacity(classDate,classTime){
  if(!classDate||!classTime)return true; // no time = no slot capacity check needed
  try{
    var existing=await dbGet('attendances','class_date=eq.'+classDate+'&class_time=eq.'+classTime+'&select=id');
    var cnt=(existing&&existing.length)||0;
    if(cnt>=MAX_PER_SLOT){
      alert('Bu saat üçün maksimum '+MAX_PER_SLOT+' nəfər limiti dolub. ('+classDate+' '+classTime+')');
      return false;
    }
  }catch(e){
    alert('Slot kapasitəsi yoxlaması tamamlanmadı. İnternet/DB bağlantısını yoxlayıb yenidən cəhd edin.');
    return false;
  }
  return true;
}

// Get day_of_week (1=Mon...6=Sat) from a date string
function getDayOfWeek(dateStr){
  var d=new Date(dateStr);
  var day=d.getDay(); // 0=Sun,1=Mon...6=Sat
  return day===0?null:day; // null for Sunday
}

// Get week's Monday from a date string
function getWeekMonday(dateStr){
  var d=new Date(dateStr);
  var day=d.getDay();
  var diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

// Add days to date string
function dateAddDays(dateStr, n){
  var d=new Date(dateStr);
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

// Returns the nearest date (>= baseDate) that falls on the given dow (1=Mon..6=Sat)
function getNextDateForDow(baseDate, dow){
  var d=new Date(baseDate);
  // getDay(): 0=Sun,1=Mon..6=Sat → convert to 1=Mon..6=Sat
  var cur=d.getDay()===0?7:d.getDay(); // treat Sun as 7
  var diff=dow-cur;
  if(diff<0)diff+=7;   // already passed this week → next week
  // diff===0 means baseDate itself is that dow → return as-is
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

// Format date as DD.MM
function fmtShort(dateStr){
  if(!dateStr)return '';
  var p=dateStr.split('-');
  return p[2]+'.'+p[1];
}

async function fetchExceptions(dateStr){
  var mon=getWeekMonday(dateStr);
  var end=dateAddDays(mon,27);
  try{
    var excs=await dbGet('booking_exceptions',
      'exception_date=gte.'+mon+'&exception_date=lte.'+end);
    // Merge: keep any locally-added exceptions not yet in DB response
    var dbIds={};
    (excs||[]).forEach(function(e){dbIds[e.id]=true;});
    var localOnly=(S.bronExceptions||[]).filter(function(e){return !dbIds[e.id];});
    S.bronExceptions=(excs||[]).concat(localOnly);
  }catch(e){if(!S.bronExceptions)S.bronExceptions=[];}
  render();
}

async function fetchWaitlist(){
  if(S.waitlistLoading)return;
  S.waitlistLoading=true;
  try{
    var rows=await dbGet('slot_waitlist',
      'status=in.(active,contacted)&order=created_at.asc');
    S.waitlistData=rows||[];
  }catch(e){
    if(!S.waitlistData)S.waitlistData=[];
  }finally{
    S.waitlistLoading=false;
    if(S.view==='bron'||(S.view==='cust'&&S.custSection==='bron'))render();
  }
}

// Returns waitlist entries (active/contacted) for a given day_of_week + time_slot + dateStr
// scope='recurring': matches by dow+time only
// scope='specific_date': matches by dow+time+desired_date===dateStr
function getSlotWaitlist(dow, time, dateStr){
  if(!S.waitlistData)return[];
  return S.waitlistData.filter(function(w){
    if(w.day_of_week!==dow||w.time_slot!==time)return false;
    if(w.status!=='active'&&w.status!=='contacted')return false;
    if(w.scope==='specific_date')return w.desired_date===dateStr;
    return true; // recurring
  });
}

function wlScopeChange(){
  var el=document.getElementById('wl-scope');
  var row=document.getElementById('wl-date-row');
  if(!el||!row)return;
  var isSpecific=el.value==='specific_date';
  // If no slot dateStr, block specific_date and revert to recurring
  if(isSpecific&&(!S.waitlistSlot||!S.waitlistSlot.dateStr)){
    alert('Konkret tarix üçün slot seçimindən açın.');
    el.value='recurring';
    row.style.display='none';
    return;
  }
  row.style.display=isSpecific?'block':'none';
}

function filterWaitlistCusts(){
  var inp=document.getElementById('wl-cust-search');
  var list=document.getElementById('wl-cust-list');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());var qRaw=inp.value.trim().toLowerCase();
  list.innerHTML='';
  if(!q&&!qRaw){return;}
  var shown=0;
  for(var i=0;i<D.customers.length&&shown<8;i++){
    var c=D.customers[i];
    if(normQ(c.name).indexOf(q)<0&&(!c.phone||c.phone.indexOf(qRaw)<0)&&(c.id||'').toLowerCase().indexOf(qRaw)<0)continue;
    list.innerHTML+='<div style="padding:7px 10px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px" '
      +'onclick="selectWaitlistCust(\''+escQ(c.id)+'\',\''+escQ(c.name)+'\')">'+escHtml(c.name)+'<span style="color:#aaa;font-size:11px;margin-left:6px">'+escHtml(c.id)+'</span></div>';
    shown++;
  }
  if(!shown)list.innerHTML='<div style="padding:8px 10px;color:#aaa;font-size:12px">Tapılmadı</div>';
}

async function submitAddWaitlist(){
  var slot=S.waitlistSlot;
  if(!slot){alert('Slot məlumatı yoxdur.');return;}
  var custId=S.waitlistSelCustId;
  var custName=S.waitlistSelCustName;
  if(!custId){alert('Zəhmət olmasa müştəri seçin.');return;}
  var scopeEl=document.getElementById('wl-scope');
  var scope=scopeEl?scopeEl.value:'recurring';
  // specific_date guard: must have a slot dateStr (slot-waitlist-ops-polish-v1)
  if(scope==='specific_date'&&(!slot.dateStr)){
    alert('Konkret tarix üçün slot seçimindən açın.');return;
  }
  var desiredEl=document.getElementById('wl-desired-date');
  var desiredDate=(scope==='specific_date'&&slot.dateStr)?slot.dateStr:null;
  var noteEl=document.getElementById('wl-note');
  var note=noteEl?noteEl.value.trim():'';

  // Local duplicate check
  if(S.waitlistData){
    for(var i=0;i<S.waitlistData.length;i++){
      var w=S.waitlistData[i];
      if(w.customer_id===custId&&w.day_of_week===slot.dow&&w.time_slot===slot.time
        &&(w.status==='active'||w.status==='contacted')){
        if(scope==='recurring'&&w.scope==='recurring'){
          alert('Bu müştəri artıq bu saat üçün aktiv gözləmə siyahısındadır.');return;
        }
        if(scope==='specific_date'&&w.scope==='specific_date'&&w.desired_date===desiredDate){
          alert('Bu müştəri bu tarix üçün artıq gözləmə siyahısındadır.');return;
        }
      }
    }
  }

  // Live DB duplicate check — fail closed on error
  try{
    var dupFilter='customer_id=eq.'+custId
      +'&day_of_week=eq.'+slot.dow
      +'&time_slot=eq.'+encodeURIComponent(slot.time)
      +'&status=in.(active,contacted)';
    if(scope==='specific_date'&&desiredDate){
      dupFilter+='&desired_date=eq.'+desiredDate+'&scope=eq.specific_date';
    } else {
      dupFilter+='&scope=eq.recurring';
    }
    var dups=await dbGet('slot_waitlist',dupFilter+'&select=id&limit=1');
    if(dups&&dups.length>0){
      alert('Bu müştəri artıq bu slot üçün aktiv gözləmə siyahısındadır.');return;
    }
  }catch(e){
    alert('Dublikat yoxlaması uğursuz oldu. Əməliyyat dayandırıldı.');return;
  }

  var wlId='WL'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  var now=new Date().toISOString();
  var actor=getActorMeta();
  var row=Object.assign({
    id:wlId,
    customer_id:custId,
    customer_name:custName,
    day_of_week:slot.dow,
    time_slot:slot.time,
    desired_date:desiredDate||null,
    scope:scope,
    status:'active',
    note:note||null,
    converted_booking_id:null,
    converted_exception_id:null,
    updated_at:now
  },actor,getUpdatedByMeta());

  S.saving=true;render();
  try{
    var res=await dbPost('slot_waitlist',row);
    if(res&&res.length>0){
      if(!S.waitlistData)S.waitlistData=[];
      S.waitlistData.push(res[0]);
    } else {
      if(!S.waitlistData)S.waitlistData=[];
      S.waitlistData.push(row);
    }
    emitBronSync('waitlist_create');
    S.showAddWaitlist=false;
    logAudit('waitlist',wlId,'create',
      escHtml(custName)+' — '+DAYS_AZ[slot.dow-1]+' '+slot.time+' gözləmə siyahısına əlavə edildi',
      null,{customer_id:custId,customer_name:custName,day_of_week:slot.dow,time_slot:slot.time,scope:scope,desired_date:desiredDate||null,status:'active',note:note||null,source_flow:'submitAddWaitlist'});
  }catch(e){
    alert('Xəta: gözləmə qeydi saxlanılmadı. '+e);
  }finally{
    S.saving=false;render();
  }
}

async function updateWaitlistStatus(wlId, newStatus){
  var entry=null;
  if(S.waitlistData){
    for(var i=0;i<S.waitlistData.length;i++){
      if(S.waitlistData[i].id===wlId){entry=S.waitlistData[i];break;}
    }
  }
  if(!entry)return;
  var oldStatus=entry.status;
  if(newStatus==='cancel'&&!confirm('Bu gözləmə qeydini ləğv etmək istədiyinizə əminsiniz?'))return;
  var updated=Object.assign({},getUpdatedByMeta(),{
    status:newStatus==='cancel'?'cancelled':newStatus,
    updated_at:new Date().toISOString()
  });
  S.saving=true;render();
  try{
    await dbPatch('slot_waitlist','id=eq.'+wlId,updated);
    // Update local cache
    if(S.waitlistData){
      for(var i=0;i<S.waitlistData.length;i++){
        if(S.waitlistData[i].id===wlId){
          S.waitlistData[i]=Object.assign({},S.waitlistData[i],updated);
          break;
        }
      }
      // Remove cancelled/done entries from active display cache
      S.waitlistData=S.waitlistData.filter(function(w){
        return w.status==='active'||w.status==='contacted';
      });
    }
    emitBronSync('waitlist_status');
    var actionLabel=newStatus==='cancel'?'cancel':'edit';
    logAudit('waitlist',wlId,actionLabel,
      escHtml(entry.customer_name||'?')+' gözləmə statusu: '+oldStatus+' → '+updated.status,
      {customer_id:entry.customer_id,customer_name:entry.customer_name,day_of_week:entry.day_of_week,time_slot:entry.time_slot,scope:entry.scope,desired_date:entry.desired_date||null,note:entry.note||null,status:oldStatus,source_flow:'updateWaitlistStatus'},
      {customer_id:entry.customer_id,customer_name:entry.customer_name,day_of_week:entry.day_of_week,time_slot:entry.time_slot,scope:entry.scope,desired_date:entry.desired_date||null,note:entry.note||null,status:updated.status,source_flow:'updateWaitlistStatus'});
  }catch(e){
    alert('Xəta: status yenilənmədi. '+e);
  }finally{
    S.saving=false;render();
  }
}

function getSlotBookings(day, time, dateStr){
  if(!S.bronData)return[];
  return S.bronData.filter(function(b){
    if(b.day_of_week!==day||b.time_slot!==time)return false;
    if(dateStr){
      if(b.valid_from&&b.valid_from>dateStr)return false;
      if(b.valid_until&&b.valid_until<dateStr)return false;
    }
    return true;
  });
}

function getSlotExceptions(day, time, dateStr){
  if(!S.bronExceptions)return{absents:[],temps:[],trials:[]};
  var absents=[], temps=[], trials=[];
  var slotBrons=getSlotBookings(day,time,dateStr);
  var bids=slotBrons.map(function(b){return b.id;});
  for(var i=0;i<S.bronExceptions.length;i++){
    var ex=S.bronExceptions[i];
    if(ex.exception_date!==dateStr)continue;
    if(ex.type==='absent'&&bids.indexOf(ex.booking_id)>=0)absents.push(ex);
    if(ex.type==='temp_add'&&ex.day_of_week===day&&ex.time_slot===time)temps.push(ex);
    if(ex.type==='trial_add'&&ex.day_of_week===day&&ex.time_slot===time)trials.push(ex);
  }
  return{absents:absents,temps:temps,trials:trials};
}

function getSlotCount(day, time, dateStr){
  var brons=getSlotBookings(day,time,dateStr);
  var excs=getSlotExceptions(day,time,dateStr);
  return brons.length - excs.absents.length + excs.temps.length + excs.trials.length;
}

function normQ(s){
  return s.toLowerCase()
    .replace(/ı/g,'i').replace(/İ/g,'i')
    .replace(/ə/g,'e').replace(/Ə/g,'e')
    .replace(/ü/g,'u').replace(/Ü/g,'u')
    .replace(/ö/g,'o').replace(/Ö/g,'o')
    .replace(/ğ/g,'g').replace(/Ğ/g,'g')
    .replace(/ş/g,'s').replace(/Ş/g,'s')
    .replace(/ç/g,'c').replace(/Ç/g,'c');
}


function bronSearchUpdate(val){
  S.bronSearch=val;
  // Only re-render if search is active - use partial update
  var resultsDiv=document.getElementById('bron-search-results');
  if(resultsDiv){
    resultsDiv.innerHTML=getBronSearchHTML(val);
  } else {
    render();
    // Restore focus
    setTimeout(function(){
      var inp=document.getElementById('bron-search');
      if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
    },10);
  }
}

function getBronSearchHTML(sq){
  sq=normQ((sq||'').trim());
  if(!sq)return '';
  var results=[];
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var b=S.bronData[i];
      if(normQ(b.customer_name||'').indexOf(sq)>=0){
        results.push({bronId:b.id,exId:null,name:b.customer_name,custId:b.customer_id,
          time:b.time_slot,day:DAYS_AZ[b.day_of_week-1],dow:b.day_of_week,
          date:'Daimi',type:'permanent'});
      }
    }
  }
  if(S.bronExceptions){
    for(var i=0;i<S.bronExceptions.length;i++){
      var ex=S.bronExceptions[i];
      if(ex.type==='temp_add'&&normQ(ex.temp_customer_name||'').indexOf(sq)>=0){
        var dow=ex.day_of_week;
        results.push({bronId:null,exId:ex.id,name:ex.temp_customer_name,
          custId:ex.temp_customer_id||'',
          time:ex.time_slot||'?',
          day:dow?DAYS_AZ[dow-1]:'?',dow:dow,
          date:ex.exception_date,type:'temp'});
      }
    }
  }
  if(!results.length) return '<div class="empty">Tapılmadı</div>';
  var h='<div class="slabel">AXTARIŞ NƏTİCƏLƏRİ ('+results.length+')</div>';
  h+='<div style="background:#fff;border:1px solid #eaeaea;border-radius:10px;overflow:hidden">';
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var bg=i%2===0?'#fff':'#fafcfa';
    var dateLabel=r.type==='temp'?fmt(r.date):'Daimi';
    var badgeClass=r.type==='temp'?'b-blue':'b-green';
    h+='<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:'+bg+';border-top:'+(i?'1px solid #f0f0f0':'none')+';font-size:13px">';
    h+='<div style="flex:1;min-width:0">'
      +'<div style="font-weight:500">'+r.name+'</div>'
      +'<div style="font-size:11px;color:#aaa">'+r.day+' '+r.time+'</div>'
      +'</div>';
    h+='<span class="badge '+badgeClass+'" style="font-size:10px">'+dateLabel+'</span>';
    if(r.type==='temp'){
      h+='<button class="btn btn-gray btn-sm" style="font-size:10px" onclick="editBronSearchItem('+JSON.stringify(r.exId||'')+')">✏</button>';
      h+='<button class="btn btn-gray btn-sm" style="font-size:10px;color:#C62828" onclick="deleteBronSearchItem('+JSON.stringify(r.exId||'')+',\'temp\')">&#10005;</button>';
    } else {
      h+='<button class="btn btn-gray btn-sm" style="font-size:10px;color:#C62828" onclick="deleteBronSearchItem('+JSON.stringify(r.bronId||'')+',\'permanent\')">&#10005;</button>';
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

async function deleteBronSearchItem(id, type){
  if(!confirm('Silinsin?'))return;
  if(type==='temp'){
    await cancelAbsent(id);
  } else {
    await deleteBron(id);
  }
  var rd=document.getElementById('bron-search-results');
  if(rd)rd.innerHTML=getBronSearchHTML(S.bronSearch);
  render();
}

async function submitEditBronEx(){
  var ex=S.editBronEx;
  if(!ex)return;
  var day=parseInt(document.getElementById('ebe-day').value);
  var time=document.getElementById('ebe-time').value;
  var date=document.getElementById('ebe-date').value;
  if(!day||!time||!date)return;

  // ── Same-day guard: eyni müştərinin həmin tarixdə başqa bronu olmasın ──
  var _ebCustId=ex.temp_customer_id;
  if(_ebCustId){
    // Local state check — exclude current exception itself
    if(hasCustomerAnyBookingOnDate(_ebCustId,date,ex.id)){
      return alert('Bu müştərinin həmin tarixdə artıq bronu var. Eyni günə ikinci slot yaratmaq olmaz.');
    }
    // Live DB check — başqa cihazdan yaradılmış ola bilər
    try{
      var _ebDow=new Date(date+'T00:00:00').getDay();
      var _ebSlotDow=(_ebDow===0)?7:_ebDow;
      var _dbTmpEb=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+_ebCustId+'&exception_date=eq.'+date+'&select=id&limit=5');
      if(_dbTmpEb){
        for(var _ti=0;_ti<_dbTmpEb.length;_ti++){
          if(_dbTmpEb[_ti].id!==ex.id)return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər).');
        }
      }
      var _dbPermEb=await dbGet('bookings','customer_id=eq.'+_ebCustId+'&day_of_week=eq.'+_ebSlotDow+'&type=eq.permanent&is_active=eq.true&select=id,valid_from,valid_until&limit=5');
      if(_dbPermEb&&_dbPermEb.length>0){
        for(var _pi=0;_pi<_dbPermEb.length;_pi++){
          var _pb=_dbPermEb[_pi];
          if(_pb.valid_from&&date<_pb.valid_from)continue;
          if(_pb.valid_until&&date>_pb.valid_until)continue;
          return alert('Bu müştərinin həmin tarixdə artıq aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər). Eyni günə ikinci slot yaratmaq olmaz.');
        }
      }
    }catch(e){}
  }

  var _ebOldDate=ex.exception_date;var _ebOldTime=ex.time_slot;var _ebOldDow=ex.day_of_week;
  S.saving=true;render();
  try{
    await dbPatch('booking_exceptions','id=eq.'+ex.id,{exception_date:date,time_slot:time,day_of_week:day});
    logAudit('booking',ex.id,'edit',
      'Müvəqqəti bron dəyişdirildi — '+(ex.temp_customer_name||ex.temp_customer_id||'')+' — '+date+(time?' '+time:''),
      {exception_date:_ebOldDate,time_slot:_ebOldTime,day_of_week:_ebOldDow},
      {exception_date:date,time_slot:time,day_of_week:day,source_flow:'submitEditBronEx'});
    ex.exception_date=date;ex.time_slot=time;ex.day_of_week=day;
    S.showEditBronEx=false;
    S.bronExceptions=null;
    await fetchExceptions(date);
    var rd=document.getElementById('bron-search-results');
    if(rd)rd.innerHTML=getBronSearchHTML(S.bronSearch);
    render();
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}
function filterBronCusts(){
  var inp=document.getElementById('ab-cust-search');
  var list=document.getElementById('ab-cust-list');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());
  var sorted=D.customers.slice().sort(function(a,b){return a.name.localeCompare(b.name,'az');});
  list.innerHTML='';
  var shown=0;
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i];
    if(q&&normQ(c.name).indexOf(q)<0)continue;
    if(shown>=50)break;
    (function(cust){
      var el=document.createElement('div');
      el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
      el.innerHTML=cust.name+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+cust.id+'</span>';
      el.ontouchstart=function(){this.style.background='#f0faf5';};
      el.onmouseenter=function(){this.style.background='#f0faf5';};
      el.onmouseleave=function(){this.style.background='';};
      el.onclick=function(){selectBronCust(cust.id,cust.name);};
      list.appendChild(el);
    })(c);
    shown++;
  }
  if(shown===0){
    list.innerHTML='<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">Tapılmadı</div>';
  }
}

async function submitAddBron(){
  var custId=document.getElementById('ab-cust').value;
  var type=document.getElementById('ab-type').value;
  var note=document.getElementById('ab-note').value;
  if(!custId)return alert('Müştəri seçin');
  var cust=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}

  // ── Same-day defense-in-depth guards (legacy path protection) ────────────
  if(type==='permanent'){
    var _abDay=S.selBronDay;
    if(_abDay){
      // Local: active permanent booking on same day_of_week
      if(hasActivePermanentBookingOnDow(custId,_abDay)){
        return alert('Bu müştərinin '+(DAYS_AZ[_abDay-1]||'')+' günü üçün artıq aktiv sabit bronu var.\nEyni gündə ikinci sabit bron yaratmaq olmaz.');
      }
      // Local: any booking/temp_add on first occurrence date of this dow
      var _abCheckDate=getNextDateForDow(S.selBronDate||td(),_abDay);
      if(hasCustomerAnyBookingOnDate(custId,_abCheckDate)){
        return alert('Bu müştərinin həmin tarixdə ('+_abCheckDate+') artıq bronu var. Eyni günə ikinci slot yaratmaq olmaz.');
      }
      // DB live: permanent booking same dow
      try{
        var _abDbPerm=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+_abDay+'&type=eq.permanent&select=id,is_active&limit=5');
        if(_abDbPerm){
          for(var _abpi=0;_abpi<_abDbPerm.length;_abpi++){
            if(_abDbPerm[_abpi].is_active!==false){
              return alert('Bu müştərinin '+(DAYS_AZ[_abDay-1]||'')+' günü üçün artıq aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər).');
            }
          }
        }
        // DB live: temp_add on first occurrence date
        var _abDbTmp=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=eq.'+_abCheckDate+'&select=id&limit=1');
        if(_abDbTmp&&_abDbTmp.length>0){
          return alert('Bu müştərinin həmin tarixdə ('+_abCheckDate+') artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər).');
        }
      }catch(e){}
    }
  } else {
    // temp_add branch
    var _abDate=S.selBronDate||td();
    // Local: existing temp_add on same date
    if(hasCustomerTempAddOnDate(custId,_abDate)){
      return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var.');
    }
    // Local: active permanent booking on same date
    if(hasCustomerActiveBookingOnDate(custId,_abDate)){
      return alert('Bu müştərinin həmin tarixdə aktiv sabit bronu var.\nMüvəqqəti bron əlavə etmək olmaz.');
    }
    // DB live: temp_add on same date
    try{
      var _abDbTmpEx=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=eq.'+_abDate+'&select=id&limit=1');
      if(_abDbTmpEx&&_abDbTmpEx.length>0){
        return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər).');
      }
      // DB live: active permanent booking on same date (respecting absent exceptions)
      var _abDow2=new Date(_abDate+'T00:00:00').getDay();
      var _abSlotDow2=(_abDow2===0)?7:_abDow2;
      var _abDbPermEx=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+_abSlotDow2+'&type=eq.permanent&is_active=eq.true&select=id,valid_from,valid_until&limit=5');
      if(_abDbPermEx&&_abDbPermEx.length>0){
        for(var _abpi2=0;_abpi2<_abDbPermEx.length;_abpi2++){
          var _abpb=_abDbPermEx[_abpi2];
          if(_abpb.valid_from&&_abDate<_abpb.valid_from)continue;
          if(_abpb.valid_until&&_abDate>_abpb.valid_until)continue;
          if(hasAbsentForBookingOnDate(_abpb.id,_abDate))continue;
          try{
            var _abAbChk=await dbGet('booking_exceptions','type=eq.absent&booking_id=eq.'+_abpb.id+'&exception_date=eq.'+_abDate+'&select=id&limit=1');
            if(_abAbChk&&_abAbChk.length>0)continue;
          }catch(e2){}
          return alert('Bu müştərinin həmin tarixdə aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər).');
        }
      }
    }catch(e){}
  }
  // ─────────────────────────────────────────────────────────────────────────

  S.saving=true;render();
  try{
    if(type==='permanent'){
      var from=document.getElementById('ab-from').value;
      var bid='BK'+Date.now();
      var bron={id:bid,customer_id:custId,customer_name:cust?cust.name:'',
        day_of_week:S.selBronDay,time_slot:S.selBronTime,type:'permanent',
        valid_from:from||null,note:note||null,is_active:true};
      await dbPost('bookings',bron);
      logAudit('booking',bron.id,'create',
        'Sabit bron yaradıldı — '+(cust?cust.name:custId)+' — '+(DAYS_AZ[S.selBronDay-1]||'')+' '+(S.selBronTime||''),
        null,{type:'permanent',customer_id:bron.customer_id,customer_name:bron.customer_name,day_of_week:bron.day_of_week,time_slot:bron.time_slot,valid_from:bron.valid_from||null,source_flow:'submitAddBron'});
      S.bronData.push(bron);
      emitBronSync('booking_create');
    } else {
      // Temp - add as exception
      var eid='EX'+Date.now();
      var ex={id:eid,booking_id:null,exception_date:S.selBronDate||td(),
        type:'temp_add',temp_customer_id:custId,
        temp_customer_name:cust?cust.name:'',
        day_of_week:S.selBronDay,time_slot:S.selBronTime,
        note:note||null};
      await dbPost('booking_exceptions',ex);
      logAudit('booking',ex.id,'create',
        'Müvəqqəti bron yaradıldı — '+(cust?cust.name:custId)+' — '+ex.exception_date+(ex.time_slot?' '+ex.time_slot:''),
        null,{type:'temp_add',booking_id:null,temp_customer_id:ex.temp_customer_id,temp_customer_name:ex.temp_customer_name,exception_date:ex.exception_date,day_of_week:ex.day_of_week,time_slot:ex.time_slot,source_flow:'submitAddBron'});
      if(!S.bronExceptions)S.bronExceptions=[];
      S.bronExceptions.push(ex);
      emitBronSync('temp_add_create');
    }
    S.showAddBron=false;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

function hasStudioSubscriptionForBooking(custId){
  var today=td();
  var PARTNER_IDS=['ROF','RPP','RPS'];
  var SINGLE_IDS=['ROTG','ROTI','RTEST'];
  for(var i=0;i<D.subscriptions.length;i++){
    var s=D.subscriptions[i];
    if(s.customer_id!==custId||!s.is_active)continue;
    if(s.is_partner)continue;
    if(PARTNER_IDS.indexOf(s.program_id)>=0)continue;
    if(SINGLE_IDS.indexOf(s.program_id)>=0)continue;
    if((parseInt(s.sessions_total)||0)<=1)continue;
    if(s.status==='pending')return true;
    if(s.end_date>=today)return true;
  }
  return false;
}

function getCustomerBronMaxWeeklySlots(custId){
  var bst=getCustBronStatus(custId);
  var sub=bst.sub;
  if(sub&&(bst.type==='ok'||bst.type==='warn'||bst.type==='pending')){
    if(!sub.is_partner&&['ROTG','ROTI','RTEST'].indexOf(sub.program_id)<0&&(parseInt(sub.sessions_total)||0)>1){
      var t=parseInt(sub.sessions_total)||0;
      return t>=12?3:t>=8?2:2;
    }
  }
  return 3; // partner / single / no-subscription
}

async function cancelAbsent(exId){
  S.saving=true;render();
  try{
    var _caEx=null;
    if(S.bronExceptions){for(var _cai=0;_cai<S.bronExceptions.length;_cai++){if(S.bronExceptions[_cai].id===exId){_caEx=S.bronExceptions[_cai];break;}}}
    // Bug-1 guard: restoring an absent slot must not cause over-limit
    if(_caEx&&_caEx.type==='absent'&&_caEx.booking_id){
      var _abBron=null;
      if(S.bronData){for(var _abi=0;_abi<S.bronData.length;_abi++){if(S.bronData[_abi].id===_caEx.booking_id){_abBron=S.bronData[_abi];break;}}}
      var _abCustId=_abBron?_abBron.customer_id:null;
      if(_abCustId){
        var _abMaxW=getCustomerBronMaxWeeklySlots(_abCustId);
        var _abCurW=getCustomerWeeklySlotCount(_abCustId,_caEx.exception_date);
        if(_abCurW+1>_abMaxW){
          S.saving=false;render();
          return alert('Bu əməliyyat həftəlik slot limitini aşır ('+(_abCurW+1)+'/'+_abMaxW+'). Əvvəl müvəqqəti bronu və ya başqa slotu silin.');
        }
      }
    }
    var r=await fetch(BASE+'/booking_exceptions?id=eq.'+exId,{method:'DELETE',headers:Object.assign({},H,{'Prefer':'return=minimal'})});
    if(!r.ok)throw new Error(await r.text());
    logAudit('booking',exId,'delete',
      'Bron istisna silindi — '+(_caEx?(_caEx.temp_customer_name||_caEx.customer_name||_caEx.booking_id||exId)+' — '+(_caEx.exception_date||''):exId),
      _caEx?{type:_caEx.type,booking_id:_caEx.booking_id||null,exception_date:_caEx.exception_date,temp_customer_id:_caEx.temp_customer_id||null,temp_customer_name:_caEx.temp_customer_name||null,time_slot:_caEx.time_slot||null}:null,
      null);
    S.bronExceptions=S.bronExceptions.filter(function(e){return e.id!==exId;});
    emitBronSync('booking_exception_delete');
    invalidateDataIntegrityResults('Bron istisna silindi ('+exId+')');
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function deleteException(exId){
  if(!confirm('Silinsin?'))return;
  await cancelAbsent(exId);
}

async function cancelTrialSlot(exId,leadId){
  var _guardLead=getLead(leadId);
  if(!_guardLead){
    try{
      var _fetched=await dbGet('leads','id=eq.'+leadId+'&select=id,name,status,trial_done_at&limit=1');
      if(_fetched&&_fetched.length)_guardLead=_fetched[0];
    }catch(e){}
  }
  if(_guardLead&&(_guardLead.status==='trial_done'||_guardLead.trial_done_at)){
    alert('Bu lead artıq sınaq məşqinə davamiyyət kimi qeyd edilib. Əvvəlcə lead kartından sınaq davamiyyətini silin, sonra slotu silə bilərsiniz.');
    return;
  }
  if(!confirm('Sınaq slotunu silmək istədiyinizdən əminsinizmi?'))return;
  var _ex=null;
  if(S.bronExceptions){for(var _i=0;_i<S.bronExceptions.length;_i++){if(S.bronExceptions[_i].id===exId){_ex=S.bronExceptions[_i];break;}}}
  var lead=getLead(leadId);

  try{
    var r=await fetch(BASE+'/booking_exceptions?id=eq.'+exId,{method:'DELETE',headers:Object.assign({},H,{'Prefer':'return=minimal'})});
    if(!r.ok)throw new Error(await r.text());
    if(S.bronExceptions)S.bronExceptions=S.bronExceptions.filter(function(e){return e.id!==exId;});
  }catch(e){
    S.saving=false;render();
    return alert('Slot silinərkən xəta: '+e.message);
  }
  // Update lead
  try{
    await dbPatch('leads','id=eq.'+leadId,{status:'contacted',trial_booking_ex_id:null,trial_class_date:null,trial_class_time:null});
    var _leads=S.leadsData||[];
    for(var i=0;i<_leads.length;i++){
      if(_leads[i].id===leadId){
        _leads[i].status='contacted';
        _leads[i].trial_booking_ex_id=null;
        _leads[i].trial_class_date=null;
        _leads[i].trial_class_time=null;
        break;
      }
    }

      'Sınaq slotu silindi — '+(lead?escHtml(lead.name||leadId):leadId)+(_ex?' — '+(_ex.exception_date||''):''),
      {status:'trial_scheduled',trial_booking_ex_id:exId},

  }catch(e2){
    alert('Slot silindi, lakin lead statusu yenilənmədi. Leadi manual \'Əlaqə quruldu\' statusuna çevirin.\nXəta: '+e2.message);
  }
  leadsInvalidate();
  fetchLeads();
  S.saving=false;render();
}

var PARTNER_PROG_IDS=['ROF','RPS','RPP'];
var PARTNER_MONTH_LIMIT=12;

function isPartnerProgId(progId){
  if(PARTNER_PROG_IDS.indexOf(progId)>=0)return true;
  for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId&&D.programs[i].is_partner)return true;}
  return false;
}

function getPartnerMonthStats(custId){
  var cm=curMonth();
  var used=0;
  var attsArr=(S.custDetail&&S.selCust===custId&&S.custDetail.atts)?S.custDetail.atts:D.attendances;
  for(var i=0;i<attsArr.length;i++){
    var a=attsArr[i];
    if(a.customer_id!==custId)continue;
    if(!a.class_date||a.class_date.slice(0,7)!==cm)continue;
    if(isPartnerProgId(a.program_id))used++;
  }
  return{used:used,limit:PARTNER_MONTH_LIMIT,remaining:Math.max(0,PARTNER_MONTH_LIMIT-used),over:used>=PARTNER_MONTH_LIMIT};
}

// Returns false if user cancels, true if should proceed
function warnIfPartnerLimit(custId,custName){
  var stats=getPartnerMonthStats(custId);
  if(!stats.over)return true;
  var msg=(custName||custId)+' bu ay artıq '+stats.used+'/'+stats.limit+' partner məşqə gəlib.\n';
  if(stats.used===stats.limit)msg+='Limit dolub. 13-cü məşqi yenə də əlavə etmək istəyirsinizmi?';
  else msg+='Limit '+(stats.used-stats.limit)+' dəfə aşılıb. Davam etmək istəyirsinizmi?';
  return confirm(msg);
}
var SAT_TIMES=['10:00','11:00','12:00','13:00','14:00','15:00'];

function escQ(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function getTimesForDay(dow){
  if(dow===null)return null;
  if(dow===6)return SAT_TIMES;
  return TIMES;
}

// Returns {type, txt, sub, isPartner} for bron context
function getCustBronStatus(custId){
  if(!custId)return{type:'none',txt:'Abunə yoxdur',sub:null,isPartner:false};
  var today=td();
  var pendingSub=null;
  var latestExpired=null;
  for(var i=0;i<D.subscriptions.length;i++){
    var s=D.subscriptions[i];
    if(s.customer_id!==custId||!s.is_active)continue;
    // 1. Active subscription — highest priority
    if(s.status!=='pending'&&s.end_date>=today){
      if(s.is_partner){
        var used=0;var cm=curMonth();
        for(var j=0;j<D.attendances.length;j++){
          var a=D.attendances[j];
          if(a.subscription_id===s.id&&a.class_date.indexOf(cm)===0)used++;
        }
        var left=12-used;
        if(left<=0)return{type:'warn',txt:'Bu ay limiti dolub',sub:s,isPartner:true};
        if(left<=2)return{type:'warn',txt:left+' dərs qaldı',sub:s,isPartner:true};
        return{type:'ok',txt:'Aktiv',sub:s,isPartner:true};
      }
      var rem=calcRemainingForDisplay(s);
      if(rem<=0)return{type:'warn',txt:'Dərs qalmayıb',sub:s,isPartner:false};
      if(rem<=2)return{type:'warn',txt:rem+' dərs qaldı',sub:s,isPartner:false};
      return{type:'ok',txt:'Aktiv',sub:s,isPartner:false};
    }
    // 2. Pending — keep as fallback
    if(s.status==='pending'&&!pendingSub)pendingSub=s;
    // 3. Expired — track latest
    if(s.status!=='pending'&&s.end_date<today){
      if(!latestExpired||s.end_date>latestExpired.end_date)latestExpired=s;
    }
  }
  if(pendingSub)return{type:'pending',txt:'Pending',sub:pendingSub,isPartner:!!pendingSub.is_partner};
  if(latestExpired)return{type:'grace',txt:'Abunə bitib',sub:latestExpired,isPartner:!!latestExpired.is_partner};
  return{type:'none',txt:'Abunə yoxdur',sub:null,isPartner:false};
}

function getBronSubBadge(bst){
  if(!bst)return'';
  if(bst.type==='ok')return'<span class="badge b-green" style="font-size:10px">Aktiv</span>';
  if(bst.type==='warn')return'<span class="badge b-yellow" style="font-size:10px">'+bst.txt+'</span>';
  if(bst.type==='grace')return'<span class="badge b-orange" style="font-size:10px">Abunə bitib</span>';
  if(bst.type==='pending')return'<span class="badge b-blue" style="font-size:10px">Pending</span>';
  return'<span class="badge b-gray" style="font-size:10px">Abunə yoxdur</span>';
}

function inferCustomerBronSource(custId){
  var sub=activeSub(custId);
  if(!sub)return'single';
  if(sub.is_partner)return'partner';
  if(['ROF','RPP','RPS'].indexOf(sub.program_id)>=0)return'partner';
  if(['ROTG','ROTI','RTEST'].indexOf(sub.program_id)>=0||sub.sessions_total<=1)return'single';
  return'studio';
}

function getBookingSource(b,custId){
  if(b&&b.note){
    if(b.note.indexOf('[source:studio]')>=0)return'studio';
    if(b.note.indexOf('[source:partner]')>=0)return'partner';
    if(b.note.indexOf('[source:single]')>=0)return'single';
  }
  return inferCustomerBronSource(custId);
}

function sourceBadge(src){
  if(src==='partner')return'<span class="badge b-purple" style="font-size:10px">Partner</span>';
  if(src==='single')return'<span class="badge b-blue" style="font-size:10px">Tək giriş</span>';
  return'<span class="badge b-green" style="font-size:10px">Studio</span>';
}

function getSlotStatusLabel(count){

    +'</div>'

        } else {

      if(pbst.isPartner){hasPartnerInSlot=true;break;}

function rBronSabitSlotSummary(){
  if(!S.bronData)return'';
  var hasDays=S.bronSabitDays.length>0;
  var hasTimes=S.bronSabitTimes.length>0;
  if(!hasDays&&!hasTimes)return'';

  // Build {dow, time} pairs according to filter combination
  var pairs=[];
  var di,ti,dv,tv,dtimes,vi,pi;

  if(hasDays&&hasTimes){
    // Cross-product of selected days × selected times
    for(di=0;di<S.bronSabitDays.length;di++){
      for(ti=0;ti<S.bronSabitTimes.length;ti++){
        pairs.push({dow:S.bronSabitDays[di],time:S.bronSabitTimes[ti]});
      }
    }
  } else if(hasDays&&!hasTimes){
    // Selected day(s): all valid times for each day, will filter to count>0 below
    for(di=0;di<S.bronSabitDays.length;di++){
      dv=S.bronSabitDays[di];
      dtimes=(dv===6)?SAT_TIMES:TIMES;
      for(ti=0;ti<dtimes.length;ti++){
        pairs.push({dow:dv,time:dtimes[ti]});
      }
    }
  } else {
    // Only times selected: show each selected time across all Mon–Sat days
    for(dv=1;dv<=6;dv++){
      for(ti=0;ti<S.bronSabitTimes.length;ti++){
        tv=S.bronSabitTimes[ti];
        dtimes=(dv===6)?SAT_TIMES:TIMES;
        var valid=false;
        for(vi=0;vi<dtimes.length;vi++){if(dtimes[vi]===tv){valid=true;break;}}
        if(valid)pairs.push({dow:dv,time:tv});
      }
    }
  }

  // Sort: dow asc, time asc
  pairs.sort(function(a,b){return a.dow!==b.dow?a.dow-b.dow:a.time<b.time?-1:a.time>b.time?1:0;});

  // Count permanent bookings per dow+time from S.bronData
  var counts={};
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    var ck=b.day_of_week+'|'+b.time_slot;
    counts[ck]=(counts[ck]||0)+1;
  }

  // If only days filter (no times): skip pairs with 0 bookings
  if(hasDays&&!hasTimes){
    var filt=[];
    for(pi=0;pi<pairs.length;pi++){
      if((counts[pairs[pi].dow+'|'+pairs[pi].time]||0)>0)filt.push(pairs[pi]);
    }
    pairs=filt;
  }

  if(!pairs.length)return'';

  var h='<div style="margin-bottom:10px">'
    +'<div style="font-size:11px;font-weight:700;color:#555;margin-bottom:6px;letter-spacing:0.3px">📊 Slot xülasəsi</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:5px">';

  for(pi=0;pi<pairs.length;pi++){
    var p=pairs[pi];
    var booked=counts[p.dow+'|'+p.time]||0;
    var free=MAX_PER_SLOT-booked;
    var bg,col,lbl;
    if(free<=0){bg='#FFEBEE';col='#C62828';lbl='Tam dolu';}
    else if(free<=2){bg='#FFF8E1';col='#E65100';lbl=free+' boş';}
    else{bg='#E8F5E9';col='#1B5E20';lbl=free+' boş';}
    h+='<div style="background:'+bg+';border-radius:8px;padding:5px 11px;font-size:11px;font-weight:600;color:'+col+';white-space:nowrap">'
      +DAYS_SHORT[p.dow-1]+' <strong>'+p.time+'</strong>'
      +' <span style="opacity:0.7;font-weight:500">'+booked+'/'+MAX_PER_SLOT+'</span>'
      +' · '+lbl
      +'</div>';
  }

  h+='</div></div>';
  return h;
}

// ---- BLOCK FOOTPRINT ANALYSIS (read-only) ----

function getBronBlockFootprint(targetDays,targetTime,anchorDate){
  if(!S.bronData||!targetDays||!targetDays.length||!targetTime)return[];
  var mon=getWeekMonday(anchorDate||td());
  var dowDates={};
  for(var di=0;di<targetDays.length;di++){var dv=targetDays[di];dowDates[dv]=getNextDateForDow(mon,dv);}
  var custMap={};
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    if(b.time_slot!==targetTime)continue;
    if(targetDays.indexOf(b.day_of_week)<0)continue;
    var chk=dowDates[b.day_of_week];
    if(chk){if(b.valid_from&&b.valid_from>chk)continue;if(b.valid_until&&b.valid_until<chk)continue;}
    if(!custMap[b.customer_id]){custMap[b.customer_id]={custId:b.customer_id,custName:b.customer_name,days:[],firstBron:b};}
    custMap[b.customer_id].days.push(b.day_of_week);
  }
  var result=[];
  var cids=Object.keys(custMap);
  for(var ci=0;ci<cids.length;ci++){
    var e=custMap[cids[ci]];
    e.days.sort(function(a,b){return a-b;});
    var src=getBookingSource(e.firstBron,e.custId);
    var bst=getCustBronStatus(e.custId);
    result.push({custId:e.custId,custName:e.custName,days:e.days,source:src,subStatus:bst.type,subTxt:bst.txt});
  }
  return result;
}

function classifyBronBlockFootprint(footprint,targetDays){
  var days=targetDays.slice().sort(function(a,b){return a-b;});
  var d0=days[0],d1=days[1],d2=days[2];
  var three=[];
  var two={};two[d0+'|'+d1]=[];two[d0+'|'+d2]=[];two[d1+'|'+d2]=[];
  var one={};one[d0]=[];one[d1]=[];one[d2]=[];
  var occ={};occ[d0]=0;occ[d1]=0;occ[d2]=0;
  for(var i=0;i<footprint.length;i++){
    var f=footprint[i];var fd=f.days;
    for(var di=0;di<fd.length;di++){if(occ[fd[di]]!==undefined)occ[fd[di]]++;}
    if(fd.length>=3){three.push(f);}
    else if(fd.length===2){var k=fd[0]+'|'+fd[1];if(two[k]!==undefined)two[k].push(f);}
    else if(fd.length===1){if(one[fd[0]]!==undefined)one[fd[0]].push(f);}
  }
  var maxOcc=Math.max(occ[d0],occ[d1],occ[d2]);
  var minOcc=Math.min(occ[d0],occ[d1],occ[d2]);
  return{three:three,two:two,one:one,occ:occ,days:days,maxOcc:maxOcc,minOcc:minOcc,imbalance:maxOcc-minOcc};
}

function rBronBlockAnalysis(){
  if(!S.bronData)return'';
  var selDays=S.bronSabitDays;
  var selTimes=S.bronSabitTimes;
  if(selDays.length!==3||selTimes.length!==1){
    if(selDays.length>0||selTimes.length>0){
      return'<div style="margin-bottom:10px;padding:8px 12px;background:#f5f5f5;border-radius:8px;font-size:11px;color:#999">Blok analizi: 3 gun + 1 saat secin (mes. B.e + Cer + Cum / 19:00)</div>';
    }
    return'';
  }
  var targetTime=selTimes[0];
  var anchorDate=S.bronSelDate||td();
  var footprint=getBronBlockFootprint(selDays,targetTime,anchorDate);
  var cls=classifyBronBlockFootprint(footprint,selDays);
  var days=cls.days;
  var d0=days[0],d1=days[1],d2=days[2];
  var pairKeys=[d0+'|'+d1,d0+'|'+d2,d1+'|'+d2];
  var pairLbls={};
  pairLbls[d0+'|'+d1]=DAYS_SHORT[d0-1]+' + '+DAYS_SHORT[d1-1];
  pairLbls[d0+'|'+d2]=DAYS_SHORT[d0-1]+' + '+DAYS_SHORT[d2-1];
  pairLbls[d1+'|'+d2]=DAYS_SHORT[d1-1]+' + '+DAYS_SHORT[d2-1];
  var open=S.bronBlockOpen;
  var headerTitle=DAYS_SHORT[d0-1]+' + '+DAYS_SHORT[d1-1]+' + '+DAYS_SHORT[d2-1]+' / '+targetTime;
  var h='';
  h+='<div style="margin-bottom:10px;border:1px solid #d4eae0;border-radius:10px;background:#f7fbf9">';
  h+='<div onclick="S.bronBlockOpen=!S.bronBlockOpen;render()" style="display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;user-select:none">';
  h+='<span style="font-size:12px;font-weight:700;color:#1D9E75">Blok Analizi: '+headerTitle+'</span>';
  h+='<span style="font-size:12px;color:#888">'+(open?'&#9650;':'&#9660;')+'</span>';
  h+='</div>';
  if(!open){h+='</div>';return h;}
  h+='<div style="padding:0 13px 12px 13px">';
  h+='<div style="font-size:11px;font-weight:700;color:#555;margin-bottom:6px">Gunluk doldurulma</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  for(var di=0;di<days.length;di++){
    var dv=days[di];
    var booked=cls.occ[dv]||0;
    var free=MAX_PER_SLOT-booked;
    var bg2,col2,lbl2;
    if(free<=0){bg2='#FFEBEE';col2='#C62828';lbl2='Dolu';}
    else if(free<=2){bg2='#FFF8E1';col2='#E65100';lbl2=free+' bos';}
    else{bg2='#E8F5E9';col2='#1B5E20';lbl2=free+' bos';}
    h+='<div style="background:'+bg2+';border-radius:8px;padding:6px 12px;text-align:center;min-width:80px">';
    h+='<div style="font-size:11px;font-weight:700;color:'+col2+'">'+DAYS_SHORT[dv-1]+' '+targetTime+'</div>';
    h+='<div style="font-size:13px;font-weight:700;color:'+col2+'">'+booked+'/'+MAX_PER_SLOT+'</div>';
    h+='<div style="font-size:10px;color:'+col2+'">'+lbl2+'</div>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="font-size:11px;font-weight:700;color:#555;margin-bottom:6px">Mustori paylanmasi</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
  h+='<div style="background:#EDE7F6;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;color:#4A148C">3-slot (her 3 gun): '+cls.three.length+' nefer</div>';
  for(var pi=0;pi<pairKeys.length;pi++){
    var pk=pairKeys[pi];
    var pcount=(cls.two[pk]||[]).length;
    var pbg=pcount>0?'#E8EAF6':'#F5F5F5';
    var pcol=pcount>0?'#283593':'#bbb';
    h+='<div style="background:'+pbg+';border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;color:'+pcol+'">2-slot ('+pairLbls[pk]+'): '+pcount+'</div>';
  }
  for(var si=0;si<days.length;si++){
    var sd=days[si];
    var scount=(cls.one[sd]||[]).length;
    var sbg=scount>0?'#E0F2F1':'#F5F5F5';
    var scol=scount>0?'#004D40':'#bbb';
    h+='<div style="background:'+sbg+';border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;color:'+scol+'">1-slot ('+DAYS_SHORT[sd-1]+'): '+scount+'</div>';
  }
  h+='</div>';
  if(cls.imbalance>=2){
    var bottDow=null,bottLoad=0;
    for(var ii=0;ii<days.length;ii++){if(cls.occ[days[ii]]>bottLoad){bottLoad=cls.occ[days[ii]];bottDow=days[ii];}}
    h+='<div style="background:#FFF8E1;border-left:3px solid #F9A825;border-radius:0 8px 8px 0;padding:7px 11px;font-size:11px;color:#5D4037;margin-bottom:8px">';
    h+='Yuk imbalansi: '+DAYS_SHORT[bottDow-1]+' gununde en yuksek yuk ('+bottLoad+'/'+MAX_PER_SLOT+'). Ferq: '+cls.imbalance+' yer.';
    h+='</div>';
  }
  var hasBottleneck=cls.maxOcc>=MAX_PER_SLOT;
  var hasFreeElsewhere=cls.minOcc<MAX_PER_SLOT;
  if(cls.imbalance>=2||(hasBottleneck&&hasFreeElsewhere)){
    h+='<div style="background:#E8F5E9;border-left:3px solid #1D9E75;border-radius:0 8px 8px 0;padding:7px 11px;font-size:11px;color:#1B5E20;margin-bottom:8px">';

    h+='</div>';

  if(footprint.length>0){

function resetWlFilter(){S.wlFilter={search:'',days:[],times:[],status:'all',scope:'all'};render();}
function wlFilterToggle(arrName,value){
  var arr=S.wlFilter[arrName];

function getFilteredWaitlistRows(){
  var f=S.wlFilter||{search:'',days:[],times:[],status:'all',scope:'all'};
  var q=normQ((f.search||'').trim());
  var qRaw=(f.search||'').trim().toLowerCase();
  var hasDays=f.days&&f.days.length>0;
  var hasTimes=f.times&&f.times.length>0;
  var wl=(S.waitlistData||[]).filter(function(w){
    if(f.status!=='all'&&w.status!==f.status)return false;
    if(f.scope!=='all'&&w.scope!==f.scope)return false;
    if(hasDays&&f.days.indexOf(w.day_of_week)<0)return false;
    if(hasTimes&&f.times.indexOf(w.time_slot)<0)return false;
    if(q&&normQ(w.customer_name||'').indexOf(q)<0&&(w.customer_id||'').toLowerCase().indexOf(qRaw)<0)return false;
    return true;
  });
  return wl.slice().sort(function(a,b){
    var sa=a.status==='active'?0:1;var sb=b.status==='active'?0:1;
    if(sa!==sb)return sa-sb;
    if(a.day_of_week!==b.day_of_week)return a.day_of_week-b.day_of_week;
    if(a.time_slot!==b.time_slot)return(a.time_slot||'').localeCompare(b.time_slot||'');
    return(a.created_at||'').localeCompare(b.created_at||'');
  });
}

async function submitAddWaitlistGeneral(){
  var custId=(document.getElementById('wlg-cust-id')||{}).value||'';
  var custName=(document.getElementById('wlg-cust-name')||{}).value||'';
  var dayEl=document.getElementById('wlg-day');
  var timeEl=document.getElementById('wlg-time');
  var scopeEl=document.getElementById('wlg-scope');
  var dateEl=document.getElementById('wlg-desired-date');
  var noteEl=document.getElementById('wlg-note');
  if(!custId){alert('Zəhmət olmasa müştəri seçin.');return;}
  var dow=dayEl?parseInt(dayEl.value):0;
  var time=timeEl?timeEl.value:'';
  if(!dow||!time){alert('Gün və saat seçin.');return;}
  var scope=scopeEl?scopeEl.value:'recurring';
  var desiredDate=(scope==='specific_date'&&dateEl&&dateEl.value)?dateEl.value:null;
  if(scope==='specific_date'&&!desiredDate){alert('Konkret tarix seçin.');return;}
  // Day/date mismatch guard
  if(scope==='specific_date'&&desiredDate){
    var _ddow=getDayOfWeek(desiredDate);
    if(_ddow===null||_ddow!==dow){
      alert('Seçilmiş tarix seçilən günə uyğun deyil. Ya günü dəyişin, ya da uyğun tarix seçin.');
      return;
    }
  }
  var note=noteEl?noteEl.value.trim():'';
  // Local dup check
  if(S.waitlistData){
    for(var i=0;i<S.waitlistData.length;i++){
      var w=S.waitlistData[i];
      if(w.customer_id===custId&&w.day_of_week===dow&&w.time_slot===time&&(w.status==='active'||w.status==='contacted')){
        if(scope==='recurring'&&w.scope==='recurring'){alert('Bu müştəri artıq bu saat üçün aktiv gözləmə siyahısındadır.');return;}
        if(scope==='specific_date'&&w.scope==='specific_date'&&w.desired_date===desiredDate){alert('Bu müştəri bu tarix üçün artıq gözləmə siyahısındadır.');return;}
      }
    }
  }
  // Live DB dup check
  try{
    var dupF='customer_id=eq.'+custId+'&day_of_week=eq.'+dow+'&time_slot=eq.'+encodeURIComponent(time)+'&status=in.(active,contacted)'
      +(scope==='specific_date'?'&desired_date=eq.'+desiredDate+'&scope=eq.specific_date':'&scope=eq.recurring');
    var dups=await dbGet('slot_waitlist',dupF+'&select=id&limit=1');
    if(dups&&dups.length>0){alert('Bu müştəri artıq bu slot üçün aktiv gözləmə siyahısındadır.');return;}
  }catch(e){alert('Dublikat yoxlaması uğursuz oldu. Əməliyyat dayandırıldı.');return;}
  var wlId='WL'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  var actor=getActorMeta();
  var row=Object.assign({id:wlId,customer_id:custId,customer_name:custName,day_of_week:dow,time_slot:time,
    desired_date:desiredDate||null,scope:scope,status:'active',note:note||null,
    converted_booking_id:null,converted_exception_id:null,updated_at:new Date().toISOString()},actor,getUpdatedByMeta());
  S.saving=true;render();
  try{
    var res=await dbPost('slot_waitlist',row);
    if(!S.waitlistData)S.waitlistData=[];
    S.waitlistData.push((res&&res.length>0)?res[0]:row);
    S.showAddWaitlistGeneral=false;
    logAudit('waitlist',wlId,'create',
      escHtml(custName)+' — '+DAYS_AZ[dow-1]+' '+time+' gözləmə siyahısına əlavə edildi',
      null,{customer_id:custId,customer_name:custName,day_of_week:dow,time_slot:time,scope:scope,desired_date:desiredDate||null,status:'active',note:note||null,source_flow:'submitAddWaitlistGeneral'});
  }catch(e){alert('Xəta: gözləmə qeydi saxlanılmadı. '+e);}
  finally{S.saving=false;render();}
}

    var freeSlots=[];
    for(var ti2=0;ti2<times.length;ti2++){
      var t=times[ti2];
      if(hasTimes&&S.bronBosTimes.indexOf(t)<0)continue;
      var count=getSlotCount(dow,t,selDate);
      var free=MAX_PER_SLOT-count;
      if(free>0)freeSlots.push({time:t,count:count,free:free,date:selDate,dow:dow});
    }
    if(!freeSlots.length){
      return h+'<div style="text-align:center;padding:40px;background:#fff;border-radius:12px;border:1px solid #eaeaea">'
        +'<div style="font-size:28px;margin-bottom:8px">📋</div>'
        +'<div style="font-weight:600;color:#555">Bu gün bütün slotlar doludur</div>'
        +'<div style="font-size:12px;color:#aaa;margin-top:6px">'+fmt(selDate)+' tarixə boş yer yoxdur</div>'
        +'</div>';
    }
    h+='<div class="slabel">'+freeSlots.length+' slotda boş yer var</div>';
    for(var fi=0;fi<freeSlots.length;fi++){h+=rBronBosRow(freeSlots[fi],false);}
    return h;
  }

  // Multi-day view: show selected weekdays in the week containing selDate
  var weekMon=getWeekMonday(selDate);
  var allFree=[];
  for(var di=0;di<S.bronBosDays.length;di++){
    var ddow=S.bronBosDays[di];
    var ddate=dateAddDays(weekMon,ddow-1);
    var dtimes=getTimesForDay(ddow);
    if(!dtimes)continue;
    for(var ti3=0;ti3<dtimes.length;ti3++){
      var dt=dtimes[ti3];
      if(hasTimes&&S.bronBosTimes.indexOf(dt)<0)continue;
      var dc=getSlotCount(ddow,dt,ddate);
      var df=MAX_PER_SLOT-dc;
      if(df>0)allFree.push({time:dt,count:dc,free:df,date:ddate,dow:ddow});
    }
  }
  allFree.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:a.time<b.time?-1:a.time>b.time?1:0;});
  if(!allFree.length){
    return h+'<div style="text-align:center;padding:40px;background:#fff;border-radius:12px;border:1px solid #eaeaea">'
      +'<div style="font-size:28px;margin-bottom:8px">📋</div>'
      +'<div style="font-weight:600;color:#555">Seçilən günlər üzrə boş yer yoxdur</div>'
      +'</div>';
  }
  h+='<div class="slabel">'+allFree.length+' slotda boş yer var</div>';
  for(var fi2=0;fi2<allFree.length;fi2++){h+=rBronBosRow(allFree[fi2],true);}
  return h;
}
