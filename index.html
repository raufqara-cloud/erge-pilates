// ---- POTENSIAL NAMİZƏDLƏR (temp-bron-candidates-v1) ----

function getTempBronCandidates(dow, time, dateStr){
  // Returns {strong:[], secondary:[], inferredInstructor:null, inferFailed:bool}
  var atts=D.attendances||[];
  var custs=D.customers||[];
  var result={strong:[],secondary:[],inferredInstructor:null,inferFailed:false};
  if(!atts.length)return result;

  // Date window: last 30 days
  var today=td();
  var cutDate=dateAddDays(today,-30);

  // Helper: is partner or single-entry program (fix: getSingleEntryPrograms returns objects)
  function isCandidateProgram(progId){
    if(!progId)return false;
    if(isPartnerProgId(progId))return true;
    return getSingleEntryPrograms().some(function(p){return p.id===progId;});
  }

  // Build set of customers already booked for this specific date (not just same dow)
  // Uses existing helpers: hasCustomerActiveBookingOnDate and hasCustomerTempAddOnDate
  function isAlreadyBookedOnDate(custId){
    return hasCustomerActiveBookingOnDate(custId,dateStr)||hasCustomerTempAddOnDate(custId,dateStr);
  }

  // --- Strong candidates: same dow + same time, last 30 days, partner/single prog ---
  var strongMap={};
  for(var ai=0;ai<atts.length;ai++){
    var a=atts[ai];
    if(!a.class_date||a.class_date<cutDate||a.class_date>today)continue;
    if(!isCandidateProgram(a.program_id))continue;
    if(getDayOfWeek(a.class_date)!==dow)continue;
    if(a.class_time!==time)continue;
    if(isAlreadyBookedOnDate(a.customer_id))continue;
    var cid=a.customer_id;
    if(!strongMap[cid]){
      strongMap[cid]={customer_id:cid,customer_name:a.customer_name||cid,lastDate:a.class_date,lastInstructor:a.instructor_name||null,count:0,type:'strong'};
    }
    strongMap[cid].count++;
    if(a.class_date>strongMap[cid].lastDate){
      strongMap[cid].lastDate=a.class_date;
      strongMap[cid].lastInstructor=a.instructor_name||null;
    }
  }
  var strongArr=[];
  for(var k in strongMap){if(strongMap.hasOwnProperty(k))strongArr.push(strongMap[k]);}
  strongArr.sort(function(a,b){return a.lastDate<b.lastDate?1:a.lastDate>b.lastDate?-1:b.count-a.count;});
  result.strong=strongArr;

  // --- Infer target slot instructor from recent attendance history ---
  var instCount={};
  for(var ai2=0;ai2<atts.length;ai2++){
    var a2=atts[ai2];
    if(!a2.class_date||a2.class_date<cutDate||a2.class_date>today)continue;
    if(getDayOfWeek(a2.class_date)!==dow)continue;
    if(a2.class_time!==time)continue;
    if(!a2.instructor_id)continue;
    var ikey=a2.instructor_id+':::'+(a2.instructor_name||'');
    instCount[ikey]=(instCount[ikey]||0)+1;
  }
  var bestInst=null;var bestCount=0;var totalInstAtts=0;
  for(var ik in instCount){
    if(!instCount.hasOwnProperty(ik))continue;
    totalInstAtts+=instCount[ik];
    if(instCount[ik]>bestCount){bestCount=instCount[ik];bestInst=ik;}
  }
  // Only infer if dominant instructor covers >= 70% of recent slot attendances
  if(bestInst&&totalInstAtts>0&&(bestCount/totalInstAtts)>=0.7){
    var parts=bestInst.split(':::');
    result.inferredInstructor={id:parts[0],name:parts[1]||parts[0]};
  } else if(totalInstAtts>0){
    result.inferFailed=true;
  }

  // --- Secondary candidates: same inferred instructor, last 30 days, partner/single prog ---
  if(result.inferredInstructor){
    var secInstId=result.inferredInstructor.id;
    var secMap={};
    for(var ai3=0;ai3<atts.length;ai3++){
      var a3=atts[ai3];
      if(!a3.class_date||a3.class_date<cutDate||a3.class_date>today)continue;
      if(!isCandidateProgram(a3.program_id))continue;
      if(a3.instructor_id!==secInstId)continue;
      if(isAlreadyBookedOnDate(a3.customer_id))continue;
      if(strongMap[a3.customer_id])continue; // already in strong
      var cid3=a3.customer_id;
      if(!secMap[cid3]){
        secMap[cid3]={customer_id:cid3,customer_name:a3.customer_name||cid3,lastDate:a3.class_date,lastInstructor:a3.instructor_name||null,count:0,type:'secondary'};
      }
      secMap[cid3].count++;
      if(a3.class_date>secMap[cid3].lastDate){
        secMap[cid3].lastDate=a3.class_date;
        secMap[cid3].lastInstructor=a3.instructor_name||null;
      }
    }
    var secArr=[];
    for(var k2 in secMap){if(secMap.hasOwnProperty(k2))secArr.push(secMap[k2]);}
    secArr.sort(function(a,b){return a.lastDate<b.lastDate?1:a.lastDate>b.lastDate?-1:b.count-a.count;});
    result.secondary=secArr;
  }

  return result;
}

// ---- FILTER HELPERS ----

function daysSinceDate(dateStr){
  var d1=new Date(td());var d2=new Date(dateStr);
  return Math.floor((d1-d2)/86400000);
}
function bronFilterToggle(arrName,value){
  var arr=S[arrName];
  var idx=arr.indexOf(value);
  if(idx>=0){arr.splice(idx,1);}else{arr.push(value);}
  render();
}
function bronMatchesRenewalFilter(custId,filter){
  if(filter==='all')return true;
  var bst=getCustBronStatus(custId);
  if(bst.type!=='grace'||!bst.sub||!bst.sub.end_date)return false;
  var days=daysSinceDate(bst.sub.end_date);
  if(days<0)return false;
  if(filter==='expired_all')return true;
  if(filter==='exp_0_7')return days<=7;
  if(filter==='exp_8_14')return days>=8&&days<=14;
  if(filter==='exp_15_30')return days>=15&&days<=30;
  if(filter==='exp_31_plus')return days>=31;
  return true;
}

function filterTempAddCusts(){
  var inp=document.getElementById('ta-cust-search');
  var list=document.getElementById('ta-cust-list');
  var srcEl=document.getElementById('ta-source');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());
  var isTrial=srcEl&&srcEl.value==='trial';
  list.innerHTML='';
  var shown=0;
  if(isTrial){
    var leads=S.leadsData||[];
    if(S.leadsLoading){
      list.innerHTML='<div style="padding:10px;color:#aaa;font-size:13px;text-align:center"><span class="spin"></span> Yüklənir...</div>';
      return;
    }
    for(var i=0;i<leads.length;i++){
      var ld=leads[i];
      if(q&&normQ(ld.name||'').indexOf(q)<0&&normQ(ld.phone||'').indexOf(q)<0)continue;
      if(shown>=50)break;
      (function(lead){
        var el=document.createElement('div');
        var isConverted=lead.status==='converted';
        el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px'+(isConverted?';opacity:0.5;cursor:default':'');
        el.innerHTML=escHtml(lead.name||'')+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+(lead.phone||'')+'</span>'+' <span class="badge '+getLeadStatusBadgeClass(lead.status)+'" style="font-size:10px">'+getLeadStatusLabel(lead.status)+'</span>'+(isConverted?'<span style="font-size:10px;color:#C62828;margin-left:4px">(seçilə bilməz)</span>':'');
        if(!isConverted){
          el.onmouseenter=function(){this.style.background='#FFF3E0';};
          el.onmouseleave=function(){this.style.background='';};
          el.onclick=function(){selectTempAddCust(lead.id,lead.name);};
        }
        list.appendChild(el);
      })(ld);
      shown++;
    }
    if(shown===0)list.innerHTML='<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">Lead tapılmadı</div>';
  }else{
    var sorted=D.customers.slice().sort(function(a,b){return a.name.localeCompare(b.name,'az');});
    for(var i=0;i<sorted.length;i++){
      var c=sorted[i];
      if(q&&normQ(c.name).indexOf(q)<0)continue;
      if(shown>=50)break;
      (function(cust){
        var el=document.createElement('div');
        el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
        el.innerHTML=cust.name+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+cust.id+'</span>';
        el.onmouseenter=function(){this.style.background='#f0faf5';};
        el.onmouseleave=function(){this.style.background='';};
        el.onclick=function(){selectTempAddCust(cust.id,cust.name);};
        list.appendChild(el);
      })(c);
      shown++;
    }
    if(shown===0)list.innerHTML='<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">Tapılmadı</div>';
  }
}

function hasLeadActiveTrial(leadId){

  for(var i=0;i<leads.length;i++){
    if(leads[i].id===leadId&&leads[i].trial_booking_ex_id)return true;
  }
  return false;
}

function hasLeadTrialOnDate(leadId,dateStr){
  var excs=S.bronExceptions||[];
  for(var i=0;i<excs.length;i++){
    var ex=excs[i];
    if(ex.type==='trial_add'&&ex.temp_lead_id===leadId&&ex.exception_date===dateStr)return true;
  }
  return false;
}

// --- Weekly slot limit helper ---
function getCustomerWeeklySlotCount(custId,dateStr){
  var mon=getWeekMonday(dateStr);
  var weekSat=dateAddDays(mon,5);
  // Build map: booking_id -> set of absent exception_dates in this week
  // We must match per-booking class date, not just any absent in the week.
  var absentDateByBronId={};
  if(S.bronExceptions){
    for(var i=0;i<S.bronExceptions.length;i++){
      var _ae=S.bronExceptions[i];
      if(_ae.type!=='absent')continue;
      if(!_ae.booking_id)continue;
      if(_ae.exception_date<mon||_ae.exception_date>weekSat)continue;
      if(!absentDateByBronId[_ae.booking_id])absentDateByBronId[_ae.booking_id]=[];
      absentDateByBronId[_ae.booking_id].push(_ae.exception_date);
    }
  }
  var count=0;
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var b=S.bronData[i];
      if(b.customer_id!==custId)continue;
      if(b.is_active===false)continue;
      var dow=b.day_of_week;
      if(dow<1||dow>6)continue;
      var bDate=dateAddDays(mon,dow-1);
      if(b.valid_from&&bDate<b.valid_from)continue;
      if(b.valid_until&&bDate>b.valid_until)continue;
      // Only free this booking if there is an absent whose exception_date exactly equals this booking's class date in the week
      if(absentDateByBronId[b.id]&&absentDateByBronId[b.id].indexOf(bDate)>=0)continue;
      count++;
    }
  }
  if(S.bronExceptions){
    for(var i=0;i<S.bronExceptions.length;i++){
      var _te=S.bronExceptions[i];
      if(_te.type!=='temp_add')continue;
      if(_te.temp_customer_id!==custId)continue;
      if(_te.is_active===false)continue;
      if(_te.exception_date<mon||_te.exception_date>weekSat)continue;
      count++;
    }
  }
  return count;
}

// Helper for new permanent booking limit:
// Counts active permanent bookings in target week (NO absent subtraction)
// + temp_add exceptions in target week. Does NOT count trial_add.
function getCustomerWeeklySlotCountForPermanentLimit(custId,dateStr){
  var mon=getWeekMonday(dateStr);
  var weekSat=dateAddDays(mon,5);
  var count=0;
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var b=S.bronData[i];
      if(b.customer_id!==custId)continue;
      if(b.is_active===false)continue;
      var dow=b.day_of_week;
      if(dow<1||dow>6)continue;
      var bDate=dateAddDays(mon,dow-1);
      if(b.valid_from&&bDate<b.valid_from)continue;
      if(b.valid_until&&bDate>b.valid_until)continue;
      count++; // absent NOT subtracted — one-week absent cannot allow a new recurring booking
    }
  }
  if(S.bronExceptions){
    for(var i=0;i<S.bronExceptions.length;i++){
      var _te=S.bronExceptions[i];
      if(_te.type!=='temp_add')continue;
      if(_te.temp_customer_id!==custId)continue;
      if(_te.is_active===false)continue;
      if(_te.exception_date<mon||_te.exception_date>weekSat)continue;
      count++;
    }
  }
  return count;
}

async function submitTempAdd(){
  var noteEl=document.getElementById('ta-note');
  var sourceEl=document.getElementById('ta-source');
  var userNote=(noteEl?noteEl.value:'').trim();
  var sourceVal=sourceEl?sourceEl.value:'studio';
  var slot=S.tempAddSlot;
  if(!slot)return;

  // ---- TRIAL BRANCH ----
  if(sourceVal==='trial'){
    var leadIdEl=document.getElementById('ta-lead-id');
    var leadId=leadIdEl?leadIdEl.value.trim():'';
    if(!leadId)return alert('Lead seçin');
    var lead=getLead(leadId);
    if(!lead)return alert('Lead tapılmadı. Yenidən cəhd edin.');
    if(lead.status==='converted')return alert('Bu lead artıq müştəriyə çevrilib. Sınaq slotu yaradıla bilməz.');
    if(lead.status==='trial_done')return alert('Bu leadın sınağı artıq keçib. Bu mərhələdə yeni sınaq slotu yaradılmır.');
    if(hasLeadActiveTrial(leadId))return alert('Bu leadın artıq aktiv sınaq slotu var. Əvvəlcə mövcud slotu lead kartından silin.');
    if(hasLeadTrialOnDate(leadId,slot.date))return alert('Bu lead həmin tarixdə artıq sınaq bronundadır.');
    try{
      var _dbTrial=await dbGet('booking_exceptions','type=eq.trial_add&temp_lead_id=eq.'+leadId+'&exception_date=eq.'+slot.date+'&select=id&limit=1');
      if(_dbTrial&&_dbTrial.length>0)return alert('Bu lead həmin tarixdə artıq sınaq bronundadır (başqa cihazdan yaradılmış ola bilər).');
    }catch(e){}
    var prevStatus=lead.status;
    var eid='EX'+Date.now();
    var ex={
      id:eid,
      booking_id:null,
      exception_date:slot.date,
      type:'trial_add',
      temp_lead_id:leadId,
      temp_lead_name:lead.name||'',
      day_of_week:slot.dow,
      time_slot:slot.time,
      note:userNote||null
    };
    S.saving=true;S.showTempAdd=false;render();
    try{
      await dbPost('booking_exceptions',ex);
    }catch(e){
      S.saving=false;render();
      return alert('Sınaq slotu yaradılarkən xəta: '+e.message);
    }
    try{
      await dbPatch('leads','id=eq.'+leadId,{
        status:'trial_scheduled',
        trial_booking_ex_id:eid,
        trial_class_date:slot.date,
        trial_class_time:slot.time
      });
    }catch(e2){
      try{
        await fetch(BASE+'/booking_exceptions?id=eq.'+eid,{method:'DELETE',headers:Object.assign({},H,{'Prefer':'return=minimal'})});
        S.saving=false;render();
        return alert('Sınaq slotu yaradıldı, lakin lead yenilənərkən xəta baş verdi. Slot silinməsi cəhd edildi.\nXəta: '+e2.message);
      }catch(e3){
        S.saving=false;render();
        return alert('MANUAL TƏMİZLƏMƏ LAZIMDIR:\nLead yenilənmədi, slot silinmədi.\nSlot ID: '+eid+'\nLead ID: '+leadId+'\nXəta: '+e2.message);
      }
    }
    if(!S.bronExceptions)S.bronExceptions=[];
    S.bronExceptions.push(ex);
    var _leads=S.leadsData||[];
    for(var i=0;i<_leads.length;i++){
      if(_leads[i].id===leadId){
        _leads[i].status='trial_scheduled';
        _leads[i].trial_booking_ex_id=eid;
        _leads[i].trial_class_date=slot.date;
        _leads[i].trial_class_time=slot.time;
        break;
      }
    }
    logAudit('lead',leadId,'trial_scheduled',
      'Sınaq slotu yaradıldı — '+escHtml(lead.name||leadId)+' — '+slot.date+' '+slot.time,
      {status:prevStatus,trial_booking_ex_id:null},
      {status:'trial_scheduled',trial_booking_ex_id:eid,trial_class_date:slot.date,trial_class_time:slot.time,exception_id:eid,source_flow:'submitTempAdd_trial'});
    S.saving=false;render();
    return;
  }

  // ---- NORMAL CUSTOMER BRANCH ----
  var custIdEl=document.getElementById('ta-cust-id');
  var custId=custIdEl?custIdEl.value:'';
  if(!custId)return alert('Müştəri seçin');
  // Studio source requires a real studio subscription
  if(sourceVal==='studio'&&!hasStudioSubscriptionForBooking(custId)){
    return alert('Bu müştərinin studio abunəliyi yoxdur. Studio bron üçün əvvəl abunəlik yaradın. Əks halda Tək giriş və ya Partner seçin.');
  }
  if(hasCustomerTempAddOnDate(custId,slot.date)){
    return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var.');
  }
  if(hasCustomerActiveBookingOnDate(custId,slot.date)){
    return alert('Bu müştərinin həmin tarixə aktiv sabit bronu var.\nMüvəqqəti bron əlavə etmək olmaz.\n(İstisna: əvvəlcə həmin tarix üçün "Gəlməyəcək" qeyd edin.)');
  }
  // --- Weekly slot limit guard (all sources: studio, partner, single, no-sub) ---
  var _bstW=getCustBronStatus(custId);
  var _subW=_bstW.sub;
  var _maxW;
  if(_subW&&_bstW.type!=='pending'&&_bstW.type!=='none'&&_bstW.type!=='grace'){
    _maxW=_subW.sessions_total>=12?3:_subW.sessions_total>=8?2:_subW.sessions_total>1?2:3;
  } else {
    _maxW=3; // partner, single, no subscription → max 3 slots/week
  }
  var _weekCount=getCustomerWeeklySlotCount(custId,slot.date);
  if(_weekCount>=_maxW){
    return alert('Bu müştərinin bu həftə üçün slot limiti dolub: '+_weekCount+'/'+_maxW+'. Yeni müvəqqəti bron üçün əvvəlcə mövcüd bronu silin/deaktiv edin və ya həmin tarix üçün \'Gəlməyəcək\' qeyd edin.');
  }
  if(!sourceVal||sourceVal==='auto')sourceVal='studio';
  var marker='[source:'+sourceVal+']';
  var finalNote=userNote?marker+' '+userNote:marker;
  var cust=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
  try{
    var _dbTmp=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=eq.'+slot.date+'&select=id&limit=1');
    if(_dbTmp&&_dbTmp.length>0){
      return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər).');
    }
    var _tDow=new Date(slot.date+'T00:00:00').getDay();
    var _tSlotDow=(_tDow===0)?7:_tDow;
    var _dbPermT=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+_tSlotDow+'&type=eq.permanent&is_active=eq.true&select=id,valid_from,valid_until&limit=5');
    if(_dbPermT&&_dbPermT.length>0){
      for(var _pi=0;_pi<_dbPermT.length;_pi++){
        var _pb=_dbPermT[_pi];
        if(_pb.valid_from&&slot.date<_pb.valid_from)continue;
        if(_pb.valid_until&&slot.date>_pb.valid_until)continue;
        // Check absent: local first, then DB
        if(hasAbsentForBookingOnDate(_pb.id,slot.date))continue;
        try{
          var _abChk=await dbGet('booking_exceptions','type=eq.absent&booking_id=eq.'+_pb.id+'&exception_date=eq.'+slot.date+'&select=id&limit=1');
          if(_abChk&&_abChk.length>0)continue;
        }catch(e){}
        return alert('Bu müştərinin həmin tarixdə artıq aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər). Eyni günə ikinci slot yaratmaq olmaz.');
      }
    }
  
    // Live DB: weekly limit cross-device check (always runs, maxW is always>=3)
    var _wMon=getWeekMonday(slot.date);
    var _wSat=dateAddDays(_wMon,5);
    var _dbWkTemps=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=gte.'+_wMon+'&exception_date=lte.'+_wSat+'&select=id&limit=20');
    var _dbWkTempCnt=(_dbWkTemps||[]).length;
    var _localPermW=getCustomerWeeklySlotCount(custId,slot.date)-_dbWkTempCnt;
    var _dbWeekTotal=Math.max(0,_localPermW)+_dbWkTempCnt;
    if(_dbWeekTotal>=_maxW){
      return alert('Bu müştərinin bu həftə üçün slot limiti dolub: '+_dbWeekTotal+'/'+_maxW+' (canlı yoxlama). Yeni müvəqqəti bron üçün əvvəlcə mövcüd bronu silin/deaktiv edin və ya həmin tarix üçün \'Gəlməyəcək\' qeyd edin.');
    }
  }catch(e){}
  S.saving=true;S.showTempAdd=false;render();
  try{
    var eid='EX'+Date.now();
    var ex={id:eid,booking_id:null,exception_date:slot.date,
      type:'temp_add',temp_customer_id:custId,
      temp_customer_name:cust?cust.name:'',
      day_of_week:slot.dow,time_slot:slot.time,
      note:finalNote};
    await dbPost('booking_exceptions',ex);
    logAudit('booking',ex.id,'create',
      'Müvəqqəti bron yaradıldı — '+(cust?cust.name:custId)+' — '+ex.exception_date+(ex.time_slot?' '+ex.time_slot:''),
      null,{type:'temp_add',booking_id:null,temp_customer_id:ex.temp_customer_id,temp_customer_name:ex.temp_customer_name,exception_date:ex.exception_date,day_of_week:ex.day_of_week,time_slot:ex.time_slot,note:ex.note,source_flow:'submitTempAdd'});
    if(!S.bronExceptions)S.bronExceptions=[];
    S.bronExceptions.push(ex);
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

// ── BOOKING SLOT CAPACITY GUARD (slot-waitlist-conversion-ux-v1-hotfix2) ──
// Checks booking occupancy, not attendance rows. This matches getSlotCount():
// permanent bookings - absents + temp_add + trial_add. Fail-closed on live DB error.
async function checkBookingSlotCapacity(dow,time,dateStr){
  if(!dow||!time||!dateStr)return{ok:false,msg:'Slot tutumu yoxlaması üçün gün, saat və tarix natamamdır.'};
  try{
    if(S.bronData&&S.bronExceptions){
      var localCnt=getSlotCount(dow,time,dateStr);
      if(localCnt>=MAX_PER_SLOT)return{ok:false,msg:'Bu slot tam doludur ('+localCnt+'/'+MAX_PER_SLOT+').'};
    }
  }catch(e){}
  try{
    var encTime=encodeURIComponent(time);
    var dbBrons=await dbGet('bookings','day_of_week=eq.'+dow+'&time_slot=eq.'+encTime+'&type=eq.permanent&is_active=eq.true&select=id,valid_from,valid_until,is_active&limit=50');
    var activeIds=[];
    if(dbBrons){
      for(var i=0;i<dbBrons.length;i++){
        var b=dbBrons[i];
        if(b.is_active===false)continue;
        if(b.valid_from&&dateStr<b.valid_from)continue;
        if(b.valid_until&&dateStr>b.valid_until)continue;
        activeIds.push(b.id);
      }
    }
    var cnt=activeIds.length;
    var idMap={};
    for(var ai=0;ai<activeIds.length;ai++)idMap[activeIds[ai]]=true;
    var exs=await dbGet('booking_exceptions','exception_date=eq.'+dateStr+'&select=id,type,booking_id,day_of_week,time_slot&limit=200');
    if(exs){
      for(var xi=0;xi<exs.length;xi++){
        var ex=exs[xi];
        if(ex.type==='absent'&&ex.booking_id&&idMap[ex.booking_id])cnt--;
        else if((ex.type==='temp_add'||ex.type==='trial_add')&&ex.day_of_week===dow&&ex.time_slot===time)cnt++;
      }
    }
    if(cnt>=MAX_PER_SLOT)return{ok:false,msg:'Bu slot tam doludur ('+cnt+'/'+MAX_PER_SLOT+').'};
    return{ok:true,count:cnt};
  }catch(e){
    return{ok:false,msg:'Slot tutumu canlı yoxlaması tamamlanmadı. İnternet/DB bağlantısını yoxlayıb yenidən cəhd edin.'};
  }
}

// ── BOOKING GUARD HELPERS (slot-waitlist-conversion-ux-v1) ──
// Returns {ok:true} or {ok:false, msg:string}
// Runs all permanent-booking guards for a given custId+day+time+source (no DOM reading)
async function checkPermanentBronGuards(custId, day, time, source, fromDate){
  if(!custId)return{ok:false,msg:'Müştəri seçin'};
  if(!day||!time)return{ok:false,msg:'Gün və saat seçin.'};
  var resolvedSource=source==='auto'||!source?inferCustomerBronSource(custId):source;
  // Studio subscription check
  if(resolvedSource==='studio'&&!hasStudioSubscriptionForBooking(custId)){
    return{ok:false,msg:'Bu müştərinin studio abunəliyi yoxdur. Studio bron üçün əvvəl abunəlik yaradın.'};
  }
  // Weekly limit
  var bst=getCustBronStatus(custId);
  var activSub=bst.sub;
  var maxD;
  if(resolvedSource==='studio'&&activSub&&(bst.type==='ok'||bst.type==='warn')){
    maxD=activSub.sessions_total>=12?3:activSub.sessions_total>=8?2:activSub.sessions_total>1?2:0;
    if(maxD===0)return{ok:false,msg:'Tək giriş proqramı üçün Studio bron yaratmaq olmaz.'};
  } else {
    maxD=3;
  }
  var checkDate=getNextDateForDow(fromDate||S.bronSelDate||td(),day);
  var weekCount=getCustomerWeeklySlotCountForPermanentLimit(custId,checkDate);
  if(weekCount>=maxD)return{ok:false,msg:'Bu müştərinin həftəlik slot limiti dolub: '+weekCount+'/'+maxD+'.'};
  // Same-day permanent duplicate (local)
  if(hasActivePermanentBookingOnDow(custId,day)){
    return{ok:false,msg:'Bu müştərinin '+DAYS_AZ[day-1]+' günü üçün artıq aktiv sabit bronu var.'};
  }
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var eb=S.bronData[i];
      if(eb.customer_id===custId&&eb.day_of_week===day&&eb.time_slot===time){
        return{ok:false,msg:'Bu müştərinin '+DAYS_AZ[day-1]+' '+time+' üçün artıq sabit bronu var.'};
      }
    }
  }
  // Same-day temp_add (local)
  var firstDate=getNextDateForDow(fromDate||td(),day);
  if(S.bronExceptions){
    for(var xi=0;xi<S.bronExceptions.length;xi++){
      var xe=S.bronExceptions[xi];
      if(xe.type!=='temp_add'||xe.temp_customer_id!==custId||xe.is_active===false||xe.exception_date<firstDate)continue;
      var xd=new Date(xe.exception_date+'T00:00:00').getDay();
      var xdow=(xd===0)?7:xd;
      if(xdow===day)return{ok:false,msg:'Bu müştərinin həmin gün üzrə gələcək tarixdə artıq müvəqqəti bronu var.'};
    }
  }
  // Slot capacity — local + live DB, fail-closed
  var cap=await checkBookingSlotCapacity(day,time,checkDate);
  if(!cap.ok)return cap;
  // Live DB checks
  try{
    var dbBron=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+day+'&type=eq.permanent&select=id,is_active&limit=5');
    if(dbBron){
      for(var di=0;di<dbBron.length;di++){
        if(dbBron[di].is_active!==false)return{ok:false,msg:'Bu müştərinin '+DAYS_AZ[day-1]+' günü üçün artıq aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər).'};
      }
    }
    var dbTmp=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=gte.'+firstDate+'&select=id,exception_date&limit=50');
    if(dbTmp&&dbTmp.length>0){
      for(var dti=0;dti<dbTmp.length;dti++){
        var dtd=new Date(dbTmp[dti].exception_date+'T00:00:00').getDay();
        var dtDow=(dtd===0)?7:dtd;
        if(dtDow===day)return{ok:false,msg:'Bu müştərinin həmin gün üzrə gələcək tarixdə artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər).'};
      }
    }
  }catch(e){}
  return{ok:true,source:resolvedSource};
}

// Runs all temp_add guards for a given custId+slot (no DOM reading)
async function checkTempAddGuards(custId, slot){
  if(!custId)return{ok:false,msg:'Müştəri seçin'};
  if(!slot||!slot.date||!slot.time||!slot.dow)return{ok:false,msg:'Slot məlumatı natamamdır.'};
  var cap=await checkBookingSlotCapacity(slot.dow,slot.time,slot.date);
  if(!cap.ok)return cap;
  if(hasCustomerTempAddOnDate(custId,slot.date))return{ok:false,msg:'Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var.'};
  if(hasCustomerActiveBookingOnDate(custId,slot.date))return{ok:false,msg:'Bu müştərinin həmin tarixə aktiv sabit bronu var. Müvəqqəti bron əlavə etmək olmaz.'};
  // Weekly limit
  var bstW=getCustBronStatus(custId);
  var subW=bstW.sub;
  var maxW;
  if(subW&&bstW.type!=='pending'&&bstW.type!=='none'&&bstW.type!=='grace'){
    maxW=subW.sessions_total>=12?3:subW.sessions_total>=8?2:subW.sessions_total>1?2:3;
  } else {
    maxW=3;
  }
  var weekCount=getCustomerWeeklySlotCount(custId,slot.date);
  if(weekCount>=maxW)return{ok:false,msg:'Bu müştərinin həftəlik slot limiti dolub: '+weekCount+'/'+maxW+'.'};
  // Live DB
  try{
    var dbTmp=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=eq.'+slot.date+'&select=id&limit=1');
    if(dbTmp&&dbTmp.length>0)return{ok:false,msg:'Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var (başqa cihazdan).'};
    var tDow=new Date(slot.date+'T00:00:00').getDay();
    var tSlotDow=(tDow===0)?7:tDow;
    var dbPerm=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+tSlotDow+'&type=eq.permanent&is_active=eq.true&select=id,valid_from,valid_until&limit=5');
    if(dbPerm&&dbPerm.length>0){
      for(var pi=0;pi<dbPerm.length;pi++){
        var pb=dbPerm[pi];
        if(pb.valid_from&&slot.date<pb.valid_from)continue;
        if(pb.valid_until&&slot.date>pb.valid_until)continue;
        if(hasAbsentForBookingOnDate(pb.id,slot.date))continue;
        try{var ac=await dbGet('booking_exceptions','type=eq.absent&booking_id=eq.'+pb.id+'&exception_date=eq.'+slot.date+'&select=id&limit=1');if(ac&&ac.length>0)continue;}catch(e){}
        return{ok:false,msg:'Bu müştərinin həmin tarixdə artıq aktiv sabit bronu var (başqa cihazdan).'};
      }
    }
    // Weekly live check
    var wMon=getWeekMonday(slot.date);
    var wSat=dateAddDays(wMon,5);
    var dbWkTemps=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=gte.'+wMon+'&exception_date=lte.'+wSat+'&select=id&limit=20');
    var dbWkCnt=(dbWkTemps||[]).length;
    var localPerm=getCustomerWeeklySlotCount(custId,slot.date)-dbWkCnt;
    var dbTotal=Math.max(0,localPerm)+dbWkCnt;
    if(dbTotal>=maxW)return{ok:false,msg:'Bu müştərinin həftəlik slot limiti dolub: '+dbTotal+'/'+maxW+' (canlı yoxlama).'};
  }catch(e){}
  return{ok:true};
}
// ── END BOOKING GUARD HELPERS ──

// ── WAITLIST CONVERSION (slot-waitlist-conversion-ux-v1) ──
async function convertWaitlistToBron(wlId){
  var entry=null;
  if(S.waitlistData){for(var i=0;i<S.waitlistData.length;i++){if(S.waitlistData[i].id===wlId){entry=S.waitlistData[i];break;}}}
  if(!entry){alert('Gözləmə qeydi tapılmadı.');return;}
  if(entry.status!=='active'&&entry.status!=='contacted'){
    alert('Yalnız aktiv və ya əlaqə saxlanmış qeydlər bronlaşdırıla bilər.');return;
  }
  var custId=entry.customer_id;
  var custName=entry.customer_name||'';
  var cust=null;
  for(var ci=0;ci<D.customers.length;ci++){if(D.customers[ci].id===custId){cust=D.customers[ci];break;}}
  if(!cust){alert('Müştəri məlumatı tapılmadı (ID: '+custId+'). Müştərilər siyahısını yeniləyin.');return;}

  if(entry.scope==='recurring'){
    // ── Permanent booking path ──
    var guard=await checkPermanentBronGuards(custId,entry.day_of_week,entry.time_slot,'auto',td());
    if(!guard.ok){alert(guard.msg);return;}
    S.saving=true;render();
    var bid='BK'+Date.now();
    var source=guard.source||inferCustomerBronSource(custId);
    var marker='[source:'+source+'][from:waitlist:'+wlId+']';
    var bron={id:bid,customer_id:custId,customer_name:cust.name,
      day_of_week:entry.day_of_week,time_slot:entry.time_slot,type:'permanent',
      valid_from:td(),note:marker,is_active:true};
    try{
      await dbPost('bookings',bron);
      if(S.bronData)S.bronData.push(bron);
      emitBronSync('booking_create_from_waitlist');
      logAudit('booking',bron.id,'create',
        'Sabit bron yaradıldı (gözləmədən) — '+escHtml(cust.name)+' — '+DAYS_AZ[entry.day_of_week-1]+' '+entry.time_slot,
        null,{type:'permanent',customer_id:custId,customer_name:cust.name,day_of_week:entry.day_of_week,time_slot:entry.time_slot,source_flow:'convertWaitlistToBron'});
    }catch(e){S.saving=false;render();alert('Bron yaradılarkən xəta: '+e);return;}
    // Update waitlist status
    try{
      var wlPatch=Object.assign({},getUpdatedByMeta(),{status:'converted',converted_booking_id:bid,updated_at:new Date().toISOString()});
      await dbPatch('slot_waitlist','id=eq.'+wlId,wlPatch);
      if(S.waitlistData)S.waitlistData=S.waitlistData.filter(function(w){return w.id!==wlId;});
      emitBronSync('waitlist_converted');
      logAudit('waitlist',wlId,'edit',
        escHtml(custName)+' gözləmə → bronlaşdırıldı (sabit)',
        {customer_id:custId,customer_name:custName,day_of_week:entry.day_of_week,time_slot:entry.time_slot,scope:'recurring',status:entry.status,source_flow:'convertWaitlistToBron'},
        {customer_id:custId,customer_name:custName,day_of_week:entry.day_of_week,time_slot:entry.time_slot,scope:'recurring',status:'converted',converted_booking_id:bid,source_flow:'convertWaitlistToBron'});
    }catch(e2){
      alert('⚠ Bron yaradıldı, lakin gözləmə qeydi yenilənmədi. Gözləmə qeydini manual ləğv edin. (Bron ID: '+bid+')');
    }
    S.saving=false;render();

  } else if(entry.scope==='specific_date'){
    // ── Temp_add path ──
    if(!entry.desired_date){alert('Konkret tarix müəyyən edilməyib. Qeydi manual ləğv edin.');return;}
    // Day/date mismatch guard
    var _cvDow=getDayOfWeek(entry.desired_date);
    if(_cvDow===null||_cvDow!==entry.day_of_week){
      alert('Gözləmə qeydindəki tarix günü ilə uyğun deyil. Qeydi yenidən yaradın.');
      return;
    }
    var slot={date:entry.desired_date,time:entry.time_slot,dow:entry.day_of_week};
    var guard=await checkTempAddGuards(custId,slot);
    if(!guard.ok){alert(guard.msg);return;}
    S.saving=true;render();
    var eid='EX'+Date.now();
    var marker2='[source:'+inferCustomerBronSource(custId)+'][from:waitlist:'+wlId+']';
    var ex={id:eid,booking_id:null,exception_date:entry.desired_date,
      type:'temp_add',temp_customer_id:custId,temp_customer_name:cust.name,
      day_of_week:entry.day_of_week,time_slot:entry.time_slot,note:marker2};
    try{
      await dbPost('booking_exceptions',ex);
      if(!S.bronExceptions)S.bronExceptions=[];
      S.bronExceptions.push(ex);
      emitBronSync('temp_add_from_waitlist');
      logAudit('booking',ex.id,'create',
        'Müvəqqəti bron yaradıldı (gözləmədən) — '+escHtml(cust.name)+' — '+ex.exception_date+' '+ex.time_slot,
        null,{type:'temp_add',temp_customer_id:custId,temp_customer_name:cust.name,exception_date:ex.exception_date,day_of_week:ex.day_of_week,time_slot:ex.time_slot,source_flow:'convertWaitlistToBron'});
    }catch(e){S.saving=false;render();alert('Müvəqqəti bron yaradılarkən xəta: '+e);return;}
    // Update waitlist status
    try{
      var wlPatch2=Object.assign({},getUpdatedByMeta(),{status:'converted',converted_exception_id:eid,updated_at:new Date().toISOString()});
      await dbPatch('slot_waitlist','id=eq.'+wlId,wlPatch2);
      if(S.waitlistData)S.waitlistData=S.waitlistData.filter(function(w){return w.id!==wlId;});
      emitBronSync('waitlist_converted');
      logAudit('waitlist',wlId,'edit',
        escHtml(custName)+' gözləmə → müvəqqəti bron ('+entry.desired_date+')',
        {customer_id:custId,customer_name:custName,day_of_week:entry.day_of_week,time_slot:entry.time_slot,scope:'specific_date',desired_date:entry.desired_date,status:entry.status,source_flow:'convertWaitlistToBron'},
        {customer_id:custId,customer_name:custName,day_of_week:entry.day_of_week,time_slot:entry.time_slot,scope:'specific_date',desired_date:entry.desired_date,status:'converted',converted_exception_id:eid,source_flow:'convertWaitlistToBron'});
    }catch(e2){
      alert('⚠ Müvəqqəti bron yaradıldı, lakin gözləmə qeydi yenilənmədi. Gözləmə qeydini manual ləğv edin. (Exception ID: '+eid+')');
    }
    S.saving=false;render();

  } else {
    alert('Naməlum scope: '+entry.scope);
  }
}
// ── END WAITLIST CONVERSION ──

async function submitNewSabitBron(){
  // DOM values read before any await
  var custIdEl=document.getElementById('nsb-cust-id');
  var dayEl=document.getElementById('nsb-day');
  var timeEl=document.getElementById('nsb-time');
  var fromEl=document.getElementById('nsb-from');
  var noteEl=document.getElementById('nsb-note');
  var srcEl=document.getElementById('nsb-source');
  var custId=custIdEl?custIdEl.value:'';
  var day=dayEl?parseInt(dayEl.value):0;
  var time=timeEl?timeEl.value:'';
  var from=fromEl?fromEl.value:'';
  var userNote=noteEl?noteEl.value:'';
  var source=srcEl?srcEl.value:'auto';
  if(!custId)return alert('Müştəri seçin');
  if(!day||!time)return alert('Gün və saat seçin.');

  // ── 1. Source təyin et ──
  if(source==='auto')source=inferCustomerBronSource(custId);

  // ── 2. Source-a görə abunə yoxlama + weekly limit (bütün sources) ──
  var _nsbMaxW;
  if(source==='studio'){
    if(!hasStudioSubscriptionForBooking(custId)){
      return alert('Bu müştərinin studio abunəliyi yoxdur. Studio bron üçün əvvəl abunəlik yaradın. Əks halda Tək giriş və ya Partner seçin.');
    }
    var bst=getCustBronStatus(custId);
    var activSubForLimit=bst.sub;
    if(activSubForLimit&&(bst.type==='ok'||bst.type==='warn')){
      var maxD=activSubForLimit.sessions_total>=12?3:activSubForLimit.sessions_total>=8?2:activSubForLimit.sessions_total>1?2:0;
      if(maxD===0){return alert('Tək giriş proqramı üçün Studio bron yaratmaq olmaz. Partner və ya Tək giriş seçin.');}
      _nsbMaxW=maxD;
    } else {
      _nsbMaxW=3;
    }
  } else {
    // partner, single: no subscription required, max 3 slots/week
    _nsbMaxW=3;
  }
  // Weekly slot limit guard: use checkDate (next occurrence of this dow)
  var _nsbCheckDate=getNextDateForDow(from||td(),day);
  var _nsbWeekCount=getCustomerWeeklySlotCountForPermanentLimit(custId,_nsbCheckDate);
  if(_nsbWeekCount>=_nsbMaxW){
    return alert('Bu müştərinin bu həftə üçün slot limiti dolub: '+_nsbWeekCount+'/'+_nsbMaxW+'. Yeni sabit bron üçün əvvəlcə mövcüd bronu silin/deaktiv edin.');
  }

  // ── 3. Dublikat yoxlama: eyni müştəriyə eyni gündə 2-ci sabit bron yaratmaq olmaz ──
  if(hasActivePermanentBookingOnDow(custId,day)){
    return alert('Bu müştərinin '+DAYS_AZ[day-1]+' günü üçün artıq aktiv sabit bronu var.\nEyni gündə ikinci sabit bron yaratmaq olmaz.');
  }
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var eb=S.bronData[i];
      if(eb.customer_id===custId&&eb.day_of_week===day&&eb.time_slot===time){
        return alert('Bu müştərinin '+DAYS_AZ[day-1]+' '+time+' üçün artıq sabit bronu var.');
      }
    }
  }

  // ── 3b. Eyni gün üzrə gələcək müvəqqəti bron var? (bütün həftəlik təkrarlar üçün) ──
  var _firstBronDate=getNextDateForDow(from||td(),day);
  if(S.bronExceptions){
    for(var _bxi=0;_bxi<S.bronExceptions.length;_bxi++){
      var _bxe=S.bronExceptions[_bxi];
      if(_bxe.type!=='temp_add')continue;
      if(_bxe.temp_customer_id!==custId)continue;
      if(_bxe.is_active===false)continue;
      if(_bxe.exception_date<_firstBronDate)continue;
      var _bxd=new Date(_bxe.exception_date+'T00:00:00').getDay();
      var _bxDow=(_bxd===0)?7:_bxd;
      if(_bxDow!==day)continue;
      return alert('Bu müştərinin həmin gün üzrə gələcək tarixdə artıq müvəqqəti bronu var. Eyni günə ikinci slot yaratmaq olmaz.');
    }
  }

  // ── 4. Slot tutumu hard limit ──
  var checkDate=getNextDateForDow(S.bronSelDate||td(),day);
  var slotCount=getSlotCount(day,time,checkDate);
  if(slotCount>=MAX_PER_SLOT){
    return alert('Bu slot tam doludur ('+slotCount+'/'+MAX_PER_SLOT+'). Əvvəl mövcud bronu bağlayın və ya başqa saat seçin.');
  }

  // ── 5. Note marker ──
  var marker='[source:'+source+']';
  var finalNote=userNote?marker+' '+userNote:marker;

  var cust=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
  // Live DB check — başqa cihazdan yaradılmış sabit bronu tutur
  try{
    var _dbBron=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+day+'&type=eq.permanent&select=id,is_active&limit=5');
    if(_dbBron){
      for(var i=0;i<_dbBron.length;i++){
        if(_dbBron[i].is_active!==false){
          return alert('Bu müştərinin '+DAYS_AZ[day-1]+' günü üçün artıq aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər).');
        }
      }
    }
    // temp_add on same day_of_week on or after first date — başqa cihazdan yaradılmış ola bilər
    var _dbTmpFirst=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=gte.'+_firstBronDate+'&select=id,exception_date&limit=50');
    if(_dbTmpFirst&&_dbTmpFirst.length>0){
      for(var _dti=0;_dti<_dbTmpFirst.length;_dti++){
        var _dtd=new Date(_dbTmpFirst[_dti].exception_date+'T00:00:00').getDay();
        var _dtDow=(_dtd===0)?7:_dtd;
        if(_dtDow===day){
          return alert('Bu müştərinin həmin gün üzrə gələcək tarixdə artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər). Eyni günə ikinci slot yaratmaq olmaz.');
        }
      }
    }
  }catch(e){}
  S.saving=true;render();
  try{
    var bid='BK'+Date.now();
    var bron={id:bid,customer_id:custId,customer_name:cust?cust.name:'',
      day_of_week:day,time_slot:time,type:'permanent',
      valid_from:from||null,note:finalNote,is_active:true};
    await dbPost('bookings',bron);
    logAudit('booking',bron.id,'create',
      'Sabit bron yaradıldı — '+(cust?cust.name:custId)+' — '+DAYS_AZ[day-1]+' '+time,
      null,{type:'permanent',customer_id:bron.customer_id,customer_name:bron.customer_name,day_of_week:bron.day_of_week,time_slot:bron.time_slot,valid_from:bron.valid_from||null,note:bron.note,source_flow:'submitNewSabitBron'});
    S.bronData.push(bron);
    emitBronSync('booking_create_new_sabit');
    S.showAddBron=false;S._bronNewCustId=null;S._bronNewCustName=null;
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

function filterNsbCusts(){
  var inp=document.getElementById('nsb-search');
  var list=document.getElementById('nsb-list');
  var hidden=document.getElementById('nsb-cust-id');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());
  var sorted=D.customers.slice().sort(function(a,b){return a.name.localeCompare(b.name,'az');});
  list.innerHTML='';
  var shown=0;
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i];
    if(q&&normQ(c.name).indexOf(q)<0)continue;
    if(shown>=50)break;
    (function(cust){
      var el=document.createElement('div');
      el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
      el.innerHTML=cust.name+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+cust.id+'</span>';
      el.onmouseenter=function(){this.style.background='#f0faf5';};
      el.onmouseleave=function(){this.style.background='';};
      el.onclick=function(){selectNsbCust(cust.id,cust.name);};
      list.appendChild(el);
    })(c);
    shown++;
  }
  if(shown===0)list.innerHTML='<div style="padding:10px;color:#aaa;text-align:center;font-size:13px">Tapılmadı</div>';
}

function selectNsbCust(id,name){
  var inp=document.getElementById('nsb-search');
  var list=document.getElementById('nsb-list');
  var hidden=document.getElementById('nsb-cust-id');
  var infoDiv=document.getElementById('nsb-cust-info');
  var submitBtn=document.getElementById('nsb-submit-btn');
  if(inp)inp.value=name;
  if(hidden)hidden.value=id;
  if(list)list.innerHTML='<div style="padding:8px 12px;background:#E8F5EE;font-size:13px;border-radius:6px">✓ '+escHtml(name)+'</div>';
  if(!infoDiv)return;

  var bst=getCustBronStatus(id);
  // Limit calc
  var maxD=0;var existD=0;var subName='';var sessTotal=0;
  if(bst.sub){
    sessTotal=bst.sub.sessions_total||0;
    subName=bst.sub.program_name||'';
    if(bst.type==='ok'||bst.type==='warn'){
      maxD=sessTotal>=12?3:sessTotal>=8?2:sessTotal>1?2:0;
    } else if(bst.type==='pending'){
      maxD=sessTotal>=12?3:sessTotal>=8?2:sessTotal>1?2:0;
    }
  }
  if(S.bronData){for(var i=0;i<S.bronData.length;i++){if(S.bronData[i].customer_id===id)existD++;}}

  var blocked=(bst.type==='none'||bst.type==='grace');
  var limitFull=(maxD>0&&existD>=maxD);
  var colorMap={ok:'#1D9E75',warn:'#E65100',grace:'#E65100',pending:'#1565C0',none:'#C62828'};
  var col=colorMap[bst.type]||'#888';

  var html='<div style="background:#f8f8f8;border-radius:8px;padding:10px 12px;font-size:12px;border:1px solid #e8e8e8">';
  html+='<div style="display:flex;justify-content:space-between;margin-bottom:6px">';
  html+='<span>Abunə statusu: <strong style="color:'+col+'">'+bst.txt+'</strong></span>';
  if(subName)html+='<span style="color:#888">'+escHtml(subName)+'</span>';
  html+='</div>';
  if(sessTotal>0)html+='<div style="margin-bottom:4px">Proqram: <strong>'+sessTotal+' dərslik</strong></div>';
  if(maxD>0){
    var limitColor=limitFull?'#C62828':existD===maxD-1?'#E65100':'#1D9E75';
    html+='<div style="color:'+limitColor+'">Studio bron limiti: <strong>'+existD+'/'+maxD+' gün</strong></div>';
  }
  html+='<div style="margin-top:6px;display:flex;gap:4px">';
  html+=(bst.isPartner?'<span class="badge b-purple" style="font-size:10px">Partner</span>':'<span class="badge b-green" style="font-size:10px">Studio</span>');
  html+=getBronSubBadge(bst);
  html+='</div>';
  if(blocked)html+='<div class="al al-y" style="margin-top:8px;font-size:12px">⚠ Aktiv abunəlik yoxdur — yalnız Partner və ya Tək giriş bron tipi seçin.</div>';
  else if(limitFull)html+='<div class="al al-y" style="margin-top:8px;font-size:12px">Studio bron limiti dolub ('+existD+'/'+maxD+') — Partner və ya Tək giriş seçin.</div>';
  else if(maxD===0&&bst.sub)html+='<div class="al al-b" style="margin-top:8px;font-size:12px">Tək giriş proqramı — Bron tipi Partner və ya Tək giriş seçin.</div>';
  html+='</div>';
  infoDiv.innerHTML=html;

  // Only disable if slot is full (hard limit) — source validation handled in submit
  if(submitBtn)submitBtn.disabled=false;
}

// ---- openAttFromSlot: real implementation ----
function openAttFromSlot(time, dateStr, dow){
  var brons=getSlotBookings(dow,time,dateStr);
  var excs=getSlotExceptions(dow,time,dateStr);
  var customers=[];
  var absentBronIds={};
  for(var i=0;i<excs.absents.length;i++)absentBronIds[excs.absents[i].booking_id]=excs.absents[i].id;
  // Precompute alreadyRec
  var alreadyRec={};
  for(var i=0;i<D.attendances.length;i++){
    var a=D.attendances[i];
    if(a.class_date===dateStr&&a.class_time===time)alreadyRec[a.customer_id]=true;
  }
  // 1. Sabit bronlar
  for(var i=0;i<brons.length;i++){
    var b=brons[i];
    var isAbsent=!!absentBronIds[b.id];
    var sub=activeSub(b.customer_id);
    var bst=getCustBronStatus(b.customer_id);
    var src=getBookingSource(b,b.customer_id);
    var noSub=!sub;
    var already=!!alreadyRec[b.customer_id];
    // needsEntryPayment: partner veya single source + no activeSub
    var needsEntryPayment=!already&&noSub&&(src==='single'||src==='partner');
    var entryPaymentType=(src==='partner')?'partner':'single';
    var isDisabled=already;
    if(!needsEntryPayment){
      if(src==='studio')isDisabled=isDisabled||noSub;
      if(src==='partner')isDisabled=isDisabled||(bst.type==='none'||bst.type==='grace');
      if(src==='single')isDisabled=isDisabled||noSub;
    }
    customers.push({custId:b.customer_id,custName:b.customer_name,sub:sub,bst:bst,
      type:'permanent',absent:isAbsent,absentExId:absentBronIds[b.id]||null,bronId:b.id,
      already:already,isDisabled:needsEntryPayment?true:isDisabled,src:src,
      needsEntryPayment:needsEntryPayment,entryPaymentType:entryPaymentType,
      singleNeedsPay:needsEntryPayment}); // singleNeedsPay compat alias
  }
  // 2. Temp_add müştərilər
  for(var i=0;i<excs.temps.length;i++){
    var t=excs.temps[i];
    var sub=activeSub(t.temp_customer_id);
    var bst=getCustBronStatus(t.temp_customer_id);
    var noSub=!sub;
    // Source-u exception note-dan oxu (sabit bron ilə eyni mexanizm)
    var src=getBookingSource({note:t.note},t.temp_customer_id);
    var needsEntryPayment=!already&&noSub&&(src==='single'||src==='partner');
    var already=!!alreadyRec[t.temp_customer_id];
    var isDisabled=already;
    if(!needsEntryPayment){
      if(src==='studio')isDisabled=isDisabled||noSub;
      if(src==='partner')isDisabled=isDisabled||(bst.type==='none'||bst.type==='grace');
      if(src==='single')isDisabled=isDisabled||noSub;
    }
    customers.push({custId:t.temp_customer_id,custName:t.temp_customer_name,sub:sub,bst:bst,
      type:'temp',absent:false,absentExId:null,bronId:null,
      already:already,isDisabled:needsEntryPayment?true:isDisabled,src:src,
      needsEntryPayment:needsEntryPayment,
      entryPaymentType:(src==='partner')?'partner':'single',
      singleNeedsPay:needsEntryPayment});
  }
  // 3. Trial leads
  for(var i=0;i<excs.trials.length;i++){
    var t=excs.trials[i];
    var leadId=t.temp_lead_id;
    var leadName=t.temp_lead_name||'?';
    var lead=null;
    if(S.leadsData){for(var j=0;j<S.leadsData.length;j++){if(S.leadsData[j].id===leadId){lead=S.leadsData[j];break;}}}
    var isDone=(lead&&(lead.status==='trial_done'||!!lead.trial_done_at))||false;
    var isConverted=(lead&&lead.status==='converted')||false;
    var trialDisabled=isDone||isConverted;
    customers.push({
      custId:null,leadId:leadId,custName:leadName,leadName:leadName,
      type:'trial',src:'trial',exId:t.id,
      absent:false,absentExId:null,bronId:null,
      already:isDone,isDisabled:trialDisabled,
      isDone:isDone,isConverted:isConverted,
      sub:null,bst:{type:'none',txt:'Lead - Sinaq'}
    });
  }
  // Build selectedIds: customer rows='cust:<id>', trial rows='lead:<id>'
  var selectedIds=[];
  for(var i=0;i<customers.length;i++){
    var cu=customers[i];
    if(!cu.absent&&!cu.isDisabled&&!cu.already){
      if(cu.type==='trial')selectedIds.push('lead:'+cu.leadId);
      else selectedIds.push('cust:'+cu.custId);
    }
  }
  S.slotAttData={time:time,dateStr:dateStr,dow:dow,customers:customers,selectedIds:selectedIds,instId:null};
  S.showSlotAttModal=true;
  render();
}

  }
  h+='</div>';
  h+='<div style="margin-bottom:14px">'+payPanelHtml+'</div>';

// Checkbox toggle — state only, NO render() call
function toggleSlotAttCustomer(custId, checked, wasAbsent){
  if(!S.slotAttData)return;
  if(!S.slotAttData.selectedIds)S.slotAttData.selectedIds=[];
  var arr=S.slotAttData.selectedIds;
  var idx=arr.indexOf(custId);
  if(checked&&idx<0)arr.push(custId);
  if(!checked&&idx>=0)arr.splice(idx,1);
  // Absent xəbərdarlığı DOM-da göstər (render çağırmadan)
  if(wasAbsent&&checked){
    var cb=document.getElementById? document.querySelector('.slot-att-cb[value="'+custId+'"]'):null;
    if(cb){
      var label=cb.nextElementSibling;
      if(label&&!label.querySelector('.absent-warn')){
        var warn=document.createElement('div');
        warn.className='absent-warn';
        warn.style.cssText='font-size:11px;color:#E65100;background:#FFF3E0;padding:4px 8px;border-radius:5px;margin-top:4px';
        warn.textContent='⚠ Bu müştəri gəlməyəcək kimi işarələnib — əmin misiniz?';

    }
  }
}

function slotPayKey(custId){return String(custId||'');}
function getSingleEntryPrograms(){
  var ids=['ROF','RPP','RPS','ROTG','ROTI'];
  return(D.programs||[]).filter(function(p){
    return p.is_active!==false&&(ids.indexOf(p.id)>=0||p.sessions_total<=1);
  });
}
function getPartnerEntryPrograms(){
  return(D.programs||[]).filter(function(p){
    return p.is_active!==false&&['ROF','RPP','RPS'].indexOf(p.id)>=0;
  });
}
function getStudioSinglePrograms(){
  return(D.programs||[]).filter(function(p){
    return p.is_active!==false&&(
      ['ROTG','ROTI'].indexOf(p.id)>=0||
      (p.sessions_total<=1&&['ROF','RPP','RPS','RTEST'].indexOf(p.id)<0)
    );
  });
}
function getSlotPayCustomer(custId){
  var key=slotPayKey(custId);
  var sd=S.slotAttData;
  if(sd&&sd.customers){
    for(var i=0;i<sd.customers.length;i++){
      var cid=slotPayKey(sd.customers[i].custId||sd.customers[i].customer_id);
      if(cid===key)return sd.customers[i];
    }
  }
  return null;
}
function getEntryProgramsForCustomer(custId){
  var item=getSlotPayCustomer(custId);
  if(item&&item.entryPaymentType==='partner')return getPartnerEntryPrograms();
  return getStudioSinglePrograms();
}

async function confirmSlotSinglePay(custId){
  var sd=S.slotAttData;
  if(!sd)return;
  var key=slotPayKey(custId);
  var pay=(S.slotSinglePayData&&S.slotSinglePayData[key])||{};
  var progEl=document.getElementById('slot-sp-prog-'+key);
  var amtEl=document.getElementById('slot-sp-amount-'+key);
  var acctEl=document.getElementById('slot-sp-acct-'+key);
  var noteEl=document.getElementById('slot-sp-note-'+key);
  var instEl=document.getElementById('slot-att-inst');
  var programId=(pay.programId||'')||(progEl?progEl.value:'');
  // Fallback guard: RTEST must never be processed here; trial only via CRM Lead lifecycle
  if(programId==='RTEST'){alert('RTEST artıq slot tək giriş kimi istifadə edilə bilməz.\nSınaq məşqi yalnız CRM Lead axınından qeyd edilir.');return;}
  var amount=parseFloat((amtEl?amtEl.value:pay.amount)||pay.amount)||0;
  var note=(noteEl?noteEl.value:(pay.note||''))||'';
  var instId=sd.instId||(instEl?instEl.value:'');
  if(!programId){alert('Proqram seçin');return;}
  if(amount<0||amount===0){alert('Məbləğ 0-dan böyük olmalıdır');return;}
  if(sd.dateStr>td()){alert('Gələcək tarix üçün davamiyyət qeyd etmək olmaz.');return;}
  if(!instId){alert('Əvvəl instruktor seçin.');return;}
  // Partner ay limit xəbərdarlığı
  if(isPartnerEntryProgram(programId)){
    if(!warnIfPartnerLimit(custId,cust?cust.name:custId))return;
  }
  var entryItem=getSlotPayCustomer(key);
  var entryType=entryItem?entryItem.entryPaymentType:'single';
  if(entryType==='single'&&isPartnerEntryProgram(programId)){
    alert('Bu bron Tək giriş kimi yaradılıb.\nPartner proqramı seçmək düzgün deyil — ROTG/ROTI seçin.');
    return;
  }
  if(entryType==='partner'&&!isPartnerEntryProgram(programId)){
    alert('Bu bron Partner kimi yaradılıb.\nPartner proqramı ROF/RPP/RPS olmalıdır.');
    return;
  }
  var accountId='';
  if(isPartnerEntryProgram(programId)){
    accountId=getPartnerReceivableAccountId(programId)||'';
    if(!accountId){
      alert('Bu partner proqramı üçün alacaq hesabı tapılmadı.\nAccounts bölməsində "1FIT alacaqlar" və ya "Push30 alacaqlar" hesabını yaradın.');
      return;
    }
  } else {
    accountId=(acctEl?acctEl.value:'')||pay.accountId||'';
    if(!accountId){alert('Hesab seçin.');return;}
  }
  var cust=null,prog=null,inst=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===key){cust=D.customers[i];break;}}
  for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===programId){prog=D.programs[i];break;}}
  for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
  if(!cust||!prog){alert('Müştəri və ya proqram tapılmadı');return;}
  // Günlük duplicate: tarix+saat deyil, yalnız tarix yoxlanılır (transaction-dan əvvəl)
  // In-flight lock: set BEFORE all duplicate/capacity checks, released in finally
  var _cspLock=acquireAttLock(key,sd.dateStr);
  if(!_cspLock)return;
  var _cspLockReleased=false;
  try{
  if(hasCustomerAttendanceOnDate(key,sd.dateStr)){
    alert(cust.name+' artıq bu tarixdə davamiyyətə qeyd edilib.');
    return;
  }
  // Live DB check — fail-CLOSED: xəta baş verərsə insert bloklanır
  try{
    var _dbSlotAtt=await dbGet('attendances','customer_id=eq.'+key+'&class_date=eq.'+sd.dateStr+'&select=id&limit=1');
    if(_dbSlotAtt&&_dbSlotAtt.length>0){
      alert(cust.name+' artıq bu tarixdə davamiyyətə qeyd edilib.');
      return;
    }
  }catch(e){
    alert('Davamiyyət yoxlaması tamamlanmadı. İnternet/DB bağlantısını yoxlayıb yenidən cəhd edin.');
    return;
  }
  // Slot capacity guard: real attendance rows for class_date + class_time
  if(!await checkSlotCapacity(sd.dateStr,sd.time))return;
  if(S.slotSinglePayData)delete S.slotSinglePayData[key];
  S.slotSinglePayCustId=null;
  S.saving=true;render();
  try{
    var isPartner=isPartnerEntryProgram(programId);
    var txnDate=sd.dateStr;
    var txnDesc=prog.name+' — '+cust.name+(isPartner?' — partner giriş':' — tək giriş');
    if(amount>0){
      var txn={id:'TX'+Date.now(),date:txnDate,type:'income',
        category:isPartner?'Partner giriş':'Tək giriş',
        description:txnDesc+(note?' ('+note+')':''),
        amount:amount,account_id:accountId,
        to_account_id:null,subscription_id:null,customer_id:key};
      Object.assign(txn,getActorMeta());
      await dbPost('transactions',txn);
      logAudit('transaction',txn.id,'create',
        cust.name+' — '+prog.name+' ('+amount+' AZN, '+accountId+')',
        null,{type:txn.type,category:txn.category,amount:amount,account_id:accountId,
          subscription_id:null,customer_id:key,date:txnDate,description:txn.description,source_flow:'confirmSlotSinglePay'});
      // Slot payment: Bank/POS hesabı (ACC003) seçilərsə 2% komissiya yaransın.
      // Partner alacaq hesabları və RTEST=0 bu qaydaya düşmür.
      if(!isPartner&&txn.account_id===BANK_ACCT_ID&&txn.amount>0){
        await createPosCommission(txn.amount,txn.date,txn.description);
      }
    }
    // RTEST=0 isə kassa əməliyyatı yaradılmır
    var att={id:uid(),customer_id:key,customer_name:cust.name,
      subscription_id:null,program_id:prog.id,program_name:prog.name,
      class_date:sd.dateStr,class_time:sd.time,
      instructor_id:instId,instructor_name:inst?inst.full_name:''};
    await dbPost('attendances',att);
    logAudit('attendance',att.id,'create',
      (cust?cust.name:key)+' — '+(att.program_name||'')+' — '+att.class_date+(att.class_time?' '+att.class_time:''),
      null,{customer_id:att.customer_id,customer_name:att.customer_name,subscription_id:att.subscription_id,program_id:att.program_id,program_name:att.program_name,class_date:att.class_date,class_time:att.class_time,instructor_id:att.instructor_id,instructor_name:att.instructor_name,source_flow:'confirmSlotSinglePay'});
    D.attendances.unshift(att);
    if(S.selDateAtts!==null&&(S.selDate||td())===att.class_date)S.selDateAtts.unshift(att);
    S.kassaData=null;S.reportData=null;S.izlemeData=null;
    if(sd&&sd.customers){
      for(var i=0;i<sd.customers.length;i++){
        var cid=slotPayKey(sd.customers[i].custId||sd.customers[i].customer_id);
        if(cid===key){
          sd.customers[i].already=true;
          sd.customers[i].isDisabled=true;
          sd.customers[i].singleNeedsPay=false;
          sd.customers[i].needsEntryPayment=false;
          var _custKey2='cust:'+key;
          var idx2=sd.selectedIds?sd.selectedIds.indexOf(_custKey2):-1;
          if(idx2>=0)sd.selectedIds.splice(idx2,1);
          break;
        }
      }
    }
    S.showAlert={t:'ok',cust:cust,st:{t:'ok',txt:cust.name+(isPartner?' — partner giriş və davamiyyət qeyd edildi':' — tək giriş ödənişi və davamiyyət qeyd edildi')}};
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
  }finally{releaseAttLock(_cspLock);}
}

async function submitSlotAttendance(){
  var sd=S.slotAttData;
  if(!sd)return;
  // instId: state first, DOM fallback
  var instId=sd.instId||'';
  if(!instId){var el=document.getElementById('slot-att-inst');instId=el?el.value:'';}
  if(!instId){alert('İnstruktor seçin');return;}
  if(sd.dateStr>td()){
    alert('Gələcək tarix üçün davamiyyət qeyd etmək olmaz.\nBu tarix üçün yalnız bron/istisna planlana bilər.');
    return;
  }
  // selectedIds state-dən — DOM-dan asılı deyil
  var selectedIds=(sd.selectedIds||[]).slice();
  if(!selectedIds.length){alert('Heç bir müştəri seçilməyib');return;}
  // Split by prefix: cust:<id> = normal customer, lead:<id> = trial lead
  var custSelectedIds=selectedIds.filter(function(k){return k.indexOf('cust:')===0;}).map(function(k){return k.slice(5);});
  var leadSelectedIds=selectedIds.filter(function(k){return k.indexOf('lead:')===0;}).map(function(k){return k.slice(5);});
  // Build customer map and lead map
  var custMap={};
  var trialMap={};
  for(var i=0;i<sd.customers.length;i++){
    var _cu=sd.customers[i];
    if(_cu.type==='trial'&&_cu.leadId)trialMap[_cu.leadId]=_cu;
    else if(_cu.custId)custMap[_cu.custId]=_cu;
  }
  // Build work list for normal customers
  var workList=[];
  for(var i=0;i<custSelectedIds.length;i++){
    var cu=custMap[custSelectedIds[i]];
    if(!cu)continue;
    if(cu.already||cu.isDisabled)continue;
    if(!cu.sub||!cu.sub.id)continue;
    workList.push({custId:cu.custId,subId:cu.sub.id});
  }
  var hasWork=workList.length>0||leadSelectedIds.length>0;
  if(!hasWork){alert('Seçilmiş müştərilərin heç biri üçün davamiyyət yazıla bilmir');return;}
  S.saving=true;render();
  var errors=[];
  var done=0;
  // --- Normal customer attendance ---
  for(var i=0;i<workList.length;i++){
    try{
      var result=await createAttendance(workList[i].custId,workList[i].subId,sd.time,instId,sd.dateStr);
      if(result!==null)done++;
    }catch(e){errors.push(e.message);}
  }
  // --- Trial lead: PATCH lead status to trial_done ---
  var trialDone=0;
  var instName='';
  for(var ii=0;ii<D.instructors.length;ii++){if(D.instructors[ii].id===instId){instName=D.instructors[ii].full_name||'';break;}}
  for(var i=0;i<leadSelectedIds.length;i++){
    var leadId=leadSelectedIds[i];
    var cu=trialMap[leadId];
    if(!cu||cu.already||cu.isDisabled)continue;
    try{
      var now=new Date().toISOString();
      await dbPatch('leads','id=eq.'+leadId,{
        status:'trial_done',
        trial_done_at:now,
        trial_done_instructor_id:instId,
        trial_done_instructor_name:instName
      });
      // Update local S.leadsData
      var _leads=S.leadsData||[];
      for(var j=0;j<_leads.length;j++){
        if(_leads[j].id===leadId){
          _leads[j].status='trial_done';
          _leads[j].trial_done_at=now;
          _leads[j].trial_done_instructor_id=instId;
          _leads[j].trial_done_instructor_name=instName;
          break;
        }
      }
      logAudit('lead',leadId,'trial_done',
        'Sınaq keçdi — '+(cu.leadName||leadId)+' — '+sd.dateStr+' '+sd.time+(instName?' — '+instName:''),
        {status:'trial_scheduled'},
        {status:'trial_done',trial_done_at:now,trial_done_instructor_id:instId,trial_done_instructor_name:instName,source_flow:'submitSlotAttendance'});
      trialDone++;
    }catch(e){errors.push('Lead sınaq: '+e.message);}
  }
  if(errors.length)alert('Bəzi xətalar:\n'+errors.join('\n'));
  var totalDone=done+trialDone;
  var msgParts=[];
  if(done>0)msgParts.push(done+' müştəri qeydə alındı');
  if(trialDone>0)msgParts.push(trialDone+' sınaq lead — trial_done');
  var msg=totalDone===0?'Yeni davamiyyət yazılmadı.':(msgParts.join(', ')+'.');
  S.showAlert={t:totalDone>0?'ok':'warn',cust:{name:''},st:{t:totalDone>0?'ok':'warn',txt:fmt(sd.dateStr)+' '+sd.time+' — '+msg}};
  S.showSlotAttModal=false;
  S.slotAttData=null;
  S.saving=false;
  if(trialDone>0){leadsInvalidate();fetchLeads();}
  render();
}

async function createAttendance(custId, subId, classTime, instId, attDate){
  var cust=null,sub=null,inst=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
  for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
  for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
  if(!cust||!sub)throw new Error('Müştəri/abunə tapılmadı: '+custId);
  // In-flight lock: prevents parallel submits for same customer+date
  var _lock=acquireAttLock(custId,attDate);
  if(!_lock)return null;
  try{
    // Partner ay limit xəbərdarlığı (slot attendance)
    if(isPartnerProgId(sub.program_id)){
      if(!warnIfPartnerLimit(custId,cust.name))return null;
    }
    // Check duplicate: customer_id + class_date (günlük 1 dəfə, saat fərqi nəzərə alınmır)
    if(hasCustomerAttendanceOnDate(custId,attDate)){
      alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
      return null;
    }
    // Live DB check — fail-CLOSED: xəta baş verərsə insert bloklanır
    try{
      var _dbAtt=await dbGet('attendances','customer_id=eq.'+custId+'&class_date=eq.'+attDate+'&select=id&limit=1');
      if(_dbAtt&&_dbAtt.length>0){
        alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
        return null;
      }
    }catch(e){
      alert('Davamiyyət yoxlaması tamamlanmadı. İnternet/DB bağlantısını yoxlayıb yenidən cəhd edin.');
      return null;
    }
    // Slot capacity guard: real attendance rows for class_date + class_time
    if(!await checkSlotCapacity(attDate,classTime))return null;
    // Activate pending sub
    if(sub.status==='pending'){
      var prog=null;
      for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===sub.program_id){prog=D.programs[i];break;}}
      var newStart=attDate;
      var newEnd=addDays(newStart,prog?prog.duration_days:30);
      // Subscription conflict guard: ensure no other open sub exists for this start date
      if(!await dbAssertCanCreateOrEditSubscription(custId,newStart,subId,'activate')) return null;
      await dbPatch('subscriptions','id=eq.'+subId,{status:'active',start_date:newStart,end_date:newEnd});
      sub.status='active';sub.start_date=newStart;sub.end_date=newEnd;
      if(S.custDetail&&S.custDetail.subs){
        for(var i=0;i<S.custDetail.subs.length;i++){
          if(S.custDetail.subs[i].id===subId){
            S.custDetail.subs[i].status='active';S.custDetail.subs[i].start_date=newStart;S.custDetail.subs[i].end_date=newEnd;break;
          }
        }
      }
    }
    var att={id:uid(),customer_id:custId,customer_name:cust.name,subscription_id:subId,
      program_id:sub.program_id,program_name:sub.program_name,
      class_date:attDate,class_time:classTime,
      instructor_id:instId,instructor_name:inst?inst.full_name:''};
    await dbPost('attendances',att);
    logAudit('attendance',att.id,'create',
      (cust?cust.name:custId)+' — '+(att.program_name||'')+' — '+att.class_date+(att.class_time?' '+att.class_time:''),
      null,{customer_id:att.customer_id,customer_name:att.customer_name,subscription_id:att.subscription_id,program_id:att.program_id,program_name:att.program_name,class_date:att.class_date,class_time:att.class_time,instructor_id:att.instructor_id,instructor_name:att.instructor_name,source_flow:'createAttendance'});
    D.attendances.unshift(att);
    if(S.selDateAtts!==null&&(S.selDate||td())===att.class_date)S.selDateAtts.unshift(att);
    // Remaining: real attendance count əsasında yenidən hesabla
    if(!sub.is_partner){
      await recalcSubscriptionRemaining(subId);
    }
  }finally{releaseAttLock(_lock);}
}

async function submitPlanAbsent(){
  var pb=S.planAbsentBooking;
  if(!pb)return;
  var dateEl=document.getElementById('pa-date');
  var noteEl=document.getElementById('pa-note');
  var selDate=dateEl?dateEl.value:'';
  var note=noteEl?noteEl.value:'';
  if(!selDate){alert('Tarix seçin');return;}
  var bk=pb.booking;
  var dow=bk.day_of_week;
  // Validation 1: dow check
  var selDow=getDayOfWeek(selDate);
  if(selDow!==dow){
    alert('Seçilən tarix '+DAYS_AZ[dow-1]+' günü olmalıdır!\n\n'+fmt(selDate)+' — '+( selDow?DAYS_AZ[selDow-1]:'Bazar')+' günüdür.');
    return;
  }
  // Validation 2: valid_from
  if(bk.valid_from&&selDate<bk.valid_from){
    alert('Bu bron '+fmt(bk.valid_from)+' tarixindən etibarən aktivdir.\nSeçilən tarix bundan əvvəldir.');
    return;
  }
  // Validation 3: valid_until
  if(bk.valid_until&&selDate>bk.valid_until){
    alert('Bu bron '+fmt(bk.valid_until)+' tarixinə qədər aktivdir.\nSeçilən tarix bundan sonradır.');
    return;
  }
  // Validation 4: duplicate check
  if(S.bronExceptions){
    for(var i=0;i<S.bronExceptions.length;i++){
      var ex=S.bronExceptions[i];
      if(ex.booking_id===pb.bronId&&ex.exception_date===selDate&&ex.type==='absent'){
        alert('Bu tarix üçün artıq gəlməyəcək qeydi var.');
        return;
      }
    }
  }
  S.saving=true;render();
  try{
    var eid='EX'+Date.now();
    var exRec={id:eid,booking_id:pb.bronId,exception_date:selDate,type:'absent',note:note||null};
    await dbPost('booking_exceptions',exRec);
    logAudit('booking',exRec.id,'create',
      'Gəlməyəcək qeyd edildi — '+escHtml(pb.custName)+' — '+selDate,
      null,{type:'absent',booking_id:pb.bronId,exception_date:selDate,customer_name:pb.custName,day_of_week:bk.day_of_week,time_slot:bk.time_slot,note:note||null,source_flow:'submitPlanAbsent'});
    if(!S.bronExceptions)S.bronExceptions=[];
    S.bronExceptions.push(exRec);
    S.showPlanAbsent=false;
    S.planAbsentBooking=null;
    // Re-fetch exceptions if the date is in the currently loaded range
    var curDate=S.bronSelDate||td();
    var mon=getWeekMonday(curDate);
    var endR=dateAddDays(mon,27);
    if(selDate>=mon&&selDate<=endR){
      // Already loaded range — exception is in bronExceptions
    } else {
      // Extend the fetch to include the new date if needed
      await fetchExceptions(selDate);
    }
    alert('✓ '+fmt(selDate)+' tarixi üçün gəlməyəcək qeydi saxlandı.');
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}
