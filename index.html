function rKassaImport(){
  var imp=S.kassaImport||{};
  var h='<div style="background:#fff;border:1px solid #eaeaea;border-radius:12px;padding:16px;margin-bottom:16px">';

  // File picker (always shown)
  h+='<div style="margin-bottom:12px">'
    +'<label class="fl">JSON faylı seçin (kassa-import.json)</label>'
    +'<input type="file" id="ki-file" accept=".json,application/json" onchange="loadKassaImportFile()" style="margin-top:6px">'
    +'</div>';

  if(imp.loading){
    h+='<div class="empty"><span class="spin"></span> Yüklənir...</div>';
    h+='</div>';return h;
  }

  if(imp.error){
    h+='<div style="color:#C62828;padding:8px;background:#ffebee;border-radius:6px;font-size:13px">⚠ '+imp.error+'</div>';
  }

  if(!imp.rows){h+='</div>';return h;}

  // Stats summary
  var rows=imp.rows;
  var totalInc=0,totalExp=0,incCount=0,expCount=0;
  var byCat={},byAcct={},byYear={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.type==='income'){totalInc+=r.amount;incCount++;}
    if(r.type==='expense'){totalExp+=r.amount;expCount++;}
    var key=r.type+'|'+r.category;
    byCat[key]=(byCat[key]||0)+1;
    byAcct[r.account_id]=(byAcct[r.account_id]||0)+1;
    var y=(r.date||'').slice(0,4);
    byYear[y]=(byYear[y]||0)+1;
  }
  var net=totalInc-totalExp;
  var minDate=rows[0]?rows[0].date:'';
  var maxDate=rows[0]?rows[0].date:'';
  for(var i=0;i<rows.length;i++){if(rows[i].date<minDate)minDate=rows[i].date;if(rows[i].date>maxDate)maxDate=rows[i].date;}

async function loadKassaImportFile(){
  var inp=document.getElementById('ki-file');
  if(!inp||!inp.files||!inp.files[0])return;
  var f=inp.files[0];
  S.kassaImport={loading:true};render();
  try{
    var text=await f.text();
    var data=JSON.parse(text);
    if(!Array.isArray(data))throw new Error('JSON array gözlənilirdi');
    if(!data.length)throw new Error('JSON boşdur');
    // Validate first row has required fields
    var first=data[0];
    if(!first.id||!first.date||!first.type||first.amount===undefined||!first.account_id){
      throw new Error('JSON formatı yanlışdır (id/date/type/amount/account_id məcburidir)');
    }
    S.kassaImport={rows:data};
  }catch(e){
    S.kassaImport={error:'Faylı oxumaq mümkün olmadı: '+e.message};
  }
  render();
}

async function checkExistingImports(){
  if(!S.kassaImport)return;
  S.kassaImport.checking=true;render();
  try{
    var existing=await dbGet('transactions','id=like.IMP*&select=id&limit=10000');
    S.kassaImport.existingCount=(existing||[]).length;
  }catch(e){
    S.kassaImport.error='Yoxlamaq mümkün olmadı: '+e.message;
    S.kassaImport.existingCount=undefined;
  }

  render();
}

async function deleteExistingImports(){
  if(!confirm('Bütün IMP* qeydlərini silmək istədiyinizdən əminsinizmi?\\n\\nBu əməliyyat geri qaytarıla bilməz.'))return;
  S.kassaImport.deleting=true;render();
  try{
    var r=await fetch(BASE+'/transactions?id=like.IMP*',{method:'DELETE',headers:Object.assign({},H,{'Prefer':'return=minimal'})});
    if(!r.ok)throw new Error(await r.text());
    S.kassaImport.existingCount=0;
    S.kassaImport.completed=false;
    S.kassaImport.completedCount=0;
  }catch(e){
    S.kassaImport.error='Silmə xətası: '+e.message;
  }
  S.kassaImport.deleting=false;
  render();
}

async function runKassaImport(){
  if(!S.kassaImport||!S.kassaImport.rows)return;
  if(S.kassaImport.existingCount!==0){alert('Əvvəlcə mövcud IMP qeydlərini silin');return;}
  if(!confirm('Bu '+S.kassaImport.rows.length+' sətir bazaya əlavə olunacaq. Davam edək?'))return;

  var rows=S.kassaImport.rows;
  S.kassaImport.importing=true;
  S.kassaImport.done=0;
  S.kassaImport.total=rows.length;
  S.kassaImport.importErrors=[];
  S.kassaImport.completed=false;
  render();

  var BATCH=100;
  var successCount=0;
  for(var i=0;i<rows.length;i+=BATCH){
    var batch=rows.slice(i,i+BATCH);
    try{
      await dbPost('transactions',batch);
      successCount+=batch.length;
    }catch(e){
      // Try one-by-one to identify bad rows
      for(var j=0;j<batch.length;j++){
        try{
          await dbPost('transactions',batch[j]);
          successCount++;
        }catch(ee){
          S.kassaImport.importErrors.push(batch[j].id+': '+ee.message.slice(0,150));
        }
      }
    }
    S.kassaImport.done=Math.min(i+BATCH,rows.length);
    render();
    // Small delay to allow UI update
    await new Promise(function(res){setTimeout(res,30);});
  }

  S.kassaImport.importing=false;
  S.kassaImport.completed=true;
  S.kassaImport.completedCount=successCount;
  S.kassaImport.existingCount=successCount; // so the button stays disabled

  // Refresh kassa data if user goes there
  S.kassaData=null;

  render();
}

  var due=S.singleAttDue!==null?S.singleAttDue:(parseFloat(document.getElementById('sa-due')?document.getElementById('sa-due').value:0)||0);

    var _p=getProgramById(progId);

  }
  if(!await dbAssertCanCreateAttendance(S.singleCust,saDate||td()))return;

  try{
    var c=null,inst=null,prog=null;
    for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===S.singleCust){c=D.customers[i];break;}}
    for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}

async function fetchCustDetail(custId){
  try{
    var res=await Promise.all([
      dbGet('subscriptions','customer_id=eq.'+custId+'&order=start_date.desc'),
      dbGet('attendances','customer_id=eq.'+custId+'&order=class_date.desc')
    ]);
    S.custDetail={subs:res[0]||[],atts:res[1]||[]};
    // D.attendances-a bu musteri ucun TAM davamiyyeti yaz
    // Belece calcSubRemaining her zaman duzgun netice verar
    var freshAtts=S.custDetail.atts;
    D.attendances=D.attendances.filter(function(a){return a.customer_id!==custId;});
    for(var i=0;i<freshAtts.length;i++)D.attendances.push(freshAtts[i]);
    // D.subscriptions-i da yenile
    var existSubIdxs={};
    for(var i=0;i<D.subscriptions.length;i++)existSubIdxs[D.subscriptions[i].id]=i;
    for(var i=0;i<S.custDetail.subs.length;i++){
      var freshSub=S.custDetail.subs[i];
      if(existSubIdxs[freshSub.id]!==undefined){
        D.subscriptions[existSubIdxs[freshSub.id]]=freshSub;
      }else{
        D.subscriptions.push(freshSub);
      }
    }
  }catch(e){S.custDetail={subs:[],atts:[]};}
  S.custDetailLoading=false;render();
}

async function submitEditSub(){
  var start=document.getElementById('es-start').value;
  var end=document.getElementById('es-end').value;
  var listPrice=money(document.getElementById('es-list-price').value);
  var discount=money(document.getElementById('es-discount').value);
  if(discount<0){alert('Endirim mənfi ola bilməz.');return;}
  if(discount>listPrice){alert('Endirim paket qiymətindən çox ola bilməz.');return;}
  var due=calcSubDueFromDiscount(listPrice,discount);
  var paid=money(document.getElementById('es-paid').value);
  var dnoteEl=document.getElementById('es-discount-note');
  var discountNote=dnoteEl?dnoteEl.value.trim():'';
  if(!start||!end||!S.editSub)return;
  S.saving=true;render();
  try{
    await dbPatch('subscriptions','id=eq.'+S.editSub,{
      start_date:start,end_date:end,
      list_price_at_sale:listPrice,
      discount_amount:discount,
      discount_note:discountNote,
      price_due:due,price_paid:paid,is_active:true
    });
    logAudit('subscription',S.editSub,'edit','Abunəlik redaktə edildi',null,{start_date:start,end_date:end,price_due:due,price_paid:paid,discount_amount:discount});
    var rec=await recalcSubscriptionRemaining(S.editSub);
    var remaining=rec&&rec.remaining!==undefined?rec.remaining:0;
    function _applyEdit(arr){
      if(!arr)return;
      for(var i=0;i<arr.length;i++){
        if(arr[i].id===S.editSub){
          arr[i].start_date=start;arr[i].end_date=end;
          arr[i].list_price_at_sale=listPrice;arr[i].discount_amount=discount;arr[i].discount_note=discountNote;
          arr[i].price_due=due;arr[i].price_paid=paid;
          arr[i].remaining=remaining;arr[i].is_active=true;
          break;
        }
      }
    }
    _applyEdit(D.subscriptions);
    if(S.custDetail&&S.custDetail.subs)_applyEdit(S.custDetail.subs);
    S.reportData=null;S.izlemeData=null;S.kassaData=null;
    S.editSub=null;
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

function updateSubDiscount(){
  var lp=document.getElementById('m-list-price');
  var disc=document.getElementById('m-discount');
  var due=document.getElementById('m-price-due');
  var paid=document.getElementById('m-price-paid');
  var hint=document.getElementById('m-phint');
  var listPrice=money(lp?lp.value:0);
  var discount=money(disc?disc.value:0);
  if(discount<0)discount=0;
  if(discount>listPrice)discount=listPrice;
  if(disc)disc.value=discount;
  var newDue=money(listPrice-discount);
  var oldDue=due?money(due.value):listPrice;
  if(due)due.value=newDue;
  if(paid&&(paid.value===''||money(paid.value)===oldDue))paid.value=newDue;
  if(hint)hint.textContent='Paket: '+listPrice+' AZN | Endirim: '+discount+' AZN | Ödənilməli: '+newDue+' AZN';
}

async function editFreeze(subId){
  // Find the freeze record for this subscription
  var sub=null;
  for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
  if(!sub||!sub.freeze_end)return;

  var action=prompt('Nə etmək istəyirsiniz?\n1 - Donmanı ləğv et\n2 - Bitmə tarixini dəyiş\n\nRəqəm daxil edin (1 və ya 2):');
  if(!action)return;

  if(action==='1'){
    if(!confirm('Donma tamamilə ləğv edilsin? Abunəlik aktiv olacaq.'))return;
    S.saving=true;render();
    try{
      var freezeRec=await dbGet('freezes','subscription_id=eq.'+subId+'&order=freeze_start.desc&limit=1');
      var origEnd=(freezeRec&&freezeRec.length&&freezeRec[0].original_end_date)?freezeRec[0].original_end_date:sub.end_date;
      await dbPatch('subscriptions','id=eq.'+subId,{freeze_end:null,end_date:origEnd});
      sub.freeze_end=null;sub.end_date=origEnd;
      for(var di=0;di<D.subscriptions.length;di++){if(D.subscriptions[di].id===subId){D.subscriptions[di].freeze_end=null;D.subscriptions[di].end_date=origEnd;break;}}
      if(S.custDetail&&S.custDetail.subs){for(var di=0;di<S.custDetail.subs.length;di++){if(S.custDetail.subs[di].id===subId){S.custDetail.subs[di].freeze_end=null;S.custDetail.subs[di].end_date=origEnd;break;}}}
    }catch(e){alert('Xeta: '+e.message);}
    S.saving=false;render();
  } else if(action==='2'){
    var newDate=prompt('Yeni bitmə tarixi (YYYY-MM-DD):', sub.freeze_end);
    if(!newDate)return;
    S.saving=true;render();
    try{
      await dbPatch('subscriptions','id=eq.'+subId,{freeze_end:newDate,end_date:newDate});
      await dbPatch('freezes','subscription_id=eq.'+subId,{freeze_end:newDate});
      sub.freeze_end=newDate;sub.end_date=newDate;
      for(var di=0;di<D.subscriptions.length;di++){if(D.subscriptions[di].id===subId){D.subscriptions[di].freeze_end=newDate;D.subscriptions[di].end_date=newDate;break;}}
      if(S.custDetail&&S.custDetail.subs){for(var di=0;di<S.custDetail.subs.length;di++){if(S.custDetail.subs[di].id===subId){S.custDetail.subs[di].freeze_end=newDate;S.custDetail.subs[di].end_date=newDate;break;}}}
    }catch(e){alert('Xeta: '+e.message);}
    S.saving=false;render();
  }
}

  if(!S.kassaData)return h+'<div class="empty">Yüklənir...</div>';

  var accounts=D.accounts||[];
  var txns=S.kassaData.txns||[];

  // Balans: IMP* (tarixi arxiv) və pending qeydlərini çıxar
  var liveTxns=txns.filter(function(t){return t.id.indexOf('IMP')!==0&&t.status!=='pending';});

  // Calculate balances from live transactions only
  var balances={};
  for(var i=0;i<accounts.length;i++)balances[accounts[i].id]=0;
  for(var i=0;i<liveTxns.length;i++){
    var t=liveTxns[i];
    if(t.type==='income'&&balances[t.account_id]!==undefined)balances[t.account_id]+=parseFloat(t.amount||0);
    if(t.type==='expense'&&balances[t.account_id]!==undefined)balances[t.account_id]-=parseFloat(t.amount||0);
    if(t.type==='transfer'){
      if(balances[t.account_id]!==undefined)balances[t.account_id]-=parseFloat(t.amount||0);
      if(t.to_account_id&&balances[t.to_account_id]!==undefined)balances[t.to_account_id]+=parseFloat(t.amount||0);
    }
  }

  // Balance cards
  h+='<div class="sgrid" style="grid-template-columns:repeat('+Math.min(accounts.length,4)+',1fr);margin-bottom:8px">';
  for(var i=0;i<accounts.length;i++){
    var a=accounts[i];
    var bal=balances[a.id]||0;
    var icon=a.type==='cash'?'💵':a.type==='bank'?'🏦':'💳';
    h+='<div class="scard"><div class="snum" style="font-size:18px;color:'+(bal>=0?'#222':'#C62828')+'">'+(bal>=0?'':'-')+Math.abs(bal).toFixed(0)+' ₼</div>'
      +'<div class="slbl">'+icon+' '+a.name+'</div></div>';
  }
  h+='</div>';

  // Summary totals
  var faktiki=(balances['ACC001']||0)+(balances['ACC002']||0)+(balances['ACC003']||0)+(balances['ACC004']||0);
  var gozlenen=faktiki+(balances['ACC005']||0)+(balances['ACC006']||0)-(Math.abs(balances['ACC007']||0));
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
  h+='<div style="background:#E8F5EE;border:1.5px solid #1D9E75;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
    +'<div><div style="font-size:11px;font-weight:600;color:#1D9E75">💰 FACTİKİ NƏĞd</div>'
    +'<div style="font-size:10px;color:#888">Kassa+Yığım+Bank+B.kart</div></div>'
    +'<div style="font-size:20px;font-weight:700;color:'+(faktiki>=0?'#1D9E75':'#C62828')+'">'+(faktiki>=0?'':'-')+Math.abs(faktiki).toFixed(0)+' ₼</div>'
    +'</div>';
  h+='<div style="background:#EFF6FF;border:1.5px solid #1565C0;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
    +'<div><div style="font-size:11px;font-weight:600;color:#1565C0">📊 GÖZLƏNİLƏN</div>'
    +'<div style="font-size:10px;color:#888">Faktiki+Alacaqlar−Vergi</div></div>'
    +'<div style="font-size:20px;font-weight:700;color:'+(gozlenen>=0?'#1565C0':'#C62828')+'">'+(gozlenen>=0?'':'-')+Math.abs(gozlenen).toFixed(0)+' ₼</div>'
    +'</div>';
  h+='</div>';

  // Tabs
  h+='<div class="tab-row">'
    +'<button class="tab '+(S.kassaTab==='txns'?'active':'')+'" onclick="S.kassaTab=\'txns\';render()">Əməliyyatlar</button>'
    +'<button class="tab '+(S.kassaTab==='accounts'?'active':'')+'" onclick="S.kassaTab=\'accounts\';render()">Hesablar</button>'
    +'<button class="tab '+(S.kassaTab==='zclose'?'active':'')+'" onclick="S.kassaTab=\'zclose\';if(!S.zCloseHistory&&!S.zCloseLoading)fetchZCloseHistory();render()">Gün Bağlama</button>'
    +'</div>';

  if(S.kassaTab==='accounts'){
    h+=rKassaAccounts(accounts,balances);
  } else if(S.kassaTab==='zclose'){
    h+=rKassaZClose(liveTxns,accounts,balances);
  } else {
    h+=rKassaTxns(txns,accounts);
  }

  if(S.showAddTxn)h+=rModalAddTxn();
  if(S.editTxnId)h+=rModalEditTxn();
  if(S.showZClose)h+=rModalZClose(liveTxns,accounts,balances);
  return h;
}

function rKassaTxns(txns, accounts){
  var acctMap={};
  for(var i=0;i<accounts.length;i++)acctMap[accounts[i].id]=accounts[i].name;

  var f=S.kassaFilter||{preset:'all',dateFrom:'',dateTo:'',account:'',category:'',txnType:''};
  var today=td();
  // Date range for presets
  var fFrom=f.dateFrom,fTo=f.dateTo;
  if(f.preset==='today'){fFrom=today;fTo=today;}
  else if(f.preset==='thisMonth'){var cm=today.slice(0,7);fFrom=cm+'-01';fTo=today;}
  else if(f.preset==='lastMonth'){
    var d=new Date(today);d.setDate(1);d.setMonth(d.getMonth()-1);
    var y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0');
    var ld=new Date(y,d.getMonth()+1,0).getDate();
    fFrom=y+'-'+mo+'-01';fTo=y+'-'+mo+'-'+String(ld).padStart(2,'0');
  }

  // Category list
  var cats={};
  for(var i=0;i<txns.length;i++){if(txns[i].category)cats[txns[i].category]=1;}
  var catList=Object.keys(cats).sort();

  var anyFilter=(f.preset!=='all'||f.account||f.category||f.txnType);

  // Filter panel
  var h='<div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:12px 14px;margin-bottom:14px">';
  h+='<div style="font-size:11px;font-weight:700;color:#888;margin-bottom:8px;letter-spacing:.5px">🔍 FİLTR</div>';
  var presets=[['all','Hamısı'],['today','Bugün'],['thisMonth','Bu ay'],['lastMonth','Keçən ay'],['custom','Xüsusi']];
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
  for(var i=0;i<presets.length;i++){
    var pv=presets[i][0],pl=presets[i][1],isAct=(f.preset===pv);
    h+='<button class="btn btn-sm '+(isAct?'btn-g':'btn-gray')+'" style="font-size:11px" onclick="S.kassaFilter.preset=\''+pv+'\';render()">'+pl+'</button>';
  }
  h+='</div>';
  if(f.preset==='custom'){
    h+='<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'
      +'<input class="fi" type="date" style="flex:1" value="'+f.dateFrom+'" onchange="S.kassaFilter.dateFrom=this.value;render()">'
      +'<span style="color:#aaa;font-size:12px">—</span>'
      +'<input class="fi" type="date" style="flex:1" value="'+f.dateTo+'" onchange="S.kassaFilter.dateTo=this.value;render()">'
      +'</div>';
  }
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h+='<select class="fs" style="flex:1;min-width:120px" onchange="S.kassaFilter.account=this.value;render()"><option value="">Bütün hesablar</option>';
  for(var i=0;i<accounts.length;i++){var a=accounts[i];h+='<option value="'+a.id+'"'+(f.account===a.id?' selected':'')+'>'+a.name+'</option>';}
  h+='</select>';
  h+='<select class="fs" style="flex:1;min-width:110px" onchange="S.kassaFilter.txnType=this.value;render()"><option value="">Bütün növlər</option>'
    +'<option value="income"'+(f.txnType==='income'?' selected':'')+'>Mədaxil ↑</option>'
    +'<option value="expense"'+(f.txnType==='expense'?' selected':'')+'>Məxaric ↓</option>'
    +'<option value="transfer"'+(f.txnType==='transfer'?' selected':'')+'>Transfer ⇄</option>'
    +'</select>';
  h+='<select class="fs" style="flex:1;min-width:130px" onchange="S.kassaFilter.category=this.value;render()"><option value="">Bütün kateqoriyalar</option>';
  for(var i=0;i<catList.length;i++)h+='<option value="'+catList[i]+'"'+(f.category===catList[i]?' selected':'')+'>'+catList[i]+'</option>';
  h+='</select>';
  if(anyFilter)h+='<button class="btn btn-gray btn-sm" style="font-size:11px;color:#C62828" onclick="S.kassaFilter={preset:\'all\',dateFrom:\'\',dateTo:\'\',account:\'\',category:\'\',txnType:\'\'};render()">✕ Sıfırla</button>';
  h+='</div></div>';

  // Apply filters
  var pendingTxns=txns.filter(function(t){return t.status==='pending';});
  var filtered=txns.filter(function(t){
    if(t.status==='pending')return false;
    if(t.id.indexOf('IMP')===0)return false;
    if(fFrom&&t.date<fFrom)return false;
    if(fTo&&t.date>fTo)return false;
    if(f.account&&t.account_id!==f.account)return false;
    if(f.txnType&&t.type!==f.txnType)return false;
    if(f.category&&t.category!==f.category)return false;
    return true;
  });
  var impTxns=!anyFilter?txns.filter(function(t){return t.id.indexOf('IMP')===0;}):[];

  // Summary
  var fInc=0,fExp=0;
  for(var i=0;i<filtered.length;i++){var t=filtered[i];if(t.type==='income')fInc+=parseFloat(t.amount||0);if(t.type==='expense')fExp+=parseFloat(t.amount||0);}
  h+='<div style="display:flex;gap:12px;font-size:12px;margin-bottom:10px;padding:8px 12px;background:#f8faf8;border-radius:8px;flex-wrap:wrap">'
    +'<span>Tapıldı: <b>'+filtered.length+'</b></span>'
    +'<span style="color:#1D9E75">Mədaxil: <b>+'+fInc.toFixed(2)+' ₼</b></span>'
    +'<span style="color:#C62828">Məxaric: <b>-'+fExp.toFixed(2)+' ₼</b></span>'
    +'<span style="color:#555;font-weight:600">Net: <b>'+(fInc-fExp>=0?'+':'')+((fInc-fExp).toFixed(2))+' ₼</b></span>'
    +'</div>';

  if(!pendingTxns.length&&!filtered.length&&!impTxns.length)return h+'<div class="empty">Əməliyyat yoxdur</div>';

  if(pendingTxns.length){
    h+='<div class="slabel" style="color:#E65100;margin-bottom:6px">⏳ GÖZLƏYƏN ('+pendingTxns.length+')</div>';
    h+=rTxnRows(pendingTxns,acctMap);
  }
  if(filtered.length){
    if(!anyFilter||fFrom)h+='<div class="slabel" style="margin-bottom:6px">ƏMƏLİYYATLAR ('+filtered.length+')</div>';
    h+=rTxnRows(filtered,acctMap);
  }
  if(impTxns.length){
    h+='<details style="margin-top:8px"><summary style="font-size:12px;color:#aaa;cursor:pointer;padding:6px 4px">Tarixi arxiv ('+impTxns.length+') ▼</summary>';
    h+=rTxnRows(impTxns,acctMap);
    h+='</details>';
  }
  return h;
}

async function fetchZCloseHistory(){
  S.zCloseLoading=true;render();
  try{
    var rows=await dbGet('daily_closes','order=date.desc&limit=30');
    S.zCloseHistory=rows||[];
  }catch(e){
    S.zCloseHistory=[];
    if(e.message&&e.message.indexOf('does not exist')>=0){
      S.zCloseHistory='no_table';
    }
  }
  S.zCloseLoading=false;render();
}

function getTodayTxnStats(liveTxns,date){
  var dayTxns=liveTxns.filter(function(t){return t.date===date;});
  var stats={};
  var accounts=D.accounts||[];
  for(var i=0;i<accounts.length;i++){
    stats[accounts[i].id]={inc:0,exp:0,net:0,items:[]};
  }
  for(var i=0;i<dayTxns.length;i++){
    var t=dayTxns[i];
    var aid=t.account_id;
    if(!stats[aid])stats[aid]={inc:0,exp:0,net:0,items:[]};
    var amt=parseFloat(t.amount||0);
    if(t.type==='income'){stats[aid].inc+=amt;stats[aid].net+=amt;}
    if(t.type==='expense'){stats[aid].exp+=amt;stats[aid].net-=amt;}
    stats[aid].items.push(t);
    if(t.type==='transfer'){
      var tid=t.to_account_id;
      if(tid){
        if(!stats[tid])stats[tid]={inc:0,exp:0,net:0,items:[]};
        stats[tid].inc+=amt;stats[tid].net+=amt;
        stats[tid].items.push(t);
      }
    }
  }
  return stats;
}

async function submitZClose(expKassa,expBank,expPush30,expFit1){
  var actualKassa=parseFloat(document.getElementById('zc-kassa-actual').value);
  var actualBank=parseFloat(document.getElementById('zc-bank-actual').value)||expBank;
  var actualPush30El=document.getElementById('zc-push30-actual');
  var actualFit1El=document.getElementById('zc-fit1-actual');
  var actualPush30=actualPush30El?parseFloat(actualPush30El.value)||expPush30:expPush30;
  var actualFit1=actualFit1El?parseFloat(actualFit1El.value)||expFit1:expFit1;
  var noteRaw=document.getElementById('zc-note').value||'';
  if(isNaN(actualKassa)){alert('Kassa məbləğini daxil edin');return;}
  var diffK=actualKassa-expKassa;
  var diffB=actualBank-expBank;
  var selDate=S.zCloseDate||td();
  // Partner data in note as structured JSON
  var partnerData={push30_exp:+(expPush30||0).toFixed(2),push30_act:+(actualPush30||0).toFixed(2),push30_diff:+((actualPush30||0)-(expPush30||0)).toFixed(2),fit1_exp:+(expFit1||0).toFixed(2),fit1_act:+(actualFit1||0).toFixed(2),fit1_diff:+((actualFit1||0)-(expFit1||0)).toFixed(2)};
  var finalNote=(noteRaw?noteRaw+' ':'')+'[p:'+JSON.stringify(partnerData)+']';
  S.saving=true;render();
  try{
    var rec={
      id:'ZC'+Date.now(),date:selDate,
      expected_kassa:expKassa,expected_bank:expBank,
      actual_kassa:actualKassa,actual_bank:actualBank,
      diff_kassa:diffK,diff_bank:diffB,
      note:finalNote
    };
    await dbPost('daily_closes',rec);
    if(!S.zCloseHistory||S.zCloseHistory==='no_table')S.zCloseHistory=[];
    S.zCloseHistory.unshift(rec);
    S.zCloseHistory.sort(function(a,b){return b.date>a.date?1:-1;});
    S.showZClose=false;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function deleteZClose(id){

// Returns alacaq account id based on program name
function partnerAcctId(progName){
  var n=(progName||'').toLowerCase();
  if(n.indexOf('push30')>=0||n.indexOf('push 30')>=0)return'ACC005';
  if(n.indexOf('1fit')>=0)return'ACC006';
  return'ACC005'; // fallback
}

function isPartnerEntryProgram(programId){
  return['ROF','RPP','RPS'].indexOf(programId)>=0;
}

function getPartnerReceivableAccountId(programId){
  var accts=D.accounts||[];
  if(programId==='ROF'){
    for(var i=0;i<accts.length;i++){
      var n=(accts[i].name||'').toLowerCase();
      if(n.indexOf('1fit')>=0)return accts[i].id;
    }
    return null;
  }
  if(programId==='RPP'||programId==='RPS'){
    for(var i=0;i<accts.length;i++){
      var n=(accts[i].name||'').toLowerCase();
      if(n.indexOf('push30')>=0||n.indexOf('push 30')>=0)return accts[i].id;
    }
    return null;
  }
  return null;
}

// Build category picker HTML (custom searchable dropdown)
function rCatPicker(pickerId,cats,currentVal){
  var opts='';
  for(var i=0;i<cats.length;i++)opts+='<div class="cpick-opt" onmousedown="event.preventDefault()" onclick="selectCat(\''+pickerId+'\',\''+cats[i]+'\')">'+cats[i]+'</div>';
  return '<div style="position:relative" id="'+pickerId+'-wrap">'
    +'<input class="fi" id="'+pickerId+'-input" autocomplete="off" placeholder="— Seçin —" value="'+(currentVal||'')+'"'
    +' onfocus="openCatPicker(\''+pickerId+'\')"'
    +' oninput="filterCatPicker(\''+pickerId+'\')"'
    +' onblur="closeCatPicker(\''+pickerId+'\')">'
    +'<input type="hidden" id="'+pickerId+'" value="'+(currentVal||'')+'">'
    +'<div id="'+pickerId+'-list" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:8px;max-height:200px;overflow-y:auto;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,0.12)">'+opts+'</div>'
    +'</div>';

function openCatPicker(id){
  var list=document.getElementById(id+'-list');
  if(list)list.style.display='block';
  filterCatPicker(id); // show all initially
}
function closeCatPicker(id){
  setTimeout(function(){
    var list=document.getElementById(id+'-list');
    if(list)list.style.display='none';
    // If input doesn't match any option, clear hidden value
    var inp=document.getElementById(id+'-input');
    var hid=document.getElementById(id);
    if(inp&&hid&&inp.value!==hid.value){
      // check if typed value is a valid cat
      var allCats=INCOME_CATS.concat(EXPENSE_CATS);
      var match=false;
      for(var i=0;i<allCats.length;i++){if(allCats[i]===inp.value){match=true;break;}}
      if(!match){inp.value=hid.value;} // revert to last valid
    }
  },180);
}
function filterCatPicker(id){
  var inp=document.getElementById(id+'-input');
  var list=document.getElementById(id+'-list');
  if(!inp||!list)return;
  var q=inp.value.toLowerCase().trim();
  var items=list.querySelectorAll('.cpick-opt');
  var visible=0;
  for(var i=0;i<items.length;i++){
    var text=items[i].textContent.toLowerCase();
    var show=q.length<2||text.indexOf(q)>=0;
    items[i].style.display=show?'block':'none';
    if(show)visible++;
  }
  list.style.display=visible?'block':'none';
}
function selectCat(id,val){
  var inp=document.getElementById(id+'-input');
  var hid=document.getElementById(id);
  var list=document.getElementById(id+'-list');
  if(inp)inp.value=val;
  if(hid)hid.value=val;
  if(list)list.style.display='none';
}
function updateCatPickerOpts(id,cats){
  var list=document.getElementById(id+'-list');
  var inp=document.getElementById(id+'-input');
  var hid=document.getElementById(id);
  if(!list)return;
  var opts='';
  for(var i=0;i<cats.length;i++)opts+='<div class="cpick-opt" onmousedown="event.preventDefault()" onclick="selectCat(\''+id+'\',\''+cats[i]+'\')">'+cats[i]+'</div>';
  list.innerHTML=opts;
  if(inp)inp.value='';
  if(hid)hid.value='';
}

// ==================== AUDIT LOG — daily-auditlog-v1 ====================
// Fail-silent audit logger. Never blocks main operation.
async function logAudit(entityType, entityId, action, summary, oldVal, newVal){
  try{
    var entry={
      id:'AL'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
      entity_type:entityType,
      entity_id:String(entityId||''),
      action:action,
      summary:summary||'',
      old_value:oldVal!==undefined?oldVal:null,
      new_value:newVal!==undefined?newVal:null
    };
    var r=await fetch(BASE+'/audit_logs',{
      method:'POST',
      headers:Object.assign({},H,{'Prefer':'return=minimal'}),
      body:JSON.stringify(entry)
    });
    if(!r.ok){
      var errText='';try{errText=await r.text();}catch(te){}
      console.warn('[audit] log failed ('+r.status+'):', errText);
    }
  }catch(e){
    console.warn('[audit] logAudit error:', e.message);
  }
}

async function loadAuditLog(){
  S.auditLogLoading=true;S.auditLogData=null;render();
  try{
    var rows=await dbGet('audit_logs','order=created_at.desc&limit=10');

  }catch(e){
    S.auditLogData={error:e.message};
    console.warn('[audit] loadAuditLog error:', e.message);
  }
  S.auditLogLoading=false;render();
}

async function submitAddTxn(){
  var type=document.getElementById('txn-type').value;
  var cat=document.getElementById('txn-cat').value;
  var date=document.getElementById('txn-date').value;
  var amount=parseFloat(document.getElementById('txn-amount').value)||0;
  var acctId=document.getElementById('txn-acct').value;
  var desc=document.getElementById('txn-desc').value;
  var toAcct=document.getElementById('txn-to')?document.getElementById('txn-to').value:'';
  var isPending=document.getElementById('txn-pending')&&document.getElementById('txn-pending').checked;
  if(!cat||!date||!amount||!acctId){alert('Bütün məcburi sahələri doldurun');return;}
  if(type==='transfer'&&!toAcct){alert('Hədəf hesab seçin');return;}
  S.saving=true;render();
  try{
    var txn={id:'TX'+Date.now(),date:date,type:type,category:cat,
      description:desc||cat,amount:amount,account_id:acctId,
      to_account_id:toAcct||null,subscription_id:null,customer_id:null,
      status:isPending?'pending':'posted'};
    await dbPost('transactions',txn);
    logAudit('transaction',txn.id,'create',(txn.description||txn.category)+' ('+txn.amount+' AZN)',null,{type:txn.type,category:txn.category,amount:txn.amount,account_id:txn.account_id,status:txn.status});

// ==================== BUG 2 — Subscription price_paid recalc ====================

async function recalcSubscriptionPaid(subId){
  if(!subId)return;
  var txns=await dbGet('transactions','subscription_id=eq.'+subId+'&type=eq.income');
  var total=0;
  for(var i=0;i<txns.length;i++)total+=parseFloat(txns[i].amount)||0;
  total=Math.round(total*100)/100;
  await dbPatch('subscriptions','id=eq.'+subId,{price_paid:total});
  for(var i=0;i<D.subscriptions.length;i++){
    if(D.subscriptions[i].id===subId){D.subscriptions[i].price_paid=total;break;}
  }
  if(S.custDetail&&S.custDetail.subs){
    for(var j=0;j<S.custDetail.subs.length;j++){
      if(S.custDetail.subs[j].id===subId){S.custDetail.subs[j].price_paid=total;break;}
    }
  }
  S.kassaData=null;
  S.izlemeData=null;
  S.reportData=null;
}

// ==================== SUBSCRIPTION REMAINING RECALC ====================

async function recalcSubscriptionRemaining(subId){
  if(!subId||subId==='null')return null;
  var sub=null;
  for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
  if(!sub){
    var rows=await dbGet('subscriptions','id=eq.'+subId);
    sub=rows&&rows[0]?rows[0]:null;
    if(!sub)return null;
  }
  if(sub.is_partner)return sub;
  var atts=await dbGet('attendances','subscription_id=eq.'+subId);
  var used=atts?atts.length:0;
  var total=parseInt(sub.sessions_total)||0;
  var newRemaining=Math.max(0,total-used);
  await dbPatch('subscriptions','id=eq.'+subId,{remaining:newRemaining});
  updateSubscriptionLocal(subId,{remaining:newRemaining});
  S.reportData=null;S.izlemeData=null;
  return{subId:subId,used:used,remaining:newRemaining};
}

// ==================== DATA INTEGRITY AUDIT — daily-integrity-v1 ====================

function auditDuplicateAttendanceByDay(){
  // Check 1: same customer_id + class_date, count > 1
  var map={};
  var atts=D.attendances||[];
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    var key=a.customer_id+'|'+a.class_date;
    if(!map[key])map[key]={customer_id:a.customer_id,customer_name:a.customer_name||'',class_date:a.class_date,times:[],ids:[]};
    map[key].times.push(a.class_time||'--');
    map[key].ids.push(a.id);
  }
  var issues=[];
  for(var k in map){
    if(map[k].ids.length>1)issues.push(map[k]);
  }
  return issues;
}

function auditDuplicateAttendanceBySlot(){
  // Check 2: same customer_id + class_date + class_time, count > 1
  var map={};
  var atts=D.attendances||[];
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    var key=a.customer_id+'|'+a.class_date+'|'+(a.class_time||'');
    if(!map[key])map[key]={customer_id:a.customer_id,customer_name:a.customer_name||'',class_date:a.class_date,class_time:a.class_time||'--',ids:[]};
    map[key].ids.push(a.id);
  }
  var issues=[];
  for(var k in map){
    if(map[k].ids.length>1)issues.push(map[k]);
  }
  return issues;
}

function auditSubscriptionRemainingMismatch(){
  // Check 3: non-partner subs where DB remaining != expected remaining
  var issues=[];
  var subs=D.subscriptions||[];
  var atts=D.attendances||[];
  var custMap={};
  var customers=D.customers||[];
  for(var i=0;i<customers.length;i++)custMap[customers[i].id]=customers[i].name;
  for(var i=0;i<subs.length;i++){
    var sub=subs[i];
    if(sub.is_partner)continue;
    var used=0;
    for(var j=0;j<atts.length;j++){
      if(atts[j].subscription_id===sub.id)used++;
    }
    var total=parseInt(sub.sessions_total)||0;
    var expected=Math.max(0,total-used);
    var dbRem=parseInt(sub.remaining);
    if(isNaN(dbRem))dbRem=0;
    if(dbRem!==expected){
      issues.push({
        subscription_id:sub.id,
        customer_id:sub.customer_id,
        customer_name:custMap[sub.customer_id]||sub.customer_id,
        program_name:sub.program_name||sub.program_id,
        sessions_total:total,
        used:used,
        db_remaining:dbRem,
        expected_remaining:expected,
        diff:dbRem-expected
      });
    }
  }
  return issues;
}

function auditAttendanceOutsideSubscriptionRange(){
  // Check 4: attendance.class_date outside subscription start/end
  var issues=[];
  var atts=D.attendances||[];
  var subMap={};
  var subs=D.subscriptions||[];
  for(var i=0;i<subs.length;i++)subMap[subs[i].id]=subs[i];
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    if(!a.subscription_id||a.subscription_id==='null')continue;
    var sub=subMap[a.subscription_id];
    if(!sub)continue;
    if(!sub.start_date||!sub.end_date)continue;
    if(a.class_date<sub.start_date||a.class_date>sub.end_date){
      issues.push({
        attendance_id:a.id,
        customer_id:a.customer_id,
        customer_name:a.customer_name||'',
        class_date:a.class_date,
        class_time:a.class_time||'--',
        subscription_id:a.subscription_id,
        sub_start:sub.start_date,
        sub_end:sub.end_date,
        program_name:sub.program_name||sub.program_id
      });
    }
  }
  return issues;
}

function runDataIntegrityAudit(){
  if(!D.attFull){
    alert('Davamiyyət datası tam yüklənməyib. Zəhmət olmasa səhifəni yeniləyin və bir az gözləyin.');
    return;
  }
  S.auditLoading=true;
  S.auditResults=null;
  S.auditOpenChecks={c1:false,c2:false,c3:false,c4:false};
  render();
  // All checks are synchronous (local D data only)
  try{
    var r1=auditDuplicateAttendanceByDay();
    var r2=auditDuplicateAttendanceBySlot();
    var r3=auditSubscriptionRemainingMismatch();
    var r4=auditAttendanceOutsideSubscriptionRange();
    S.auditResults={c1:r1,c2:r2,c3:r3,c4:r4,ts:new Date().toLocaleTimeString('az-AZ')};
  }catch(e){
    S.auditResults={error:'Yoxlama zamanı xəta: '+e.message};
  }
  S.auditLoading=false;
  render();
}

// ==================== CSV EXPORT — daily-integrity-v1.2 ====================

function csvCell(v){
  if(v===null||v===undefined)v='';
  v=String(v).replace(/\r?\n/g,' ').replace(/"/g,'""');
  return '"'+v+'"';
}

function downloadCsv(filename,rows){
  var lines=[];
  for(var i=0;i<rows.length;i++){
    lines.push(rows[i].map(csvCell).join(';'));
  }
  var content='\uFEFF'+lines.join('\r\n');
  var blob=new Blob([content],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=filename.endsWith('.csv')?filename:filename+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  }
  function addC3(items){
    rows.push(['Yoxlama','Subscription ID','Müştəri ID','Müştəri adı','Proqram','Sessions total','İstifadə sayı','DB qalıq','Gözlənilən qalıq','Fərq']);
    for(var i=0;i<items.length;i++){
      var x=items[i];
      rows.push(['3 - Qalıq uyğunsuzluq',x.subscription_id,x.customer_id,x.customer_name,x.program_name,x.sessions_total,x.used,x.db_remaining,x.expected_remaining,x.diff]);
    }
  }
  function addC4(items){
    rows.push(['Yoxlama','Attendance ID','Müştəri ID','Müştəri adı','Tarix','Saat','Subscription ID','Proqram','Abunə başlanğıc tarixi','Abunə bitiş tarixi','Problem tipi']);
    for(var i=0;i<items.length;i++){
      var x=items[i];
      var pt=x.class_date<x.sub_start?'Abunə başlanğıcından əvvəl':'Abunə bitdikdən sonra';
      rows.push(['4 - Tarix aralığı xarici',x.attendance_id,x.customer_id,x.customer_name,fmt(x.class_date),x.class_time,x.subscription_id,x.program_name,fmt(x.sub_start),fmt(x.sub_end),pt]);
    }
  }

  var filename;
  if(checkKey==='all'){
    filename='erge_audit_all_'+today+'.csv';
    addC1(res.c1);
    if(res.c2.length){rows.push([]);addC2(res.c2);}
    if(res.c3.length){rows.push([]);addC3(res.c3);}
    if(res.c4.length){rows.push([]);addC4(res.c4);}
  }else if(checkKey==='c1'){
    filename='erge_audit_duplicate_day_'+today+'.csv';
    addC1(res.c1);
  }else if(checkKey==='c2'){
    filename='erge_audit_duplicate_slot_'+today+'.csv';
    addC2(res.c2);
  }else if(checkKey==='c3'){
    filename='erge_audit_remaining_mismatch_'+today+'.csv';
    addC3(res.c3);
  }else if(checkKey==='c4'){
    filename='erge_audit_date_range_'+today+'.csv';
    addC4(res.c4);
  }else return;

  downloadCsv(filename,rows);
}

function rAuditResults(){
  if(S.auditLoading){
    return '<div class="lscreen"><span class="spin"></span> Yoxlanılır...</div>';
  }
  if(!S.auditResults)return '';
  var res=S.auditResults;
  if(res.error){
    return '<div class="errbox">⚠ '+res.error+'</div>';
  }

  var total=res.c1.length+res.c2.length+res.c3.length+res.c4.length;
  var checkCounts=[res.c1.length,res.c2.length,res.c3.length,res.c4.length];
  var checkLabels=['Dublikat gün','Dublikat slot','Qalıq fərqi','Tarix aralığı'];

  var h='<div style="margin-top:12px">';
  h+='<div style="font-size:11px;color:#aaa;margin-bottom:8px">Son yoxlama: '+res.ts+'</div>';

  // Summary card
  h+='<div style="background:#f8faf8;border:1px solid #e0ebe0;border-radius:10px;padding:12px 14px;margin-bottom:12px">';
  h+='<div style="font-weight:700;font-size:12px;color:#555;margin-bottom:8px;letter-spacing:.3px">YEKUN NƏTİCƏ</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">';
  for(var ci=0;ci<4;ci++){
    var cc=checkCounts[ci];
    h+='<div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:8px;text-align:center">'
      +'<div style="font-size:18px;font-weight:700;color:'+(cc===0?'#1D9E75':'#E65100')+'">'+cc+'</div>'
      +'<div style="font-size:10px;color:#999;margin-top:2px">'+checkLabels[ci]+'</div>'
      +'</div>';
  }
  h+='</div>';
  if(total===0){
    h+='<div class="al al-g" style="margin:0">✓ Bütün yoxlamalar təmizdir</div>';
  }else{
    h+='<div class="al al-y" style="margin:0">⚠ Cəmi <b>'+total+'</b> problem tapıldı. Bu problemlər əsasən tarixi Excel import datasından qaynaqlana bilər. Avtomatik düzəliş edilmədi.</div>';
  }
  h+='<div style="margin-top:10px;display:flex;justify-content:flex-end">'
    +'<button class="btn btn-gray btn-sm" onclick="exportAuditCsv(\'all\')" '+(total===0?'disabled':'')+' style="font-size:12px">⬇ Bütün audit nəticələrini CSV yüklə</button>'
    +'</div>';
  h+='</div>';

  // Check 1
  h+=rAuditCheckBlock('c1','1 — Eyni gündə dublikat davamiyyət',res.c1,function(x){
    return '<div style="background:#fff8f0;border:1px solid #ffe0b2;border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12px">'
      +'<b>'+x.customer_name+'</b> <span style="color:#aaa">('+x.customer_id+')</span><br>'
      +'Tarix: <b>'+fmt(x.class_date)+'</b> — <b>'+x.ids.length+'</b> qeyd<br>'
      +'Saatlar: '+x.times.join(', ')+'<br>'
      +'<span style="color:#aaa;font-size:11px">ID-lər: '+x.ids.join(', ')+'</span>'
      +'</div>';
  });

  // Check 2
  h+=rAuditCheckBlock('c2','2 — Eyni slotda dublikat davamiyyət',res.c2,function(x){
    return '<div style="background:#fff0f0;border:1px solid #ffcdd2;border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12px">'
      +'<b>'+x.customer_name+'</b> <span style="color:#aaa">('+x.customer_id+')</span><br>'
      +'Tarix: <b>'+fmt(x.class_date)+'</b>, Saat: <b>'+x.class_time+'</b> — <b>'+x.ids.length+'</b> qeyd<br>'
      +'<span style="color:#aaa;font-size:11px">ID-lər: '+x.ids.join(', ')+'</span>'
      +'</div>';
  });

  // Check 3
  h+=rAuditCheckBlock('c3','3 — Abunə qalıq uyğunsuzluğu (non-partner)',res.c3,function(x){
    var d=x.diff;
    var dc=d>0?'#C62828':'#1D9E75';
    return '<div style="background:#fff8f0;border:1px solid #ffe0b2;border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12px">'
      +'<b>'+x.customer_name+'</b> — '+x.program_name+'<br>'
      +'Cəmi: '+x.sessions_total+' | İstifadə: '+x.used+' | DB: '+x.db_remaining+' | Gözlənən: '+x.expected_remaining
      +' | Fərq: <b style="color:'+dc+'">'+(d>0?'+':'')+d+'</b><br>'
      +'<span style="color:#aaa;font-size:11px">Sub: '+x.subscription_id+'</span>'
      +'</div>';
  });

  // Check 4
  h+=rAuditCheckBlock('c4','4 — Abunə tarix aralığı xarici davamiyyət',res.c4,function(x){
    return '<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12px">'
      +'<b>'+x.customer_name+'</b> — '+x.program_name+'<br>'
      +'Davamiyyət: <b>'+fmt(x.class_date)+'</b> '+x.class_time+'<br>'
      +'Abunə aralığı: '+fmt(x.sub_start)+' → '+fmt(x.sub_end)+'<br>'
      +'<span style="color:#aaa;font-size:11px">Att: '+x.attendance_id+' | Sub: '+x.subscription_id+'</span>'
      +'</div>';
  });

  h+='</div>';
  return h;
}

loadAll();
</script>
