<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F6F4;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e0e8e0;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:700;letter-spacing:.8px}.logo span{color:#1D9E75}
.nav{display:flex;gap:3px}
.nav button{background:none;border:none;padding:7px 12px;border-radius:8px;font-size:13px;color:#666;cursor:pointer;font-family:inherit}
.nav button.active{background:#E8F5EF;color:#0F6E56;font-weight:600}
.nav button:hover:not(.active){background:#f0f0f0}
.content{padding:18px;max-width:720px;margin:0 auto}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.pt{font-size:17px;font-weight:700}
.btn{border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:#1D9E75;color:#fff}
.btn-b{background:#3B7DD8;color:#fff}
.btn-gray{background:#f0f0f0;color:#444;border:1px solid #e0e0e0}
.btn-sm{padding:5px 10px;font-size:12px}
.sbar{position:relative;margin-bottom:12px}
.sbar input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:13px;font-family:inherit;outline:none}
.sbar input:focus{border-color:#1D9E75}
.sicon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;font-size:13px;pointer-events:none}
.card{background:#fff;border:1px solid #eaeaea;border-radius:12px;padding:12px 15px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.card:hover{border-color:#1D9E75}
.cleft{display:flex;align-items:center;gap:11px}
.av{width:38px;height:38px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0F6E56;flex-shrink:0}
.av-p{background:#EDE7F6;color:#5E35B1}
.cid{font-size:10px;color:#aaa;font-weight:500}
.cname{font-size:14px;font-weight:600;margin-top:1px}
.csub{font-size:12px;color:#999;margin-top:1px}
.badge{display:inline-flex;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:#E1F5EE;color:#0F6E56}
.b-yellow{background:#FFF8E1;color:#E65100}
.b-red{background:#FFEBEE;color:#C62828}
.b-gray{background:#f0f0f0;color:#888}
.b-purple{background:#EDE7F6;color:#5E35B1}
.b-blue{background:#E3F2FD;color:#1565C0}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:14px;padding:22px;width:420px;max-width:100%;max-height:90vh;overflow-y:auto}
.mtitle{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{font-size:12px;color:#666;margin-bottom:4px;display:block;font-weight:500}
.fi,.fs{width:100%;padding:9px 10px;border-radius:8px;border:1px solid #ddd;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#1a1a1a}
.fi:focus,.fs:focus{border-color:#1D9E75}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.back{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:3px 0;margin-bottom:12px;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.attitem{background:#fff;border:1px solid #eaeaea;border-radius:10px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.empty{text-align:center;padding:30px;color:#bbb;font-size:13px}
.subcard{background:#f8faf8;border:1px solid #e8ede8;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.progress-bar{height:5px;background:#e0e0e0;border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#1D9E75}
.progress-fill.warn{background:#FB8C00}
.progress-fill.exp{background:#E53935}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.scard{background:#fff;border-radius:10px;padding:13px;text-align:center;border:1px solid #eaeaea}
.snum{font-size:22px;font-weight:700}
.slbl{font-size:11px;color:#999;margin-top:2px}
.al{padding:10px 13px;border-radius:9px;font-size:13px;margin-bottom:10px}
.al-g{background:#E8F5EE;color:#0F6E56;border:1px solid #b2dfc8}
.al-y{background:#FFF8E1;color:#E65100;border:1px solid #ffe082}
.al-r{background:#FFEBEE;color:#C62828;border:1px solid #ffcdd2}
.al-b{background:#E3F2FD;color:#1565C0;border:1px solid #90caf9}
.slabel{font-size:11px;color:#999;font-weight:600;letter-spacing:.4px;margin-bottom:7px;margin-top:14px;display:flex;justify-content:space-between;align-items:center}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #ccc;border-top-color:#1D9E75;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.lscreen{display:flex;align-items:center;justify-content:center;height:200px;color:#aaa;font-size:14px}
.errbox{background:#fff0f0;border:1px solid #ffcdd2;color:#c62828;padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:12px}
.partner-strip{background:#F3E5F5;border:1px solid #CE93D8;border-radius:9px;padding:9px 13px;margin-bottom:8px;font-size:12px;color:#6A1B9A}
.tab-row{display:flex;gap:4px;margin-bottom:14px}
.tab{background:#f0f0f0;border:none;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:#666}
.tab.active{background:#1D9E75;color:#fff}
</style>

<script>

const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function dbGet(t,p){
  var r=await fetch(BASE+'/'+t+(p?'?'+p:''),{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function dbPost(t,b){
  var r=await fetch(BASE+'/'+t,{method:'POST',headers:H,body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function dbPatch(t,f,b){
  var r=await fetch(BASE+'/'+t+'?'+f,{method:'PATCH',headers:Object.assign({},H,{'Prefer':'return=minimal'}),body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
}

var TIMES=['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];
var D={programs:[],instructors:[],customers:[],subscriptions:[],attendances:[]};
var S={view:'home',loading:true,saving:false,err:null,selCust:null,
  showAddCust:false,showAddSub:false,showAtt:false,showFreeze:false,showAlert:null,
  attCust:null,freezeSub:null,editSub:null,showSingleAtt:false,singleCust:null,search:'',custTab:'all',selDate:null,selDateAtts:null,selDateLoading:false,reportMonth:null,reportData:null,reportLoading:false,selReportInst:null,editCust:null,custDetail:null,custDetailLoading:false,reportTab:'salary',izlemeData:null,izlemeLoading:false,selIzleme:null};

function ini(n){return n.trim().split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
function td(){return new Date().toISOString().slice(0,10);}
function fmt(d){if(!d)return'--';var p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function curMonth(){return new Date().toISOString().slice(0,7);}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function uid(){return 'X'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function norm(s){
  if(!s)return '';
  var result='';
  var lower=s.toLowerCase();
  for(var i=0;i<lower.length;i++){
    var c=lower[i];
    if(c==='\u0131')c='i';
    else if(c==='\u0259')c='e';
    else if(c==='\u015f')c='s';
    else if(c==='\u00e7')c='c';
    else if(c==='\u00f6')c='o';
    else if(c==='\u00fc')c='u';
    else if(c==='\u011f')c='g';
    else if(c==='\u0130')c='i';
    result+=c;
  }
  return result;
}

function activeSub(custId){
  var today=td();
  for(var i=0;i<D.subscriptions.length;i++){
    var s=D.subscriptions[i];
    if(s.customer_id===custId&&s.is_active&&s.end_date>=today&&(s.is_partner||s.remaining>0))return s;
  }
  return null;
}

function subStatus(sub){
  if(!sub)return{t:'none',txt:'Abunəlik yoxdur'};
  if(!sub.is_active)return{t:'exp',txt:'Deaktiv'};
  if(sub.end_date<td())return{t:'exp',txt:'Muddət bitib'};
  if(sub.is_partner){
    var used=0;
    var cm=curMonth();
    for(var i=0;i<D.attendances.length;i++){
      var a=D.attendances[i];
      if(a.subscription_id===sub.id&&a.class_date.indexOf(cm)===0)used++;
    }
    var left=12-used;
    if(left<=0)return{t:'exp',txt:'Bu ay limiti dolub'};
    if(left<=2)return{t:'warn',txt:'Bu ay '+left+' ders qaldi'};
    return{t:'ok',txt:'Bu ay '+left+' ders qaldi'};
  }
  if(sub.remaining<=0)return{t:'exp',txt:'Ders sayi bitib'};
  if(sub.remaining<=2)return{t:'warn',txt:sub.remaining+' ders qaldi'};
  return{t:'ok',txt:sub.remaining+' ders qaldi'};
}

function custStatus(custId){return subStatus(activeSub(custId));}


async function fetchAttByDate(d){
  S.selDateLoading=true;render();
  try{
    var res=await dbGet('attendances','class_date=eq.'+d+'&order=class_time');
    S.selDateAtts=res||[];
  }catch(e){S.selDateAtts=[];}
  S.selDateLoading=false;render();
}
async function loadAll(){
  S.loading=true;S.err=null;render();
  try{
    var res=await Promise.all([
      dbGet('programs','order=sort_order'),
      dbGet('instructors','order=full_name'),
      dbGet('customers','order=name'),
      dbGet('subscriptions','order=start_date.desc'),
      dbGet('attendances','order=class_date.desc'),
    ]);
    D.programs=res[0];D._allInstructors=res[1];D.instructors=res[1].filter(function(x){return x.is_active!==false;});D.customers=res[2];
    D.subscriptions=res[3];D.attendances=res[4];
    // Fetch today's attendances from DB directly
    try{
      var todayAtts=await dbGet('attendances','class_date=eq.'+td()+'&order=class_time');
      S.selDateAtts=todayAtts||[];
    }catch(e){S.selDateAtts=[];}
  }catch(e){S.err='Verilənlər bazasına qoşulmaq olmadi: '+e.message;}
  S.loading=false;render();
}

async function doAddCust(name,phone,birth){
  S.saving=true;render();
  try{
    var rows=await dbPost('customers',{name:name,phone:phone||'',birth_date:birth||''});
    var row=Array.isArray(rows)?rows[0]:rows;
    if(row)D.customers.unshift(row);
    S.showAddCust=false;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function doAddSub(custId,progId,priceDue,pricePaid,startDate){
  S.saving=true;render();
  try{
    var prog=null;
    for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId){prog=D.programs[i];break;}}
    var sd=startDate||td();
    var end=addDays(sd,prog.duration_days);
    var sub={id:uid(),customer_id:custId,program_id:progId,program_name:prog.name,
      sessions_total:prog.sessions_total,remaining:prog.sessions_total,
      price_due:parseFloat(priceDue)||prog.list_price,
      price_paid:parseFloat(pricePaid)||0,
      start_date:sd,end_date:end,is_partner:prog.is_partner,is_active:true,freeze_end:null};
    await dbPost('subscriptions',sub);
    D.subscriptions.unshift(sub);
    S.showAddSub=false;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function doAtt(custId,subId,classTime,instId,attDate){
  S.saving=true;render();
  try{
    var cust=null,sub=null,inst=null;
    for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
    for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
    for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
    var att={id:uid(),customer_id:custId,customer_name:cust.name,subscription_id:subId,
      program_id:sub.program_id,program_name:sub.program_name,
      class_date:attDate||td(),class_time:classTime,
      instructor_id:instId,instructor_name:inst?inst.full_name:''};
    await dbPost('attendances',att);
    D.attendances.unshift(att);
     if(att.class_date===td()&&S.selDateAtts!==null){S.selDateAtts.unshift(att);}
    if(!sub.is_partner){
      var nr=Math.max(0,sub.remaining-1);
      await dbPatch('subscriptions','id=eq.'+subId,{remaining:nr});
      sub.remaining=nr;
    }
    S.showAtt=false;
    S.showAlert={t:'ok',cust:cust,st:subStatus(activeSub(custId))};
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function doFreeze(subId,days,note){
  S.saving=true;render();
  try{
    var sub=null;
    for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
    var newEnd=addDays(sub.end_date,parseInt(days));
    var fEnd=addDays(td(),parseInt(days));
    await dbPost('freezes',{id:uid(),subscription_id:subId,freeze_start:td(),freeze_end:fEnd,days_count:parseInt(days),note:note||''});
    await dbPatch('subscriptions','id=eq.'+subId,{end_date:newEnd,freeze_end:fEnd});
    sub.end_date=newEnd;sub.freeze_end=fEnd;
    S.showFreeze=false;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

function render(){
  var root=document.getElementById('root');
  if(S.loading){root.innerHTML='<div class="topbar"><div class="logo">ERGE <span>PILATES</span></div></div><div class="lscreen"><span class="spin"></span> Yuklenilir...</div>';return;}
  var h='<div class="topbar"><div class="logo">ERGE <span>PILATES</span></div><div class="nav">'
    +'<button class="'+(S.view==='home'?'active':'')+'" onclick="sv(\'home\')">Əsas</button>'
    +'<button class="'+(S.view==='att'?'active':'')+'" onclick="sv(\'att\')">Davamiyyət</button>'
    +'<button class="'+(S.view==='cust'?'active':'')+'" onclick="sv(\'cust\')">Müştərilər</button>'
    +'<button class="'+(S.view==='admin'?'active':'')+'" onclick="sv(\'admin\')">Admin</button>'
    +'<button class="'+(S.view==='report'?'active':'')+'" onclick="sv(\'report\')">Hesabat</button>'
    +'</div></div><div class="content">';
  if(S.err)h+='<div class="errbox">'+S.err+'<br><button onclick="loadAll()" style="margin-top:6px;background:#c62828;color:#fff;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px">Yeniden cehd et</button></div>';
  if(S.saving)h+='<div class="al al-b"><span class="spin"></span>Saxlanilir...</div>';
  if(S.view==='home')h+=rHome();
  else if(S.view==='att')h+=rAtt();
  else if(S.view==='cust')h+=(S.selCust?rDetail():rCusts());
  else if(S.view==='admin')h+=rAdmin();
  else if(S.view==='report')h+=rReport();
  h+='</div>';
  if(S.showAddCust)h+=rModalAddCust();
  if(S.showAddSub)h+=rModalAddSub();
  if(S.showAtt)h+=rModalAtt();
  if(S.showFreeze)h+=rModalFreeze();
  if(S.editSub)h+=rModalEditSub();
  if(S.editCust)h+=rModalEditCust();
  if(S.showSingleAtt)h+=rModalSingleAtt();
  if(S.showAlert)h+=rAlertModal();
  root.innerHTML=h;
}

function rHome(){
  var ta=[];
  if(S.selDateAtts!==null){
    ta=S.selDateAtts.slice();
    ta.sort(function(a,b){return a.class_time.localeCompare(b.class_time);});
  }else if(S.selDateLoading){
    ta=[];
  }else{
    // Fallback: filter local cache
    for(var i=0;i<D.attendances.length;i++){if(D.attendances[i].class_date===viewDate)ta.push(D.attendances[i]);}
    ta.sort(function(a,b){return a.class_time.localeCompare(b.class_time);});
  }
  var ew=[],ex=[];
  for(var i=0;i<D.customers.length;i++){
    var st=custStatus(D.customers[i].id);
    if(st.t==='warn')ew.push(D.customers[i]);
    if(!activeSub(D.customers[i].id)||st.t==='exp')ex.push(D.customers[i]);
  }
  var viewDate=S.selDate||td();
  var isToday=viewDate===td();
  var h='<div class="ph"><div class="pt">'+(isToday?'Bu gun — '+fmt(td()):fmt(viewDate))+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<input type="date" value="'+viewDate+'" max="'+td()+'" onchange="S.selDate=this.value===td()?null:this.value;fetchAttByDate(this.value);" style="padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none">'
    +(isToday?'':'<button class="btn btn-gray btn-sm" onclick="S.selDate=null;render()">Bu gun</button>')
    +'</div></div>'
    +'<div class="sgrid">'
    +'<div class="scard"><div class="snum">'+ta.length+'</div><div class="slbl">Bugunki istirak</div></div>'
    +'<div class="scard"><div class="snum">'+D.customers.length+'</div><div class="slbl">Mustəri</div></div>'
    +'<div class="scard"><div class="snum">'+ew.length+'</div><div class="slbl">Abunə bitir</div></div>'
    +'</div>';
  if(ex.length)h+='<div class="al al-r">'+ex.length+' mustərinin aktiv abunəliyi yoxdur</div>';
  if(ew.length)h+='<div class="al al-y">Az ders qalan: '+ew.map(function(c){return c.name;}).join(', ')+'</div>';
  h+='<div class="slabel">BU GUN ISTIRAK ETDILER</div>';
  if(S.selDateLoading)h+='<div class="empty"><span class="spin"></span> Yuklenilir...</div>';
  else if(!ta.length)h+='<div class="empty">'+(isToday?'Hələ heç kim qeydiyyatdan keçməyib':fmt(viewDate)+' tarixində iştirak yoxdur')+'</div>';
  for(var i=0;i<ta.length;i++){
    var a=ta[i];
    h+='<div class="attitem"><div><div style="font-size:11px;color:#aaa;font-weight:500">'+a.customer_id+'</div>'
      +'<div style="font-size:13px;font-weight:600">'+a.customer_name+'</div>'
      +'<div style="font-size:11px;color:#bbb">'+a.class_time+' - '+a.instructor_name+' - '+a.program_name+'</div>'
      +'</div><span class="badge b-green">'+a.class_time+'</span></div>';
  }
  return h;
}

function rAtt(){
  var q=norm(S.search);
  var list=[];
  for(var i=0;i<D.customers.length;i++){
    var c=D.customers[i];
    if(!q||norm(c.name).indexOf(q)>=0||c.id.toLowerCase().indexOf(q)>=0||(c.phone||'').indexOf(q)>=0){
      list.push(c);
    }
  }
  var h='<div class="ph"><div class="pt">Davamiyyət Qeydiyyati</div></div>'
    +'<div class="sbar"><span class="sicon">&#128269;</span>'
    +'<input id="att-search" placeholder="Ad, ID veya telefon..." value="'+S.search+'" oninput="ss(this.value)"></div>';
  if(!list.length)h+='<div class="empty">'+(S.search?'Tapilmadi':'Hələ mustəri yoxdur')+'</div>';
  for(var i=0;i<list.length;i++){
    var c=list[i];
    var sub=activeSub(c.id);var st=subStatus(sub);
    var bc=st.t==='ok'?'b-green':st.t==='warn'?'b-yellow':'b-red';
    var isP=sub&&sub.is_partner;
    var done=false;
    for(var j=0;j<D.attendances.length;j++){if(D.attendances[j].customer_id===c.id&&D.attendances[j].class_date===td()){done=true;break;}}

      h+='<button class="btn btn-b btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openSingleAtt(\''+c.id+'\')">+ Tək giriş</button>';
      if(st.t==='exp'){h+='<button class="btn btn-g btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openAtt(\''+c.id+'\')">+ Abunə ilə</button>';}
    }else if(sub&&['ROF','RPP','RPS','ROTG','ROTI'].indexOf(sub.program_id)>=0){
      h+='<button class="btn btn-g btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openAtt(\''+c.id+'\')">+ İştirak</button>';
    }else{
      h+='<button class="btn btn-g btn-sm" '+(S.saving?'disabled':'')+' onclick="event.stopPropagation();openAtt(\''+c.id+'\')">+ İştirak</button>';
    }
    h+='</div></div>';
  }
  return h;
}

async function fetchIzleme(){
  if(S.izlemeData)return;
  S.izlemeLoading=true;render();
  try{
    var singleProgs=['ROF','RPS','RPP','ROTG','ROTI'];
    var today=td();
    var day7=addDays(today,-7);
    var day30=addDays(today,-30);

    // 1. All active subscriptions
    var activeSubs=await dbGet('subscriptions','is_active=eq.true&order=end_date&select=id,customer_id,program_id,end_date,remaining,sessions_total,price_paid,price_due,is_partner,is_active');
    // 2. Debt subs handled via activeSubs
    var debtSubs=activeSubs;
    // 3. Recent attendances (last 30 days)
    var recentAtts=await dbGet('attendances','class_date=gte.'+day30+'&order=class_date.desc');
    // 4. Expired subs with recent attendance
    var expiredSubs=await dbGet('subscriptions','is_active=eq.false&end_date=gte.'+day30+'&order=end_date.desc&select=id,customer_id,program_id,end_date,remaining,sessions_total,price_paid,price_due,is_partner');

    // Build last attendance map
    var lastAtt={};
    for(var i=0;i<recentAtts.length;i++){
      var a=recentAtts[i];
      if(!lastAtt[a.customer_id]||a.class_date>lastAtt[a.customer_id])
        lastAtt[a.customer_id]=a.class_date;
    }

    // Build customer map
    var custMap={};
    for(var i=0;i<D.customers.length;i++){
      custMap[D.customers[i].id]=D.customers[i];
    }

    // Category 1: Dərs sayı tamamlananlar (remaining=0, end_date >= today, is_active=true)
    var completedSessions=[];
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(s.remaining===0&&s.end_date>=today&&!s.is_partner){
        var c=custMap[s.customer_id];
        if(c)completedSessions.push({c:c,s:s,last:lastAtt[c.id]||''});
      }
    }

    // Category 2: Vaxtı bitənlər (end_date < today, had attendance in last 30 days)
    var expiredTime=[];
    var expiredCusts={};
    for(var i=0;i<expiredSubs.length;i++){
      var s=expiredSubs[i];
      if(s.end_date<today&&lastAtt[s.customer_id]&&!expiredCusts[s.customer_id]&&singleProgs.indexOf(s.program_id)<0){
        var c=custMap[s.customer_id];
        // Make sure they don't have another active sub
        var hasActive=false;
        for(var j=0;j<activeSubs.length;j++){
          if(activeSubs[j].customer_id===s.customer_id){hasActive=true;break;}
        }
        if(!hasActive&&c){
          expiredCusts[s.customer_id]=true;
          expiredTime.push({c:c,s:s,last:lastAtt[c.id]||''});
        }
      }
    }

    // Category 3: Tez bitəcək (remaining=1, active)
    var almostDone=[];
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(s.remaining===1&&!s.is_partner&&singleProgs.indexOf(s.program_id)<0){
        var c=custMap[s.customer_id];
        if(c)almostDone.push({c:c,s:s,last:lastAtt[c.id]||''});
      }
    }

    // Category 4: Bu həftə gəlməyənlər (active sub, no attendance in last 7 days)
    var notThisWeek=[];
    var weekCusts={};
    for(var i=0;i<recentAtts.length;i++){
      if(recentAtts[i].class_date>=day7)weekCusts[recentAtts[i].customer_id]=true;
    }
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(!weekCusts[s.customer_id]&&lastAtt[s.customer_id]){
        var c=custMap[s.customer_id];
        if(c&&!notThisWeek.find(function(x){return x.c.id===s.customer_id;}))
          notThisWeek.push({c:c,s:s,last:lastAtt[c.id]||''});
      }
    }

    // Category 5: Borclular (price_paid < price_due)
    var debtors=[];
    var debtCusts={};
    for(var i=0;i<debtSubs.length;i++){
      var s=debtSubs[i];
      var due=s.price_due||0;
      var paid=s.price_paid||0;
      if(due>paid&&!debtCusts[s.customer_id]){
        var c=custMap[s.customer_id];
        if(c){
          debtCusts[s.customer_id]=true;
          debtors.push({c:c,s:s,last:lastAtt[c.id]||'',debt:due-paid});
        }
      }
    }

    S.izlemeData={completedSessions,expiredTime,almostDone,notThisWeek,debtors};
  }catch(e){alert('Xeta: '+e.message);}
  S.izlemeLoading=false;render();
}

async function fetchReport(month){
  S.reportLoading=true;S.reportData=null;render();
  try{
    var allInst=D._allInstructors||D.instructors;
    var instMap={};
    for(var i=0;i<allInst.length;i++){instMap[allInst[i].id]=allInst[i];}

    // Fetch attendances WITH subscription and program data joined via separate queries
    var atts=await dbGet('attendances','class_date=gte.'+month+'-01&class_date=lte.'+month+'-31&order=class_date');
    
    // Fetch ALL subscriptions referenced in these attendances
    var subIds=[...new Set(atts.filter(function(a){return a.subscription_id;}).map(function(a){return a.subscription_id;}))];
    var subMap={};
    // Fetch in batches of 100
    for(var b=0;b<subIds.length;b+=100){
      var batch=subIds.slice(b,b+100);
      var subs=await dbGet('subscriptions','id=in.('+batch.join(',')+')'+'&select=id,price_paid,sessions_total,program_id');
      for(var i=0;i<subs.length;i++){subMap[subs[i].id]=subs[i];}
    }

    var progMap={};
    for(var i=0;i<D.programs.length;i++){progMap[D.programs[i].id]=D.programs[i];}

    var instData={};
    for(var i=0;i<allInst.length;i++){
      instData[allInst[i].id]={
        name:allInst[i].full_name,
        pct:allInst[i].commission_pct||30,
        sessions:0,gross:0,commission:0,days:{}
      };
    }

    var cutoff='2026-01-01';
    var singleProgs=['ROF','RPS','RPP','ROTG','ROTI'];

    for(var i=0;i<atts.length;i++){
      var a=atts[i];
      if(!a.instructor_id||!instData[a.instructor_id])continue;
      var prog=progMap[a.program_id];
      var perSession=0;

      if(singleProgs.indexOf(a.program_id)>=0){
        perSession=prog?prog.list_price||0:0;
      } else if(a.subscription_id&&subMap[a.subscription_id]){
        var sub=subMap[a.subscription_id];
        var subSessions=sub.sessions_total||1;
        if(a.class_date<cutoff){
          perSession=(sub.price_paid||0)/subSessions;
        } else {
          perSession=prog?(prog.list_price||0)/subSessions:0;
        }
      } else {
        if(a.class_date<cutoff){
          perSession=0;
        } else if(prog){
          var pSess=singleProgs.indexOf(a.program_id)>=0?1:(prog.sessions_total||1);
          perSession=(prog.list_price||0)/pSess;
        }
      }

      var inst=instData[a.instructor_id];
      inst.sessions+=1;
      inst.gross+=perSession;
      inst.commission+=perSession*(inst.pct/100);
      var dk=a.class_date;
      if(!inst.days[dk])inst.days[dk]={sessions:0,gross:0,commission:0};
      inst.days[dk].sessions+=1;
      inst.days[dk].gross+=perSession;
      inst.days[dk].commission+=perSession*(inst.pct/100);
    }

    S.reportData={month:month,instData:instData,totalAtts:atts.length};
  }catch(e){alert('Hesabat xetasi: '+e.message);}
  S.reportLoading=false;render();
}

    +'<div class="fg"><label class="fl">Ödənilən (AZN)</label><input class="fi" id="sa-paid" type="number" value="'+defPrice+'"></div>'
    +'</div>'
    +'<div class="mact"><button class="btn btn-gray" onclick="S.showSingleAtt=false;render()">Legv et</button>'
    +'<button class="btn btn-g" onclick="submitSingleAtt()">Qeydə al</button></div>'
    +'</div></div>';
}

function updateSinglePrice(){
  var sel=document.getElementById('sa-prog');
  if(!sel)return;

  for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===sel.value){prog=D.programs[i];break;}}
  if(prog){
    var due=document.getElementById('sa-due');
    var paid=document.getElementById('sa-paid');
    if(due)due.value=prog.list_price;
    if(paid)paid.value=prog.list_price;

async function submitSingleAtt(){
  var progId=document.getElementById('sa-prog').value;
  var saDate=document.getElementById('sa-date')?document.getElementById('sa-date').value:td();
  var time=document.getElementById('sa-time').value;
  var instId=document.getElementById('sa-inst').value;
  var due=parseFloat(document.getElementById('sa-due').value)||0;
  var paid=parseFloat(document.getElementById('sa-paid').value)||0;
  if(!progId||!time||!instId||!S.singleCust)return;
  S.saving=true;render();
  try{
    var c=null,inst=null,prog=null;
    for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===S.singleCust){c=D.customers[i];break;}}
    for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
    for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId){prog=D.programs[i];break;}}
    var att={id:uid(),customer_id:S.singleCust,customer_name:c.name,
      subscription_id:null,
      program_id:progId,program_name:prog.name,
      class_date:saDate||td(),class_time:time,
      instructor_id:instId,instructor_name:inst?inst.full_name:'',
      price_due:due,price_paid:paid};
    await dbPost('attendances',att);
    D.attendances.unshift(att);
    if(att.class_date===td()&&S.selDateAtts!==null){
      S.selDateAtts.unshift(att);
    }
    S.showSingleAtt=false;
    S.showAlert={t:'ok',cust:c,st:{t:'ok',txt:'Tək giriş qeydə alindi'}};
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function deleteAtt(attId, subId, attDate){
  if(!confirm(attDate+' tarixli məşqi silmək istədiyinizdən əminsinizmi?\nAbunəlik qalığı avtomatik +1 artacaq.'))return;
  S.saving=true;render();
  try{
    // Delete attendance
    var r=await fetch(BASE+'/attendances?id=eq.'+attId,{method:'DELETE',headers:Object.assign({},H,{'Prefer':'return=minimal'})});
    if(!r.ok)throw new Error(await r.text());
    
    // Remove from local data
    D.attendances=D.attendances.filter(function(a){return a.id!==attId;});
    
    // If has subscription, restore remaining +1
    if(subId&&subId!=='null'){
      var sub=null;
      for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
      if(sub){
        var newRem=sub.remaining+1;
        await dbPatch('subscriptions','id=eq.'+subId,{remaining:newRem});
        sub.remaining=newRem;
      }
    }
    S.showAlert={t:'ok',cust:{name:'Məşq silindi'},st:{t:'ok',txt:'Abunəlik qalığı +1 artırıldı'}};
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function fetchCustDetail(custId){
  try{
    var res=await Promise.all([
      dbGet('subscriptions','customer_id=eq.'+custId+'&order=start_date.desc'),
      dbGet('attendances','customer_id=eq.'+custId+'&order=class_date.desc')
    ]);
    S.custDetail={subs:res[0]||[],atts:res[1]||[]};
    // Update local cache too
    var existSubIds={};
    for(var i=0;i<D.subscriptions.length;i++)existSubIds[D.subscriptions[i].id]=true;
    for(var i=0;i<S.custDetail.subs.length;i++){
      if(!existSubIds[S.custDetail.subs[i].id])D.subscriptions.push(S.custDetail.subs[i]);
    }
  }catch(e){S.custDetail={subs:[],atts:[]};}
  S.custDetailLoading=false;render();
}

    +'<div class="fg"><label class="fl">Ödənilən (AZN)</label><input class="fi" id="es-paid" type="number" value="'+paid+'"></div>'

    +'<div class="mact"><button class="btn btn-gray" onclick="S.editSub=null;render()">Legv et</button>'

async function submitEditSub(){
  var start=document.getElementById('es-start').value;
  var end=document.getElementById('es-end').value;
  var due=parseFloat(document.getElementById('es-due').value)||0;
  var paid=parseFloat(document.getElementById('es-paid').value)||0;
  var remaining=parseInt(document.getElementById('es-remaining').value)||0;
  if(!start||!end||!S.editSub)return;
  S.saving=true;render();
  try{
    await dbPatch('subscriptions','id=eq.'+S.editSub,{
      start_date:start,end_date:end,
      price_due:due,price_paid:paid,remaining:remaining,
      is_active:true
    });
    for(var i=0;i<D.subscriptions.length;i++){
      if(D.subscriptions[i].id===S.editSub){
        D.subscriptions[i].start_date=start;
        D.subscriptions[i].end_date=end;
        D.subscriptions[i].price_due=due;
        D.subscriptions[i].price_paid=paid;
        D.subscriptions[i].remaining=remaining;
        D.subscriptions[i].is_active=true;
        break;
      }
    }
    S.editSub=null;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

function sv(v){S.view=v;S.search='';S.selCust=null;render();}
function ss(v){
  S.search=v;
  // Don't re-render, just filter the visible cards
  filterCards(v);
}
function filterCards(q){
  var nq=norm(q);
  var cards=document.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++){
    var card=cards[i];
    var cid=card.querySelector('.cid');
    var cname=card.querySelector('.cname');
    var csub=card.querySelector('.csub');
    var idText=cid?cid.textContent:'';
    var nameText=cname?cname.textContent:'';
    var phoneText=csub?csub.textContent:'';
    if(!nq||norm(nameText).indexOf(nq)>=0||idText.toLowerCase().indexOf(nq)>=0||phoneText.indexOf(nq)>=0){
      card.style.display='';
    }else{
      card.style.display='none';
    }
  }
}
function selCust(id){S.selCust=id;S.search='';S.custDetail=null;S.custDetailLoading=true;render();fetchCustDetail(id);}
