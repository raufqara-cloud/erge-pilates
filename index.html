// ==================== PARTNER RECONCİLİASİYA ====================
function rPartnerRecon(){
  var now=new Date();
  var curMonth=now.getFullYear()+'-'+(String(now.getMonth()+1).padStart(2,'0'));
  var selMonth=S.reportMonth||curMonth;

  // Month selector (reuse same as salary tab)
  var curYear=now.getFullYear();
  var years=[];for(var y=2023;y<=curYear;y++)years.push(y);
  var selYear=parseInt(selMonth.split('-')[0]);
  var selMon=selMonth.split('-')[1];
  var monthNames=['Yanvar','Fevral','Mart','Aprel','May','İyun','İyul','Avqust','Sentyabr','Oktyabr','Noyabr','Dekabr'];
  var yearOpts='';for(var i=0;i<years.length;i++)yearOpts+='<option value="'+years[i]+'"'+(years[i]===selYear?' selected':'')+'>'+years[i]+'</option>';
  var monOpts='';for(var i=0;i<12;i++){var mv=String(i+1).padStart(2,'0');monOpts+='<option value="'+mv+'"'+(mv===selMon?' selected':'')+'>'+monthNames[i]+'</option>';}

  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    +'<select class="fs" style="width:100px" id="pr-year" onchange="S.reportMonth=document.getElementById(\'pr-year\').value+\'-\'+document.getElementById(\'pr-mon\').value;render()">'+yearOpts+'</select>'
    +'<select class="fs" style="width:130px" id="pr-mon" onchange="S.reportMonth=document.getElementById(\'pr-year\').value+\'-\'+document.getElementById(\'pr-mon\').value;render()">'+monOpts+'</select>'
    +'</div>';

  // Filter attendances for selected month + partner programs
  var atts=D.attendances.filter(function(a){
    return a.class_date&&a.class_date.indexOf(selMonth)===0;
  });

  // Group by partner: identify Push30 vs 1FIT by program name
  var partners={
    push30:{name:'Push30',acct:'ACC005',progs:{},days:{},total:0,count:0},
    fit1:{name:'1FIT',acct:'ACC006',progs:{},days:{},total:0,count:0}
  };

  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    // Find program
    var prog=null;
    for(var j=0;j<D.programs.length;j++){if(D.programs[j].id===a.program_id){prog=D.programs[j];break;}}
    if(!prog||!prog.is_partner)continue;

    var pname=(a.program_name||'').toLowerCase();
    var key=pname.indexOf('1fit')>=0?'fit1':(pname.indexOf('push')>=0?'push30':null);
    if(!key)continue;

    var p=partners[key];
    var unitPrice=prog.list_price/prog.sessions_total;
    p.total+=unitPrice;
    p.count++;

    // By program
    var pid=a.program_id;
    if(!p.progs[pid])p.progs[pid]={name:a.program_name,price:unitPrice,count:0,total:0};
    p.progs[pid].count++;p.progs[pid].total+=unitPrice;

    // By day
    var day=a.class_date;
    if(!p.days[day])p.days[day]={count:0,total:0,names:[]};
    p.days[day].count++;p.days[day].total+=unitPrice;
    p.days[day].names.push(a.customer_name||'?');
  }

  // Get alacaq account balances from kassaData (live txns)
  var alacaqBals={ACC005:0,ACC006:0};
  if(S.kassaData){
    var liveTxns=(S.kassaData.txns||[]).filter(function(t){return t.id.indexOf('IMP')!==0;});
    for(var i=0;i<liveTxns.length;i++){
      var t=liveTxns[i];
      if(t.account_id!=='ACC005'&&t.account_id!=='ACC006')continue;
      var amt=parseFloat(t.amount||0);
      if(t.type==='income')alacaqBals[t.account_id]+=amt;
      if(t.type==='expense')alacaqBals[t.account_id]-=amt;
      if(t.type==='transfer'){
        alacaqBals[t.account_id]-=amt;
        if(t.to_account_id&&alacaqBals[t.to_account_id]!==undefined)alacaqBals[t.to_account_id]+=amt;
      }
    }
  }

  var partnerKeys=['push30','fit1'];
  for(var pi=0;pi<partnerKeys.length;pi++){
    var pk=partnerKeys[pi];
    var p=partners[pk];
    var bal=alacaqBals[p.acct];

    h+='<div style="background:#fff;border:1px solid #eaeaea;border-radius:12px;padding:16px;margin-bottom:16px">';

    // Header
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      +'<div style="font-weight:700;font-size:15px">'+(pk==='push30'?'🟣 Push30':'🔵 1FIT')+'</div>'
      +'<div style="text-align:right">'
      +'<div style="font-size:12px;color:#888">Bu ay ('+selMonth+')</div>'
      +'<div style="font-size:18px;font-weight:700;color:#1D9E75">'+p.total.toFixed(2)+' ₼ <span style="font-size:12px;color:#888">('+p.count+' dərs)</span></div>'
      +'</div></div>';

    // Summary cards
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
    h+='<div class="scard"><div class="snum" style="font-size:15px">'+p.count+'</div><div class="slbl">Bu ay dərs</div></div>';
    h+='<div class="scard"><div class="snum" style="font-size:15px;color:#1D9E75">'+p.total.toFixed(0)+' ₼</div><div class="slbl">Bu ay cəmi</div></div>';
    h+='<div class="scard"><div class="snum" style="font-size:15px;color:'+(bal>=0?'#1D9E75':'#C62828')+'">'+bal.toFixed(0)+' ₼</div><div class="slbl">Alacaq balans</div></div>';
    h+='</div>';

    if(!p.count){
      h+='<div class="empty">Bu ay davamiyyət yoxdur</div>';
      h+='</div>';continue;
    }

    // By program breakdown
    var progKeys=Object.keys(p.progs);
    if(progKeys.length>1){
      h+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px">PROQRAMLAR ÜZRƏ</div>';
      h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
      for(var gi=0;gi<progKeys.length;gi++){
        var pg=p.progs[progKeys[gi]];
        h+='<div style="background:#f5f5f5;border-radius:7px;padding:6px 10px;font-size:12px">'
          +'<b>'+pg.name+'</b>: '+pg.count+' dərs × '+pg.price.toFixed(0)+' ₼ = <b>'+pg.total.toFixed(0)+' ₼</b></div>';
      }
      h+='</div>';
    }

    // Day-by-day table
    h+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px">GÜN ÜZRƏ</div>';
    h+='<div style="background:#f8faf8;border-radius:9px;overflow:hidden">';
    h+='<div style="display:grid;grid-template-columns:90px 50px 70px 1fr;padding:7px 12px;font-size:11px;font-weight:600;color:#888">'
      +'<div>TARİX</div><div style="text-align:center">DƏRS</div><div style="text-align:right">MƏBLƏĞ</div><div style="padding-left:8px">MÜŞTƏRİLƏR</div></div>';
    var dayKeys=Object.keys(p.days).sort();
    var runTotal=0;
    for(var di=0;di<dayKeys.length;di++){
      var dk=dayKeys[di];
      var day=p.days[dk];
      runTotal+=day.total;
      var bg=di%2===0?'#fff':'#f8faf8';
      // Unique customers only
      var uniq={};for(var ni=0;ni<day.names.length;ni++)uniq[day.names[ni]]=true;
      var nameList=Object.keys(uniq).join(', ');
      h+='<div style="display:grid;grid-template-columns:90px 50px 70px 1fr;padding:7px 12px;background:'+bg+';border-top:1px solid #f0f0f0;font-size:12px;align-items:center">'
        +'<div style="font-weight:500">'+fmt(dk)+'</div>'
        +'<div style="text-align:center;color:#555">'+day.count+'</div>'
        +'<div style="text-align:right;font-weight:600;color:#1D9E75">'+day.total.toFixed(2)+' ₼</div>'
        +'<div style="font-size:11px;color:#888;padding-left:8px">'+nameList+'</div>'
        +'</div>';
    }
    // Total row
    h+='<div style="display:grid;grid-template-columns:90px 50px 70px 1fr;padding:8px 12px;background:#e8f5e9;font-size:13px;font-weight:700;border-top:2px solid #c8e6c9">'
      +'<div>CƏMİ</div>'
      +'<div style="text-align:center">'+p.count+'</div>'
      +'<div style="text-align:right;color:#1D9E75">'+p.total.toFixed(2)+' ₼</div>'
      +'<div></div></div>';
    h+='</div>';

    h+='</div>'; // partner card end
  }

  return h;
}


async function fetchIzleme(force){
  if(S.izlemeLoading)return;
  if(S.izlemeData&&!force)return;
  S.izlemeLoading=true;render();
  try{
    var singleProgs=['ROF','RPS','RPP','ROTG','ROTI','RTEST'];
    var today=td();
    var day7=addDays(today,-7);
    var day30=addDays(today,-30);

    // 1. Fetch all is_active=true subscriptions with full fields
    var activeSubs=await dbGet('subscriptions',
      'is_active=eq.true&order=end_date&select=id,customer_id,program_id,program_name,start_date,end_date,remaining,sessions_total,status,freeze_end,price_paid,price_due,list_price_at_sale,discount_amount,discount_note,is_partner,is_active');

    // 2. Fetch recently expired subscriptions for actionable follow-up (is_active=false, last 30 days)
    var recentExpiredInactive=await dbGet('subscriptions',
      'is_active=eq.false&end_date=lt.'+today+'&end_date=gte.'+day30+'&order=end_date.desc&select=id,customer_id,program_id,program_name,start_date,end_date,remaining,sessions_total,status,freeze_end,price_paid,price_due,list_price_at_sale,discount_amount,discount_note,is_partner,is_active');

    // 3. Status drift subs: is_active=true but end_date < today — these are abnormal
    //    (already inside activeSubs, filtered below for drift warning and expired follow-up)

    // 4. Build full list of sub IDs needing fresh attendance counts
    var allRelevantSubs=activeSubs.slice();
    for(var i=0;i<recentExpiredInactive.length;i++)allRelevantSubs.push(recentExpiredInactive[i]);
    var allSubIds=[];
    var subIdSeen={};
    for(var i=0;i<allRelevantSubs.length;i++){
      var sid=allRelevantSubs[i].id;
      if(sid&&!subIdSeen[sid]){subIdSeen[sid]=true;allSubIds.push(sid);}
    }

    // 5. Fetch fresh attendance count per subscription from DB (batched, 50 per call)
    var freshSubAttCount={};
    var batchSize=50;
    for(var b=0;b<allSubIds.length;b+=batchSize){
      var batch=allSubIds.slice(b,b+batchSize);
      if(!batch.length)break;
      var batAtts=await dbGet('attendances','subscription_id=in.('+batch.join(',')+')'+'&select=subscription_id,id');
      for(var i=0;i<batAtts.length;i++){
        var sid=batAtts[i].subscription_id;
        if(sid)freshSubAttCount[sid]=(freshSubAttCount[sid]||0)+1;
      }
    }

    // 6. Fetch recent attendances (last 30 days) for last-date display and this-week check only
    var recentAtts=await dbGet('attendances','class_date=gte.'+day30+'&order=class_date.desc&select=customer_id,class_date');
    var lastAtt={};
    var weekCusts={};
    for(var i=0;i<recentAtts.length;i++){
      var a=recentAtts[i];
      if(!lastAtt[a.customer_id]||a.class_date>lastAtt[a.customer_id])lastAtt[a.customer_id]=a.class_date;
      if(a.class_date>=day7)weekCusts[a.customer_id]=true;
    }

    var custMap={};
    for(var i=0;i<D.customers.length;i++)custMap[D.customers[i].id]=D.customers[i];

    // 7. getFreshRemaining — uses fresh DB att count, never D.attendances
    function getFreshRemaining(sub){
      if(sub.is_partner)return null;
      var used=freshSubAttCount[sub.id]||0;
      var total=parseInt(sub.sessions_total)||0;
      var rr=Math.max(0,total-used);
      sub._used=used;
      sub._freshRemaining=rr;
      return rr;
    }

    // Helper: is this sub operationally active (not pending, not future, not expired, not frozen)?
    function isOperationallyActive(s){
      if(!s.is_active)return false;
      if(s.status==='pending')return false;
      if(s.start_date&&s.start_date>today)return false;
      if(!s.end_date||s.end_date<today)return false;
      if(s.freeze_end&&s.freeze_end>=today)return false;
      return true;
    }

    // Build map: customer has any operationally active sub with fresh remaining > 0
    var hasActivePosRem={};
    var hasOperationalActive={};
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(!isOperationallyActive(s))continue;
      if(s.is_partner||singleProgs.indexOf(s.program_id)>=0){hasOperationalActive[s.customer_id]=true;continue;}
      var rr=getFreshRemaining(s);
      hasOperationalActive[s.customer_id]=true;
      if(rr>0)hasActivePosRem[s.customer_id]=true;
    }

    // 8. almostDone — fresh remaining === 1, operationally active, studio subs only
    var almostDone=[];
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(s.is_partner)continue;
      if(singleProgs.indexOf(s.program_id)>=0)continue;
      if(!isOperationallyActive(s))continue;
      var rr=getFreshRemaining(s);
      if(rr===1){
        var c=custMap[s.customer_id];
        if(c)almostDone.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});
      }
    }

    // 9. completedSessions — fresh remaining === 0, end_date >= today, no other active sub with rem > 0
    var completedSessions=[];
    var completedCusts={};
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(s.is_partner)continue;
      if(singleProgs.indexOf(s.program_id)>=0)continue;
      if(s.status==='pending')continue;
      if(!s.end_date||s.end_date<today)continue;
      if(hasActivePosRem[s.customer_id])continue;
      var rr=getFreshRemaining(s);
      if(rr===0&&!completedCusts[s.customer_id]){
        var c=custMap[s.customer_id];
        if(c){completedCusts[s.customer_id]=true;completedSessions.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});}
      }
    }

    // 10. notThisWeek — operationally active, studio sub, fresh rem > 0, no att in last 7 days
    var notThisWeek=[];
    var notThisWeekCusts={};
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(s.is_partner)continue;
      if(singleProgs.indexOf(s.program_id)>=0)continue;
      if(!isOperationallyActive(s))continue;
      var rr=getFreshRemaining(s);
      if(rr===null||rr<=0)continue;
      if(weekCusts[s.customer_id])continue;
      if(notThisWeekCusts[s.customer_id])continue;
      var c=custMap[s.customer_id];
      if(c){notThisWeekCusts[s.customer_id]=true;notThisWeek.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});}
    }

    // 11. expiredTime — actionable recently expired (last 30 days), no newer active sub
    //     Include both is_active=false (normal) AND is_active=true with end_date<today (status drift expired)
    var expiredCandidates=recentExpiredInactive.slice();
    // Also add activeSubs where end_date < today AND end_date >= day30 (status drift, actionable window only)
    // Old historical status-drift subs older than 30 days must NOT enter expiredTime
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(s.end_date&&s.end_date<today&&s.end_date>=day30&&s.status!=='pending'&&!s.is_partner&&singleProgs.indexOf(s.program_id)<0){
        expiredCandidates.push(s);
      }
    }
    // Sort by end_date desc so most recent comes first per customer
    expiredCandidates.sort(function(a,b){return b.end_date.localeCompare(a.end_date);});
    var expiredTime=[];
    var expiredCusts={};
    for(var i=0;i<expiredCandidates.length;i++){
      var s=expiredCandidates[i];
      if(s.is_partner)continue;
      if(singleProgs.indexOf(s.program_id)>=0)continue;
      if(s.status==='pending')continue;
      if(expiredCusts[s.customer_id])continue;
      // Must not have a currently operational active sub
      if(hasOperationalActive[s.customer_id])continue;
      var c=custMap[s.customer_id];
      if(c){
        expiredCusts[s.customer_id]=true;
        var rr=getFreshRemaining(s);
        expiredTime.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});
      }
    }

    // 12. Debtors — from all is_active=true subscriptions
    var debtors=[];
    var debtCusts={};
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      var debt=calcDebt(s);
      if(debt>0&&!debtCusts[s.customer_id]){
        var c=custMap[s.customer_id];
        if(c){debtCusts[s.customer_id]=true;debtors.push({c:c,s:s,last:lastAtt[c.id]||'',debt:debt});}
      }
    }

    // 13. Status drift — is_active=true, end_date < today, status != pending, non-partner, non-single
    //     Data quality risk — display only, do NOT auto-repair
    var statusDrift=[];
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      if(!s.end_date||s.end_date>=today)continue;
      if(s.status==='pending')continue;
      if(s.is_partner)continue;
      if(singleProgs.indexOf(s.program_id)>=0)continue;
      var c=custMap[s.customer_id];
      if(c){
        var rr=getFreshRemaining(s);
        statusDrift.push({c:c,s:s,realRemaining:rr!==null?rr:s.remaining,freshRemaining:rr});
      }
    }

    S.izlemeData={completedSessions:completedSessions,expiredTime:expiredTime,almostDone:almostDone,notThisWeek:notThisWeek,debtors:debtors,statusDrift:statusDrift};
  }catch(e){alert('Xəta: '+e.message);}
  S.izlemeLoading=false;render();
}

async function fetchReport(month){
  S.reportLoading=true;S.reportData=null;render();
  try{
    var allInst=D._allInstructors||D.instructors;
    var instMap={};
    for(var i=0;i<allInst.length;i++){instMap[allInst[i].id]=allInst[i];}

    // Fetch attendances WITH subscription and program data joined via separate queries
    var atts=await dbGet('attendances','class_date=gte.'+month+'-01&class_date=lte.'+month+'-31&order=class_date');
    
    // Fetch ALL subscriptions referenced in these attendances
    var subIds=[...new Set(atts.filter(function(a){return a.subscription_id;}).map(function(a){return a.subscription_id;}))];
    var subMap={};
    // Fetch in batches of 100
    for(var b=0;b<subIds.length;b+=100){
      var batch=subIds.slice(b,b+100);
      var subs=await dbGet('subscriptions','id=in.('+batch.join(',')+')'+'&select=id,price_paid,sessions_total,program_id');
      for(var i=0;i<subs.length;i++){subMap[subs[i].id]=subs[i];}
    }

    var progMap={};
    for(var i=0;i<D.programs.length;i++){progMap[D.programs[i].id]=D.programs[i];}

    // Load trainer+program commission override rules (Phase 1)
    var commRuleMap={};
    try{
      var commRules=await dbGet('trainer_program_commissions','is_active=eq.true');
      for(var ci=0;ci<commRules.length;ci++){
        var cr=commRules[ci];
        if(!commRuleMap[cr.instructor_id])commRuleMap[cr.instructor_id]={};
        if(!commRuleMap[cr.instructor_id][cr.program_id])commRuleMap[cr.instructor_id][cr.program_id]=[];
        commRuleMap[cr.instructor_id][cr.program_id].push(cr);
      }
    }catch(e){/* table not yet created — graceful fallback to general commission */}

    var instData={};
    for(var i=0;i<allInst.length;i++){
      instData[allInst[i].id]={
        name:allInst[i].full_name,
        pct:allInst[i].commission_pct||30,
        sessions:0,gross:0,commission:0,days:{},
        commSources:[]
      };
    }

    var cutoff='2026-01-01';
    var singleProgs=['ROF','RPS','RPP','ROTG','ROTI'];

    for(var i=0;i<atts.length;i++){
      var a=atts[i];
      if(!a.instructor_id||!instData[a.instructor_id])continue;
      var prog=progMap[a.program_id];
      var perSession=0;

      if(singleProgs.indexOf(a.program_id)>=0){
        perSession=prog?prog.list_price||0:0;
      } else if(a.subscription_id&&subMap[a.subscription_id]){
        var sub=subMap[a.subscription_id];
        var subSessions=sub.sessions_total||1;
        if(a.class_date<cutoff){
          perSession=(sub.price_paid||0)/subSessions;
        } else {
          perSession=prog?(prog.list_price||0)/subSessions:0;
        }
      } else {
        if(a.class_date<cutoff){
          perSession=0;
        } else if(prog){
          var pSess=singleProgs.indexOf(a.program_id)>=0?1:(prog.sessions_total||1);
          perSession=(prog.list_price||0)/pSess;
        }
      }

      var inst=instData[a.instructor_id];

      // Commission hierarchy: program override → general → default 30%
      var appliedPct=inst.pct;
      var commSource=instMap[a.instructor_id].commission_pct?'gen':'default';
      if(commRuleMap[a.instructor_id]&&commRuleMap[a.instructor_id][a.program_id]){
        var rules=commRuleMap[a.instructor_id][a.program_id];
        for(var ri=0;ri<rules.length;ri++){
          var rule=rules[ri];
          if(rule.valid_from<=a.class_date&&(rule.valid_until===null||rule.valid_until===undefined||a.class_date<=rule.valid_until)){
            appliedPct=rule.commission_pct;
            commSource='prog';
            break;
          }
        }
      }

      inst.sessions+=1;
      inst.gross+=perSession;
      inst.commission+=perSession*(appliedPct/100);
      var dk=a.class_date;
      if(!inst.days[dk])inst.days[dk]={sessions:0,gross:0,commission:0,pcts:[],sources:[]};
      inst.days[dk].sessions+=1;
      inst.days[dk].gross+=perSession;
      inst.days[dk].commission+=perSession*(appliedPct/100);
      if(inst.days[dk].pcts.indexOf(appliedPct)<0)inst.days[dk].pcts.push(appliedPct);
      if(inst.days[dk].sources.indexOf(commSource)<0)inst.days[dk].sources.push(commSource);
      if(inst.commSources.indexOf(commSource)<0)inst.commSources.push(commSource);
    }

    S.reportData={month:month,instData:instData,totalAtts:atts.length};
  }catch(e){alert('Hesabat xetasi: '+e.message);}
  S.reportLoading=false;render();
}

// ── CUSTOMER MOVEMENT REPORT ────────────────────────────────────────────────

// Studio single program IDs (hardcoded for safety — avoids sessions_total edge cases)
var MOV_STUDIO_SINGLE_IDS=['ROTG','ROTI'];
// Partner program IDs (same as PARTNER_PROG_IDS but explicitly scoped here)
var MOV_PARTNER_IDS=['ROF','RPP','RPS'];
// Non-partner studio sub exclusion list
var MOV_EXCL_PROG_IDS=['ROF','RPP','RPS','ROTG','ROTI','RTEST'];

// Returns true if sub qualifies as a non-partner studio subscription
// is_active/status NOT checked here — callers apply context-specific filters
function movIsStudioSub(sub){
  if(!sub)return false;
  if(sub.is_partner)return false;
  if(MOV_EXCL_PROG_IDS.indexOf(sub.program_id)>=0)return false;
  if(!(parseInt(sub.sessions_total)>1))return false;
  if(!sub.start_date)return false;
  return true;
}

// Returns YYYY-MM-DD for last day of a YYYY-MM string
function movMonthEnd(ym){
  var p=ym.split('-');
  var y=parseInt(p[0]),m=parseInt(p[1]);
  var last=new Date(y,m,0); // day 0 of next month = last day of current month
  return last.getFullYear()+'-'+(String(last.getMonth()+1).padStart(2,'0'))+'-'+String(last.getDate()).padStart(2,'0');
}

// Day difference between two YYYY-MM-DD strings (b - a)
function movDayDiff(a,b){
  return Math.round((new Date(b)-new Date(a))/(1000*86400));
}

// Calculate all movement metrics from D.* caches for given YYYY-MM
function calcMovement(ym){
  var monthPrefix=ym+'-';         // e.g. "2026-05-"
  var monthStart=ym+'-01';        // e.g. "2026-05-01"
  var monthEnd=movMonthEnd(ym);   // e.g. "2026-05-31"
  var today=td();
  var analysisEnd=today<monthEnd?today:monthEnd; // min(monthEnd, today)

  var subs=D.subscriptions||[];
  var atts=D.attendances||[];
  var custs=D.customers||[];

  // Build customer name map
  var custMap={};
  for(var i=0;i<custs.length;i++)custMap[custs[i].id]=custs[i].name||custs[i].id;

  // Build subscription id → object map
  var subMap={};
  for(var i=0;i<subs.length;i++)subMap[subs[i].id]=subs[i];

  // ── All non-partner studio subscriptions (no is_active filter) ──
  var studioPSubs=[];
  for(var i=0;i<subs.length;i++){if(movIsStudioSub(subs[i]))studioPSubs.push(subs[i]);}

  // Group studio subs by customer
  var studioSubsByCust={};
  for(var i=0;i<studioPSubs.length;i++){
    var s=studioPSubs[i];
    if(!studioSubsByCust[s.customer_id])studioSubsByCust[s.customer_id]=[];
    studioSubsByCust[s.customer_id].push(s);
  }
  // Sort each customer's subs by start_date ascending
  var custIds=Object.keys(studioSubsByCust);
  for(var i=0;i<custIds.length;i++){
    studioSubsByCust[custIds[i]].sort(function(a,b){return(a.start_date||'').localeCompare(b.start_date||'');});
  }

  // ── Metric 1: New subscription customers ──
  // Customer whose earliest non-partner studio sub start_date falls in selected month
  var newSubs=[];
  for(var ci=0;ci<custIds.length;ci++){
    var cid=custIds[ci];
    var cSubs=studioSubsByCust[cid];
    var earliest=cSubs[0]; // sorted asc, first = earliest
    if(earliest.start_date&&earliest.start_date.indexOf(monthPrefix)===0){
      newSubs.push({cid:cid,name:custMap[cid]||cid,subId:earliest.id,startDate:earliest.start_date,progId:earliest.program_id});
    }
  }
  newSubs.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});

  // ── Metric 5: Renewed customers ──
  // Customer has a non-partner studio sub starting in this month AND had a prior one
  var renewed=[];
  for(var ci=0;ci<custIds.length;ci++){
    var cid=custIds[ci];
    var cSubs=studioSubsByCust[cid];
    // Find all subs starting this month
    for(var si=0;si<cSubs.length;si++){
      var ns=cSubs[si];
      if(!ns.start_date||ns.start_date.indexOf(monthPrefix)!==0)continue;
      // Find the latest prior sub (start_date < this month)
      var prevSub=null;
      for(var pi=si-1;pi>=0;pi--){
        if(cSubs[pi].start_date&&cSubs[pi].start_date<ns.start_date){prevSub=cSubs[pi];break;}
      }
      if(!prevSub)continue; // no prior sub → this is "new", handled in metric 1
      // Calculate gap
      var gap=movDayDiff(prevSub.end_date,ns.start_date);
      var bucket;
      if(gap<=0)bucket='ontime';
      else if(gap<=7)bucket='week';
      else if(gap<=30)bucket='month';
      else bucket='reactivation';
      renewed.push({cid:cid,name:custMap[cid]||cid,prevEnd:prevSub.end_date,newStart:ns.start_date,gap:gap,bucket:bucket});
    }
  }
  renewed.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});

  // ── Metric 4: Yenilənmə riski ──
  // Customers who actually attended in the selected month on a non-partner studio sub,
  // whose sub expired or was completed by analysisEnd, and who have no later studio sub.
  // Key: must have a real attendance in the month — NOT just any historical subscription.
  var riskSet={};
  var renewalRisk=[];
  for(var i=0;i<atts.length;i++){
    var _a=atts[i];
    // Attendance must fall within selected month
    if(!_a.class_date||_a.class_date<monthStart||_a.class_date>monthEnd)continue;
    // Must be linked to a subscription
    if(!_a.subscription_id)continue;
    var _sub=subMap[_a.subscription_id];
    // Subscription must qualify as a non-partner studio sub
    if(!_sub||!movIsStudioSub(_sub))continue;
    var _cid=_a.customer_id;
    // Each customer counted at most once
    if(riskSet[_cid])continue;
    // Subscription must be ended or completed by analysisEnd
    var _endedByDate=_sub.end_date&&_sub.end_date<=analysisEnd;
    var _completedByCount=false;
    if(!_endedByDate){
      var _sessTotal=parseInt(_sub.sessions_total)||0;
      if(_sessTotal>0){
        var _usedCount=0;
        for(var j=0;j<atts.length;j++){
          if(atts[j].subscription_id===_sub.id&&atts[j].class_date<=analysisEnd)_usedCount++;
        }
        _completedByCount=_usedCount>=_sessTotal;
      }
    }
    if(!_endedByDate&&!_completedByCount)continue;
    // No later non-partner studio sub for same customer (start_date > this sub AND <= analysisEnd)
    var _custSS=studioSubsByCust[_cid]||[];
    var _hasLater=false;
    for(var j=0;j<_custSS.length;j++){
      var _cs=_custSS[j];
      if(_cs.id===_sub.id)continue;
      if(_cs.start_date&&_cs.start_date>_sub.start_date&&_cs.start_date<=analysisEnd){_hasLater=true;break;}
    }
    if(_hasLater)continue;
    riskSet[_cid]=true;
    renewalRisk.push({cid:_cid,name:custMap[_cid]||_cid,lastEnd:_sub.end_date,hasBron:false});
  }
  renewalRisk.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});

  // ── Metric 2: New studio single-entry customers ──
  // Customer whose earliest ROTG/ROTI attendance class_date falls in selected month
  var singleAttByCust={};
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    if(MOV_STUDIO_SINGLE_IDS.indexOf(a.program_id)<0)continue;
    if(!singleAttByCust[a.customer_id]||a.class_date<singleAttByCust[a.customer_id])
      singleAttByCust[a.customer_id]=a.class_date;
  }
  var newSingle=[];
  var singleCids=Object.keys(singleAttByCust);
  for(var i=0;i<singleCids.length;i++){
    var cid=singleCids[i];
    var earliest=singleAttByCust[cid];
    if(earliest&&earliest.indexOf(monthPrefix)===0)
      newSingle.push({cid:cid,name:custMap[cid]||cid,firstDate:earliest});
  }
  newSingle.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});

  // ── Metric 3: New partner customers ──
  // Customer whose earliest ROF/RPP/RPS attendance class_date falls in selected month
  var partnerAttByCust={};
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    if(MOV_PARTNER_IDS.indexOf(a.program_id)<0)continue;
    if(!partnerAttByCust[a.customer_id]||a.class_date<partnerAttByCust[a.customer_id])
      partnerAttByCust[a.customer_id]=a.class_date;
  }
  var newPartner=[];
  var partnerCids=Object.keys(partnerAttByCust);
  for(var i=0;i<partnerCids.length;i++){
    var cid=partnerCids[i];
    var earliest=partnerAttByCust[cid];
    if(earliest&&earliest.indexOf(monthPrefix)===0)
      newPartner.push({cid:cid,name:custMap[cid]||cid,firstDate:earliest});
  }
  newPartner.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});

  // ── Metric 6: S/P → Studio Sub conversion ──
  // Any non-partner studio sub starting in selected month WHERE customer had
  // ROTG/ROTI/ROF/RPP/RPS attendance with class_date <= sub.start_date (same-day inclusive).
  // Not restricted to first-ever sub — covers all subs starting this month.
  // Deduplicated by customer_id.
  var convertedSet={};
  var converted=[];
  for(var i=0;i<studioPSubs.length;i++){
    var _ns=studioPSubs[i];
    if(!_ns.start_date||_ns.start_date.indexOf(monthPrefix)!==0)continue;
    var _cid=_ns.customer_id;
    if(convertedSet[_cid])continue; // already captured via an earlier sub this month
    var _hadSP=false;
    for(var j=0;j<atts.length;j++){
      var _att=atts[j];
      if(_att.customer_id!==_cid)continue;
      if(_att.class_date>_ns.start_date)continue; // attendance after sub start → skip
      if(MOV_STUDIO_SINGLE_IDS.indexOf(_att.program_id)>=0||MOV_PARTNER_IDS.indexOf(_att.program_id)>=0){_hadSP=true;break;}
    }
    if(_hadSP){
      convertedSet[_cid]=true;
      converted.push({cid:_cid,name:custMap[_cid]||_cid,firstSubStart:_ns.start_date});
    }
  }
  converted.sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});

  return {
    ym:ym,
    newSubs:newSubs,
    renewed:renewed,
    lost:renewalRisk,    // key kept for UI/booking-fetch compatibility
    newSingle:newSingle,
    newPartner:newPartner,
    converted:converted
  };
}

// Async wrapper: calculates movement then does narrow booking fetch for lost candidates
async function fetchMovement(ym){
  if(S.movLoading)return;
  S.movLoading=true;render();
  try{
    var data=calcMovement(ym);
    // Narrow booking fetch for lost candidates only
    if(data.lost.length>0){
      var lostIds=data.lost.map(function(l){return l.cid;});
      // Supabase: customer_id=in.(id1,id2,...) with is_active=true permanent bookings
      var q='is_active=eq.true&type=eq.permanent&customer_id=in.('+lostIds.join(',')+')'
           +'&select=customer_id&limit=200';
      var bronRows=await dbGet('bookings',q);
      var bronSet={};
      if(bronRows&&bronRows.length){
        for(var i=0;i<bronRows.length;i++)bronSet[bronRows[i].customer_id]=true;
      }
      for(var i=0;i<data.lost.length;i++){
        data.lost[i].hasBron=!!bronSet[data.lost[i].cid];
      }
    }
    S.movData=data;
  }catch(e){
    alert('Müştəri hərəkəti xətası: '+e.message);
    S.movData=null;
  }
  S.movLoading=false;render();
}

}

function toggleAdminSection(key){
  if(!S.adminOpenSections)S.adminOpenSections={progs:false,insts:false,accts:false,excel:false,audit:false,auditlog:false};
  S.adminOpenSections[key]=!S.adminOpenSections[key];
  // Auto-load audit log rows when section is opened for the first time
  if(key==='auditlog'&&S.adminOpenSections['auditlog']&&!S.auditLogData&&!S.auditLogLoading){
    loadAuditLog();
  }
  if(key==='insts'&&S.adminOpenSections['insts']&&!S.commRulesCache&&!S.commRulesLoading){
    loadCommRulesCache();
  }
  render();
}
function toggleAuditCheck(key){
  if(!S.auditOpenChecks)S.auditOpenChecks={c1:false,c2:false,c3:false,c4:false,c5:false,c6:false};
  S.auditOpenChecks[key]=!S.auditOpenChecks[key];
  render();
}
function rAdminAccHdr(key,icon,title,badge,badgeClass){
  var open=S.adminOpenSections&&S.adminOpenSections[key];
  var bc=badgeClass||'b-gray';
  return '<div onclick="toggleAdminSection(\''+key+'\')" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:13px 16px;user-select:none;background:'+(open?'#f8fdf9':'#fff')+';'+(open?'border-bottom:1px solid #f0f0f0':'')+'">'
    +'<span style="font-size:15px">'+icon+'</span>'
    +'<span style="font-weight:700;font-size:14px;flex:1">'+title+'</span>'
    +(badge!==null&&badge!==undefined?'<span class="badge '+bc+'" style="margin-right:6px">'+badge+'</span>':'')
    +'<span style="color:#bbb;font-size:13px">'+(open?'▲':'▼')+'</span>'
    +'</div>';
}
function rAuditCheckBlock(checkKey,title,issues,renderRow){
  var open=S.auditOpenChecks&&S.auditOpenChecks[checkKey];
  var cnt=issues.length;
  var badgeClass=cnt===0?'b-green':(checkKey==='c2'?'b-red':'b-yellow');
  var badgeTxt=cnt===0?'Problem yoxdur':''+cnt+' problem';
  var h='<div style="border:1px solid #eaeaea;border-radius:10px;margin-bottom:8px;overflow:hidden">';
  h+='<div onclick="toggleAuditCheck(\''+checkKey+'\')" style="display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;background:'+(open?'#fafafa':'#fff')+';user-select:none;'+(open?'border-bottom:1px solid #f0f0f0':'')+'">'
    +'<span style="font-size:13px;font-weight:600;flex:1">'+title+'</span>'
    +'<span class="badge '+badgeClass+'" style="margin-right:4px">'+badgeTxt+'</span>'
    +'<span style="color:#bbb;font-size:12px">'+(open?'▲':'▼')+'</span>'
    +'</div>';
  if(open){
    h+='<div style="padding:10px 14px">';
    if(!cnt){
      h+='<div class="al al-g">✓ Problem tapılmadı</div>';
    }else{
      h+='<div style="display:flex;justify-content:flex-end;margin-bottom:8px">'
        +'<button class="btn btn-gray btn-sm" onclick="exportAuditCsv(\''+checkKey+'\')" style="font-size:11px">⬇ CSV yüklə</button>'
        +'</div>';
      var shown=Math.min(cnt,200);
      var hidden=cnt-shown;
      for(var ri=0;ri<shown;ri++){h+=renderRow(issues[ri]);}
      if(hidden>0){
        h+='<div style="font-size:12px;color:#888;text-align:center;padding:8px 0;border-top:1px solid #f0f0f0;margin-top:6px">İlk 200 nəticə göstərilir, qalan <b>'+hidden+'</b> nəticə gizlədildi.</div>';
      }
    }
    h+='</div>';
  }
  h+='</div>';
  return h;
}

  // ── İŞÇİLƏR / STAFF (staff-payroll-link-v1) ──
  if(canSeeAdmin()){
    if(!S.staffData&&!S.staffLoading){fetchStaffMembers();}

      if(S.staffLoading){

function openEditStaff(id){S.editStaffId=id;S.showAddStaff=false;render();}

function rModalStaff(editId){
  var sm=null;
  if(editId&&S.staffData){for(var i=0;i<S.staffData.length;i++){if(S.staffData[i].id===editId){sm=S.staffData[i];break;}}}
  var isEdit=!!sm;
  var allInst=D._allInstructors||D.instructors||[];
  var instOpts='<option value="">— Əlaqəli instruktor (opsional) —</option>';
  for(var i=0;i<allInst.length;i++){
    var ins=allInst[i];
    instOpts+='<option value="'+escHtml(ins.id)+'"'+(sm&&sm.linked_instructor_id===ins.id?' selected':'')+'>'+escHtml(ins.full_name||ins.name||ins.id)+'</option>';
  }
  return '<div class="ov" onclick="S.showAddStaff=false;S.editStaffId=null;render()"><div class="modal" onclick="event.stopPropagation()">'
    +'<div class="mtitle">'+(isEdit?'✏ İşçi Redaktəsi':'+ Yeni İşçi')+'</div>'
    +'<div class="fg"><label class="fl">Ad Soyad <span style="color:#C62828">*</span></label><input class="fi" id="sm-name" value="'+escHtml(sm?sm.full_name||'':'')+'"></div>'
    +'<div class="fg"><label class="fl">Rol / Vəzifə <span style="color:#C62828">*</span></label><input class="fi" id="sm-role" placeholder="məs. Trener, Menecer, Texniki..." value="'+escHtml(sm?sm.role||'':'')+'"></div>'
    +'<div class="fg"><label class="fl">Əlaqəli instruktor</label><select class="fs" id="sm-inst">'+instOpts+'</select></div>'
    +'<div class="fg"><label class="fl">Qeyd</label><input class="fi" id="sm-note" placeholder="İstəyə görə" value="'+escHtml(sm?sm.note||'':'')+'"></div>'
    +(isEdit?'<div class="fg"><label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="sm-active"'+(sm.is_active!==false?' checked':'')+'>  <span>Aktiv</span></label></div>':'')
    +'<div class="mact"><button class="btn btn-gray" onclick="S.showAddStaff=false;S.editStaffId=null;render()">Ləğv et</button>'
    +'<button class="btn btn-g" onclick="saveStaffMember(&quot;'+(isEdit?editId:'null')+'&quot;)">Saxla</button></div>'
    +'</div></div>';
}

async function saveStaffMember(editId){
  // editId is 'null' string when adding new (safe check)
  if(editId==='null')editId=null;
  var name=(document.getElementById('sm-name').value||'').trim();
  var role=(document.getElementById('sm-role').value||'').trim();
  var instId=document.getElementById('sm-inst').value||null;
  var note=(document.getElementById('sm-note').value||'').trim()||null;
  if(!name||!role){alert('Ad və rol məcburidir');return;}
  S.saving=true;render();
  try{
    if(editId){
      var activeCb=document.getElementById('sm-active');
      var isActive=activeCb?activeCb.checked:true;
      await dbPatch('staff_members','id=eq.'+encodeURIComponent(editId),{full_name:name,role:role,linked_instructor_id:instId,note:note,is_active:isActive});
      S.editStaffId=null;
    } else {
      var newId='SM'+Date.now();
      await dbPost('staff_members',{id:newId,full_name:name,role:role,linked_instructor_id:instId,note:note,is_active:true});
      S.showAddStaff=false;
    }
    S.staffData=null; // invalidate cache
    await fetchStaffMembers();
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function toggleStaffMember(id,newActive){
  if(!confirm((newActive?'Aktiv':'Deaktiv')+' etmək istədiyinizdən əminsinizmi?'))return;
  S.saving=true;render();
  try{
    await dbPatch('staff_members','id=eq.'+encodeURIComponent(id),{is_active:newActive});
    if(S.staffData)for(var i=0;i<S.staffData.length;i++){if(S.staffData[i].id===id){S.staffData[i].is_active=newActive;break;}}
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

function rKassaImport(){
  var imp=S.kassaImport||{};
  var h='<div style="background:#fff;border:1px solid #eaeaea;border-radius:12px;padding:16px;margin-bottom:16px">';

  // File picker (always shown)
  h+='<div style="margin-bottom:12px">'
    +'<label class="fl">JSON faylı seçin (kassa-import.json)</label>'
    +'<input type="file" id="ki-file" accept=".json,application/json" onchange="loadKassaImportFile()" style="margin-top:6px">'
    +'</div>';

  if(imp.loading){
    h+='<div class="empty"><span class="spin"></span> Yüklənir...</div>';
    h+='</div>';return h;
  }

  if(imp.error){
    h+='<div style="color:#C62828;padding:8px;background:#ffebee;border-radius:6px;font-size:13px">⚠ '+imp.error+'</div>';
  }

  if(!imp.rows){h+='</div>';return h;}

  // Stats summary
  var rows=imp.rows;
  var totalInc=0,totalExp=0,incCount=0,expCount=0;
  var byCat={},byAcct={},byYear={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.type==='income'){totalInc+=r.amount;incCount++;}
    if(r.type==='expense'){totalExp+=r.amount;expCount++;}
    var key=r.type+'|'+r.category;
    byCat[key]=(byCat[key]||0)+1;
    byAcct[r.account_id]=(byAcct[r.account_id]||0)+1;
    var y=(r.date||'').slice(0,4);
    byYear[y]=(byYear[y]||0)+1;
  }
  var net=totalInc-totalExp;
  var minDate=rows[0]?rows[0].date:'';
  var maxDate=rows[0]?rows[0].date:'';
  for(var i=0;i<rows.length;i++){if(rows[i].date<minDate)minDate=rows[i].date;if(rows[i].date>maxDate)maxDate=rows[i].date;}

  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">';
  h+='<div class="scard"><div class="snum" style="font-size:16px">'+rows.length+'</div><div class="slbl">Cəmi sətir</div></div>';
  h+='<div class="scard"><div class="snum" style="font-size:16px;color:#1D9E75">+'+Math.round(totalInc)+' ₼</div><div class="slbl">Mədaxil ('+incCount+')</div></div>';
  h+='<div class="scard"><div class="snum" style="font-size:16px;color:#C62828">-'+Math.round(totalExp)+' ₼</div><div class="slbl">Məxaric ('+expCount+')</div></div>';
  h+='<div class="scard"><div class="snum" style="font-size:16px;color:'+(net>=0?'#1D9E75':'#C62828')+'">'+(net>=0?'+':'')+net.toFixed(2)+' ₼</div><div class="slbl">Net</div></div>';
  h+='</div>';

  h+='<div style="font-size:12px;color:#666;margin-bottom:10px">📅 Tarix: <b>'+fmt(minDate)+'</b> → <b>'+fmt(maxDate)+'</b></div>';

  // By account
  h+='<div style="font-size:12px;color:#666;margin-bottom:6px"><b>Hesab bölgüsü:</b></div>';
  var acctMap={};for(var i=0;i<(D.accounts||[]).length;i++)acctMap[D.accounts[i].id]=D.accounts[i].name;
  h+='<div style="font-size:12px;margin-bottom:14px">';
  for(var aid in byAcct)h+='<span style="margin-right:14px">'+(acctMap[aid]||aid)+': <b>'+byAcct[aid]+'</b></span>';
  h+='</div>';

  // By year
  h+='<div style="font-size:12px;color:#666;margin-bottom:6px"><b>İl bölgüsü:</b></div>';
  h+='<div style="font-size:12px;margin-bottom:14px">';
  var yrs=Object.keys(byYear).sort();
  for(var i=0;i<yrs.length;i++)h+='<span style="margin-right:14px">'+yrs[i]+': <b>'+byYear[yrs[i]]+'</b></span>';
  h+='</div>';

  // By category — collapsible
  h+='<details style="margin-bottom:14px"><summary style="cursor:pointer;font-size:12px;color:#1D9E75;font-weight:600">Kateqoriya üzrə bölgü ▼</summary>';
  h+='<div style="margin-top:8px;font-size:12px">';
  var catKeys=Object.keys(byCat).sort();
  for(var i=0;i<catKeys.length;i++){
    var parts=catKeys[i].split('|');
    var t=parts[0],c=parts[1];
    var color=t==='income'?'#1D9E75':'#C62828';
    h+='<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dotted #eee"><span><span style="color:'+color+'">●</span> '+c+'</span><span><b>'+byCat[catKeys[i]]+'</b></span></div>';
  }
  h+='</div></details>';

  // Existing IMP records check
  if(imp.existingCount===undefined){
    h+='<div style="margin-bottom:10px"><button class="btn btn-gray btn-sm" onclick="checkExistingImports()">Mövcud import qeydlərini yoxla</button></div>';
  } else if(imp.existingCount>0){
    h+='<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px">'
      +'⚠ Bazada artıq <b>'+imp.existingCount+'</b> import qeydi var (IMP* prefiks). '
      +'<button class="btn btn-gray btn-sm" style="margin-left:8px;color:#C62828" onclick="deleteExistingImports()">Hamısını sil</button>'
      +'</div>';
  } else {
    h+='<div style="background:#e8f5e9;border:1px solid #4caf50;border-radius:8px;padding:8px;margin-bottom:10px;font-size:12px">✓ Bazada IMP qeydləri yoxdur — təmiz import.</div>';
  }

  // Progress
  if(imp.importing){
    var pct=imp.total?Math.round(imp.done/imp.total*100):0;
    h+='<div style="margin-bottom:10px">'
      +'<div style="font-size:13px;margin-bottom:4px">İmport edilir: <b>'+imp.done+' / '+imp.total+'</b> ('+pct+'%)</div>'
      +'<div style="background:#eee;height:8px;border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:#1D9E75;transition:width 0.3s"></div></div>'
      +'</div>';
  }

  if(imp.completed){
    h+='<div style="background:#e8f5e9;border:1px solid #4caf50;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px">✓ İmport tamamlandı: <b>'+imp.completedCount+'</b> sətir uğurla əlavə olundu.</div>';
  }

  if(imp.importErrors&&imp.importErrors.length){
    h+='<details style="margin-bottom:10px"><summary style="cursor:pointer;color:#C62828;font-size:13px;font-weight:600">⚠ '+imp.importErrors.length+' xəta ▼</summary><div style="font-size:11px;max-height:200px;overflow:auto;background:#ffebee;padding:8px;border-radius:6px;margin-top:6px">';
    for(var i=0;i<Math.min(imp.importErrors.length,30);i++)h+='<div>'+imp.importErrors[i]+'</div>';
    h+='</div></details>';
  }

  // Action buttons
  var canImport=imp.existingCount===0&&!imp.importing&&!imp.completed;
  h+='<div style="display:flex;gap:8px;margin-top:12px">';
  h+='<button class="btn btn-g" onclick="runKassaImport()" '+(canImport?'':'disabled style="opacity:0.5;cursor:not-allowed"')+'>İmport et ('+rows.length+' sətir)</button>';
  h+='<button class="btn btn-gray" onclick="S.kassaImport=null;render()">Ləğv et</button>';
  h+='</div>';

  h+='</div>';
  return h;
}

async function loadKassaImportFile(){
  var inp=document.getElementById('ki-file');
  if(!inp||!inp.files||!inp.files[0])return;
  var f=inp.files[0];
  S.kassaImport={loading:true};render();
  try{
    var text=await f.text();
    var data=JSON.parse(text);
    if(!Array.isArray(data))throw new Error('JSON array gözlənilirdi');
    if(!data.length)throw new Error('JSON boşdur');
    // Validate first row has required fields
    var first=data[0];
    if(!first.id||!first.date||!first.type||first.amount===undefined||!first.account_id){
      throw new Error('JSON formatı yanlışdır (id/date/type/amount/account_id məcburidir)');
    }
    S.kassaImport={rows:data};
  }catch(e){
    S.kassaImport={error:'Faylı oxumaq mümkün olmadı: '+e.message};
  }
  render();
}

async function runKassaImport(){
  if(!S.kassaImport||!S.kassaImport.rows)return;
  if(S.kassaImport.existingCount!==0){alert('Əvvəlcə mövcud IMP qeydlərini silin');return;}
  if(!confirm('Bu '+S.kassaImport.rows.length+' sətir bazaya əlavə olunacaq. Davam edək?'))return;

  var rows=S.kassaImport.rows;
  S.kassaImport.importing=true;
  S.kassaImport.done=0;
  S.kassaImport.total=rows.length;
  S.kassaImport.importErrors=[];
  S.kassaImport.completed=false;
  render();

  var BATCH=100;
  var successCount=0;
  for(var i=0;i<rows.length;i+=BATCH){
    var batch=rows.slice(i,i+BATCH);
    try{
      await dbPost('transactions',batch);
      successCount+=batch.length;
    }catch(e){
      // Try one-by-one to identify bad rows
      for(var j=0;j<batch.length;j++){
        try{
          await dbPost('transactions',batch[j]);
          successCount++;
        }catch(ee){
          S.kassaImport.importErrors.push(batch[j].id+': '+ee.message.slice(0,150));
        }
      }
    }
    S.kassaImport.done=Math.min(i+BATCH,rows.length);
    render();
    // Small delay to allow UI update
    await new Promise(function(res){setTimeout(res,30);});
  }

  S.kassaImport.importing=false;
  S.kassaImport.completed=true;
  S.kassaImport.completedCount=successCount;
  S.kassaImport.existingCount=successCount; // so the button stays disabled

  // Refresh kassa data if user goes there
  S.kassaData=null;

  render();
}

async function submitSingleAtt(){
  var progId=S.singleAttProgId||( document.getElementById('sa-prog')?document.getElementById('sa-prog').value:'');
  // Fallback guard: RTEST must never be processed here; trial only via CRM Lead lifecycle
  if(progId==='RTEST'){alert('RTEST artıq manual tək giriş kimi istifadə edilə bilməz.\nSınaq məşqi yalnız CRM Lead axınından qeyd edilir.');return;}
  var saDate=document.getElementById('sa-date')?document.getElementById('sa-date').value:td();
  var time=document.getElementById('sa-time').value;
  var instId=document.getElementById('sa-inst').value;
  var saAcctIdPre=S.singleAttAcctId||(document.getElementById('sa-account')?document.getElementById('sa-account').value:'');
  var saPaidPre=S.singleAttPaid!==null?S.singleAttPaid:(parseFloat(document.getElementById('sa-paid')?document.getElementById('sa-paid').value:0)||0);
  var due=S.singleAttDue!==null?S.singleAttDue:(parseFloat(document.getElementById('sa-due')?document.getElementById('sa-due').value:0)||0);
  var paid=saPaidPre;
  if(progId==='RTEST'){due=0;paid=0;}
  if(!progId||!time||!instId||!S.singleCust){alert('Proqram, saat və instruktor seçilməlidir');return;}
  // Partner ay limit xəbərdarlığı
  if(isPartnerProgId(progId)){
    var cObj2=null;for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===S.singleCust){cObj2=D.customers[i];break;}}
    if(!warnIfPartnerLimit(S.singleCust,cObj2?cObj2.name:S.singleCust))return;
  }
  if(progId!=='RTEST'&&paid<=0){alert('Məbləğ 0-dan böyük olmalıdır');return;}
  if(progId!=='RTEST'&&paid>0&&!saAcctIdPre){
    var _p=getProgramById(progId);
    if(!_p||!_p.is_partner){alert('Hesab seçin');return;}
  }
  // In-flight lock acquired BEFORE duplicate/capacity DB checks (correct guard order)
  var _singleLock=acquireAttLock(S.singleCust,saDate||td());
  if(!_singleLock)return;
  try{
    if(!await dbAssertCanCreateAttendance(S.singleCust,saDate||td()))return;
    if(!await checkSlotCapacity(saDate||td(),time))return;
    S.saving=true;render();
    try{
      var c=null,inst=null,prog=null;
      for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===S.singleCust){c=D.customers[i];break;}}
      for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
      for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId){prog=D.programs[i];break;}}
      var att={id:uid(),customer_id:S.singleCust,customer_name:c.name,
        subscription_id:null,
        program_id:progId,program_name:prog.name,
        class_date:saDate||td(),class_time:time,
        instructor_id:instId,instructor_name:inst?inst.full_name:'',
        price_due:due,price_paid:paid};
      await dbPost('attendances',att);
      logAudit('attendance',att.id,'create',
        (c?c.name:S.singleCust)+' — '+(att.program_name||'')+' — '+att.class_date+(att.class_time?' '+att.class_time:''),
        null,{customer_id:att.customer_id,customer_name:att.customer_name,subscription_id:att.subscription_id,program_id:att.program_id,program_name:att.program_name,class_date:att.class_date,class_time:att.class_time,instructor_id:att.instructor_id,instructor_name:att.instructor_name,source_flow:'submitSingleAtt'});
      D.attendances.unshift(att);
      if(S.selDateAtts!==null&&(S.selDate||td())===att.class_date){
        S.selDateAtts.unshift(att);
      }
      // Determine account: partner → alacaq account, else selected account
      var saAcctId=prog.is_partner?partnerAcctId(prog.name):saAcctIdPre;
      var saPaid=saPaidPre;
      if(saAcctId&&saPaid>0){
        var desc=(prog?prog.name:'Tək giriş')+' — '+c.name;
        var stxn={id:'TX'+Date.now(),date:saDate||td(),type:'income',category:'Tək giriş',
          description:desc,amount:saPaid,account_id:saAcctId,
          subscription_id:null,customer_id:c.id};
        Object.assign(stxn,getActorMeta());
        await dbPost('transactions',stxn);
        logAudit('transaction',stxn.id,'create',
          c.name+' — '+(prog?prog.name:'Tək giriş')+' ('+saPaid+' AZN, '+saAcctId+')',
          null,{type:stxn.type,category:stxn.category,amount:saPaid,account_id:saAcctId,
            subscription_id:null,customer_id:c.id,date:stxn.date,description:desc,source_flow:'submitSingleAtt'});
        if(S.kassaData)S.kassaData.txns.unshift(stxn);
        // 2% POS commission — stxn.account_id Bank-dırsa (ACC003), non-partner
        if(stxn.account_id===BANK_ACCT_ID&&!prog.is_partner){
          await createPosCommission(stxn.amount,stxn.date,desc);
        }
        S.kassaData=null;
      }
      S.showSingleAtt=false;
      S.singleAttProgId=null;
      S.singleAttDate=null;
      S.singleAttAcctId=null;
      S.singleAttDue=null;
      S.singleAttPaid=null;
      S.showAlert={t:'ok',cust:c,st:{t:'ok',txt:'Tək giriş qeydə alindi'}};
    }catch(e){alert('Xeta: '+e.message);}
    S.saving=false;render();
  }finally{releaseAttLock(_singleLock);}
}

async function fetchCustDetail(custId){
  try{
    var res=await Promise.all([
      dbGet('subscriptions','customer_id=eq.'+custId+'&order=start_date.desc'),
      dbGet('attendances','customer_id=eq.'+custId+'&order=class_date.desc'),
      dbGet('customers','id=eq.'+custId)
    ]);
    S.custDetail={subs:res[0]||[],atts:res[1]||[]};
    // Refresh this customer's row in D.customers for cross-session profile edits
    if(res[2]&&res[2].length>0){
      var freshCust=res[2][0];
      var found=false;
      for(var ci=0;ci<D.customers.length;ci++){
        if(D.customers[ci].id===custId){D.customers[ci]=freshCust;found=true;break;}
      }
      if(!found)D.customers.unshift(freshCust);
    }
    // D.attendances-a bu musteri ucun TAM davamiyyeti yaz
    // Belece calcSubRemaining her zaman duzgun netice verar
    var freshAtts=S.custDetail.atts;
    D.attendances=D.attendances.filter(function(a){return a.customer_id!==custId;});
    for(var i=0;i<freshAtts.length;i++)D.attendances.push(freshAtts[i]);
    // D.subscriptions-i da yenile
    var existSubIdxs={};
    for(var i=0;i<D.subscriptions.length;i++)existSubIdxs[D.subscriptions[i].id]=i;
    for(var i=0;i<S.custDetail.subs.length;i++){
      var freshSub=S.custDetail.subs[i];
      if(existSubIdxs[freshSub.id]!==undefined){
        D.subscriptions[existSubIdxs[freshSub.id]]=freshSub;
      }else{
        D.subscriptions.push(freshSub);
      }
    }
  }catch(e){S.custDetail={subs:[],atts:[]};}
  S.custDetailLoading=false;render();
}

// ── CLIENT PORTAL SNAPSHOT REFRESH (client-snapshot-admin-refresh-v1-hotfix1) ──
// Calls Project A snapshot-proxy Edge Function (server-side secret holder).
// Browser sends only customer_id + existing anon key. No admin token in browser.
async function doSnapshotRefresh(custId){
  if(!SNAPSHOT_PROXY_URL)return;
  if(!custId)return;
  S.snapshotStatus={loading:true,ok:false,err:null,custId:custId};
  render();
  try{
    var resp=await fetch(SNAPSHOT_PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({customer_id:custId})
    });
    var data=null;
    try{data=await resp.json();}catch(e){data=null;}
    if(resp.ok&&data&&data.ok){
      S.snapshotStatus={loading:false,ok:true,custId:custId,
        projection_generated_at:data.projection_generated_at||null,
        attendance_count:data.attendance_count!=null?data.attendance_count:null,
        schedule_count:data.schedule_count!=null?data.schedule_count:null};
    }else{
      var errMsg=(data&&data.error)?data.error:('HTTP '+resp.status);
      S.snapshotStatus={loading:false,ok:false,custId:custId,err:errMsg};
    }
  }catch(e){
    S.snapshotStatus={loading:false,ok:false,custId:custId,err:e&&e.message?e.message:'Şəbəkə xətası'};
  }
  render();
}

      var freezeRec=await dbGet('freezes','subscription_id=eq.'+subId+'&order=freeze_start.desc&limit=1');
      var origEnd=(freezeRec&&freezeRec.length&&freezeRec[0].original_end_date)?freezeRec[0].original_end_date:sub.end_date;
      await dbPatch('subscriptions','id=eq.'+subId,{freeze_end:null,end_date:origEnd});
      sub.freeze_end=null;sub.end_date=origEnd;
      for(var di=0;di<D.subscriptions.length;di++){if(D.subscriptions[di].id===subId){D.subscriptions[di].freeze_end=null;D.subscriptions[di].end_date=origEnd;break;}}
      if(S.custDetail&&S.custDetail.subs){for(var di=0;di<S.custDetail.subs.length;di++){if(S.custDetail.subs[di].id===subId){S.custDetail.subs[di].freeze_end=null;S.custDetail.subs[di].end_date=origEnd;break;}}}
    }catch(e){alert('Xeta: '+e.message);}
    S.saving=false;render();
  } else if(action==='2'){
    var newDate=prompt('Yeni bitmə tarixi (YYYY-MM-DD):', sub.freeze_end);
    if(!newDate)return;
    S.saving=true;render();
    try{
      await dbPatch('subscriptions','id=eq.'+subId,{freeze_end:newDate,end_date:newDate});
      await dbPatch('freezes','subscription_id=eq.'+subId,{freeze_end:newDate});
      sub.freeze_end=newDate;sub.end_date=newDate;
      for(var di=0;di<D.subscriptions.length;di++){if(D.subscriptions[di].id===subId){D.subscriptions[di].freeze_end=newDate;D.subscriptions[di].end_date=newDate;break;}}
      if(S.custDetail&&S.custDetail.subs){for(var di=0;di<S.custDetail.subs.length;di++){if(S.custDetail.subs[di].id===subId){S.custDetail.subs[di].freeze_end=newDate;S.custDetail.subs[di].end_date=newDate;break;}}}
    }catch(e){alert('Xeta: '+e.message);}
    S.saving=false;render();
  }
}

function sv(v){

  if(v==='admin'&&!canSeeAdmin())v='home';

  if(v==='clientRequests'&&!S.clientReqData&&!S.clientReqLoading)fetchClientRequests();

  fetchKassa().then(function(){
    S.kassaRefreshing=false;

function filterCards(q){
  var nq=norm(q);
  var cards=document.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++){
    var card=cards[i];
    var cid=card.querySelector('.cid');
    var cname=card.querySelector('.cname');
    var csub=card.querySelector('.csub');
    var idText=cid?cid.textContent:'';
    var nameText=cname?cname.textContent:'';
    var phoneText=csub?csub.textContent:'';
    if(!nq||norm(nameText).indexOf(nq)>=0||idText.toLowerCase().indexOf(nq)>=0||phoneText.indexOf(nq)>=0){
      card.style.display='';
    }else{
      card.style.display='none';
    }
  }
}

async function fetchKassa(){
  S.kassaLoading=true;render();
  try{
    var txns=await dbGet('transactions','order=date.desc,created_at.desc');
    var accts=await dbGet('accounts','order=sort_order');
    D.accounts=accts||[];
    S.kassaData={txns:txns||[]};
  }catch(e){alert('Xeta: '+e.message);}

}

function rKassa(){
  if(!S.kassaData&&!S.kassaLoading){fetchKassa();}
  var h='<div class="ph"><div class="pt">Kassa</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-g btn-sm" onclick="refreshKassa()" style="padding:5px 10px;font-size:11px"'+(S.kassaRefreshing?' disabled':'')+'>↻ Yenilə</button>'
    +'<button class="btn btn-g btn-sm" onclick="S.showAddTxn=true;render()">+ Əməliyyat</button>'
    +'</div></div>';

  if(S.kassaLoading)return h+'<div class="empty"><span class="spin"></span> Yüklənir...</div>';
  if(!S.kassaData)return h+'<div class="empty">Yüklənir...</div>';

  var accounts=D.accounts||[];
  var txns=S.kassaData.txns||[];

  // Balans: IMP* (tarixi arxiv) və pending qeydlərini çıxar
  var liveTxns=txns.filter(function(t){return t.id.indexOf('IMP')!==0&&t.status!=='pending';});

  // Calculate balances from live transactions only
  var balances={};
  for(var i=0;i<accounts.length;i++)balances[accounts[i].id]=0;
  for(var i=0;i<liveTxns.length;i++){
    var t=liveTxns[i];
    if(t.type==='income'&&balances[t.account_id]!==undefined)balances[t.account_id]+=parseFloat(t.amount||0);
    if(t.type==='expense'&&balances[t.account_id]!==undefined)balances[t.account_id]-=parseFloat(t.amount||0);
    if(t.type==='transfer'){
      if(balances[t.account_id]!==undefined)balances[t.account_id]-=parseFloat(t.amount||0);
      if(t.to_account_id&&balances[t.to_account_id]!==undefined)balances[t.to_account_id]+=parseFloat(t.amount||0);
    }
  }

  // Balance cards — cashier: hide ACC002 (Yığım), ACC003 (Bank/POS), ACC007 (Vergi)
  var CASHIER_HIDDEN_ACCTS=['ACC002','ACC003','ACC007'];
  var visibleAccounts=canSeeSensitiveKassa()?accounts:accounts.filter(function(a){return CASHIER_HIDDEN_ACCTS.indexOf(a.id)<0;});
  h+='<div class="sgrid" style="grid-template-columns:repeat('+Math.min(visibleAccounts.length,4)+',1fr);margin-bottom:8px">';
  for(var i=0;i<visibleAccounts.length;i++){
    var a=visibleAccounts[i];
    var bal=balances[a.id]||0;
    var icon=a.type==='cash'?'💵':a.type==='bank'?'🏦':'💳';
    h+='<div class="scard"><div class="snum" style="font-size:18px;color:'+(bal>=0?'#222':'#C62828')+'">'+(bal>=0?'':'-')+Math.abs(bal).toFixed(0)+' ₼</div>'
      +'<div class="slbl">'+icon+' '+a.name+'</div></div>';
  }
  h+='</div>';

  // Summary totals — hide faktiki/gozlenen panels for cashier (sensitive reconciliation data)
  if(canSeeSensitiveKassa()){
    var faktiki=(balances['ACC001']||0)+(balances['ACC002']||0)+(balances['ACC003']||0)+(balances['ACC004']||0);
    var gozlenen=faktiki+(balances['ACC005']||0)+(balances['ACC006']||0)-(Math.abs(balances['ACC007']||0));
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
    h+='<div style="background:#E8F5EE;border:1.5px solid #1D9E75;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
      +'<div><div style="font-size:11px;font-weight:600;color:#1D9E75">💰 FAKTİKİ NAĞD</div>'
      +'<div style="font-size:10px;color:#888">Kassa+Yığım+Bank+B.kart</div></div>'
      +'<div style="font-size:20px;font-weight:700;color:'+(faktiki>=0?'#1D9E75':'#C62828')+'">'+(faktiki>=0?'':'-')+Math.abs(faktiki).toFixed(0)+' ₼</div>'
      +'</div>';
    h+='<div style="background:#EFF6FF;border:1.5px solid #1565C0;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
      +'<div><div style="font-size:11px;font-weight:600;color:#1565C0">📊 GÖZLƏNİLƏN</div>'
      +'<div style="font-size:10px;color:#888">Faktiki+Alacaqlar−Vergi</div></div>'
      +'<div style="font-size:20px;font-weight:700;color:'+(gozlenen>=0?'#1565C0':'#C62828')+'">'+(gozlenen>=0?'':'-')+Math.abs(gozlenen).toFixed(0)+' ₼</div>'
      +'</div>';
    h+='</div>';
  }

  // Tabs — cashier: redirect away from sensitive tabs; hide Hesablar and Gün Bağlama
  if(isCashier()&&(S.kassaTab==='accounts'||S.kassaTab==='zclose'))S.kassaTab='txns';
  h+='<div class="tab-row">'
    +'<button class="tab '+(S.kassaTab==='txns'?'active':'')+'" onclick="S.kassaTab=\'txns\';render()">Əməliyyatlar</button>';
  if(canSeeSensitiveKassa()){
    h+='<button class="tab '+(S.kassaTab==='accounts'?'active':'')+'" onclick="S.kassaTab=\'accounts\';render()">Hesablar</button>'
      +'<button class="tab '+(S.kassaTab==='zclose'?'active':'')+'" onclick="S.kassaTab=\'zclose\';if(!S.zCloseHistory&&!S.zCloseLoading)fetchZCloseHistory();render()">Gün Bağlama</button>';
  }
  h+='</div>';

  if(S.kassaTab==='accounts'&&canSeeSensitiveKassa()){
    h+=rKassaAccounts(accounts,balances);
  } else if(S.kassaTab==='zclose'&&canSeeSensitiveKassa()){
    h+=rKassaZClose(liveTxns,accounts,balances);
  } else {
    h+=rKassaTxns(txns,accounts);
  }

  if(S.showAddTxn)h+=rModalAddTxn();
  if(S.editTxnId)h+=rModalEditTxn();
  if(S.showZClose)h+=rModalZClose(liveTxns,accounts,balances);
  return h;
}

function rKassaTxns(txns, accounts){
  // Cashier visibility: only own txns + all subscription payment txns (display layer only, S.kassaData not mutated)
  txns=getVisibleKassaTxnsForCurrentUser(txns);

  var acctMap={};
  for(var i=0;i<accounts.length;i++)acctMap[accounts[i].id]=accounts[i].name;

  var f=S.kassaFilter||{preset:'all',dateFrom:'',dateTo:'',account:'',category:'',txnType:'',search:'',custSearch:'',subOnly:false};
  var today=td();
  // Date range for presets
  var fFrom=f.dateFrom,fTo=f.dateTo;
  if(f.preset==='today'){fFrom=today;fTo=today;}
  else if(f.preset==='thisMonth'){var cm=today.slice(0,7);fFrom=cm+'-01';fTo=today;}
  else if(f.preset==='lastMonth'){
    var d=new Date(today);d.setDate(1);d.setMonth(d.getMonth()-1);
    var y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0');
    var ld=new Date(y,d.getMonth()+1,0).getDate();
    fFrom=y+'-'+mo+'-01';fTo=y+'-'+mo+'-'+String(ld).padStart(2,'0');
  }

  // Resolve customer filter: match D.customers by name/id using custSearch
  var matchedCustIds=null;
  if(f.custSearch&&f.custSearch.trim()){
    var cq=norm(f.custSearch.trim());
    matchedCustIds={};
    var custs=D.customers||[];
    for(var i=0;i<custs.length;i++){
      var c=custs[i];
      if(norm(c.name||'').indexOf(cq)>=0||( c.id||'').toLowerCase().indexOf(cq.toLowerCase())>=0){
        matchedCustIds[c.id]=1;
      }
    }
  }

  // Category list
  var cats={};
  for(var i=0;i<txns.length;i++){if(txns[i].category)cats[txns[i].category]=1;}
  var catList=Object.keys(cats).sort();

  var anyFilter=(f.preset!=='all'||f.account||f.category||f.txnType||f.search||f.custSearch||f.subOnly);

  // Filter panel
  var h='<div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:12px 14px;margin-bottom:14px">';
  h+='<div style="font-size:11px;font-weight:700;color:#888;margin-bottom:8px;letter-spacing:.5px">🔍 FİLTR</div>';
  var presets=[['all','Hamısı'],['today','Bugün'],['thisMonth','Bu ay'],['lastMonth','Keçən ay'],['custom','Xüsusi']];
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
  for(var i=0;i<presets.length;i++){
    var pv=presets[i][0],pl=presets[i][1],isAct=(f.preset===pv);
    h+='<button class="btn btn-sm '+(isAct?'btn-g':'btn-gray')+'" style="font-size:11px" onclick="S.kassaFilter.preset=\''+pv+'\';render()">'+pl+'</button>';
  }
  h+='</div>';
  if(f.preset==='custom'){
    h+='<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">'
      +'<input class="fi" type="date" style="flex:1" value="'+f.dateFrom+'" onchange="S.kassaFilter.dateFrom=this.value;render()">'
      +'<span style="color:#aaa;font-size:12px">—</span>'
      +'<input class="fi" type="date" style="flex:1" value="'+f.dateTo+'" onchange="S.kassaFilter.dateTo=this.value;render()">'
      +'</div>';
  }
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
  h+='<select class="fs" style="flex:1;min-width:120px" onchange="S.kassaFilter.account=this.value;render()"><option value="">Bütün hesablar</option>';
  for(var i=0;i<accounts.length;i++){var a=accounts[i];h+='<option value="'+a.id+'"'+(f.account===a.id?' selected':'')+'>'+a.name+'</option>';}
  h+='</select>';
  h+='<select class="fs" style="flex:1;min-width:110px" onchange="S.kassaFilter.txnType=this.value;render()"><option value="">Bütün növlər</option>'
    +'<option value="income"'+(f.txnType==='income'?' selected':'')+'>Mədaxil ↑</option>'
    +'<option value="expense"'+(f.txnType==='expense'?' selected':'')+'>Məxaric ↓</option>'
    +'<option value="transfer"'+(f.txnType==='transfer'?' selected':'')+'>Transfer ⇄</option>'
    +'</select>';
  h+='<select class="fs" style="flex:1;min-width:130px" onchange="S.kassaFilter.category=this.value;render()"><option value="">Bütün kateqoriyalar</option>';
  for(var i=0;i<catList.length;i++)h+='<option value="'+catList[i]+'"'+(f.category===catList[i]?' selected':'')+'>'+catList[i]+'</option>';
  h+='</select>';
  h+='</div>';
  // Text search + customer search row
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
  h+='<input id="kassa-search-input" class="fi" type="search" placeholder="🔎 Açıqlama, kateqoriya axtar..." style="flex:2;min-width:160px" value="'+((f.search||'').replace(/"/g,'&quot;'))+'" oninput="updateKassaFilterInput(\'search\',this.value,\'kassa-search-input\')">';
  h+='<input id="kassa-cust-search-input" class="fi" type="search" placeholder="👤 Müştəri adı / ID..." style="flex:2;min-width:140px" value="'+((f.custSearch||'').replace(/"/g,'&quot;'))+'" oninput="updateKassaFilterInput(\'custSearch\',this.value,\'kassa-cust-search-input\')">';
  h+='</div>';
  // Subscription-only toggle
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
  h+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#555">'
    +'<input type="checkbox"'+(f.subOnly?' checked':'')+' onchange="S.kassaFilter.subOnly=this.checked;render()"> Yalnız abunə ödənişləri</label>';
  if(anyFilter)h+='<button class="btn btn-gray btn-sm" style="font-size:11px;color:#C62828;margin-left:auto" onclick="S.kassaFilter={preset:\'all\',dateFrom:\'\',dateTo:\'\',account:\'\',category:\'\',txnType:\'\',search:\'\',custSearch:\'\',subOnly:false};render()">✕ Sıfırla</button>';
  h+='</div>';
  h+='</div>';

  // Apply filters
  var nq=norm(f.search||'');
  var pendingTxns=txns.filter(function(t){return t.status==='pending';});
  var filtered=txns.filter(function(t){
    if(t.status==='pending')return false;
    if(t.id.indexOf('IMP')===0)return false;
    if(fFrom&&t.date<fFrom)return false;
    if(fTo&&t.date>fTo)return false;
    if(f.account&&t.account_id!==f.account)return false;
    if(f.txnType&&t.type!==f.txnType)return false;
    if(f.category&&t.category!==f.category)return false;
    // Text search: description + category + account name
    if(nq){
      var descMatch=norm(t.description||'').indexOf(nq)>=0;
      var catMatch=norm(t.category||'').indexOf(nq)>=0;
      var acctMatch=norm(acctMap[t.account_id]||'').indexOf(nq)>=0;
      // Customer name lookup
      var custNameMatch=false;
      if(t.customer_id&&D.customers){
        for(var ci=0;ci<D.customers.length;ci++){
          if(D.customers[ci].id===t.customer_id&&norm(D.customers[ci].name||'').indexOf(nq)>=0){custNameMatch=true;break;}
        }
      }
      if(!descMatch&&!catMatch&&!acctMatch&&!custNameMatch)return false;
    }
    // Customer filter
    if(matchedCustIds!==null){
      if(!t.customer_id||!matchedCustIds[t.customer_id])return false;
    }
    // Subscription-only filter
    if(f.subOnly){
      var isSubTxn=(t.subscription_id&&t.subscription_id!==''&&t.subscription_id!=='null')||(t.category==='Abunə haqqı')||(t.category==='Abunə borcu');
      if(!isSubTxn)return false;
    }
    return true;
  });
  var impTxns=!anyFilter?txns.filter(function(t){return t.id.indexOf('IMP')===0;}):[];

    }
  }

function getTodayTxnStats(liveTxns,date){
  var dayTxns=liveTxns.filter(function(t){return t.date===date;});
  var stats={};
  var accounts=D.accounts||[];
  for(var i=0;i<accounts.length;i++){
    stats[accounts[i].id]={inc:0,exp:0,net:0,items:[]};
  }
  for(var i=0;i<dayTxns.length;i++){
    var t=dayTxns[i];
    var aid=t.account_id;
    if(!stats[aid])stats[aid]={inc:0,exp:0,net:0,items:[]};
    var amt=parseFloat(t.amount||0);
    if(t.type==='income'){stats[aid].inc+=amt;stats[aid].net+=amt;}
    if(t.type==='expense'){stats[aid].exp+=amt;stats[aid].net-=amt;}
    stats[aid].items.push(t);
    if(t.type==='transfer'){
      var tid=t.to_account_id;
      if(tid){
        if(!stats[tid])stats[tid]={inc:0,exp:0,net:0,items:[]};
        stats[tid].inc+=amt;stats[tid].net+=amt;
        stats[tid].items.push(t);
      }
    }
  }
  return stats;
}

async function submitZClose(expKassa,expBank,expPush30,expFit1){
  var actualKassa=parseFloat(document.getElementById('zc-kassa-actual').value);
  var actualBank=parseFloat(document.getElementById('zc-bank-actual').value)||expBank;
  var actualPush30El=document.getElementById('zc-push30-actual');
  var actualFit1El=document.getElementById('zc-fit1-actual');
  var actualPush30=actualPush30El?parseFloat(actualPush30El.value)||expPush30:expPush30;
  var actualFit1=actualFit1El?parseFloat(actualFit1El.value)||expFit1:expFit1;
  var noteRaw=document.getElementById('zc-note').value||'';
  if(isNaN(actualKassa)){alert('Kassa məbləğini daxil edin');return;}
  var diffK=actualKassa-expKassa;
  var diffB=actualBank-expBank;
  var selDate=S.zCloseDate||td();
  // Partner data in note as structured JSON
  var partnerData={push30_exp:+(expPush30||0).toFixed(2),push30_act:+(actualPush30||0).toFixed(2),push30_diff:+((actualPush30||0)-(expPush30||0)).toFixed(2),fit1_exp:+(expFit1||0).toFixed(2),fit1_act:+(actualFit1||0).toFixed(2),fit1_diff:+((actualFit1||0)-(expFit1||0)).toFixed(2)};
  var finalNote=(noteRaw?noteRaw+' ':'')+'[p:'+JSON.stringify(partnerData)+']';
  S.saving=true;render();
  try{
    var rec={
      id:'ZC'+Date.now(),date:selDate,
      expected_kassa:expKassa,expected_bank:expBank,
      actual_kassa:actualKassa,actual_bank:actualBank,
      diff_kassa:diffK,diff_bank:diffB,
      note:finalNote
    };
    await dbPost('daily_closes',rec);
    if(!S.zCloseHistory||S.zCloseHistory==='no_table')S.zCloseHistory=[];
    S.zCloseHistory.unshift(rec);
    S.zCloseHistory.sort(function(a,b){return b.date>a.date?1:-1;});
    S.showZClose=false;
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

// Real direct payment flows: ACC001 Kassa, ACC003 Bank/POS, ACC004 Biznes kart
function isRealPaymentAccount(a){return a.is_active!==false&&['ACC001','ACC003','ACC004'].indexOf(a.id)>=0;}
// Manual kassa income/expense: adds ACC007 to real payment accounts
function isManualTxnAccount(a){return a.is_active!==false&&['ACC001','ACC003','ACC004','ACC007'].indexOf(a.id)>=0;}
// Transfer from/to: all operational accounts including partner receivables and ACC002
function isTransferAccount(a){return a.is_active!==false&&['ACC001','ACC002','ACC003','ACC004','ACC005','ACC006','ACC007'].indexOf(a.id)>=0;}
// Partner receivable accounts — not for manual direct payment selection

// Returns alacaq account id based on program name
function partnerAcctId(progName){
  var n=(progName||'').toLowerCase();
  if(n.indexOf('push30')>=0||n.indexOf('push 30')>=0)return'ACC005';
  if(n.indexOf('1fit')>=0)return'ACC006';
  return'ACC005'; // fallback
}

function isPartnerEntryProgram(programId){
  return['ROF','RPP','RPS'].indexOf(programId)>=0;
}

function getPartnerReceivableAccountId(programId){
  var accts=D.accounts||[];
  if(programId==='ROF'){
    for(var i=0;i<accts.length;i++){
      var n=(accts[i].name||'').toLowerCase();
      if(n.indexOf('1fit')>=0)return accts[i].id;
    }
    return null;
  }
  if(programId==='RPP'||programId==='RPS'){
    for(var i=0;i<accts.length;i++){
      var n=(accts[i].name||'').toLowerCase();
      if(n.indexOf('push30')>=0||n.indexOf('push 30')>=0)return accts[i].id;
    }
    return null;
  }
  return null;
}

function openCatPicker(id){
  var list=document.getElementById(id+'-list');
  if(list)list.style.display='block';
  filterCatPicker(id); // show all initially
}
function closeCatPicker(id){
  setTimeout(function(){
    var list=document.getElementById(id+'-list');
    if(list)list.style.display='none';
    // If input doesn't match any option, clear hidden value
    var inp=document.getElementById(id+'-input');
    var hid=document.getElementById(id);
    if(inp&&hid&&inp.value!==hid.value){
      // check if typed value is a valid cat
      var allCats=INCOME_CATS.concat(EXPENSE_CATS);
      var match=false;
      for(var i=0;i<allCats.length;i++){if(allCats[i]===inp.value){match=true;break;}}
      if(!match){inp.value=hid.value;} // revert to last valid
    }
  },180);
}
function filterCatPicker(id){
  var inp=document.getElementById(id+'-input');
  var list=document.getElementById(id+'-list');
  if(!inp||!list)return;
  var q=inp.value.toLowerCase().trim();
  var items=list.querySelectorAll('.cpick-opt');
  var visible=0;
  for(var i=0;i<items.length;i++){
    var text=items[i].textContent.toLowerCase();
    var show=q.length<2||text.indexOf(q)>=0;
    items[i].style.display=show?'block':'none';
    if(show)visible++;
  }
  list.style.display=visible?'block':'none';
}
function selectCat(id,val){
  var inp=document.getElementById(id+'-input');
  var hid=document.getElementById(id);
  var list=document.getElementById(id+'-list');
  if(inp)inp.value=val;
  if(hid)hid.value=val;
  if(list)list.style.display='none';
  // staff-payroll-link-v1: show/hide staff picker when txn-cat changes
  if(id==='txn-cat'||id==='et-cat'){
    var staffRow=document.getElementById(id==='txn-cat'?'txn-staff-row':'et-staff-row');
    if(staffRow)staffRow.style.display=isPayrollCategory(val)?'block':'none';
  }
}
function updateCatPickerOpts(id,cats){
  var list=document.getElementById(id+'-list');
  var inp=document.getElementById(id+'-input');
  var hid=document.getElementById(id);
  if(!list)return;
  var opts='';
  for(var i=0;i<cats.length;i++)opts+='<div class="cpick-opt" onmousedown="event.preventDefault()" onclick="selectCat(\''+id+'\',\''+cats[i]+'\')">'+cats[i]+'</div>';
  list.innerHTML=opts;
  if(inp)inp.value='';
  if(hid)hid.value='';
}

// ==================== AUDIT LOG — daily-auditlog-v1 ====================
// Fail-silent audit logger. Never blocks main operation.
async function logAudit(entityType, entityId, action, summary, oldVal, newVal){
  try{
    var _u=S.currentUser||null;
    var entry={
      id:'AL'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
      entity_type:entityType,
      entity_id:String(entityId||''),
      action:action,
      summary:summary||'',
      old_value:oldVal!==undefined?oldVal:null,
      new_value:newVal!==undefined?newVal:null,
      // Actor metadata — requires audit_logs schema migration
      user_id:_u?_u.id:null,
      username:_u?visibleUsername(_u):'Unknown',
      actor_role:_u?_u.role:'unknown',
      session_id:_u?_u.session_id:null,
      actor:_u?visibleUsername(_u):'Unknown'
    };
    var r=await fetch(BASE+'/audit_logs',{
      method:'POST',
      headers:Object.assign({},H,{'Prefer':'return=minimal'}),
      body:JSON.stringify(entry)
    });
    if(!r.ok){
      var errText='';try{errText=await r.text();}catch(te){}
      console.warn('[audit] log failed ('+r.status+'):', errText);
    }
  }catch(e){
    console.warn('[audit] logAudit error:', e.message);
  }
}

function exportAuditLogCSV(){
  if(!S.auditLogData||!S.auditLogData.rows||!S.auditLogData.rows.length){
    alert('Export üçün audit nəticəsi yoxdur.');
    return;
  }
  var rows=S.auditLogData.rows;
  var cols=['created_at_baku','entity_type','entity_id','action','summary','old_value','new_value','user_id','username','actor_role','session_id','actor'];
  var lines=[cols.join(',')];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var safeStr=function(v){
      if(v===null||v===undefined)return '';
      var s=typeof v==='object'?JSON.stringify(v):String(v);
      return '"'+s.replace(/"/g,'""')+'"';
    };
    var oldVal='';
    var newVal='';
    try{oldVal=r.old_value!==null&&r.old_value!==undefined?JSON.stringify(r.old_value):'';}catch(e){oldVal=String(r.old_value||'');}
    try{newVal=r.new_value!==null&&r.new_value!==undefined?JSON.stringify(r.new_value):'';}catch(e){newVal=String(r.new_value||'');}
    lines.push([
      safeStr(formatBakuDateTime(r.created_at)),
      safeStr(r.entity_type),
      safeStr(r.entity_id),
      safeStr(r.action),
      safeStr(r.summary),
      '"'+oldVal.replace(/"/g,'""')+'"',
      '"'+newVal.replace(/"/g,'""')+'"',
      safeStr(r.user_id),
      safeStr(r.username),
      safeStr(r.actor_role),
      safeStr(r.session_id),
      safeStr(r.actor)
    ].join(','));
  }
  var csv='\uFEFF'+lines.join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='erge_audit_log_'+td()+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
