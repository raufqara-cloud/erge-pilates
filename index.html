async function dbGet(t,p){
  var r=await fetch(BASE+'/'+t+(p?'?'+p:''),{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function dbGetAll(t,p,chunk){
  chunk=chunk||1000;
  var out=[];
  var offset=0;
  while(true){
    var query=(p?p+'&':'')+'limit='+chunk+'&offset='+offset;
    var rows=await dbGet(t,query);
    if(!rows||!rows.length)break;
    out=out.concat(rows);
    if(rows.length<chunk)break;
    offset+=chunk;
    if(offset>100000){console.warn('dbGetAll safety stop',t,out.length);break;}
  }
  return out;
}
async function dbPost(t,b){
  var r=await fetch(BASE+'/'+t,{method:'POST',headers:H,body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function dbPatch(t,f,b){
  var r=await fetch(BASE+'/'+t+'?'+f,{method:'PATCH',headers:Object.assign({},H,{'Prefer':'return=minimal'}),body:JSON.stringify(b)});

}

  attCust:null,freezeSub:null,editSub:null,showSingleAtt:false,singleCust:null,search:'',custTab:'all',attDate:null,singleAttDate:null,kassaTab:'txns',kassaData:null,kassaLoading:false,showAddTxn:false,editTxnId:null,selDate:null,selDateAtts:null,selDateLoading:false,reportMonth:null,reportData:null,reportLoading:false,selReportInst:null,editCust:null,custDetail:null,custDetailLoading:false,reportTab:'salary',izlemeData:null,izlemeLoading:false,selIzleme:null,showAddProg:false,bronData:null,bronLoading:false,selBronDay:null,selBronTime:null,selBronDate:null,showAddBron:false,bronSelDate:null,bronExceptions:null,custSection:null,homeSlot:null,bronSearch:'',showEditBronEx:false,editBronEx:null,

function ini(n){return n.trim().split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
function td(){return new Date().toISOString().slice(0,10);}
function fmt(d){if(!d)return'--';var p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function curMonth(){return new Date().toISOString().slice(0,7);}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function uid(){return 'X'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function norm(s){
  if(!s)return '';
  var result='';
  var lower=s.toLowerCase();
  for(var i=0;i<lower.length;i++){
    var c=lower[i];
    if(c==='\u0131')c='i';
    else if(c==='\u0259')c='e';
    else if(c==='\u015f')c='s';
    else if(c==='\u00e7')c='c';
    else if(c==='\u00f6')c='o';
    else if(c==='\u00fc')c='u';
    else if(c==='\u011f')c='g';
    else if(c==='\u0130')c='i';
    result+=c;
  }
  return result;
}

function toNum(v,def){
  var n=parseFloat(v);
  return isNaN(n)?(def||0):n;
}
function money(n){
  n=toNum(n,0);
  return Math.round(n*100)/100;
}
function getProgramById(id){
  for(var i=0;i<(D.programs||[]).length;i++){
    if(D.programs[i].id===id)return D.programs[i];
  }
  return null;
}
function calcSubUsed(subId,attsArr){
  if(!subId||subId==='null')return 0;
  var arr=attsArr||D.attendances||[];
  var used=0;
  for(var i=0;i<arr.length;i++){
    if(arr[i].subscription_id===subId)used++;
  }
  return used;
}
function calcSubRemaining(sub,attsArr){
  if(!sub)return 0;
  if(sub.is_partner)return null;
  var total=parseInt(sub.sessions_total)||0;
  return Math.max(0,total-calcSubUsed(sub.id,attsArr));
}
function getAttsForCalc(custId){
  if(custId&&S.custDetail&&S.selCust===custId&&S.custDetail.atts)return S.custDetail.atts;
  if(D.attFull)return D.attendances||[];
  return null;
}
function calcRemainingForDisplay(sub){
  if(!sub)return 0;
  if(sub.is_partner)return null;
  var atts=getAttsForCalc(sub.customer_id);
  if(atts)return calcSubRemaining(sub,atts);
  return Math.max(0,(parseInt(sub.remaining)||0));
}
function calcDebt(sub){
  if(!sub)return 0;
  var due=(sub.price_due!==undefined&&sub.price_due!==null)?toNum(sub.price_due,0):0;
  var paid=toNum(sub.price_paid,0);
  return Math.max(0,money(due-paid));
}
function subListPriceAtSale(sub){
  if(!sub)return 0;
  if(sub.list_price_at_sale!==undefined&&sub.list_price_at_sale!==null&&sub.list_price_at_sale!=='')return money(sub.list_price_at_sale);
  // Backward compatibility: old subscriptions did not store discount columns.
  // For old rows, treat current price_due as the sale price and discount as 0.
  if(sub.price_due!==undefined&&sub.price_due!==null&&sub.price_due!=='')return money(sub.price_due);
  var prog=getProgramById(sub.program_id);
  return prog?money(prog.list_price):0;
}
function subDiscountAmount(sub){
  if(!sub)return 0;
  if(sub.discount_amount!==undefined&&sub.discount_amount!==null&&sub.discount_amount!=='')return money(sub.discount_amount);
  return 0;
}
function subDiscountNote(sub){
  return (sub&&sub.discount_note)?String(sub.discount_note):'';
}
function calcSubDueFromDiscount(listPrice,discount){
  listPrice=money(listPrice||0);
  discount=money(discount||0);
  if(discount<0)discount=0;
  if(discount>listPrice)discount=listPrice;
  return money(listPrice-discount);
}
function updateSubscriptionLocal(subId,patch){
  function apply(arr){
    if(!arr)return;
    for(var i=0;i<arr.length;i++){
      if(arr[i].id===subId){Object.assign(arr[i],patch);break;}
    }
  }
  apply(D.subscriptions);
  if(S.custDetail&&S.custDetail.subs)apply(S.custDetail.subs);
}


function activeSub(custId){
  var today=td();
  var pending=null;
  for(var i=0;i<D.subscriptions.length;i++){
    var s=D.subscriptions[i];
    if(s.customer_id!==custId||!s.is_active)continue;
    if(s.status==='pending'){
      if(!pending)pending=s;
      continue;
    }
    var rem=s.is_partner?null:calcRemainingForDisplay(s);
    if(s.end_date>=today&&(s.is_partner||(rem!==null&&rem>0)))return s;
  }
  return pending;
}

function subStatus(sub){
  if(!sub)return{t:'none',txt:'Abunəlik yoxdur'};
  if(sub.status==='pending')return{t:'pending',txt:'Ödənilib, gözləyir'};
  if(!sub.is_active)return{t:'exp',txt:'Deaktiv'};
  if(sub.end_date<td())return{t:'exp',txt:'Müddət bitib'};
  if(sub.is_partner){
    var used=0;
    var cm=curMonth();
    for(var i=0;i<D.attendances.length;i++){
      var a=D.attendances[i];
      if(a.subscription_id===sub.id&&a.class_date.indexOf(cm)===0)used++;
    }
    var left=12-used;
    if(left<=0)return{t:'exp',txt:'Bu ay limiti dolub'};
    if(left<=2)return{t:'warn',txt:'Bu ay '+left+' dərs qaldı'};
    return{t:'ok',txt:'Bu ay '+left+' dərs qaldı'};
  }
  var rem=calcRemainingForDisplay(sub);
  if(rem<=0)return{t:'exp',txt:'Dərs sayı tamamlandı'};
  if(rem<=2)return{t:'warn',txt:rem+' dərs qaldı'};
  return{t:'ok',txt:rem+' dərs qaldı'};
}

function custStatus(custId){return subStatus(activeSub(custId));}

async function doAddSub(custId,progId,listPriceAtSale,discountAmount,discountNote,priceDue,pricePaid,startDate,isPending,acctId){
  S.saving=true;render();
  try{
    var prog=null;
    for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId){prog=D.programs[i];break;}}
    if(!prog)throw new Error('Proqram tapılmadı');
    var sd=startDate||td();
    var end=addDays(sd,prog.duration_days);
    var listNum=money(listPriceAtSale!==undefined&&listPriceAtSale!==''?listPriceAtSale:prog.list_price);
    var discNum=money(discountAmount||0);
    if(discNum<0)discNum=0;
    if(discNum>listNum)discNum=listNum;
    var dueNum=calcSubDueFromDiscount(listNum,discNum);
    // UI also sends priceDue; final source of truth is list - discount.
    if(priceDue!==undefined&&priceDue!==''&&Math.abs(money(priceDue)-dueNum)>0.01){
      dueNum=calcSubDueFromDiscount(listNum,discNum);
    }
    var paidNum=money(pricePaid||0);

      start_date:sd,end_date:end,is_partner:prog.is_partner,
      is_active:true,freeze_end:null,
      status:isPending?'pending':'active'};
    await dbPost('subscriptions',sub);
    logAudit('subscription',sub.id,'create',sub.program_name+' — '+custId,null,{program_id:sub.program_id,price_due:sub.price_due,price_paid:sub.price_paid,status:sub.status});
    D.subscriptions.unshift(sub);
    // Create transaction if paid amount > 0 and account selected

        amount:paidNum,account_id:acctId,
        subscription_id:sub.id,customer_id:custId};
      await dbPost('transactions',txn);
      logAudit('transaction',txn.id,'create',txn.description+' ('+txn.amount+' AZN)',null,{type:txn.type,category:txn.category,amount:txn.amount,account_id:txn.account_id});
      // 2% POS commission if Bank selected
      if(acctId===BANK_ACCT_ID){
        await createPosCommission(paidNum,sd,(prog.name||progId)+' — '+((cust&&cust.name)||custId));
      }
      S.kassaData=null;
    }
    S.showAddSub=false;
    // Bron state-ni tam sıfırla — heç bir halda avtomatik bron yaranmasın
    S.showAddBron=false;
    S._bronNewCustId=null;

  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

// ── DAILY GUARDS v1 ──

function isActiveBookingForDate(booking,dateStr){
  if(booking.is_active===false)return false;
  if(booking.valid_from&&dateStr<booking.valid_from)return false;
  if(booking.valid_until&&dateStr>booking.valid_until)return false;
  return true;
}

function hasActivePermanentBookingOnDow(customerId,dow,excludeBookingId){
  if(!S.bronData)return false;
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    if(b.customer_id!==customerId)continue;
    if(b.type!=='permanent')continue;
    if(excludeBookingId&&b.id===excludeBookingId)continue;
    if(b.day_of_week!==dow)continue;
    if(b.is_active===false)continue;
    return true;
  }
  return false;
}

function hasAbsentForBookingOnDate(bookingId,dateStr){
  if(!S.bronExceptions)return false;
  for(var i=0;i<S.bronExceptions.length;i++){
    var e=S.bronExceptions[i];
    if(e.booking_id===bookingId&&e.exception_date===dateStr&&e.type==='absent')return true;
  }
  return false;
}

function hasCustomerActiveBookingOnDate(customerId,dateStr){
  if(!S.bronData)return false;
  var d=new Date(dateStr+'T00:00:00').getDay();
  var dow=(d===0)?7:d; // Sun=7, Mon=1..Sat=6
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    if(b.customer_id!==customerId)continue;
    if(b.type!=='permanent')continue;
    if(b.day_of_week!==dow)continue;
    if(!isActiveBookingForDate(b,dateStr))continue;
    if(hasAbsentForBookingOnDate(b.id,dateStr))continue;
    return true;
  }
  return false;
}

function hasCustomerAttendanceOnDate(customerId,dateStr){
  var lists=[D.attendances];
  if(S.selDateAtts)lists.push(S.selDateAtts);
  if(S.custDetail&&S.custDetail.atts)lists.push(S.custDetail.atts);
  var seen={};
  for(var li=0;li<lists.length;li++){
    var arr=lists[li];if(!arr)continue;
    for(var i=0;i<arr.length;i++){
      var a=arr[i];
      if(a.customer_id===customerId&&a.class_date===dateStr){
        if(!seen[a.id]){seen[a.id]=true;return true;}
      }
    }
  }
  return false;
}

function assertCanCreateAttendance(customerId,dateStr){
  if(hasCustomerAttendanceOnDate(customerId,dateStr)){
    alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
    return false;
  }
  return true;
}

// Live DB check — başqa cihazdan edilən əməliyyatları da tutur
async function dbAssertCanCreateAttendance(customerId,dateStr){
  if(hasCustomerAttendanceOnDate(customerId,dateStr)){
    alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
    return false;
  }
  try{
    var res=await dbGet('attendances','customer_id=eq.'+customerId+'&class_date=eq.'+dateStr+'&select=id&limit=1');
    if(res&&res.length>0){
      alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
      return false;
    }
  }catch(e){}
  return true;
}

function hasCustomerTempAddOnDate(customerId,dateStr){
  if(!S.bronExceptions)return false;
  for(var i=0;i<S.bronExceptions.length;i++){
    var e=S.bronExceptions[i];
    if(e.type==='temp_add'
      &&e.temp_customer_id===customerId
      &&e.exception_date===dateStr
      &&e.is_active!==false){
      return true;
    }
  }
  return false;
}

async function doAtt(custId,subId,classTime,instId,attDate){
  if(!await dbAssertCanCreateAttendance(custId,attDate||td()))return;
  S.saving=true;render();
  try{
    var cust=null,sub=null,inst=null;
    for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
    for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
    for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
    // Activate pending subscription on first attendance
    if(sub&&sub.status==='pending'){
      var prog=null;
      for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===sub.program_id){prog=D.programs[i];break;}}
      var newStart=attDate||td();
      var newEnd=addDays(newStart,prog?prog.duration_days:30);
      await dbPatch('subscriptions','id=eq.'+subId,{status:'active',start_date:newStart,end_date:newEnd});
      sub.status='active';sub.start_date=newStart;sub.end_date=newEnd;
    }
    var att={id:uid(),customer_id:custId,customer_name:cust.name,subscription_id:subId,
      program_id:sub.program_id,program_name:sub.program_name,
      class_date:attDate||td(),class_time:classTime,
      instructor_id:instId,instructor_name:inst?inst.full_name:''};
    await dbPost('attendances',att);
    D.attendances.unshift(att);
     if(att.class_date===td()&&S.selDateAtts!==null){S.selDateAtts.unshift(att);}
    // Remaining: real attendance count əsasında yenidən hesabla
    if(!sub.is_partner){
      await recalcSubscriptionRemaining(subId);
    }
    S.showAtt=false;
    S.showAlert={t:'ok',cust:cust,st:subStatus(activeSub(custId))};
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

async function doFreeze(subId,days,note){
  S.saving=true;render();
  try{
    var sub=null;
    for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
    var newEnd=addDays(sub.end_date,parseInt(days));
    var fEnd=newEnd; // freeze_end = new end_date
    await dbPost('freezes',{id:uid(),subscription_id:subId,freeze_start:td(),freeze_end:fEnd,days_count:parseInt(days),original_end_date:sub.end_date,note:note||''});
    await dbPatch('subscriptions','id=eq.'+subId,{end_date:newEnd,freeze_end:fEnd});
    sub.end_date=newEnd;sub.freeze_end=fEnd;
    S.showFreeze=false;
    if(S.custDetail){S.custDetail=null;S.custDetailLoading=true;fetchCustDetail(S.selCust);}
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

// Get day_of_week (1=Mon...6=Sat) from a date string
function getDayOfWeek(dateStr){
  var d=new Date(dateStr);
  var day=d.getDay(); // 0=Sun,1=Mon...6=Sat
  return day===0?null:day; // null for Sunday
}

// Get week's Monday from a date string
function getWeekMonday(dateStr){
  var d=new Date(dateStr);
  var day=d.getDay();
  var diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

// Add days to date string
function dateAddDays(dateStr, n){
  var d=new Date(dateStr);
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

// Returns the nearest date (>= baseDate) that falls on the given dow (1=Mon..6=Sat)
function getNextDateForDow(baseDate, dow){
  var d=new Date(baseDate);
  // getDay(): 0=Sun,1=Mon..6=Sat → convert to 1=Mon..6=Sat
  var cur=d.getDay()===0?7:d.getDay(); // treat Sun as 7
  var diff=dow-cur;
  if(diff<0)diff+=7;   // already passed this week → next week
  // diff===0 means baseDate itself is that dow → return as-is
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

// Format date as DD.MM
function fmtShort(dateStr){
  if(!dateStr)return '';
  var p=dateStr.split('-');
  return p[2]+'.'+p[1];
}

async function fetchExceptions(dateStr){
  var mon=getWeekMonday(dateStr);
  var end=dateAddDays(mon,27);
  try{
    var excs=await dbGet('booking_exceptions',
      'exception_date=gte.'+mon+'&exception_date=lte.'+end);
    // Merge: keep any locally-added exceptions not yet in DB response
    var dbIds={};
    (excs||[]).forEach(function(e){dbIds[e.id]=true;});
    var localOnly=(S.bronExceptions||[]).filter(function(e){return !dbIds[e.id];});
    S.bronExceptions=(excs||[]).concat(localOnly);
  }catch(e){if(!S.bronExceptions)S.bronExceptions=[];}
  render();
}

function getSlotBookings(day, time, dateStr){
  if(!S.bronData)return[];
  return S.bronData.filter(function(b){
    if(b.day_of_week!==day||b.time_slot!==time)return false;
    if(dateStr){
      if(b.valid_from&&b.valid_from>dateStr)return false;
      if(b.valid_until&&b.valid_until<dateStr)return false;
    }
    return true;
  });
}

function getSlotExceptions(day, time, dateStr){
  if(!S.bronExceptions)return{absents:[],temps:[]};
  var absents=[], temps=[];
  var slotBrons=getSlotBookings(day,time,dateStr);
  var bids=slotBrons.map(function(b){return b.id;});
  for(var i=0;i<S.bronExceptions.length;i++){
    var ex=S.bronExceptions[i];
    if(ex.exception_date!==dateStr)continue;
    if(ex.type==='absent'&&bids.indexOf(ex.booking_id)>=0)absents.push(ex);
    if(ex.type==='temp_add'&&ex.day_of_week===day&&ex.time_slot===time)temps.push(ex);
  }
  return{absents:absents,temps:temps};
}

function getSlotCount(day, time, dateStr){
  var brons=getSlotBookings(day,time,dateStr);
  var excs=getSlotExceptions(day,time,dateStr);
  return brons.length - excs.absents.length + excs.temps.length;
}

function normQ(s){
  return s.toLowerCase()
    .replace(/ı/g,'i').replace(/İ/g,'i')
    .replace(/ə/g,'e').replace(/Ə/g,'e')
    .replace(/ü/g,'u').replace(/Ü/g,'u')
    .replace(/ö/g,'o').replace(/Ö/g,'o')
    .replace(/ğ/g,'g').replace(/Ğ/g,'g')
    .replace(/ş/g,'s').replace(/Ş/g,'s')
    .replace(/ç/g,'c').replace(/Ç/g,'c');
}

function getBronSearchHTML(sq){
  sq=normQ((sq||'').trim());

  var results=[];
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var b=S.bronData[i];
      if(normQ(b.customer_name||'').indexOf(sq)>=0){
        results.push({bronId:b.id,exId:null,name:b.customer_name,custId:b.customer_id,
          time:b.time_slot,day:DAYS_AZ[b.day_of_week-1],dow:b.day_of_week,
          date:'Daimi',type:'permanent'});

  if(S.bronExceptions){

      if(ex.type==='temp_add'&&normQ(ex.temp_customer_name||'').indexOf(sq)>=0){

      +'</div>';

function filterBronCusts(){
  var inp=document.getElementById('ab-cust-search');
  var list=document.getElementById('ab-cust-list');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());
  var sorted=D.customers.slice().sort(function(a,b){return a.name.localeCompare(b.name,'az');});
  list.innerHTML='';
  var shown=0;
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i];
    if(q&&normQ(c.name).indexOf(q)<0)continue;
    if(shown>=50)break;
    (function(cust){
      var el=document.createElement('div');
      el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
      el.innerHTML=cust.name+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+cust.id+'</span>';
      el.ontouchstart=function(){this.style.background='#f0faf5';};
      el.onmouseenter=function(){this.style.background='#f0faf5';};
      el.onmouseleave=function(){this.style.background='';};
      el.onclick=function(){selectBronCust(cust.id,cust.name);};
      list.appendChild(el);
    })(c);
    shown++;
  }
  if(shown===0){
    list.innerHTML='<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">Tapılmadı</div>';
  }
}

var PARTNER_PROG_IDS=['ROF','RPS','RPP'];
var PARTNER_MONTH_LIMIT=12;

function isPartnerProgId(progId){
  if(PARTNER_PROG_IDS.indexOf(progId)>=0)return true;
  for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===progId&&D.programs[i].is_partner)return true;}
  return false;
}

function getPartnerMonthStats(custId){
  var cm=curMonth();
  var used=0;
  var attsArr=(S.custDetail&&S.selCust===custId&&S.custDetail.atts)?S.custDetail.atts:D.attendances;
  for(var i=0;i<attsArr.length;i++){
    var a=attsArr[i];
    if(a.customer_id!==custId)continue;
    if(!a.class_date||a.class_date.slice(0,7)!==cm)continue;
    if(isPartnerProgId(a.program_id))used++;
  }
  return{used:used,limit:PARTNER_MONTH_LIMIT,remaining:Math.max(0,PARTNER_MONTH_LIMIT-used),over:used>=PARTNER_MONTH_LIMIT};
}

// Returns false if user cancels, true if should proceed
function warnIfPartnerLimit(custId,custName){
  var stats=getPartnerMonthStats(custId);
  if(!stats.over)return true;
  var msg=(custName||custId)+' bu ay artıq '+stats.used+'/'+stats.limit+' partner məşqə gəlib.\n';
  if(stats.used===stats.limit)msg+='Limit dolub. 13-cü məşqi yenə də əlavə etmək istəyirsinizmi?';
  else msg+='Limit '+(stats.used-stats.limit)+' dəfə aşılıb. Davam etmək istəyirsinizmi?';
  return confirm(msg);
}
var SAT_TIMES=['10:00','11:00','12:00','13:00','14:00','15:00'];

function escQ(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function getTimesForDay(dow){
  if(dow===null)return null;
  if(dow===6)return SAT_TIMES;
  return TIMES;
}

// Returns {type, txt, sub, isPartner} for bron context
function getCustBronStatus(custId){
  if(!custId)return{type:'none',txt:'Abunə yoxdur',sub:null,isPartner:false};
  var today=td();
  var pendingSub=null;
  var latestExpired=null;
  for(var i=0;i<D.subscriptions.length;i++){
    var s=D.subscriptions[i];
    if(s.customer_id!==custId||!s.is_active)continue;
    // 1. Active subscription — highest priority
    if(s.status!=='pending'&&s.end_date>=today){
      if(s.is_partner){
        var used=0;var cm=curMonth();
        for(var j=0;j<D.attendances.length;j++){
          var a=D.attendances[j];
          if(a.subscription_id===s.id&&a.class_date.indexOf(cm)===0)used++;
        }
        var left=12-used;
        if(left<=0)return{type:'warn',txt:'Bu ay limiti dolub',sub:s,isPartner:true};
        if(left<=2)return{type:'warn',txt:left+' dərs qaldı',sub:s,isPartner:true};
        return{type:'ok',txt:'Aktiv',sub:s,isPartner:true};
      }
      var rem=calcRemainingForDisplay(s);
      if(rem<=0)return{type:'warn',txt:'Dərs qalmayıb',sub:s,isPartner:false};
      if(rem<=2)return{type:'warn',txt:rem+' dərs qaldı',sub:s,isPartner:false};
      return{type:'ok',txt:'Aktiv',sub:s,isPartner:false};
    }
    // 2. Pending — keep as fallback
    if(s.status==='pending'&&!pendingSub)pendingSub=s;
    // 3. Expired — track latest
    if(s.status!=='pending'&&s.end_date<today){
      if(!latestExpired||s.end_date>latestExpired.end_date)latestExpired=s;
    }
  }
  if(pendingSub)return{type:'pending',txt:'Pending',sub:pendingSub,isPartner:!!pendingSub.is_partner};
  if(latestExpired)return{type:'grace',txt:'Abunə bitib',sub:latestExpired,isPartner:!!latestExpired.is_partner};
  return{type:'none',txt:'Abunə yoxdur',sub:null,isPartner:false};
}

function getBronSubBadge(bst){
  if(!bst)return'';
  if(bst.type==='ok')return'<span class="badge b-green" style="font-size:10px">Aktiv</span>';
  if(bst.type==='warn')return'<span class="badge b-yellow" style="font-size:10px">'+bst.txt+'</span>';
  if(bst.type==='grace')return'<span class="badge b-orange" style="font-size:10px">Abunə bitib</span>';
  if(bst.type==='pending')return'<span class="badge b-blue" style="font-size:10px">Pending</span>';
  return'<span class="badge b-gray" style="font-size:10px">Abunə yoxdur</span>';
}

function inferCustomerBronSource(custId){
  var sub=activeSub(custId);
  if(!sub)return'single';
  if(sub.is_partner)return'partner';
  if(['ROF','RPP','RPS'].indexOf(sub.program_id)>=0)return'partner';
  if(['ROTG','ROTI','RTEST'].indexOf(sub.program_id)>=0||sub.sessions_total<=1)return'single';
  return'studio';
}

function getBookingSource(b,custId){
  if(b&&b.note){
    if(b.note.indexOf('[source:studio]')>=0)return'studio';
    if(b.note.indexOf('[source:partner]')>=0)return'partner';
    if(b.note.indexOf('[source:single]')>=0)return'single';
  }
  return inferCustomerBronSource(custId);
}

function sourceBadge(src){
  if(src==='partner')return'<span class="badge b-purple" style="font-size:10px">Partner</span>';
  if(src==='single')return'<span class="badge b-blue" style="font-size:10px">Tək giriş</span>';
  return'<span class="badge b-green" style="font-size:10px">Studio</span>';
}

function rSlotCard(time,dateStr,dow){

    +'<div class="slot-card-hdr" style="background:'+headerBg+'" onclick="S.bronSelTime=S.bronSelTime===\''+time+'\'?null:\''+time+'\';render()">'

    +'<span style="font-size:13px;font-weight:600;color:#1a1a1a">'+count+'/'+MAX_PER_SLOT+'</span>'

    +'</div>'
    +'<div class="slot-fill-bar"><div class="slot-fill-fill" style="background:'+barColor+';width:'+pct+'%"></div></div>'
    +'</div>'
    // Free + absents summary
    +'<div style="text-align:right;min-width:56px">';

  if(free===MAX_PER_SLOT)h+='<div style="font-size:11px;color:#bbb">Boş slot</div>';

function rSlotDetail(time,dateStr,dow,brons,excs,count){
  var h='';
  var canAdd=count<MAX_PER_SLOT;

  // --- Sabit bronlar ---
  if(brons.length>0){
    h+='<div class="slabel" style="margin-top:0">SABİT BRONLAR ('+brons.length+')</div>';
    for(var i=0;i<brons.length;i++){
      var b=brons[i];
      var isAbsent=false;
      var absentExId=null;
      for(var ai=0;ai<excs.absents.length;ai++){
        if(excs.absents[ai].booking_id===b.id){isAbsent=true;absentExId=excs.absents[ai].id;break;}
      }
      var bst=getCustBronStatus(b.customer_id);
      var src=getBookingSource(b,b.customer_id);
      var isGrace=bst.type==='grace'||bst.type==='none';
      // For partner/single sources, don't show orange grace color
      var isGraceDisplay=isGrace&&src==='studio';
      var leftC=isAbsent?'#E53935':src==='partner'?'#7B1FA2':src==='single'?'#1565C0':isGraceDisplay?'#FB8C00':'#1D9E75';
      var rowBg=isAbsent?'#FFF5F5':isGraceDisplay?'#FFFDE7':'#fff';

      h+='<div class="bron-row" style="background:'+rowBg+';border-left:3px solid '+leftC+'">'
        +'<div class="bron-row-left">'
        +'<div class="bron-row-name" style="color:'+(isAbsent?'#bbb':'#1a1a1a')+';text-decoration:'+(isAbsent?'line-through':'none')+'">'+escHtml(b.customer_name||'?')+'</div>'
        +'<div style="font-size:10px;color:#aaa">'+b.customer_id+'</div>'
        +'<div class="bron-row-badges">'
        +getBronSubBadge(bst)
        +sourceBadge(src);
      if(isGraceDisplay)h+='<span class="badge b-orange" style="font-size:10px">Grace — yer saxlanılır</span>';
      if(isAbsent)h+='<span class="badge b-red" style="font-size:10px">Gəlməyəcək ✕</span>';
      h+='</div></div>'
        +'<div class="bron-row-actions">';
      if(!isAbsent){
        h+='<button class="btn btn-gray btn-sm" style="font-size:11px;background:#FFF3E0;color:#E65100" '
          +'onclick="openMarkAbsent(\''+escQ(b.id)+'\',\''+escQ(b.customer_name||'')+'\',\''+dateStr+'\')">Gəlməyəcək</button>';
      } else {
        h+='<button class="btn btn-gray btn-sm" style="font-size:11px;background:#E8F5EE;color:#1D9E75" '
          +'onclick="cancelAbsent(\''+absentExId+'\')">Geri al</button>';
      }
      h+='<button class="btn btn-gray btn-sm" style="font-size:11px;color:#C62828" onclick="deleteBron(\''+escQ(b.id)+'\')">Sil</button>'
        +'</div></div>';
    }
  }

  // --- Müvəqqəti əlavələr ---
  if(excs.temps.length>0){
    h+='<div class="slabel">MÜVƏQQƏTİ ƏLAVƏLƏR ('+excs.temps.length+')</div>';
    for(var i=0;i<excs.temps.length;i++){
      var tex=excs.temps[i];
      var tbst=getCustBronStatus(tex.temp_customer_id);

        +'<div class="bron-row-left">'
        +'<div class="bron-row-name" style="color:#1565C0">'+escHtml(tex.temp_customer_name||'?')+'</div>'
        +'<div class="bron-row-badges">'
        +'<span class="badge b-blue" style="font-size:10px">Müvəqqəti</span>'
        +getBronSubBadge(tbst)
        +'</div></div>'
        +'<button class="btn btn-gray btn-sm" style="font-size:11px;color:#C62828" onclick="deleteException(\''+escQ(tex.id)+'\')">Sil</button>'
        +'</div>';
    }
  }

  if(brons.length===0&&excs.temps.length===0){
    h+='<div class="empty-slot">Bu slot boşdur. Müvəqqəti müştəri əlavə edə bilərsiniz.</div>';
  }

  // Partner xəbərdarlığı
  if(count>=MAX_PER_SLOT){
    var hasPartnerInSlot=false;
    for(var pi=0;pi<brons.length;pi++){
      var pbst=getCustBronStatus(brons[pi].customer_id);
      if(pbst.isPartner){hasPartnerInSlot=true;break;}
    }
    if(hasPartnerInSlot){
      h+='<div class="al al-y" style="font-size:12px;margin-top:8px">⚠ Bu slotda partner bronu var. Yeni studio abunəçisi üçün yer lazımdırsa, əlaqədar partner bronunu ayrıca idarə edin.</div>';
    }
  }

  // Actions
  h+='<div class="slot-actions-bar">';
  if(canAdd){
    h+='<button class="btn btn-g btn-sm" onclick="openTempAdd(\''+time+'\',\''+dateStr+'\','+dow+')">+ Müvəqqəti əlavə</button>';
  } else {
    h+='<span style="font-size:12px;color:#aaa">Slot dolu — müvəqqəti əlavə mümkün deyil</span>';
  }
  // Mərhələ 6: Davamiyyət inteqrasiyası — yalnız bugün və keçmiş tarix

  h+='<button class="btn btn-gray btn-sm"'+(isFutureDate?' disabled title="Gələcək tarix üçün davamiyyət qeyd edilmir"':' onclick="openAttFromSlot(\''+time+'\',\''+dateStr+'\','+dow+')"')+'>📋 Davamiyyəti qeyd et</button>';
  h+='</div>';

  return h;
}

function rBronSabitList(){
  if(!S.bronData)return'<div class="empty">Yüklənir...</div>';
  var q=normQ((S.bronSabitSearch||'').trim());
  var filtered=[];
  for(var i=0;i<S.bronData.length;i++){
    var b=S.bronData[i];
    if(S.bronSabitDay&&b.day_of_week!==S.bronSabitDay)continue;
    if(q&&normQ(b.customer_name||'').indexOf(q)<0)continue;
    filtered.push(b);
  }
  if(!filtered.length)return'<div class="empty">Bron tapılmadı</div>';

  // Group by customer
  var groups={};
  var order=[];
  for(var i=0;i<filtered.length;i++){

function filterTempAddCusts(){
  var inp=document.getElementById('ta-cust-search');
  var list=document.getElementById('ta-cust-list');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());
  var sorted=D.customers.slice().sort(function(a,b){return a.name.localeCompare(b.name,'az');});
  list.innerHTML='';
  var shown=0;
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i];
    if(q&&normQ(c.name).indexOf(q)<0)continue;
    if(shown>=50)break;
    (function(cust){
      var el=document.createElement('div');
      el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
      el.innerHTML=cust.name+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+cust.id+'</span>';
      el.onmouseenter=function(){this.style.background='#f0faf5';};
      el.onmouseleave=function(){this.style.background='';};
      el.onclick=function(){selectTempAddCust(cust.id,cust.name);};
      list.appendChild(el);
    })(c);
    shown++;
  }
  if(shown===0)list.innerHTML='<div style="padding:10px;color:#aaa;font-size:13px;text-align:center">Tapılmadı</div>';
}

function selectTempAddCust(id,name){
  var inp=document.getElementById('ta-cust-search');
  var list=document.getElementById('ta-cust-list');
  var hidden=document.getElementById('ta-cust-id');
  var statusDiv=document.getElementById('ta-sub-status');
  if(inp)inp.value=name;
  if(hidden)hidden.value=id;
  if(list)list.innerHTML='<div style="padding:8px 12px;background:#E8F5EE;font-size:13px;border-radius:6px">✓ '+escHtml(name)+'</div>';
  if(statusDiv){
    var bst=getCustBronStatus(id);
    var colorMap={ok:'#1D9E75',warn:'#E65100',grace:'#E65100',pending:'#1565C0',none:'#C62828'};
    var col=colorMap[bst.type]||'#888';
    statusDiv.innerHTML='<div style="font-size:12px;padding:6px 10px;background:#f8f8f8;border-radius:6px">Abunə: <span style="font-weight:600;color:'+col+'">'+bst.txt+'</span></div>';
    if(bst.type==='none')statusDiv.innerHTML+='<div class="al al-b" style="margin-top:6px;font-size:12px">ℹ Aktiv abunəsi yoxdur. Yuxarıda <b>Partner giriş</b> və ya <b>Tək giriş</b> tipi seçin.</div>';
  }
}

async function submitTempAdd(){
  var custIdEl=document.getElementById('ta-cust-id');
  var noteEl=document.getElementById('ta-note');
  var sourceEl=document.getElementById('ta-source');
  var custId=custIdEl?custIdEl.value:'';
  var userNote=noteEl?noteEl.value:'';
  var sourceVal=sourceEl?sourceEl.value:'auto';
  var slot=S.tempAddSlot;
  if(!custId)return alert('Müştəri seçin');
  if(!slot)return;
  // Müvəqqəti bron duplicate check — eyni müştəri + eyni tarix
  if(hasCustomerTempAddOnDate(custId,slot.date)){
    return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var.');
  }
  // Sabit bron check — temp_add bloklanır əgər həmin tarixdə aktiv sabit bron varsa
  if(hasCustomerActiveBookingOnDate(custId,slot.date)){
    return alert('Bu müştərinin həmin tarixə aktiv sabit bronu var.\nMüvəqqəti bron əlavə etmək olmaz.\n(İstisna: əvvəlcə həmin tarix üçün "Gəlməyəcək" qeyd edin.)');
  }
  // Source inferenc
  if(sourceVal==='auto')sourceVal=inferCustomerBronSource(custId);
  var marker='[source:'+sourceVal+']';
  var finalNote=userNote?marker+' '+userNote:marker;
  var cust=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
  // Live DB check — başqa cihazdan edilmiş temp_add-ı tutur
  try{
    var _dbTmp=await dbGet('booking_exceptions','type=eq.temp_add&temp_customer_id=eq.'+custId+'&exception_date=eq.'+slot.date+'&select=id&limit=1');
    if(_dbTmp&&_dbTmp.length>0){
      return alert('Bu müştərinin həmin tarixdə artıq müvəqqəti bronu var (başqa cihazdan yaradılmış ola bilər).');
    }
  }catch(e){}
  S.saving=true;S.showTempAdd=false;render();
  try{
    var eid='EX'+Date.now();
    var ex={id:eid,booking_id:null,exception_date:slot.date,
      type:'temp_add',temp_customer_id:custId,
      temp_customer_name:cust?cust.name:'',
      day_of_week:slot.dow,time_slot:slot.time,
      note:finalNote};
    await dbPost('booking_exceptions',ex);
    if(!S.bronExceptions)S.bronExceptions=[];
    S.bronExceptions.push(ex);
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

async function submitNewSabitBron(){
  // DOM values read before any await
  var custIdEl=document.getElementById('nsb-cust-id');
  var dayEl=document.getElementById('nsb-day');
  var timeEl=document.getElementById('nsb-time');
  var fromEl=document.getElementById('nsb-from');
  var noteEl=document.getElementById('nsb-note');
  var srcEl=document.getElementById('nsb-source');
  var custId=custIdEl?custIdEl.value:'';
  var day=dayEl?parseInt(dayEl.value):0;
  var time=timeEl?timeEl.value:'';
  var from=fromEl?fromEl.value:'';
  var userNote=noteEl?noteEl.value:'';
  var source=srcEl?srcEl.value:'auto';
  if(!custId)return alert('Müştəri seçin');
  if(!day||!time)return alert('Gün və saat seçin.');

  // ── 1. Source təyin et ──
  if(source==='auto')source=inferCustomerBronSource(custId);

  // ── 2. Source-a görə abunə və limit yoxlama ──
  if(source==='studio'){
    var bst=getCustBronStatus(custId);
    if(bst.type==='none'||bst.type==='grace'){
      return alert('Studio bron üçün aktiv və ya pending abunəlik lazımdır.');
    }
    var activSubForLimit=bst.sub;
    if(activSubForLimit&&bst.type!=='pending'){
      var maxD=activSubForLimit.sessions_total>=12?3:activSubForLimit.sessions_total>=8?2:activSubForLimit.sessions_total>1?2:0;
      if(maxD===0){return alert('Tək giriş proqramı üçün Studio bron yaratmaq olmaz. Partner və ya Tək giriş seçin.');}
      var existD=0;
      if(S.bronData){for(var i=0;i<S.bronData.length;i++){if(S.bronData[i].customer_id===custId)existD++;}}
      if(existD>=maxD){return alert('Bu müştəri üçün artıq '+existD+' sabit bron var.\nStudio proqramına görə limit: '+maxD+' gün.');}
    }
  }
  // partner və single: abunə tələb yoxdur, limit yoxdur

  // ── 3. Dublikat yoxlama: eyni müştəriyə eyni gündə 2-ci sabit bron yaratmaq olmaz ──
  if(hasActivePermanentBookingOnDow(custId,day)){
    return alert('Bu müştərinin '+DAYS_AZ[day-1]+' günü üçün artıq aktiv sabit bronu var.\nEyni gündə ikinci sabit bron yaratmaq olmaz.');
  }
  if(S.bronData){
    for(var i=0;i<S.bronData.length;i++){
      var eb=S.bronData[i];
      if(eb.customer_id===custId&&eb.day_of_week===day&&eb.time_slot===time){
        return alert('Bu müştərinin '+DAYS_AZ[day-1]+' '+time+' üçün artıq sabit bronu var.');
      }
    }
  }

  // ── 4. Slot tutumu hard limit ──
  var checkDate=getNextDateForDow(S.bronSelDate||td(),day);
  var slotCount=getSlotCount(day,time,checkDate);
  if(slotCount>=MAX_PER_SLOT){
    return alert('Bu slot tam doludur ('+slotCount+'/'+MAX_PER_SLOT+'). Əvvəl mövcud bronu bağlayın və ya başqa saat seçin.');
  }

  // ── 5. Note marker ──
  var marker='[source:'+source+']';
  var finalNote=userNote?marker+' '+userNote:marker;

  var cust=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
  // Live DB check — başqa cihazdan yaradılmış sabit bronu tutur
  try{
    var _dbBron=await dbGet('bookings','customer_id=eq.'+custId+'&day_of_week=eq.'+day+'&type=eq.permanent&select=id,is_active&limit=5');
    if(_dbBron){
      for(var i=0;i<_dbBron.length;i++){
        if(_dbBron[i].is_active!==false){
          return alert('Bu müştərinin '+DAYS_AZ[day-1]+' günü üçün artıq aktiv sabit bronu var (başqa cihazdan yaradılmış ola bilər).');
        }
      }
    }
  }catch(e){}
  S.saving=true;render();
  try{
    var bid='BK'+Date.now();
    var bron={id:bid,customer_id:custId,customer_name:cust?cust.name:'',
      day_of_week:day,time_slot:time,type:'permanent',
      valid_from:from||null,note:finalNote,is_active:true};
    await dbPost('bookings',bron);
    S.bronData.push(bron);
    S.showAddBron=false;S._bronNewCustId=null;S._bronNewCustName=null;
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

function filterNsbCusts(){
  var inp=document.getElementById('nsb-search');
  var list=document.getElementById('nsb-list');
  var hidden=document.getElementById('nsb-cust-id');
  if(!inp||!list)return;
  var q=normQ(inp.value.trim());
  var sorted=D.customers.slice().sort(function(a,b){return a.name.localeCompare(b.name,'az');});
  list.innerHTML='';
  var shown=0;
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i];
    if(q&&normQ(c.name).indexOf(q)<0)continue;
    if(shown>=50)break;
    (function(cust){
      var el=document.createElement('div');
      el.style.cssText='padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:13px';
      el.innerHTML=cust.name+'<span style="font-size:10px;color:#aaa;margin-left:6px">'+cust.id+'</span>';
      el.onmouseenter=function(){this.style.background='#f0faf5';};
      el.onmouseleave=function(){this.style.background='';};
      el.onclick=function(){selectNsbCust(cust.id,cust.name);};
      list.appendChild(el);
    })(c);
    shown++;
  }
  if(shown===0)list.innerHTML='<div style="padding:10px;color:#aaa;text-align:center;font-size:13px">Tapılmadı</div>';
}

function selectNsbCust(id,name){
  var inp=document.getElementById('nsb-search');
  var list=document.getElementById('nsb-list');
  var hidden=document.getElementById('nsb-cust-id');
  var infoDiv=document.getElementById('nsb-cust-info');
  var submitBtn=document.getElementById('nsb-submit-btn');
  if(inp)inp.value=name;
  if(hidden)hidden.value=id;
  if(list)list.innerHTML='<div style="padding:8px 12px;background:#E8F5EE;font-size:13px;border-radius:6px">✓ '+escHtml(name)+'</div>';
  if(!infoDiv)return;

  var bst=getCustBronStatus(id);
  // Limit calc
  var maxD=0;var existD=0;var subName='';var sessTotal=0;
  if(bst.sub){
    sessTotal=bst.sub.sessions_total||0;
    subName=bst.sub.program_name||'';
    if(bst.type==='ok'||bst.type==='warn'){
      maxD=sessTotal>=12?3:sessTotal>=8?2:sessTotal>1?2:0;
    } else if(bst.type==='pending'){
      maxD=sessTotal>=12?3:sessTotal>=8?2:sessTotal>1?2:0;
    }
  }
  if(S.bronData){for(var i=0;i<S.bronData.length;i++){if(S.bronData[i].customer_id===id)existD++;}}

  var blocked=(bst.type==='none'||bst.type==='grace');
  var limitFull=(maxD>0&&existD>=maxD);
  var colorMap={ok:'#1D9E75',warn:'#E65100',grace:'#E65100',pending:'#1565C0',none:'#C62828'};
  var col=colorMap[bst.type]||'#888';

  var html='<div style="background:#f8f8f8;border-radius:8px;padding:10px 12px;font-size:12px;border:1px solid #e8e8e8">';
  html+='<div style="display:flex;justify-content:space-between;margin-bottom:6px">';
  html+='<span>Abunə statusu: <strong style="color:'+col+'">'+bst.txt+'</strong></span>';
  if(subName)html+='<span style="color:#888">'+escHtml(subName)+'</span>';
  html+='</div>';
  if(sessTotal>0)html+='<div style="margin-bottom:4px">Proqram: <strong>'+sessTotal+' dərslik</strong></div>';
  if(maxD>0){
    var limitColor=limitFull?'#C62828':existD===maxD-1?'#E65100':'#1D9E75';
    html+='<div style="color:'+limitColor+'">Studio bron limiti: <strong>'+existD+'/'+maxD+' gün</strong></div>';
  }
  html+='<div style="margin-top:6px;display:flex;gap:4px">';
  html+=(bst.isPartner?'<span class="badge b-purple" style="font-size:10px">Partner</span>':'<span class="badge b-green" style="font-size:10px">Studio</span>');
  html+=getBronSubBadge(bst);
  html+='</div>';
  if(blocked)html+='<div class="al al-y" style="margin-top:8px;font-size:12px">⚠ Aktiv abunəlik yoxdur — yalnız Partner və ya Tək giriş bron tipi seçin.</div>';
  else if(limitFull)html+='<div class="al al-y" style="margin-top:8px;font-size:12px">Studio bron limiti dolub ('+existD+'/'+maxD+') — Partner və ya Tək giriş seçin.</div>';
  else if(maxD===0&&bst.sub)html+='<div class="al al-b" style="margin-top:8px;font-size:12px">Tək giriş proqramı — Bron tipi Partner və ya Tək giriş seçin.</div>';
  html+='</div>';
  infoDiv.innerHTML=html;

  // Only disable if slot is full (hard limit) — source validation handled in submit
  if(submitBtn)submitBtn.disabled=false;
}

// ---- openAttFromSlot: real implementation ----
function openAttFromSlot(time, dateStr, dow){
  var brons=getSlotBookings(dow,time,dateStr);
  var excs=getSlotExceptions(dow,time,dateStr);
  var customers=[];
  var absentBronIds={};
  for(var i=0;i<excs.absents.length;i++)absentBronIds[excs.absents[i].booking_id]=excs.absents[i].id;
  // Precompute alreadyRec
  var alreadyRec={};
  for(var i=0;i<D.attendances.length;i++){
    var a=D.attendances[i];
    if(a.class_date===dateStr&&a.class_time===time)alreadyRec[a.customer_id]=true;
  }
  // 1. Sabit bronlar
  for(var i=0;i<brons.length;i++){
    var b=brons[i];
    var isAbsent=!!absentBronIds[b.id];
    var sub=activeSub(b.customer_id);
    var bst=getCustBronStatus(b.customer_id);
    var src=getBookingSource(b,b.customer_id);
    var noSub=!sub;
    var already=!!alreadyRec[b.customer_id];
    // needsEntryPayment: partner veya single source + no activeSub
    var needsEntryPayment=!already&&noSub&&(src==='single'||src==='partner');
    var entryPaymentType=(src==='partner')?'partner':'single';
    var isDisabled=already;
    if(!needsEntryPayment){
      if(src==='studio')isDisabled=isDisabled||noSub;
      if(src==='partner')isDisabled=isDisabled||(bst.type==='none'||bst.type==='grace');
      if(src==='single')isDisabled=isDisabled||noSub;
    }
    customers.push({custId:b.customer_id,custName:b.customer_name,sub:sub,bst:bst,
      type:'permanent',absent:isAbsent,absentExId:absentBronIds[b.id]||null,bronId:b.id,
      already:already,isDisabled:needsEntryPayment?true:isDisabled,src:src,
      needsEntryPayment:needsEntryPayment,entryPaymentType:entryPaymentType,
      singleNeedsPay:needsEntryPayment}); // singleNeedsPay compat alias
  }
  // 2. Temp_add müştərilər
  for(var i=0;i<excs.temps.length;i++){
    var t=excs.temps[i];
    var sub=activeSub(t.temp_customer_id);
    var bst=getCustBronStatus(t.temp_customer_id);
    var noSub=!sub;
    // Source-u exception note-dan oxu (sabit bron ilə eyni mexanizm)
    var src=getBookingSource({note:t.note},t.temp_customer_id);
    var needsEntryPayment=!already&&noSub&&(src==='single'||src==='partner');
    var already=!!alreadyRec[t.temp_customer_id];
    var isDisabled=already;
    if(!needsEntryPayment){
      if(src==='studio')isDisabled=isDisabled||noSub;
      if(src==='partner')isDisabled=isDisabled||(bst.type==='none'||bst.type==='grace');
      if(src==='single')isDisabled=isDisabled||noSub;
    }
    customers.push({custId:t.temp_customer_id,custName:t.temp_customer_name,sub:sub,bst:bst,
      type:'temp',absent:false,absentExId:null,bronId:null,
      already:already,isDisabled:needsEntryPayment?true:isDisabled,src:src,
      needsEntryPayment:needsEntryPayment,
      entryPaymentType:(src==='partner')?'partner':'single',
      singleNeedsPay:needsEntryPayment});
  }
  // Build selectedIds: default checked = not absent, not disabled, not already
  var selectedIds=[];
  for(var i=0;i<customers.length;i++){
    var cu=customers[i];
    if(!cu.absent&&!cu.isDisabled&&!cu.already)selectedIds.push(cu.custId);
  }
  S.slotAttData={time:time,dateStr:dateStr,dow:dow,customers:customers,selectedIds:selectedIds,instId:null};
  S.showSlotAttModal=true;
  render();
}

// Checkbox toggle — state only, NO render() call
function toggleSlotAttCustomer(custId, checked, wasAbsent){
  if(!S.slotAttData)return;
  if(!S.slotAttData.selectedIds)S.slotAttData.selectedIds=[];
  var arr=S.slotAttData.selectedIds;
  var idx=arr.indexOf(custId);
  if(checked&&idx<0)arr.push(custId);
  if(!checked&&idx>=0)arr.splice(idx,1);
  // Absent xəbərdarlığı DOM-da göstər (render çağırmadan)
  if(wasAbsent&&checked){
    var cb=document.getElementById? document.querySelector('.slot-att-cb[value="'+custId+'"]'):null;
    if(cb){
      var label=cb.nextElementSibling;
      if(label&&!label.querySelector('.absent-warn')){
        var warn=document.createElement('div');
        warn.className='absent-warn';
        warn.style.cssText='font-size:11px;color:#E65100;background:#FFF3E0;padding:4px 8px;border-radius:5px;margin-top:4px';
        warn.textContent='⚠ Bu müştəri gəlməyəcək kimi işarələnib — əmin misiniz?';
        label.appendChild(warn);
      }
    }
  }
}

function slotPayKey(custId){return String(custId||'');}
function getSingleEntryPrograms(){
  var ids=['ROF','RPP','RPS','ROTG','ROTI','RTEST'];
  return(D.programs||[]).filter(function(p){
    return p.is_active!==false&&(ids.indexOf(p.id)>=0||p.sessions_total<=1);
  });
}
function getPartnerEntryPrograms(){
  return(D.programs||[]).filter(function(p){
    return p.is_active!==false&&['ROF','RPP','RPS'].indexOf(p.id)>=0;
  });
}
function getStudioSinglePrograms(){
  return(D.programs||[]).filter(function(p){
    return p.is_active!==false&&(
      ['ROTG','ROTI','RTEST'].indexOf(p.id)>=0||
      (p.sessions_total<=1&&['ROF','RPP','RPS'].indexOf(p.id)<0)
    );
  });
}
function getSlotPayCustomer(custId){
  var key=slotPayKey(custId);
  var sd=S.slotAttData;
  if(sd&&sd.customers){
    for(var i=0;i<sd.customers.length;i++){
      var cid=slotPayKey(sd.customers[i].custId||sd.customers[i].customer_id);
      if(cid===key)return sd.customers[i];
    }
  }
  return null;
}
function getEntryProgramsForCustomer(custId){
  var item=getSlotPayCustomer(custId);
  if(item&&item.entryPaymentType==='partner')return getPartnerEntryPrograms();
  return getStudioSinglePrograms();
}
function getAccountNameById(id){
  if(!id)return'';
  for(var i=0;i<(D.accounts||[]).length;i++){
    if(D.accounts[i].id===id)return D.accounts[i].name||'';
  }
  return'';
}
function openSlotSinglePay(custId){
  var key=slotPayKey(custId);
  if(!S.slotSinglePayData)S.slotSinglePayData={};
  S.slotSinglePayData[key]={programId:'',amount:'',accountId:'',note:''};
  S.slotSinglePayCustId=key;
  render();
}
function cancelSlotSinglePay(){
  if(S.slotSinglePayCustId&&S.slotSinglePayData)delete S.slotSinglePayData[S.slotSinglePayCustId];
  S.slotSinglePayCustId=null;
  render();
}
function selectSlotSingleProgram(custId,progId){
  var key=slotPayKey(custId);
  if(!S.slotSinglePayData)S.slotSinglePayData={};
  if(!S.slotSinglePayData[key])S.slotSinglePayData[key]={programId:'',amount:'',accountId:'',note:''};
  var p=null;
  for(var i=0;i<(D.programs||[]).length;i++){
    if(D.programs[i].id===progId){p=D.programs[i];break;}
  }
  S.slotSinglePayData[key].programId=progId;
  S.slotSinglePayData[key].amount=(progId==='RTEST')?0:((p&&p.list_price!=null)?p.list_price:'');
  if(isPartnerEntryProgram(progId)){
    S.slotSinglePayData[key].accountId=getPartnerReceivableAccountId(progId)||'';
  }
  var hidden=document.getElementById('slot-sp-prog-'+key);if(hidden)hidden.value=progId;
  var amt=document.getElementById('slot-sp-amount-'+key);if(amt)amt.value=S.slotSinglePayData[key].amount;
  var disp=document.getElementById('slot-sp-acct-display-'+key);
  var info=document.getElementById('slot-sp-acct-info-'+key);
  if(isPartnerEntryProgram(progId)){
    var an=getAccountNameById(S.slotSinglePayData[key].accountId)||'Alacaq hesabı tapılmadı';
    if(disp)disp.value=an;
    if(info){
      info.style.display='block';
      info.style.color=(an==='Alacaq hesabı tapılmadı')?'#C62828':'#1D9E75';
      info.textContent=(an==='Alacaq hesabı tapılmadı')?'Bu partner proqramı üçün alacaq hesabı tapılmadı.':'Partner proqramıdır — əməliyyat avtomatik '+an+' hesabına yazılacaq.';
    }
  }
  render();
}

async function confirmSlotSinglePay(custId){
  var sd=S.slotAttData;
  if(!sd)return;
  var key=slotPayKey(custId);
  var pay=(S.slotSinglePayData&&S.slotSinglePayData[key])||{};
  var progEl=document.getElementById('slot-sp-prog-'+key);
  var amtEl=document.getElementById('slot-sp-amount-'+key);
  var acctEl=document.getElementById('slot-sp-acct-'+key);
  var noteEl=document.getElementById('slot-sp-note-'+key);
  var instEl=document.getElementById('slot-att-inst');
  var programId=(pay.programId||'')||(progEl?progEl.value:'');
  var amount=parseFloat((amtEl?amtEl.value:pay.amount)||pay.amount)||0;
  if(programId==='RTEST')amount=0;
  var note=(noteEl?noteEl.value:(pay.note||''))||'';
  var instId=sd.instId||(instEl?instEl.value:'');
  if(!programId){alert('Proqram seçin');return;}
  if(amount<0||(amount===0&&programId!=='RTEST')){alert('Məbləğ 0-dan böyük olmalıdır');return;}
  if(sd.dateStr>td()){alert('Gələcək tarix üçün davamiyyət qeyd etmək olmaz.');return;}
  if(!instId){alert('Əvvəl instruktor seçin.');return;}
  // Partner ay limit xəbərdarlığı
  if(isPartnerEntryProgram(programId)){
    if(!warnIfPartnerLimit(custId,cust?cust.name:custId))return;
  }
  var entryItem=getSlotPayCustomer(key);
  var entryType=entryItem?entryItem.entryPaymentType:'single';
  if(entryType==='single'&&isPartnerEntryProgram(programId)){
    alert('Bu bron Tək giriş kimi yaradılıb.\nPartner proqramı seçmək düzgün deyil — ROTG/ROTI/RTEST seçin.');
    return;
  }
  if(entryType==='partner'&&!isPartnerEntryProgram(programId)){
    alert('Bu bron Partner kimi yaradılıb.\nPartner proqramı ROF/RPP/RPS olmalıdır.');
    return;
  }
  var accountId='';
  if(isPartnerEntryProgram(programId)){
    accountId=getPartnerReceivableAccountId(programId)||'';
    if(!accountId){
      alert('Bu partner proqramı üçün alacaq hesabı tapılmadı.\nAccounts bölməsində "1FIT alacaqlar" və ya "Push30 alacaqlar" hesabını yaradın.');
      return;
    }
  } else {
    accountId=(acctEl?acctEl.value:'')||pay.accountId||'';
    if(!accountId&&!(programId==='RTEST'&&amount===0)){alert('Hesab seçin.');return;}
  }
  var cust=null,prog=null,inst=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===key){cust=D.customers[i];break;}}
  for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===programId){prog=D.programs[i];break;}}
  for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
  if(!cust||!prog){alert('Müştəri və ya proqram tapılmadı');return;}
  // Günlük duplicate: tarix+saat deyil, yalnız tarix yoxlanılır (transaction-dan əvvəl)
  if(hasCustomerAttendanceOnDate(key,sd.dateStr)){
    alert(cust.name+' artıq bu tarixdə davamiyyətə qeyd edilib.');
    return;
  }
  // Live DB check — başqa cihazdan edilmiş qeydləri tutur
  try{
    var _dbSlotAtt=await dbGet('attendances','customer_id=eq.'+key+'&class_date=eq.'+sd.dateStr+'&select=id&limit=1');
    if(_dbSlotAtt&&_dbSlotAtt.length>0){
      alert(cust.name+' artıq bu tarixdə davamiyyətə qeyd edilib.');
      return;
    }
  }catch(e){}
  if(S.slotSinglePayData)delete S.slotSinglePayData[key];
  S.slotSinglePayCustId=null;
  S.saving=true;render();
  try{
    var isPartner=isPartnerEntryProgram(programId);
    var txnDate=sd.dateStr;
    var txnDesc=prog.name+' — '+cust.name+(isPartner?' — partner giriş':' — tək giriş');
    if(amount>0){
      var txn={id:'TX'+Date.now(),date:txnDate,type:'income',
        category:isPartner?'Partner giriş':'Tək giriş',
        description:txnDesc+(note?' ('+note+')':''),
        amount:amount,account_id:accountId,
        to_account_id:null,subscription_id:null,customer_id:key};
      await dbPost('transactions',txn);
      // Slot payment: Bank/POS hesabı (ACC003) seçilərsə 2% komissiya yaransın.
      // Partner alacaq hesabları və RTEST=0 bu qaydaya düşmür.
      if(!isPartner&&txn.account_id===BANK_ACCT_ID&&txn.amount>0){
        await createPosCommission(txn.amount,txn.date,txn.description);
      }
    }
    // RTEST=0 isə kassa əməliyyatı yaradılmır
    var att={id:uid(),customer_id:key,customer_name:cust.name,
      subscription_id:null,program_id:prog.id,program_name:prog.name,
      class_date:sd.dateStr,class_time:sd.time,
      instructor_id:instId,instructor_name:inst?inst.full_name:''};
    await dbPost('attendances',att);
    D.attendances.unshift(att);
    if(S.selDateAtts!==null&&(S.selDate||td())===att.class_date)S.selDateAtts.unshift(att);
    S.kassaData=null;S.reportData=null;S.izlemeData=null;
    if(sd&&sd.customers){
      for(var i=0;i<sd.customers.length;i++){
        var cid=slotPayKey(sd.customers[i].custId||sd.customers[i].customer_id);
        if(cid===key){
          sd.customers[i].already=true;
          sd.customers[i].isDisabled=true;
          sd.customers[i].singleNeedsPay=false;
          sd.customers[i].needsEntryPayment=false;
          var idx2=sd.selectedIds?sd.selectedIds.indexOf(key):-1;
          if(idx2>=0)sd.selectedIds.splice(idx2,1);
          break;
        }
      }
    }
    S.showAlert={t:'ok',cust:cust,st:{t:'ok',txt:cust.name+(isPartner?' — partner giriş və davamiyyət qeyd edildi':' — tək giriş ödənişi və davamiyyət qeyd edildi')}};
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

async function submitSlotAttendance(){
  var sd=S.slotAttData;
  if(!sd)return;
  // instId: state first, DOM fallback
  var instId=sd.instId||'';
  if(!instId){var el=document.getElementById('slot-att-inst');instId=el?el.value:'';}
  if(!instId){alert('İnstruktor seçin');return;}
  if(sd.dateStr>td()){
    alert('Gələcək tarix üçün davamiyyət qeyd etmək olmaz.\nBu tarix üçün yalnız bron/istisna planlana bilər.');
    return;
  }
  // selectedIds state-dən — DOM-dan asılı deyil
  var selectedIds=(sd.selectedIds||[]).slice();
  if(!selectedIds.length){alert('Heç bir müştəri seçilməyib');return;}
  // Build work list: skip disabled/already
  var workList=[];
  var custMap={};
  for(var i=0;i<sd.customers.length;i++)custMap[sd.customers[i].custId]=sd.customers[i];
  for(var i=0;i<selectedIds.length;i++){
    var cu=custMap[selectedIds[i]];
    if(!cu)continue;
    if(cu.already||cu.isDisabled)continue; // double guard
    if(!cu.sub||!cu.sub.id)continue;
    workList.push({custId:cu.custId,subId:cu.sub.id});
  }
  if(!workList.length){alert('Seçilmiş müştərilərin heç biri üçün davamiyyət yazıla bilmir');return;}
  S.saving=true;render();
  var errors=[];
  var done=0;
  for(var i=0;i<workList.length;i++){
    try{
      var result=await createAttendance(workList[i].custId,workList[i].subId,sd.time,instId,sd.dateStr);
      if(result!==null)done++;
    }catch(e){errors.push(e.message);}
  }
  if(errors.length)alert('Bəzi xətalar:\n'+errors.join('\n'));
  var msg=done===0?'Yeni davamiyyət yazılmadı.':done===1?'1 nəfər qeydə alındı.':done+' nəfər qeydə alındı.';
  S.showAlert={t:done>0?'ok':'warn',cust:{name:''},st:{t:done>0?'ok':'warn',txt:fmt(sd.dateStr)+' '+sd.time+' — '+msg}};
  S.showSlotAttModal=false;
  S.slotAttData=null;
  S.saving=false;
  render();
}

async function createAttendance(custId, subId, classTime, instId, attDate){
  var cust=null,sub=null,inst=null;
  for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}
  for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
  for(var i=0;i<D.instructors.length;i++){if(D.instructors[i].id===instId){inst=D.instructors[i];break;}}
  if(!cust||!sub)throw new Error('Müştəri/abunə tapılmadı: '+custId);
  // Partner ay limit xəbərdarlığı (slot attendance)
  if(isPartnerProgId(sub.program_id)){
    if(!warnIfPartnerLimit(custId,cust.name))return null;
  }
  // Check duplicate: customer_id + class_date (günlük 1 dəfə, saat fərqi nəzərə alınmır)
  if(hasCustomerAttendanceOnDate(custId,attDate)){
    alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
    return null;
  }
  // Live DB check — başqa cihazdan edilmiş qeydləri tutur
  try{
    var _dbAtt=await dbGet('attendances','customer_id=eq.'+custId+'&class_date=eq.'+attDate+'&select=id&limit=1');
    if(_dbAtt&&_dbAtt.length>0){
      alert('Bu müştəri artıq bu tarixdə davamiyyətə qeyd edilib.');
      return null;
    }
  }catch(e){}
  // Activate pending sub
  if(sub.status==='pending'){
    var prog=null;
    for(var i=0;i<D.programs.length;i++){if(D.programs[i].id===sub.program_id){prog=D.programs[i];break;}}
    var newStart=attDate;
    var newEnd=addDays(newStart,prog?prog.duration_days:30);
    await dbPatch('subscriptions','id=eq.'+subId,{status:'active',start_date:newStart,end_date:newEnd});
    sub.status='active';sub.start_date=newStart;sub.end_date=newEnd;
    if(S.custDetail&&S.custDetail.subs){
      for(var i=0;i<S.custDetail.subs.length;i++){
        if(S.custDetail.subs[i].id===subId){
          S.custDetail.subs[i].status='active';S.custDetail.subs[i].start_date=newStart;S.custDetail.subs[i].end_date=newEnd;break;
        }
      }
    }
  }
  var att={id:uid(),customer_id:custId,customer_name:cust.name,subscription_id:subId,
    program_id:sub.program_id,program_name:sub.program_name,
    class_date:attDate,class_time:classTime,
    instructor_id:instId,instructor_name:inst?inst.full_name:''};
  await dbPost('attendances',att);
  D.attendances.unshift(att);
  if(S.selDateAtts!==null&&(S.selDate||td())===att.class_date)S.selDateAtts.unshift(att);
  // Remaining: real attendance count əsasında yenidən hesabla
  if(!sub.is_partner){
    await recalcSubscriptionRemaining(subId);
  }
}

async function submitPlanAbsent(){
  var pb=S.planAbsentBooking;
  if(!pb)return;
  var dateEl=document.getElementById('pa-date');
  var noteEl=document.getElementById('pa-note');
  var selDate=dateEl?dateEl.value:'';
  var note=noteEl?noteEl.value:'';
  if(!selDate){alert('Tarix seçin');return;}
  var bk=pb.booking;
  var dow=bk.day_of_week;
  // Validation 1: dow check
  var selDow=getDayOfWeek(selDate);
  if(selDow!==dow){
    alert('Seçilən tarix '+DAYS_AZ[dow-1]+' günü olmalıdır!\n\n'+fmt(selDate)+' — '+( selDow?DAYS_AZ[selDow-1]:'Bazar')+' günüdür.');
    return;
  }
  // Validation 2: valid_from
  if(bk.valid_from&&selDate<bk.valid_from){
    alert('Bu bron '+fmt(bk.valid_from)+' tarixindən etibarən aktivdir.\nSeçilən tarix bundan əvvəldir.');
    return;
  }
  // Validation 3: valid_until
  if(bk.valid_until&&selDate>bk.valid_until){
    alert('Bu bron '+fmt(bk.valid_until)+' tarixinə qədər aktivdir.\nSeçilən tarix bundan sonradır.');
    return;
  }
  // Validation 4: duplicate check
  if(S.bronExceptions){
    for(var i=0;i<S.bronExceptions.length;i++){
      var ex=S.bronExceptions[i];
      if(ex.booking_id===pb.bronId&&ex.exception_date===selDate&&ex.type==='absent'){
        alert('Bu tarix üçün artıq gəlməyəcək qeydi var.');
        return;
      }
    }
  }
  S.saving=true;render();
  try{
    var eid='EX'+Date.now();
    var exRec={id:eid,booking_id:pb.bronId,exception_date:selDate,type:'absent',note:note||null};
    await dbPost('booking_exceptions',exRec);
    if(!S.bronExceptions)S.bronExceptions=[];
    S.bronExceptions.push(exRec);
    S.showPlanAbsent=false;
    S.planAbsentBooking=null;
    // Re-fetch exceptions if the date is in the currently loaded range
    var curDate=S.bronSelDate||td();
    var mon=getWeekMonday(curDate);
    var endR=dateAddDays(mon,27);
    if(selDate>=mon&&selDate<=endR){
      // Already loaded range — exception is in bronExceptions
    } else {
      // Extend the fetch to include the new date if needed
      await fetchExceptions(selDate);
    }
    alert('✓ '+fmt(selDate)+' tarixi üçün gəlməyəcək qeydi saxlandı.');
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

  var now=new Date();
  var curMonth=now.getFullYear()+'-'+(String(now.getMonth()+1).padStart(2,'0'));
  var selMonth=S.reportMonth||curMonth;

  // Month selector (reuse same as salary tab)
  var curYear=now.getFullYear();
  var years=[];for(var y=2023;y<=curYear;y++)years.push(y);
  var selYear=parseInt(selMonth.split('-')[0]);
  var selMon=selMonth.split('-')[1];
  var monthNames=['Yanvar','Fevral','Mart','Aprel','May','İyun','İyul','Avqust','Sentyabr','Oktyabr','Noyabr','Dekabr'];
  var yearOpts='';for(var i=0;i<years.length;i++)yearOpts+='<option value="'+years[i]+'"'+(years[i]===selYear?' selected':'')+'>'+years[i]+'</option>';
  var monOpts='';for(var i=0;i<12;i++){var mv=String(i+1).padStart(2,'0');monOpts+='<option value="'+mv+'"'+(mv===selMon?' selected':'')+'>'+monthNames[i]+'</option>';}

  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    +'<select class="fs" style="width:100px" id="pr-year" onchange="S.reportMonth=document.getElementById(\'pr-year\').value+\'-\'+document.getElementById(\'pr-mon\').value;render()">'+yearOpts+'</select>'
    +'<select class="fs" style="width:130px" id="pr-mon" onchange="S.reportMonth=document.getElementById(\'pr-year\').value+\'-\'+document.getElementById(\'pr-mon\').value;render()">'+monOpts+'</select>'
    +'</div>';

  // Filter attendances for selected month + partner programs
  var atts=D.attendances.filter(function(a){
    return a.class_date&&a.class_date.indexOf(selMonth)===0;
  });

  // Group by partner: identify Push30 vs 1FIT by program name
  var partners={
    push30:{name:'Push30',acct:'ACC005',progs:{},days:{},total:0,count:0},
    fit1:{name:'1FIT',acct:'ACC006',progs:{},days:{},total:0,count:0}
  };

  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    // Find program
    var prog=null;
    for(var j=0;j<D.programs.length;j++){if(D.programs[j].id===a.program_id){prog=D.programs[j];break;}}
    if(!prog||!prog.is_partner)continue;

    var pname=(a.program_name||'').toLowerCase();
    var key=pname.indexOf('1fit')>=0?'fit1':(pname.indexOf('push')>=0?'push30':null);
    if(!key)continue;

    var p=partners[key];
    var unitPrice=prog.list_price/prog.sessions_total;
    p.total+=unitPrice;
    p.count++;

    // By program
    var pid=a.program_id;
    if(!p.progs[pid])p.progs[pid]={name:a.program_name,price:unitPrice,count:0,total:0};
    p.progs[pid].count++;p.progs[pid].total+=unitPrice;

    // By day
    var day=a.class_date;
    if(!p.days[day])p.days[day]={count:0,total:0,names:[]};
    p.days[day].count++;p.days[day].total+=unitPrice;
    p.days[day].names.push(a.customer_name||'?');
  }

    for(var i=0;i<liveTxns.length;i++){
      var t=liveTxns[i];
      if(t.account_id!=='ACC005'&&t.account_id!=='ACC006')continue;
      var amt=parseFloat(t.amount||0);
      if(t.type==='income')alacaqBals[t.account_id]+=amt;
      if(t.type==='expense')alacaqBals[t.account_id]-=amt;
      if(t.type==='transfer'){
        alacaqBals[t.account_id]-=amt;
        if(t.to_account_id&&alacaqBals[t.to_account_id]!==undefined)alacaqBals[t.to_account_id]+=amt;
      }
    }
  }

  var partnerKeys=['push30','fit1'];
  for(var pi=0;pi<partnerKeys.length;pi++){
    var pk=partnerKeys[pi];
    var p=partners[pk];
    var bal=alacaqBals[p.acct];

    h+='<div style="background:#fff;border:1px solid #eaeaea;border-radius:12px;padding:16px;margin-bottom:16px">';

    // Header
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      +'<div style="font-weight:700;font-size:15px">'+(pk==='push30'?'🟣 Push30':'🔵 1FIT')+'</div>'
      +'<div style="text-align:right">'
      +'<div style="font-size:12px;color:#888">Bu ay ('+selMonth+')</div>'
      +'<div style="font-size:18px;font-weight:700;color:#1D9E75">'+p.total.toFixed(2)+' ₼ <span style="font-size:12px;color:#888">('+p.count+' dərs)</span></div>'
      +'</div></div>';

    // Summary cards
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
    h+='<div class="scard"><div class="snum" style="font-size:15px">'+p.count+'</div><div class="slbl">Bu ay dərs</div></div>';
    h+='<div class="scard"><div class="snum" style="font-size:15px;color:#1D9E75">'+p.total.toFixed(0)+' ₼</div><div class="slbl">Bu ay cəmi</div></div>';
    h+='<div class="scard"><div class="snum" style="font-size:15px;color:'+(bal>=0?'#1D9E75':'#C62828')+'">'+bal.toFixed(0)+' ₼</div><div class="slbl">Alacaq balans</div></div>';
    h+='</div>';

    if(!p.count){
      h+='<div class="empty">Bu ay davamiyyət yoxdur</div>';
      h+='</div>';continue;
    }

    // By program breakdown
    var progKeys=Object.keys(p.progs);
    if(progKeys.length>1){
      h+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px">PROQRAMLAR ÜZRƏ</div>';
      h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
      for(var gi=0;gi<progKeys.length;gi++){
        var pg=p.progs[progKeys[gi]];
        h+='<div style="background:#f5f5f5;border-radius:7px;padding:6px 10px;font-size:12px">'
          +'<b>'+pg.name+'</b>: '+pg.count+' dərs × '+pg.price.toFixed(0)+' ₼ = <b>'+pg.total.toFixed(0)+' ₼</b></div>';
      }
      h+='</div>';
    }

    // Day-by-day table
    h+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px">GÜN ÜZRƏ</div>';
    h+='<div style="background:#f8faf8;border-radius:9px;overflow:hidden">';
    h+='<div style="display:grid;grid-template-columns:90px 50px 70px 1fr;padding:7px 12px;font-size:11px;font-weight:600;color:#888">'
      +'<div>TARİX</div><div style="text-align:center">DƏRS</div><div style="text-align:right">MƏBLƏĞ</div><div style="padding-left:8px">MÜŞTƏRİLƏR</div></div>';
    var dayKeys=Object.keys(p.days).sort();
    var runTotal=0;
    for(var di=0;di<dayKeys.length;di++){
      var dk=dayKeys[di];
      var day=p.days[dk];
      runTotal+=day.total;
      var bg=di%2===0?'#fff':'#f8faf8';
      // Unique customers only
      var uniq={};for(var ni=0;ni<day.names.length;ni++)uniq[day.names[ni]]=true;
      var nameList=Object.keys(uniq).join(', ');
      h+='<div style="display:grid;grid-template-columns:90px 50px 70px 1fr;padding:7px 12px;background:'+bg+';border-top:1px solid #f0f0f0;font-size:12px;align-items:center">'
        +'<div style="font-weight:500">'+fmt(dk)+'</div>'

        +'<div style="text-align:right;font-weight:600;color:#1D9E75">'+day.total.toFixed(2)+' ₼</div>'
        +'<div style="font-size:11px;color:#888;padding-left:8px">'+nameList+'</div>'
        +'</div>';
    }
    // Total row
    h+='<div style="display:grid;grid-template-columns:90px 50px 70px 1fr;padding:8px 12px;background:#e8f5e9;font-size:13px;font-weight:700;border-top:2px solid #c8e6c9">'

    h+='</div>'; // partner card end
  }

  return h;
}


async function fetchIzleme(){
  if(S.izlemeData)return;
  S.izlemeLoading=true;render();
  try{
    var singleProgs=['ROF','RPS','RPP','ROTG','ROTI','RTEST'];
    var today=td();
    var day7=addDays(today,-7);
    var day30=addDays(today,-30);

    // 1. All active subscriptions
    var activeSubs=await dbGet('subscriptions','is_active=eq.true&order=end_date&select=id,customer_id,program_id,end_date,remaining,sessions_total,price_paid,price_due,list_price_at_sale,discount_amount,discount_note,is_partner,is_active');
    var debtSubs=activeSubs;
    var recentAtts=await dbGet('attendances','class_date=gte.'+day30+'&order=class_date.desc');
    var expiredSubs=await dbGet('subscriptions','is_active=eq.false&end_date=gte.'+day30+'&order=end_date.desc&select=id,customer_id,program_id,end_date,remaining,sessions_total,price_paid,price_due,list_price_at_sale,discount_amount,discount_note,is_partner');

    var lastAtt={};
    for(var i=0;i<recentAtts.length;i++){
      var a=recentAtts[i];
      if(!lastAtt[a.customer_id]||a.class_date>lastAtt[a.customer_id])lastAtt[a.customer_id]=a.class_date;
    }

    var custMap={};
    for(var i=0;i<D.customers.length;i++)custMap[D.customers[i].id]=D.customers[i];

    var subAttCount={};
    for(var i=0;i<D.attendances.length;i++){
      var sid=D.attendances[i].subscription_id;
      if(sid)subAttCount[sid]=(subAttCount[sid]||0)+1;
    }

    function getRealRemaining(s){
      if(s.is_partner)return null;
      var used=subAttCount[s.id]||0;
      var rr=Math.max(0,(parseInt(s.sessions_total)||0)-used);
      s.remaining=rr;
      s._used=used;
      return rr;
    }

    var completedSessions=[];
    var hasActiveSub={};
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      var rr=getRealRemaining(s);
      if(rr!==null&&rr>0&&!s.is_partner)hasActiveSub[s.customer_id]=true;
    }
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      var rr=getRealRemaining(s);
      if(rr===0&&s.end_date>=today&&!s.is_partner){
        if(hasActiveSub[s.customer_id])continue;
        var c=custMap[s.customer_id];
        if(c)completedSessions.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});
      }
    }

    var expiredTime=[];
    var expiredCusts={};
    for(var i=0;i<expiredSubs.length;i++){
      var s=expiredSubs[i];
      if(s.end_date<today&&lastAtt[s.customer_id]&&!expiredCusts[s.customer_id]&&singleProgs.indexOf(s.program_id)<0){
        var c=custMap[s.customer_id];
        var hasActive=false;
        for(var j=0;j<activeSubs.length;j++){if(activeSubs[j].customer_id===s.customer_id){hasActive=true;break;}}
        if(!hasActive&&c){expiredCusts[s.customer_id]=true;expiredTime.push({c:c,s:s,last:lastAtt[c.id]||''});}
      }
    }

    var almostDone=[];
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      var rr=getRealRemaining(s);
      if(rr===1&&!s.is_partner&&singleProgs.indexOf(s.program_id)<0){
        var c=custMap[s.customer_id];
        if(c)almostDone.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});
      }
    }

    var notThisWeek=[];
    var weekCusts={};
    for(var i=0;i<recentAtts.length;i++)if(recentAtts[i].class_date>=day7)weekCusts[recentAtts[i].customer_id]=true;
    for(var i=0;i<activeSubs.length;i++){
      var s=activeSubs[i];
      var rr=getRealRemaining(s);
      if(rr!==null&&rr<=0)continue;
      if(!weekCusts[s.customer_id]&&lastAtt[s.customer_id]){
        var c=custMap[s.customer_id];
        if(c&&!notThisWeek.find(function(x){return x.c.id===s.customer_id;}))notThisWeek.push({c:c,s:s,last:lastAtt[c.id]||'',realRemaining:rr});
      }
    }

    var debtors=[];
    var debtCusts={};
    for(var i=0;i<debtSubs.length;i++){
      var s=debtSubs[i];
      var debt=calcDebt(s);
      if(debt>0&&!debtCusts[s.customer_id]){
        var c=custMap[s.customer_id];
        if(c){debtCusts[s.customer_id]=true;debtors.push({c:c,s:s,last:lastAtt[c.id]||'',debt:debt});}
      }
    }

    S.izlemeData={completedSessions:completedSessions,expiredTime:expiredTime,almostDone:almostDone,notThisWeek:notThisWeek,debtors:debtors};
  }catch(e){alert('Xəta: '+e.message);}
  S.izlemeLoading=false;render();
}

async function fetchReport(month){
  S.reportLoading=true;S.reportData=null;render();
  try{
    var allInst=D._allInstructors||D.instructors;
    var instMap={};
    for(var i=0;i<allInst.length;i++){instMap[allInst[i].id]=allInst[i];}

    // Fetch attendances WITH subscription and program data joined via separate queries
    var atts=await dbGet('attendances','class_date=gte.'+month+'-01&class_date=lte.'+month+'-31&order=class_date');
    
    // Fetch ALL subscriptions referenced in these attendances
    var subIds=[...new Set(atts.filter(function(a){return a.subscription_id;}).map(function(a){return a.subscription_id;}))];
    var subMap={};
    // Fetch in batches of 100
    for(var b=0;b<subIds.length;b+=100){
      var batch=subIds.slice(b,b+100);
      var subs=await dbGet('subscriptions','id=in.('+batch.join(',')+')'+'&select=id,price_paid,sessions_total,program_id');
      for(var i=0;i<subs.length;i++){subMap[subs[i].id]=subs[i];}
    }

    var progMap={};
    for(var i=0;i<D.programs.length;i++){progMap[D.programs[i].id]=D.programs[i];}

    var instData={};
    for(var i=0;i<allInst.length;i++){
      instData[allInst[i].id]={
        name:allInst[i].full_name,
        pct:allInst[i].commission_pct||30,
        sessions:0,gross:0,commission:0,days:{}
      };
    }

    var cutoff='2026-01-01';
    var singleProgs=['ROF','RPS','RPP','ROTG','ROTI'];

    for(var i=0;i<atts.length;i++){
      var a=atts[i];
      if(!a.instructor_id||!instData[a.instructor_id])continue;
      var prog=progMap[a.program_id];
      var perSession=0;

      if(singleProgs.indexOf(a.program_id)>=0){
        perSession=prog?prog.list_price||0:0;
      } else if(a.subscription_id&&subMap[a.subscription_id]){
        var sub=subMap[a.subscription_id];
        var subSessions=sub.sessions_total||1;
        if(a.class_date<cutoff){
          perSession=(sub.price_paid||0)/subSessions;
        } else {
          perSession=prog?(prog.list_price||0)/subSessions:0;
        }
      } else {
        if(a.class_date<cutoff){
          perSession=0;
        } else if(prog){
          var pSess=singleProgs.indexOf(a.program_id)>=0?1:(prog.sessions_total||1);
          perSession=(prog.list_price||0)/pSess;
        }
      }

      var inst=instData[a.instructor_id];
      inst.sessions+=1;
      inst.gross+=perSession;
      inst.commission+=perSession*(inst.pct/100);
      var dk=a.class_date;
      if(!inst.days[dk])inst.days[dk]={sessions:0,gross:0,commission:0};
      inst.days[dk].sessions+=1;
      inst.days[dk].gross+=perSession;
      inst.days[dk].commission+=perSession*(inst.pct/100);
    }

    S.reportData={month:month,instData:instData,totalAtts:atts.length};
  }catch(e){alert('Hesabat xetasi: '+e.message);}
  S.reportLoading=false;render();
}

    yearOpts+='<option value="'+years[i]+'"'+(years[i]===selYear?' selected':'')+'>'+years[i]+'</option>';
  }
  var monOpts='';
  for(var i=0;i<months.length;i++){
    monOpts+='<option value="'+months[i].v+'"'+(months[i].v===selMon?' selected':'')+'>'+months[i].n+'</option>';
  }
  
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    +'<select class="fs" style="width:100px" id="rep-year" onchange="S.reportMonth=document.getElementById(\'rep-year\').value+\'-\'+document.getElementById(\'rep-mon\').value;S.reportData=null;render()">'+yearOpts+'</select>'
    +'<select class="fs" style="width:130px" id="rep-mon" onchange="S.reportMonth=document.getElementById(\'rep-year\').value+\'-\'+document.getElementById(\'rep-mon\').value;S.reportData=null;render()">'+monOpts+'</select>'
    +'<button class="btn btn-g" onclick="fetchReport(S.reportMonth)">Hesabla</button>'
    +'</div>';
  
  if(S.reportLoading){
    h+='<div class="empty"><span class="spin"></span> Hesablanir...</div>';
    return h;
  }
  
  if(!S.reportData){
    h+='<div class="empty">Ay seçib "Hesabla" düyməsinə basın</div>';
    return h;
  }
  
  var d=S.reportData;
  var instList=Object.values(d.instData).filter(function(x){return x.sessions>0;});
  instList.sort(function(a,b){return b.commission-a.commission;});
  
  var totalComm=instList.reduce(function(s,x){return s+x.commission;},0);
  var totalGross=instList.reduce(function(s,x){return s+x.gross;},0);
  
  // Summary
  h+='<div class="sgrid" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="scard"><div class="snum">'+d.totalAtts+'</div><div class="slbl">Ümumi iştirak</div></div>'
    +'<div class="scard"><div class="snum">'+Math.round(totalGross)+' ₼</div><div class="slbl">Ümumi gəlir (dərslər üzrə)</div></div>'
    +'<div class="scard"><div class="snum">'+Math.round(totalComm)+' ₼</div><div class="slbl">Ümumi trener haqqı</div></div>'
    +'</div>';
  
  if(!instList.length){
    h+='<div class="empty">Bu ay üçün məlumat yoxdur</div>';
    return h;
  }
  
  // Per instructor table
  h+='<div class="slabel">TRENER ÜZRƏ DETALLAR</div>';
  h+='<div style="background:#fff;border:1px solid #eaeaea;border-radius:12px;overflow:hidden">';
  h+='<div style="display:grid;grid-template-columns:1fr 60px 100px 60px 110px;padding:10px 14px;background:#f8faf8;font-size:11px;font-weight:600;color:#888;letter-spacing:.4px">'
    +'<div>TRENER</div><div style="text-align:right">DƏRS</div><div style="text-align:right">ÜMUMI MƏBLƏĞ</div><div style="text-align:right">FAİZ</div><div style="text-align:right">HAQQQ</div>'
    +'</div>';
  
  for(var i=0;i<instList.length;i++){
    var ins=instList[i];
    var instId=Object.keys(d.instData).find(function(k){return d.instData[k]===ins;});
    var bg=i%2===0?'#fff':'#fafcfa';
    var isSelected=S.selReportInst===instId;
    h+='<div style="display:grid;grid-template-columns:1fr 60px 100px 60px 110px;padding:11px 14px;background:'+(isSelected?'#E8F5EE':bg)+';border-top:1px solid #f0f0f0;font-size:13px;align-items:center;cursor:pointer" onclick="S.selReportInst='+(isSelected?'null':'\''+instId+'\'')+';render()">'
      +'<div style="font-weight:500">'+ins.name+' <span style="font-size:11px;color:#1D9E75">'+(isSelected?'▲ bağla':'▼ detallar')+'</span></div>'
      +'<div style="text-align:right;color:#666">'+ins.sessions+'</div>'
      +'<div style="text-align:right;color:#666">'+Math.round(ins.gross)+' ₼</div>'
      +'<div style="text-align:right;color:#666">'+ins.pct+'%</div>'
      +'<div style="text-align:right;font-weight:600;color:#0F6E56">'+Math.round(ins.commission)+' ₼</div>'
      +'</div>';
    // Daily breakdown
    if(isSelected&&ins.days){
      var days=Object.keys(ins.days).sort();
      h+='<div style="background:#f0faf5;border-top:1px solid #c8e6c9;padding:8px 14px">'
        +'<div style="display:grid;grid-template-columns:120px 1fr 100px 110px;font-size:11px;font-weight:600;color:#888;padding:4px 0;border-bottom:1px solid #ddd;margin-bottom:4px">'
        +'<div>TARİX</div><div style="text-align:right">MƏŞQ</div><div style="text-align:right">MƏBLƏĞ</div><div style="text-align:right">HAQQQ</div></div>';
      for(var j=0;j<days.length;j++){
        var day=days[j];
        var dd=ins.days[day];
        var dp=day.split('-');
        h+='<div style="display:grid;grid-template-columns:120px 1fr 100px 110px;font-size:12px;padding:5px 0;border-bottom:1px solid #e8f5e9">'
          +'<div style="color:#444">'+dp[2]+'.'+dp[1]+'.'+dp[0]+'</div>'

  h+='<div style="display:grid;grid-template-columns:1fr 60px 100px 60px 110px;padding:11px 14px;background:#E8F5EE;border-top:2px solid #b2dfc8;font-size:13px;font-weight:700">'
