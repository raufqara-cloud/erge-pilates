async function submitAddTxn(){
  var type=document.getElementById('txn-type').value;
  var cat=document.getElementById('txn-cat').value;
  var date=document.getElementById('txn-date').value;
  var amount=parseFloat(document.getElementById('txn-amount').value)||0;
  var acctId=document.getElementById('txn-acct').value;
  var desc=document.getElementById('txn-desc').value;
  var toAcct=document.getElementById('txn-to')?document.getElementById('txn-to').value:'';
  var isPending=document.getElementById('txn-pending')&&document.getElementById('txn-pending').checked;
  if(!cat||!date||!amount||!acctId){alert('Bütün məcburi sahələri doldurun');return;}
  if(type==='transfer'&&!toAcct){alert('Hədəf hesab seçin');return;}
  // staff-payroll-link-v1: payroll category requires staff selection
  var staffSel=document.getElementById('txn-staff');
  var staffId=staffSel?staffSel.value:'';
  if(isPayrollCategory(cat)&&!staffId){alert('Əmək haqqı əməliyyatı üçün işçi seçilməlidir');return;}
  // Resolve staff snapshot
  var staffSnap={staff_member_id:null,staff_member_name:null,staff_role:null};
  if(isPayrollCategory(cat)&&staffId){
    var _sm=(S.staffData||[]).find(function(m){return m.id===staffId;})||null;
    if(_sm){staffSnap={staff_member_id:_sm.id,staff_member_name:_sm.full_name,staff_role:_sm.role};}
  }
  S.saving=true;render();
  try{
    var txn={id:'TX'+Date.now(),date:date,type:type,category:cat,
      description:desc||cat,amount:amount,account_id:acctId,
      to_account_id:toAcct||null,subscription_id:null,customer_id:null,
      status:isPending?'pending':'posted',
      staff_member_id:staffSnap.staff_member_id,
      staff_member_name:staffSnap.staff_member_name,
      staff_role:staffSnap.staff_role};
    Object.assign(txn,getActorMeta());
    await dbPost('transactions',txn);
    logAudit('transaction',txn.id,'create',(txn.description||txn.category)+' ('+txn.amount+' AZN)',null,{type:txn.type,category:txn.category,amount:txn.amount,account_id:txn.account_id,status:txn.status,staff_member_id:txn.staff_member_id,staff_member_name:txn.staff_member_name,staff_role:txn.staff_role});
    S.kassaData.txns.unshift(txn);
    // 2% POS commission only if posted + income to Bank
    if(!isPending&&type==='income'&&acctId===BANK_ACCT_ID){
      await createPosCommission(amount,date,desc||cat);
    }
    if(txn.subscription_id)await recalcSubscriptionPaid(txn.subscription_id);
    S.showAddTxn=false;
    pulseCrossTabKassaSync();
  }catch(e){alert('Xeta: '+e.message);}
  S.saving=false;render();
}

// ==================== BUG 2 — Subscription price_paid recalc ====================

async function recalcSubscriptionPaid(subId){
  if(!subId)return;
  var txns=await dbGet('transactions','subscription_id=eq.'+subId+'&type=eq.income');
  var total=0;
  for(var i=0;i<txns.length;i++)total+=parseFloat(txns[i].amount)||0;
  total=Math.round(total*100)/100;
  await dbPatch('subscriptions','id=eq.'+subId,{price_paid:total});
  for(var i=0;i<D.subscriptions.length;i++){
    if(D.subscriptions[i].id===subId){D.subscriptions[i].price_paid=total;break;}
  }
  if(S.custDetail&&S.custDetail.subs){
    for(var j=0;j<S.custDetail.subs.length;j++){
      if(S.custDetail.subs[j].id===subId){S.custDetail.subs[j].price_paid=total;break;}
    }
  }
  S.kassaData=null;
  S.izlemeData=null;
  S.reportData=null;
}

// ==================== SUBSCRIPTION REMAINING RECALC ====================

async function recalcSubscriptionRemaining(subId){
  if(!subId||subId==='null')return null;
  var sub=null;
  for(var i=0;i<D.subscriptions.length;i++){if(D.subscriptions[i].id===subId){sub=D.subscriptions[i];break;}}
  if(!sub){
    var rows=await dbGet('subscriptions','id=eq.'+subId);
    sub=rows&&rows[0]?rows[0]:null;
    if(!sub)return null;
  }
  if(sub.is_partner)return sub;
  var atts=await dbGet('attendances','subscription_id=eq.'+subId);
  var used=atts?atts.length:0;
  var total=parseInt(sub.sessions_total)||0;
  var newRemaining=Math.max(0,total-used);
  await dbPatch('subscriptions','id=eq.'+subId,{remaining:newRemaining});
  updateSubscriptionLocal(subId,{remaining:newRemaining});
  // Keep display cache in sync — avoids stale display until next full refreshRemainingDisplay
  if(S.remainingDisplayCache)S.remainingDisplayCache[subId]=newRemaining;
  S.reportData=null;S.izlemeData=null;
  return{subId:subId,used:used,remaining:newRemaining};
}

// ==================== DATA INTEGRITY AUDIT — data-integrity-fresh-snapshot-v1 ====================

// Read-only fresh snapshot fetch — does NOT write to D.*
// Defensive dedup: removes rows with duplicate id from a snapshot array.
// Rows without an id field are kept (not dropped).
function dedupeRowsById(rows){
  var seen={};
  var out=[];
  for(var i=0;i<rows.length;i++){
    var id=rows[i].id;
    if(id===undefined||id===null){out.push(rows[i]);continue;}
    if(!seen[id]){seen[id]=true;out.push(rows[i]);}
  }
  return out;
}

async function fetchDataIntegritySnapshot(){
  var snap={customers:[],subscriptions:[],attendances:[],transactions:[],bookings:[]};
  try{
    var res=await Promise.all([
      dbGetAll('customers','order=id',1000),
      dbGetAll('subscriptions','order=customer_id,id',1000),
      dbGetAll('attendances','order=class_date.desc,id',1000),
      dbGetAll('transactions','order=date.desc,created_at.desc,id',1000),
      dbGetAll('bookings','is_active=eq.true&type=eq.permanent&order=day_of_week,time_slot,id',1000)
    ]);
    snap.customers    = dedupeRowsById(res[0]||[]);
    snap.subscriptions = dedupeRowsById(res[1]||[]);
    snap.attendances  = dedupeRowsById(res[2]||[]);
    snap.transactions = dedupeRowsById(res[3]||[]);
    snap.bookings     = dedupeRowsById(res[4]||[]);
  }catch(e){
    throw new Error('Snapshot yüklənərkən xəta: '+e.message);
  }
  return snap;
}

// Invalidate stale audit results after related mutations (does NOT auto-rerun)
function invalidateDataIntegrityResults(reason){
  if(S.auditResults&&!S.auditResults.error){
    S.auditResults.stale=true;
    S.auditResults.staleReason=reason||'Məlumat dəyişdi';
  }
}

function auditDuplicateAttendanceByDay(attsArg){
  // Check 1: same customer_id + class_date, count > 1
  var map={};
  var atts=attsArg||D.attendances||[];
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    var key=a.customer_id+'|'+a.class_date;
    if(!map[key])map[key]={customer_id:a.customer_id,customer_name:a.customer_name||'',class_date:a.class_date,times:[],ids:[]};
    map[key].times.push(a.class_time||'--');
    map[key].ids.push(a.id);
  }
  var issues=[];
  for(var k in map){
    if(map[k].ids.length>1)issues.push(map[k]);
  }
  return issues;
}

function auditSubscriptionRemainingMismatch(subsArg, attsArg, customersArg){
  // Check 3: non-partner subs where DB remaining != expected remaining
  var issues=[];
  var subs=subsArg||D.subscriptions||[];
  var atts=attsArg||D.attendances||[];
  var custMap={};
  var customers=customersArg||D.customers||[];
  for(var i=0;i<customers.length;i++)custMap[customers[i].id]=customers[i].name;
  for(var i=0;i<subs.length;i++){
    var sub=subs[i];
    if(sub.is_partner)continue;
    var used=0;
    for(var j=0;j<atts.length;j++){
      if(atts[j].subscription_id===sub.id)used++;
    }
    var total=parseInt(sub.sessions_total)||0;
    var expected=Math.max(0,total-used);
    var dbRem=parseInt(sub.remaining);
    if(isNaN(dbRem))dbRem=0;
    if(dbRem!==expected){
      issues.push({
        subscription_id:sub.id,
        customer_id:sub.customer_id,
        customer_name:custMap[sub.customer_id]||sub.customer_id,
        program_name:sub.program_name||sub.program_id,
        sessions_total:total,
        used:used,
        db_remaining:dbRem,
        expected_remaining:expected,
        diff:dbRem-expected
      });
    }
  }
  return issues;
}

function auditAttendanceOutsideSubscriptionRange(attsArg, subsArg){
  // Check 4: attendance.class_date outside subscription start/end
  var issues=[];
  var atts=attsArg||D.attendances||[];
  var subMap={};
  var subs=subsArg||D.subscriptions||[];
  for(var i=0;i<subs.length;i++)subMap[subs[i].id]=subs[i];
  for(var i=0;i<atts.length;i++){
    var a=atts[i];
    if(!a.subscription_id||a.subscription_id==='null')continue;
    var sub=subMap[a.subscription_id];
    if(!sub)continue;
    if(!sub.start_date||!sub.end_date)continue;
    if(a.class_date<sub.start_date||a.class_date>sub.end_date){
      issues.push({
        attendance_id:a.id,
        customer_id:a.customer_id,
        customer_name:a.customer_name||'',
        class_date:a.class_date,
        class_time:a.class_time||'--',
        subscription_id:a.subscription_id,
        sub_start:sub.start_date,
        sub_end:sub.end_date,
        program_name:sub.program_name||sub.program_id
      });
    }
  }
  return issues;
}

function auditPaymentDrift(txnsArg, subsArg, customersArg){
  // Check 5: non-partner subscriptions with payment anomalies
  var issues=[];
  var subs=subsArg||D.subscriptions||[];
  var txns=txnsArg||(S.kassaData&&S.kassaData.txns)||[];
  var custMap={};
  var customers=customersArg||D.customers||[];
  for(var i=0;i<customers.length;i++)custMap[customers[i].id]=customers[i].name;

  // Build txn map keyed by subscription_id
  var txnBySubId={};
  for(var i=0;i<txns.length;i++){
    var t=txns[i];
    if(!t.subscription_id||t.subscription_id==='null')continue;
    if(t.type!=='income')continue;
    if(!txnBySubId[t.subscription_id])txnBySubId[t.subscription_id]=[];
    txnBySubId[t.subscription_id].push(t);
  }

  for(var i=0;i<subs.length;i++){
    var sub=subs[i];
    if(sub.is_partner)continue;
    var pDue=parseFloat(sub.price_due)||0;
    var pPaid=parseFloat(sub.price_paid)||0;
    var reasons=[];

    if(pPaid>pDue)reasons.push('Ödənilən məbləğ borcdan böyükdür');
    if(pDue<0)reasons.push('Borc (price_due) mənfidir');
    if(pPaid<0)reasons.push('Ödəniş (price_paid) mənfidir');

    var linkedTxns=txnBySubId[sub.id]||[];
    var linkedSum=0;
    for(var j=0;j<linkedTxns.length;j++)linkedSum+=parseFloat(linkedTxns[j].amount)||0;
    var hasLinkedTxns=linkedTxns.length>0;
    var diff=hasLinkedTxns?Math.abs(linkedSum-pPaid):null;

    if(hasLinkedTxns&&diff>0.01)reasons.push('Əlaqəli txn cəmi ('+linkedSum.toFixed(2)+') ≠ price_paid ('+pPaid.toFixed(2)+')');

    if(reasons.length>0){
      issues.push({
        customer_id:sub.customer_id,
        customer_name:custMap[sub.customer_id]||sub.customer_id,
        subscription_id:sub.id,
        program_name:sub.program_name||sub.program_id,
        price_due:pDue,
        price_paid:pPaid,
        linked_txn_sum:hasLinkedTxns?linkedSum:null,
        diff:diff,
        reason:reasons.join('; ')
      });
    }
  }
  return issues;
}

function auditBronRisks(bookingsArg, subsArg, customersArg){
  // Check 6: active permanent booking risks
  var issues=[];
  var brons=bookingsArg||S.bronData||[];
  var customers=customersArg||D.customers||[];
  var subs=subsArg||D.subscriptions||[];
  var custMap={};
  for(var i=0;i<customers.length;i++)custMap[customers[i].id]=customers[i];

  // Valid studio sub: pending (not inactive) OR active non-partner, not expired, remaining>0
  var today=td();
  var validStudioSubs={};
  for(var i=0;i<subs.length;i++){
    var s=subs[i];
    if(s.is_partner)continue;
    if(s.is_active===false||s.is_active==='false')continue;
    var valid=false;
    if(s.status==='pending'){
      valid=true;
    }else{
      if(s.end_date&&s.end_date>=today&&(parseInt(s.remaining)||0)>0)valid=true;
    }
    if(valid){
      if(!validStudioSubs[s.customer_id])validStudioSubs[s.customer_id]=[];
      validStudioSubs[s.customer_id].push(s);
    }
  }

  var slotMap={};
  for(var i=0;i<brons.length;i++){
    var b=brons[i];
    if(!b.is_active)continue;
    if(b.type!=='permanent')continue;
    if(b.valid_until&&b.valid_until<today)continue;

    var slotKey=b.day_of_week+'|'+(b.time_slot||'');
    if(!slotMap[slotKey])slotMap[slotKey]=[];
    slotMap[slotKey].push(b);

    // Source detection: explicit note marker only; default studio for audit purposes
    var src='studio';
    if(b.note){var mn=b.note.match(/\[source:(\w+)\]/);if(mn)src=mn[1];}

    // Risk 1: customer not found
    if(!custMap[b.customer_id]){
      issues.push({customer_id:b.customer_id,customer_name:b.customer_name||b.customer_id,
        day_of_week:b.day_of_week,time_slot:b.time_slot||'--',source:src,count:null,
        reason:'Müştəri sistemdə tapılmadı'});
      continue;
    }

    // Risk 2: studio source but no valid non-partner subscription
    if(src==='studio'){
      var hasSub=(validStudioSubs[b.customer_id]&&validStudioSubs[b.customer_id].length>0);
      if(!hasSub){
        issues.push({customer_id:b.customer_id,
          customer_name:b.customer_name||(custMap[b.customer_id]&&custMap[b.customer_id].name)||b.customer_id,
          day_of_week:b.day_of_week,time_slot:b.time_slot||'--',source:src,count:null,
          reason:'Studio bronu var, aktiv/gözləyən abunəlik tapılmadı (bitmiş və ya qalıqsız abunələr nəzərə alınmır)'});
      }
    }
  }

  // Risk 3: slot count > 8
  var dayNames=['','Bazar ertəsi','Çərşənbə axşamı','Çərşənbə','Cümə axşamı','Cümə','Şənbə'];
  for(var sk in slotMap){
    var list=slotMap[sk];
    if(list.length>8){
      var parts=sk.split('|');
      var dow=parseInt(parts[0]);
      var ts=parts[1]||'--';
      issues.push({customer_id:null,customer_name:null,day_of_week:dow,time_slot:ts,source:'slot',
        count:list.length,
        reason:'Slotda '+(dayNames[dow]||'Gün '+dow)+' '+ts+' üçün '+list.length+' aktiv sabit bron var (limit 8)'});
    }
  }
  return issues;
}
async function runDataIntegrityAudit(){
  S.auditLoading=true;
  S.auditResults=null;
  S.auditOpenChecks={c1:false,c2:false,c3:false,c4:false,c5:false,c6:false};

function csvCell(v){
  if(v===null||v===undefined)v='';
  v=String(v).replace(/\r?\n/g,' ').replace(/"/g,'""');
  return '"'+v+'"';
}

function downloadCsv(filename,rows){
  var lines=[];
  for(var i=0;i<rows.length;i++){
    lines.push(rows[i].map(csvCell).join(','));
  }
  var content='\uFEFF'+lines.join('\r\n');
  var blob=new Blob([content],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=filename.endsWith('.csv')?filename:filename+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// --- Adaptive phone normalization (phone-name-standard-v1) ---
// Returns '+994XXXXXXXXX' for AZ, '+XXXXXXXXXX' for foreign, '' for empty, null for unrecognised
function normalizePhoneForStorage(raw){
  if(!raw)return'';
  var s=(raw+'').trim();
  if(!s)return'';
  var hasPlus=s.charAt(0)==='+';
  var has00=s.slice(0,2)==='00';
  var d=s.replace(/\D/g,'');
  if(!d)return'';
  if(hasPlus){
    if(d.length===12&&d.slice(0,3)==='994')return'+'+d;
    if(d.length>=10)return'+'+d;
    return null;
  }
  if(has00){
    var ds=d.slice(2);
    if(ds.length>=10)return'+'+ds;
    return null;
  }
  if(d.length===10&&d.charAt(0)==='0')return'+994'+d.slice(1);
  if(d.length===9)return'+994'+d;
  if(d.length===12&&d.slice(0,3)==='994')return'+'+d;
  return null;
}
// Canonical key for duplicate detection — works on legacy raw DB values too
function phoneKey(raw){
  if(!raw)return'';
  var norm=normalizePhoneForStorage(raw);
  if(norm===null)return(raw+'').replace(/\D/g,'');
  return norm.replace(/\D/g,'');
}
// Returns digits for WhatsApp URL (no '+')
function phoneToWhatsAppDigits(raw){
  if(!raw)return'';
  var norm=normalizePhoneForStorage(raw);
  if(!norm)return'';
  return norm.replace(/\D/g,'');
}
// Legacy aliases — callers of leadPhoneNorm / leadWaPhone continue to work
function leadPhoneNorm(phone){return phoneKey(phone);}
function leadWaPhone(phone){return phoneToWhatsAppDigits(phone);}

  try{

    if(!rows||!rows.length)return'L000001';
    var num=parseInt((rows[0].id||'').slice(1),10);
    if(isNaN(num))return'L'+Date.now().toString().slice(-6);
    return'L'+String(num+1).padStart(6,'0');
  }catch(e){
    return'L'+Date.now().toString().slice(-6);
  }
}

// --- Fetch ---

async function fetchLeads(){
  if(S.leadsLoading)return;
  S.leadsLoading=true;render();
  try{
    var rows=await dbGet('leads','select=*&order=created_at.desc&limit=500');
    S.leadsData=rows||[];
    S.leadsLoaded=true;
  }catch(e){
    S.leadsData=[];
    S.leadsLoaded=true;
    console.error('fetchLeads error',e);
  }
  S.leadsLoading=false;render();
}

function leadsInvalidate(){
  S.leadsData=null;S.leadsLoaded=false;
}

function rLeadAnalyticsPanel(leads){
  if(!leads||!leads.length)return'';
  var total=leads.length;
  var converted=0,trialDone=0,trialPlanned=0,active=0,lost=0;
  for(var i=0;i<leads.length;i++){
    var l=leads[i];
    var s=l.status||'';
    if(s==='converted')converted++;
    if(s==='lost')lost++;
    if(['new','contacted','trial_scheduled','trial_done'].indexOf(s)>=0)active++;
    var hasDone=s==='trial_done'||!!l.trial_done_at||(s==='converted'&&!!l.trial_done_at);
    var hasPlanned=s==='trial_scheduled'||hasDone||!!l.trial_class_date;
    if(hasDone)trialDone++;
    if(hasPlanned)trialPlanned++;
  }
  var convPct=total?Math.round(converted/total*100):0;
  var donePct=trialPlanned?Math.round(trialDone/trialPlanned*100):0;
  var srcMap={};
  for(var i=0;i<leads.length;i++){
    var l=leads[i];
    var _rawSrc=(l.source||'').trim();
    var sk=_rawSrc?_rawSrc.toLowerCase():'unknown';
    if(!srcMap[sk])srcMap[sk]={total:0,done:0,conv:0,lost:0};
    srcMap[sk].total++;
    if(l.status==='trial_done'||l.trial_done_at)srcMap[sk].done++;
    if(l.status==='converted')srcMap[sk].conv++;
    if(l.status==='lost')srcMap[sk].lost++;
  }
  var goalMap={};
  for(var i=0;i<leads.length;i++){
    var gk=(leads[i].goal||'').trim()||'Məqsəd yoxdur';
    if(!goalMap[gk])goalMap[gk]=0;
    goalMap[gk]++;
  }
  var lostMap={};
  for(var i=0;i<leads.length;i++){
    if(leads[i].status!=='lost')continue;
    var lk=(leads[i].lost_reason||'').trim()||'Səbəb yoxdur';
    if(!lostMap[lk])lostMap[lk]=0;
    lostMap[lk]++;
  }
  var h='<details style="margin-bottom:14px">'
    +'<summary style="cursor:pointer;font-size:12px;color:#888;padding:6px 2px;user-select:none">'
    +'📊 CRM Analitika — '+total+' lead ›</summary>'
    +'<div style="background:#f9f9f9;border-radius:10px;padding:12px 14px;margin-top:6px;border:1px solid #eaeaea">';
  var metrics=[
    [total,'Cəmi lead','#555'],
    [active,'Aktiv','#1976D2'],
    [converted,'Konvert','#1D9E75'],
    [convPct+'%','Konvert %','#1D9E75'],
    [trialPlanned,'Sınaq plan','#7B1FA2'],
    [trialDone,'Sınaq keçdi','#5E35B1'],
    [donePct+'%','Done %','#5E35B1'],
    [lost,'İtirildi','#C62828']
  ];
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  for(var i=0;i<metrics.length;i++){
    h+='<div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:8px 12px;min-width:70px;text-align:center">'
      +'<div style="font-size:16px;font-weight:700;color:'+metrics[i][2]+'">'+metrics[i][0]+'</div>'
      +'<div style="font-size:10px;color:#aaa;margin-top:2px">'+metrics[i][1]+'</div></div>';
  }
  h+='</div>';
  var srcKeys=Object.keys(srcMap).sort(function(a,b){return srcMap[b].total-srcMap[a].total;});
  if(srcKeys.length){
    h+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:600;color:#555;margin-bottom:5px">Mənbə üzrə</div>'
      +'<table style="width:100%;border-collapse:collapse;font-size:11px"><thead>'
      +'<tr style="color:#aaa"><th style="text-align:left;padding:3px 6px">Mənbə</th><th style="padding:3px 6px">Cəmi</th><th style="padding:3px 6px">Sınaq</th><th style="padding:3px 6px">Konvert</th><th style="padding:3px 6px">İtirildi</th></tr>'
      +'</thead><tbody>';
    for(var i=0;i<srcKeys.length;i++){
      var sk2=srcKeys[i];
      var sd=srcMap[sk2];
      var srcLbl=typeof getLeadSourceLabel==='function'?getLeadSourceLabel(sk2):sk2;
      h+='<tr style="border-top:1px solid #f0f0f0">'
        +'<td style="padding:3px 6px;color:#555">'+escHtml(srcLbl||sk2)+'</td>'
        +'<td style="padding:3px 6px;text-align:center;font-weight:600">'+sd.total+'</td>'
        +'<td style="padding:3px 6px;text-align:center;color:#5E35B1">'+sd.done+'</td>'
        +'<td style="padding:3px 6px;text-align:center;color:#1D9E75">'+sd.conv+'</td>'
        +'<td style="padding:3px 6px;text-align:center;color:#C62828">'+sd.lost+'</td>'
        +'</tr>';
    }
    h+='</tbody></table></div>';
  }
  h+='<div style="display:flex;gap:12px;flex-wrap:wrap">';
  var goalKeys=Object.keys(goalMap).sort(function(a,b){return goalMap[b]-goalMap[a];});
  if(goalKeys.length){
    h+='<div style="flex:1;min-width:140px"><div style="font-size:11px;font-weight:600;color:#555;margin-bottom:4px">Məqsəd</div>';
    for(var i=0;i<goalKeys.length;i++){
      h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #f0f0f0">'
        +'<span style="color:#555">'+escHtml(goalKeys[i])+'</span>'
        +'<span style="font-weight:600;color:#333">'+goalMap[goalKeys[i]]+'</span></div>';
    }
    h+='</div>';
  }
  var lostKeys=Object.keys(lostMap).sort(function(a,b){return lostMap[b]-lostMap[a];});
  if(lostKeys.length){
    h+='<div style="flex:1;min-width:140px"><div style="font-size:11px;font-weight:600;color:#555;margin-bottom:4px">İtirilmə səbəbləri</div>';
    for(var i=0;i<lostKeys.length;i++){
      var lk2=lostKeys[i];
      var lostLbl=typeof getLostReasonLabel==='function'?getLostReasonLabel(lk2):lk2;
      h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #f0f0f0">'
        +'<span style="color:#555">'+escHtml(lostLbl||lk2)+'</span>'
        +'<span style="font-weight:600;color:#C62828">'+lostMap[lk2]+'</span></div>';
    }
    h+='</div>';
  }
  h+='</div></div></details>';
  return h;
}

// ── Today + Overdue panel ──
function rLeadTodayPanel(all,today){
  var active=['new','contacted','trial_scheduled','trial_done'];
  var todayL=[],overdueL=[];
  for(var i=0;i<all.length;i++){
    var l=all[i];
    if(active.indexOf(l.status)<0||!l.follow_up_date)continue;
    if(l.follow_up_date===today)todayL.push(l);
    else if(l.follow_up_date<today)overdueL.push(l);
  }
  if(!todayL.length&&!overdueL.length)return'';
  var h='<div style="margin-bottom:14px">';
  if(todayL.length){
    h+='<div style="font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:6px">📋 Bu gün ('+todayL.length+')</div>';
    for(var i=0;i<todayL.length;i++)h+=rLeadPanelRow(todayL[i],false);
  }
  if(overdueL.length){
    h+='<div style="font-size:12px;font-weight:600;color:#C62828;margin-bottom:6px;'+(todayL.length?'margin-top:10px':'')+'">⏰ Gecikmiş ('+overdueL.length+')</div>';
    for(var i=0;i<overdueL.length;i++)h+=rLeadPanelRow(overdueL[i],true);
  }
  h+='</div>';
  return h;
}

// --- Quick Lead Actions ---

async function quickLeadStatus(leadId,newStatus){
  if(newStatus==='trial_scheduled'||newStatus==='trial_done'){
    alert('Sınaq statusu yalnız slot/davamiyyət axını ilə dəyişməlidir.');
    return;
  }
  if(newStatus==='lost'){
    S.leadLostModal={id:leadId,reason:'price'};
    render();return;
  }
  S.saving=true;render();
  try{
    var body={status:newStatus};
    if(newStatus==='contacted')body.last_contact_at=new Date().toISOString();
    await dbPatch('leads','id=eq.'+leadId,body);
    var leads=S.leadsData||[];
    for(var i=0;i<leads.length;i++){
      if(leads[i].id===leadId){
        leads[i].status=newStatus;
        if(newStatus==='contacted')leads[i].last_contact_at=body.last_contact_at;
        break;
      }
    }
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

async function quickLeadLostConfirm(){
  if(!S.leadLostModal)return;
  var leadId=S.leadLostModal.id;
  var reasonEl=document.getElementById('lost-reason-sel');
  var reason=reasonEl?reasonEl.value:(S.leadLostModal.reason||'other');
  S.saving=true;render();
  try{
    await dbPatch('leads','id=eq.'+leadId,{status:'lost',lost_reason:reason});
    var leads=S.leadsData||[];
    for(var i=0;i<leads.length;i++){
      if(leads[i].id===leadId){leads[i].status='lost';leads[i].lost_reason=reason;break;}
    }
    S.leadLostModal=null;
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

async function quickLeadReschedule(leadId,days){
  S.saving=true;render();
  try{
    var newDate=addDays(td(),days);
    await dbPatch('leads','id=eq.'+leadId,{follow_up_date:newDate});
    var leads=S.leadsData||[];
    for(var i=0;i<leads.length;i++){
      if(leads[i].id===leadId){leads[i].follow_up_date=newDate;break;}
    }
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

// --- Duplicate Phone Check ---

function checkLeadDupPhone(phone){
  var warn=document.getElementById('lead-dup-warn');
  if(!warn)return;
  var pn=leadPhoneNorm(phone);
  if(!pn||pn.length<7){warn.style.display='none';return;}
  var msgs=[];
  // Check D.customers (local cache)
  var custs=D.customers||[];
  for(var i=0;i<custs.length;i++){
    if(leadPhoneNorm(custs[i].phone)===pn){
      msgs.push('⚠ Bu telefon mövcud müştəridə var: <b>'+escHtml(custs[i].name)+'</b>');break;
    }
  }
  // Check S.leadsData (already loaded)
  var leads2=S.leadsData||[];
  for(var i=0;i<leads2.length;i++){
    var ld=leads2[i];
    if(ld.status!=='converted'&&leadPhoneNorm(ld.phone)===pn){
      msgs.push('⚠ Bu telefon mövcud leaddə var: <b>'+escHtml(ld.name)+'</b> ('+getLeadStatusLabel(ld.status)+')');break;
    }
  }
  if(msgs.length){
    warn.style.display='block';
    warn.innerHTML=msgs.join('<br>');
  }else{
    warn.style.display='none';
  }
}

// createCustomerFromLead: standalone helper, does NOT modify doAddCust()
async function createCustomerFromLead(lead){
  var rows=await dbPost('customers',{name:lead.name,phone:lead.phone||'',birth_date:''});
  var row=Array.isArray(rows)?rows[0]:rows;
  if(row){
    D.customers.unshift(row);
    logAudit('customer',row.id,'create',row.name+' müştəri (lead çevrilməsi) yaradıldı',null,{id:row.id,name:row.name,phone:row.phone||'',birth_date:'',source_flow:'lead_convert',lead_id:lead.id});
  }

function findExistingCustByPhone(phone){
  var pn=leadPhoneNorm(phone);
  if(!pn||pn.length<7)return null;
  var custs=D.customers||[];
  for(var i=0;i<custs.length;i++){
    if(leadPhoneNorm(custs[i].phone)===pn)return custs[i];
  }
  return null;
}

async function doConvertLead(leadId){
  var lead=getLead(leadId);
  if(!lead){alert('Lead tapılmadı');return;}
  if(lead.status==='converted'){alert('Bu lead artıq müştəriyə çevrilib');return;}

  // Duplicate customer phone check — must happen before any DB write
  var existingCust=findExistingCustByPhone(lead.phone);
  if(existingCust){
    if(!confirm('Bu telefon artıq mövcud müştəridə var: '+existingCust.name+' ('+existingCust.id+')\nBu lead-i həmin müştəriyə bağlamaq istəyirsiniz?'))return;
    // Link lead to existing customer — no new customer created
    S.saving=true;render();
    try{
      await dbPatch('leads','id=eq.'+leadId,{status:'converted',converted_customer_id:existingCust.id});
      S.selLead=null;
      leadsInvalidate();
      await fetchLeads();
      S.saving=false;render();
      if(confirm('Lead mövcud müştəriyə bağlandı: '+existingCust.name+' ('+existingCust.id+')\n\nMüştəri prefinə keçmək istəyirsiniz?')){
        S.view='cust';S.selCust=existingCust.id;render();
      }
    }catch(e){alert('Xəta: '+e.message);S.saving=false;render();}
    return;
  }

  if(!confirm('Bu lead-i müştəriyə çevirmək istəyirsiniz?\nAd: '+lead.name+'\nTelefon: '+(lead.phone||'')))return;
  S.saving=true;render();
  try{
    var newCust=await createCustomerFromLead(lead);
    if(!newCust||!newCust.id)throw new Error('Müştəri yaradıla bilmədi — DB cavab vermədi');
    // Update lead — if this fails, customer exists but lead stays active (tolerable, show warning)
    try{
      await dbPatch('leads','id=eq.'+leadId,{status:'converted',converted_customer_id:newCust.id});
    }catch(e2){
      S.saving=false;
      S.selLead=null;
      leadsInvalidate();
      await fetchLeads();
      alert('Müştəri yaradıldı ('+newCust.id+'), lakin lead statusu yenilənərkən xəta baş verdi.\nLeadi manual "Müştəri oldu" statusuna çevirin.\nXəta: '+e2.message);
      return;
    }
    S.selLead=null;
    leadsInvalidate();
    await fetchLeads();
    S.saving=false;render();
    if(confirm('Müştəri yaradıldı: '+escHtml(newCust.name)+' ('+newCust.id+')\n\nMüştəri prefinə keçmək istəyirsiniz?')){
      S.view='cust';S.selCust=newCust.id;render();
    }
    return;
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

async function submitCommRule(){
  if(!S.commRuleModal)return;
  var m=S.commRuleModal;
  var isEdit=!!m.ruleId;

  var progId=isEdit?m.programId:(document.getElementById('cr-prog')?document.getElementById('cr-prog').value:'');
  var pct=parseFloat(document.getElementById('cr-pct')?document.getElementById('cr-pct').value:'');
  var validFrom=document.getElementById('cr-from')?document.getElementById('cr-from').value:'';
  var validUntil=document.getElementById('cr-until')?document.getElementById('cr-until').value.trim():'';
  var note=document.getElementById('cr-note')?document.getElementById('cr-note').value.trim():'';

  if(!progId)return alert('Proqram seçin.');
  if(!pct||pct<=0||pct>100)return alert('Komissiya faizini düzgün daxil edin (1-100).');
  if(!validFrom)return alert('Başlanğıc tarixi mütləqdir.');

  // Overlap check for new rules (same instructor + program, is_active, overlapping dates)
  if(!isEdit&&S.commRulesCache){
    var conflict=false;
    for(var i=0;i<S.commRulesCache.length;i++){
      var ex=S.commRulesCache[i];
      if(ex.instructor_id===m.instId&&ex.program_id===progId&&ex.is_active!==false){
        // Check date overlap
        var exFrom=ex.valid_from||'0000-01-01';
        var exUntil=ex.valid_until||'9999-12-31';
        var newUntil=validUntil||'9999-12-31';
        if(!(newUntil<exFrom||validFrom>exUntil)){conflict=true;break;}
      }
    }
    if(conflict&&!confirm('Bu trener + proqram üçün artıq aktiv bir qayda mövcuddur və tarix aralıqları üst-üstə düşür.\n\nYenə də davam etmək istəyirsiniz?'))return;
  }

  S.saving=true;render();
  try{
    if(isEdit){
      // Edit existing rule
      var oldRule=null;
      if(S.commRulesCache){for(var i=0;i<S.commRulesCache.length;i++){if(S.commRulesCache[i].id===m.ruleId){oldRule=S.commRulesCache[i];break;}}}
      var updates={commission_pct:pct,valid_from:validFrom,valid_until:validUntil||null,note:note||null};
      await dbPatch('trainer_program_commissions','id=eq.'+m.ruleId,updates);
      logAudit('instructor',m.instId,'commission_rule_edit',
        (instNameForId(m.instId)||m.instId)+' / '+progId+' → '+pct+'%',
        oldRule?{id:oldRule.id,instructor_id:oldRule.instructor_id,program_id:oldRule.program_id,commission_pct:oldRule.commission_pct,valid_from:oldRule.valid_from,valid_until:oldRule.valid_until,is_active:oldRule.is_active,note:oldRule.note}:null,
        {id:m.ruleId,instructor_id:m.instId,program_id:progId,commission_pct:pct,valid_from:validFrom,valid_until:validUntil||null,is_active:true,note:note||null});
    } else {
      // Create new rule
      var newId='TPC'+Date.now().toString(36)+Math.random().toString(36).slice(2,4);
      var newRule={id:newId,instructor_id:m.instId,program_id:progId,commission_pct:pct,valid_from:validFrom,valid_until:validUntil||null,is_active:true,note:note||null};
      await dbPost('trainer_program_commissions',newRule);
      logAudit('instructor',m.instId,'commission_rule_create',
        (instNameForId(m.instId)||m.instId)+' / '+progId+' → '+pct+'%',
        null,
        {id:newId,instructor_id:m.instId,program_id:progId,commission_pct:pct,valid_from:validFrom,valid_until:validUntil||null,is_active:true,note:note||null});
    }
    S.commRulesCache=null;S.reportData=null;
    S.showCommRuleModal=false;S.commRuleModal=null;
    await loadCommRulesCache();
  }catch(e){alert('Xəta: '+e.message);}
  S.saving=false;render();
}

async function deactivateCommRule(ruleId,instId){
  if(!confirm('Bu komissiya qaydasını deaktiv etmək istəyirsiniz?\nQayda silinmir — yalnız deaktiv edilir.'))return;

function instNameForId(instId){

async function loginSubmit(){
  var unEl=document.getElementById('login-username');
  var pinEl=document.getElementById('login-pin');
  var uname=(unEl?unEl.value:'').trim();
  var pin=pinEl?pinEl.value:'';
  if(!uname){S._loginErr='İstifadəçi adı daxil edilməlidir.';render();return;}
  if(!pin){S._loginErr='PIN daxil edilməlidir.';render();return;}
  // Find user by username (case-insensitive); fallback to display_name for backward compat
  var user=null;
  var unameLower=uname.toLowerCase();
  for(var i=0;i<(S.appUsersData||[]).length;i++){
    var u=S.appUsersData[i];
    var uField=(u.username||'').toLowerCase();
    var dField=(u.display_name||'').toLowerCase();
    if(uField===unameLower||(uField===''&&dField===unameLower)){user=u;break;}
  }
  var pinHash=await hashPin(pin);
  // Generic error — do NOT reveal whether username exists
  if(!user||!pinHash||pinHash!==user.pin_hash){
    S._loginErr='İstifadəçi adı və ya PIN yanlışdır.';
    render();
    var pinEl2=document.getElementById('login-pin');
    if(pinEl2)pinEl2.value='';
    return;
  }
  // PIN correct — check must_change_pin before opening app
  S._loginErr=null;
  if(user.must_change_pin===true){
    S.pendingPinChangeUser=user;
    S._forcedPinErr=null;
    render(); // shows forced PIN change screen via rLoginModal()
    return;
  }
  // Normal login
  var sesId='SES'+Date.now()+Math.random().toString(36).slice(2,5);

async function submitForcedPinChange(){
  var pcu=S.pendingPinChangeUser;
  if(!pcu){S._forcedPinErr='Xəta: sessiya etibarsız. Geri qayıdın.';render();return;}
  var oldPinEl=document.getElementById('fp-old');
  var newPinEl=document.getElementById('fp-new');
  var new2PinEl=document.getElementById('fp-new2');
  var oldPin=oldPinEl?oldPinEl.value:'';
  var newPin=newPinEl?newPinEl.value:'';
  var newPin2=new2PinEl?new2PinEl.value:'';
  if(!oldPin){S._forcedPinErr='Mövcud PIN daxil edilməlidir.';render();return;}
  if(!newPin){S._forcedPinErr='Yeni PIN daxil edilməlidir.';render();return;}
  if(!/^\d{4,8}$/.test(newPin)){S._forcedPinErr='Yeni PIN 4–8 rəqəmdən ibarət olmalıdır.';render();return;}
  if(newPin!==newPin2){S._forcedPinErr='Yeni PIN-lər uyğun deyil.';render();return;}
  // Verify old PIN again
  var oldHash=await hashPin(oldPin);
  if(!oldHash||oldHash!==pcu.pin_hash){
    S._forcedPinErr='Mövcud PIN yanlışdır.';
    render();
    if(oldPinEl)oldPinEl.value='';
    return;
  }
  // Prevent same PIN
  var newHash=await hashPin(newPin);
  if(!newHash){S._forcedPinErr='PIN hash xətası.';render();return;}
  if(newHash===pcu.pin_hash){S._forcedPinErr='Yeni PIN köhnə PIN ilə eyni ola bilməz.';render();return;}
  // Patch DB
  var now=new Date().toISOString();
  try{
    await dbPatch('app_users','id=eq.'+encodeURIComponent(pcu.id),{
      pin_hash:newHash,
      must_change_pin:false,
      pin_changed_at:now
    });
  }catch(e){S._forcedPinErr='Xəta: '+e.message;render();return;}
  // Refresh active users cache so same-session re-login uses new PIN
  await refreshActiveAppUsers();
  // Create session and open app
  S._forcedPinErr=null;
  S.pendingPinChangeUser=null;
  var sesId='SES'+Date.now()+Math.random().toString(36).slice(2,5);
  S.currentUser={id:pcu.id,username:pcu.username||pcu.display_name,display_name:pcu.display_name||pcu.username,role:pcu.role,session_id:sesId,login_at:new Date().toISOString()};
  S.showLoginModal=false;
  S.loading=true;
  logAudit('app_user',pcu.id,'pin_change','İstifadəçi məcburi PIN dəyişdirdi',null,{must_change_pin:false,pin_changed_at:now});
  render();
  loadAll();
}

async function submitEditUser(){
  var d=S.editUserData||{};
  if(!d.id){S._userFormErr='Xəta: istifadəçi ID yoxdur.';render();return;}
  var username=(document.getElementById('eu-username').value||'').trim().toLowerCase();
  var displayName=(document.getElementById('eu-displayname').value||'').trim();
  var role=document.getElementById('eu-role').value||'cashier';
  var pin=(document.getElementById('eu-pin').value||'').trim();
  var pin2=(document.getElementById('eu-pin2').value||'').trim();
  if(!username){S._userFormErr='İstifadəçi adı tələb olunur.';render();return;}
  if(!/^[a-z0-9_]+$/.test(username)){S._userFormErr='İstifadəçi adı yalnız kiçik hərf, rəqəm və _ işarəsi ola bilər.';render();return;}
  // Check duplicate username (skip self)
  var existing=(S.adminUsersData||[]).filter(function(u){return (u.username||'').toLowerCase()===username&&u.id!==d.id;});
  if(existing.length){S._userFormErr='Bu istifadəçi adı artıq başqasına məxsusdur.';render();return;}
  // Last active admin role guard — cannot change last active admin away from admin
  if(d.role==='admin'&&role!=='admin'){
    var activeAdmins=(S.adminUsersData||[]).filter(function(u){return u.role==='admin'&&u.is_active!==false;});
    // Find target in adminUsersData to check active status
    var targetUser=null;
    for(var i=0;i<(S.adminUsersData||[]).length;i++){if(S.adminUsersData[i].id===d.id){targetUser=S.adminUsersData[i];break;}}
    if(targetUser&&targetUser.is_active!==false&&activeAdmins.length<=1){
      S._userFormErr='Xəta: Son aktiv adminin rolu dəyişdirilə bilməz.';render();return;
    }
  }
  // PIN validation (only if provided)
  var pinHash=null;
  if(pin){
    if(!/^\d{4,8}$/.test(pin)){S._userFormErr='Yeni PIN 4–8 rəqəmdən ibarət olmalıdır.';render();return;}
    if(pin!==pin2){S._userFormErr='Yeni PIN-lər uyğun deyil.';render();return;}
    pinHash=await hashPin(pin);
    if(!pinHash){S._userFormErr='PIN hash xətası.';render();return;}
  }
  S.saving=true;render();
  try{
    var now=new Date().toISOString();
    var body={username:username,display_name:displayName||username,role:role};
    if(pinHash){
      body.pin_hash=pinHash;
      body.must_change_pin=true;
      body.pin_reset_at=now;
      body.pin_reset_by_user_id=S.currentUser?S.currentUser.id:null;
    }
    await dbPatch('app_users','id=eq.'+encodeURIComponent(d.id),body);
    S.showEditUser=false;S.editUserData=null;S._userFormErr=null;
    await loadAdminUsers();
    await refreshActiveAppUsers();
    logAudit('app_user',d.id,'edit','İstifadəçi redaktə edildi: '+username,{username:d.username,role:d.role},{username:username,role:role,pin_reset:!!pinHash});
  }catch(e){S._userFormErr='Xəta: '+e.message;S.saving=false;render();return;}
  S.saving=false;render();
}

// Security: calls client-requests-proxy Edge Function using Project A anon key.
// No Project B service_role or CLIENT_REQUEST_ADMIN_TOKEN in browser.

//   booking_exceptions/transactions/leads/audit_logs.

async function fetchClientRequests(){
  if(S.clientReqLoading)return;
  S.clientReqLoading=true;S.clientReqErr=null;render();
  try{
    var status=S.clientReqStatusFilter||'pending';
    var resp=await fetch(CLIENT_REQUESTS_PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({action:'list',status:status,limit:50})
    });
    var data=null;
    try{data=await resp.json();}catch(e){data=null;}
    if(resp.ok&&data&&data.rows){
      S.clientReqData=data.rows;
    }else{
      var em=(data&&data.error)?data.error:('HTTP '+resp.status);
      S.clientReqErr=em;
      if(!S.clientReqData)S.clientReqData=[];
    }
  }catch(e){
    S.clientReqErr=(e&&e.message)?e.message:'Şəbəkə xətası';
    if(!S.clientReqData)S.clientReqData=[];
  }
  S.clientReqLoading=false;render();
}

async function updateClientRequest(id,status,adminNote){
  if(!id)return;
  var actor=(S.currentUser&&S.currentUser.username)?S.currentUser.username:'project_a_admin';
  try{
    var resp=await fetch(CLIENT_REQUESTS_PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({action:'update',id:id,status:status,admin_note:adminNote||null,actor:actor})
    });
    var data=null;
    try{data=await resp.json();}catch(e){data=null;}
    if(!resp.ok){
      var em=(data&&data.error)?data.error:('HTTP '+resp.status);
      alert('Xəta: '+em);
      render();return;
    }
    // Update local row without full reload
    if(S.clientReqData){
      for(var i=0;i<S.clientReqData.length;i++){
        if(S.clientReqData[i].id===id){
          S.clientReqData[i].status=status;
          if(adminNote!==undefined&&adminNote!==null)S.clientReqData[i].admin_note=adminNote;
          if(status==='resolved'||status==='cancelled'){
            S.clientReqData[i].resolved_at=new Date().toISOString();
            S.clientReqData[i].resolved_by=actor;
          }
          break;
        }
      }
    }
  }catch(e){
    alert('Şəbəkə xətası: '+((e&&e.message)?e.message:'unknown'));
  }
  render();
}

function saveClientReqNote(id){
  var el=document.getElementById('crn-'+id);
  if(!el)return;
  var note=el.value.trim();
  // Find current status for this request
  var req=null;
  if(S.clientReqData){for(var i=0;i<S.clientReqData.length;i++){if(S.clientReqData[i].id===id){req=S.clientReqData[i];break;}}}
  if(!req)return;
  // pending is client-created only and cannot be used as an admin update target.
  // Saving a note on a pending request intentionally promotes it to seen.
  var targetStatus=(req.status==='pending')?'seen':req.status;
  updateClientRequest(id,targetStatus,note);
}

function clientReqWhatsAppBtn(custId){
  if(!custId)return '<button class="btn btn-gray btn-sm" disabled>Telefon yoxdur</button>';
  var cust=null;
  if(D.customers){for(var i=0;i<D.customers.length;i++){if(D.customers[i].id===custId){cust=D.customers[i];break;}}}
  if(!cust||!cust.phone)return '<button class="btn btn-gray btn-sm" disabled>Telefon yoxdur</button>';
  var digits=phoneToWhatsAppDigits(cust.phone);
  if(!digits)return '<button class="btn btn-gray btn-sm" disabled>WA yoxdur</button>';
  var msg=encodeURIComponent('Salam, Erge Pilates-dən yazırıq. Client Portal-da əlaqə üçün müraciət etmisiniz. Sizə necə kömək edə bilərik? ❤️');
  var url='https://wa.me/'+digits+'?text='+msg;
  return '<a href="'+url+'" target="_blank" rel="noopener noreferrer" class="btn btn-sm" style="background:#25D366;color:#fff;text-decoration:none;display:inline-block">💬 WhatsApp</a>';
}

function fmtReqDate(iso){
  if(!iso)return '—';
  try{
    return new Intl.DateTimeFormat('az-AZ',{timeZone:'Asia/Baku',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(iso));
  }catch(e){return iso;}
}

function getClientReqStatusLabel(s){
  var m={pending:'Gözləyir',seen:'Görüldü',resolved:'Həll edildi',cancelled:'Ləğv edildi'};
  return m[s]||s;
}

function getClientReqStatusColor(s){
  if(s==='pending')return '#f57c00';
  if(s==='seen')return '#1565c0';
  if(s==='resolved')return '#2e7d32';
  if(s==='cancelled')return '#757575';
  return '#333';
}

function rClientRequests(){
  var h='<div class="ph"><div class="pt">Müraciətlər <small style="font-size:11px;color:#999;font-weight:400">(Client Portal)</small></div>';
  // Filter bar
  var filters=['pending','recent','all'];
  var flabels={pending:'Gözləyənlər',recent:'Son 50',all:'Hamısı'};
  h+='<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">';
  for(var fi=0;fi<filters.length;fi++){
    var fv=filters[fi];
    var fa=S.clientReqStatusFilter===fv;
    h+='<button class="btn btn-sm '+(fa?'btn-blue':'btn-gray')+'" onclick="S.clientReqStatusFilter=\''+fv+'\';S.clientReqData=null;fetchClientRequests();">'+flabels[fv]+'</button>';
  }
  h+='<button class="btn btn-sm btn-gray" onclick="S.clientReqData=null;fetchClientRequests();">↻ Yenilə</button>';
  h+='</div>';

  if(S.clientReqLoading){h+='<div class="al"><span class="spin"></span> Yüklənir...</div>';h+='</div>';return h;}
  if(S.clientReqErr){h+='<div class="errbox">Xəta: '+escHtml(S.clientReqErr)+'</div>';}

  var rows=S.clientReqData||[];
  if(!rows.length){h+='<div style="color:#999;padding:20px 0;text-align:center">Müraciət tapılmadı.</div>';h+='</div>';return h;}

  for(var i=0;i<rows.length;i++){
    var req=rows[i];
    var cid=req.customer_id||'';
    // Customer name from Project A D.customers (read-only)
    var cname='';
    if(cid&&D.customers){for(var ci=0;ci<D.customers.length;ci++){if(D.customers[ci].id===cid){cname=D.customers[ci].name;break;}}}
    var displayName=cname?escHtml(cname):escHtml(cid);
    var sColor=getClientReqStatusColor(req.status);
    var sLabel=getClientReqStatusLabel(req.status);
    var isClosed=(req.status==='resolved'||req.status==='cancelled');
    var reqId=escHtml(req.id||'');
    // Note textarea value
    var noteVal=escHtml(req.admin_note||'');
    h+='<div class="card" style="margin-bottom:10px;padding:14px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">';
    h+='<div>';
    h+='<div style="font-weight:600;font-size:14px">'+displayName+'<span style="font-size:11px;color:#aaa;margin-left:6px">'+escHtml(cid)+'</span></div>';
    h+='<div style="font-size:11px;color:#999;margin-top:2px">'+fmtReqDate(req.created_at)+'</div>';
    h+='</div>';
    h+='<span style="font-size:12px;font-weight:600;color:'+sColor+';padding:3px 8px;border:1px solid '+sColor+';border-radius:10px">'+sLabel+'</span>';
    h+='</div>';
    if(req.message){h+='<div style="margin-top:8px;font-size:13px;color:#333;background:#f9f9f9;padding:8px 10px;border-radius:6px">'+escHtml(req.message)+'</div>';}
    if(req.resolved_at){h+='<div style="font-size:11px;color:#999;margin-top:6px">Həll tarixi: '+fmtReqDate(req.resolved_at)+(req.resolved_by?' | '+escHtml(req.resolved_by):'')+'</div>';}
    // Admin note textarea
    h+='<div style="margin-top:10px">';
    h+='<textarea id="crn-'+reqId+'" rows="2" class="fi" style="width:100%;font-size:12px;resize:vertical" placeholder="Admin qeyd (maks. 400 simvol)" maxlength="400">'+noteVal+'</textarea>';
    h+='</div>';
    // Action buttons
    h+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center">';
    if(!isClosed){
      h+='<button class="btn btn-sm btn-blue" onclick="updateClientRequest(\''+reqId+'\',\'seen\',null)">Görüldü</button>';
      h+='<button class="btn btn-sm" style="background:#2e7d32;color:#fff" onclick="updateClientRequest(\''+reqId+'\',\'resolved\',null)">Həll edildi</button>';
      h+='<button class="btn btn-sm btn-gray" onclick="updateClientRequest(\''+reqId+'\',\'cancelled\',null)">Ləğv edildi</button>';
    }
    var noteBtnLabel=(req.status==='pending')?'💾 Qeydi saxla / Görüldü et':'💾 Qeydi Saxla';
    var noteBtnTitle=(req.status==='pending')?'Qeydi saxla və müraciəti görüldü et':'Qeydi yadda saxla';
    h+='<button class="btn btn-sm btn-gray" onclick="saveClientReqNote(\''+reqId+'\')" title="'+noteBtnTitle+'">'+noteBtnLabel+'</button>';
    h+=clientReqWhatsAppBtn(cid);
    h+='</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ═══════════════════════════════════════════════════════════════════════════

initApp();
</script>
</body>
